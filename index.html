<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lucy's Space</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F2;--surface:#FFF;--s2:#F2EFE9;--s3:#EAE6DE;
  --border:#E2DDD5;--border2:#D4CFC6;
  --text:#1C1917;--t2:#6B6560;--t3:#A39E97;
  --accent:#C17C3C;--al:#F5E8D8;
  --green:#4A7C6F;--gl:#E0EDEA;
  --red:#C14A3C;--rl:#F5DDD8;
  --r:12px;--rsm:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sw:240px;
  
  /* 모든 영역(영문, 숫자 포함)을 선택한 폰트로 완벽히 통일 */
  --sans:'Pretendard','Apple SD Gothic Neo',sans-serif;
  --serif:var(--sans);
  --mono:var(--sans);

  /* Routine card colors */
  --rc-bg:#E8F0F5;--rc-header:#7AAEC8;--rc-dot:#5A9AB8;

  /* Goal section vars */
  --goal-bg1:#E8F4F8;--goal-bg2:#D6EAF4;
  --goal-border:#B8D9EC;--goal-text:#1a3a4a;--goal-sub:#5a8fa8;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#B8D9EC;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#cce4f0;
}
/* ── THEME: SKY (1번 테마) ── */
body.theme-sky{
  --bg:#F4F8F9;--surface:#FFFFFF;--s2:#EDF3F5;--s3:#E2EDF0;
  --border:#D3E3E8;--border2:#B8D0D8;
  --rc-bg:#FFFFFF;--rc-header:#86A8AD;--rc-dot:#86A8AD;
  --accent:#86A8AD;--al:#E8F0F2;
  --goal-bg1:#F4F8F9;--goal-bg2:#EDF3F5;
  --goal-border:#D3E3E8;--goal-text:#2C3E42;--goal-sub:#6A868C;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#D3E3E8;
  --goal-item-bg:rgba(255,255,255,.8);--goal-item-border:#D3E3E8;
}
/* ── THEME: SAND (2번 테마 - 샌드 베이지) ── */
body.theme-sand{
  --bg:#F8F6F4;--surface:#FFFFFF;--s2:#F3EFEA;--s3:#EAE4DC;
  --border:#DFD8CE;--border2:#D1C8BC;
  --rc-bg:#F0EBE4;--rc-header:#B3A89D;--rc-dot:#968A7D;
  --accent:#A39688;--al:#F3EFEA;
  --goal-bg1:#EFE9E2;--goal-bg2:#E6DFD6;
  --goal-border:#D1C8BC;--goal-text:#3B342C;--goal-sub:#6A6157;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#D1C8BC;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#DFD8CE;
}
/* ── THEME: LIGHT BEIGE (3번 테마 - 연한 베이지) ── */
body.theme-lightBeige{
  --bg:#FDFBF7;--surface:#FFFFFF;--s2:#F5F3ED;--s3:#EAE7DF;
  --border:#E0DCD3;--border2:#C8C3BA;
  --rc-bg:#FFFFFF;--rc-header:#C0B5A7;--rc-dot:#C0B5A7;
  --accent:#C0B5A7;--al:#F3EFE9;
  --goal-bg1:#FDFBF7;--goal-bg2:#F5F3ED;
  --goal-border:#E0DCD3;--goal-text:#4A443B;--goal-sub:#8A8275;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#E0DCD3;
  --goal-item-bg:rgba(255,255,255,.8);--goal-item-border:#E0DCD3;
}
/* ── THEME: LIGHT GRAY (4번 테마 - 연한 회색) ── */
body.theme-lightGray{
  --bg:#F5F6F8;--surface:#FFFFFF;--s2:#EDEFF2;--s3:#DFE3E8;
  --border:#D0D5DB;--border2:#A8B1BC;
  --rc-bg:#FFFFFF;--rc-header:#A0ABB5;--rc-dot:#A0ABB5;
  --accent:#A0ABB5;--al:#EAF0F5;
  --goal-bg1:#F5F6F8;--goal-bg2:#EDEFF2;
  --goal-border:#D0D5DB;--goal-text:#3E454C;--goal-sub:#7A8693;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#D0D5DB;
  --goal-item-bg:rgba(255,255,255,.8);--goal-item-border:#D0D5DB;
}
/* ── THEME: STEEL (뮤트 블루그레이) ── */
body.theme-steel{
  --bg:#F4F6F8;--surface:#FFFFFF;--s2:#EDF1F4;--s3:#E2E8ED;
  --border:#CDD7DF;--border2:#B0BECA;
  --rc-bg:#E8EEF2;--rc-header:#8A9DAC;--rc-dot:#6E8292;
  --accent:#7B8E9D;--al:#E4ECF1;
  --goal-bg1:#E2E8ED;--goal-bg2:#CDD7DF;
  --goal-border:#B0BECA;--goal-text:#2D3841;--goal-sub:#5A6E7D;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#B0BECA;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#CDD7DF;
}
/* ── THEME: SAGE (차분한 세이지 그린) ── */
body.theme-sage{
  --bg:#F5F7F4;--surface:#FFFFFF;--s2:#EFF2ED;--s3:#E4EAE1;
  --border:#CEDBCA;--border2:#B1C4AD;
  --rc-bg:#EAF0E7;--rc-header:#92AA8A;--rc-dot:#758D6E;
  --accent:#839A7A;--al:#E8EFE5;
  --goal-bg1:#E4EAE1;--goal-bg2:#CEDBCA;
  --goal-border:#B1C4AD;--goal-text:#2F3D29;--goal-sub:#5A7351;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#B1C4AD;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#CEDBCA;
}
/* ── THEME: MATCHA (연한 말차) ── */
body.theme-matcha{
  --bg:#F7F8F3;--surface:#FFFFFF;--s2:#F0F3E8;--s3:#E6EBD8;
  --border:#D1DAB9;--border2:#BCC79D;
  --rc-bg:#EDF1E1;--rc-header:#A3B27D;--rc-dot:#889762;
  --accent:#95A46D;--al:#EBEFD8;
  --goal-bg1:#E6EBD8;--goal-bg2:#D1DAB9;
  --goal-border:#BCC79D;--goal-text:#343C22;--goal-sub:#6A7849;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#BCC79D;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#D1DAB9;
}
/* ── THEME: LAVENDER (페일 라벤더) ── */
body.theme-lavender{
  --bg:#F6F5F9;--surface:#FFFFFF;--s2:#F0EDF5;--s3:#E5E1EE;
  --border:#D2CCDF;--border2:#B9B0CB;
  --rc-bg:#EAE6F1;--rc-header:#9687B3;--rc-dot:#7C6D99;
  --accent:#8B7CA8;--al:#E7E2EE;
  --goal-bg1:#E5E1EE;--goal-bg2:#D2CCDF;
  --goal-border:#B9B0CB;--goal-text:#342C44;--goal-sub:#645680;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#B9B0CB;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#D2CCDF;
}
/* ── THEME: BLUSH (소프트 피치 블러시) ── */
body.theme-blush{
  --bg:#FCF6F5;--surface:#FFFFFF;--s2:#FAF0EE;--s3:#F5E5E2;
  --border:#E8CAC5;--border2:#D4ABA4;
  --rc-bg:#F8EAE7;--rc-header:#C28D85;--rc-dot:#A6736A;
  --accent:#B58077;--al:#F5E2DE;
  --goal-bg1:#F5E5E2;--goal-bg2:#E8CAC5;
  --goal-border:#D4ABA4;--goal-text:#442A25;--goal-sub:#875A52;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#D4ABA4;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#E8CAC5;
}
/* ── THEME: DUSTY ROSE (더스티 로즈) ── */
body.theme-dustyRose{
  --bg:#FAF4F5;--surface:#FFFFFF;--s2:#F5EBED;--s3:#EEDEE1;
  --border:#DFBCC2;--border2:#CA9EA5;
  --rc-bg:#F2E3E6;--rc-header:#B8858E;--rc-dot:#9E6B74;
  --accent:#AA7881;--al:#EED9DC;
  --goal-bg1:#EEDEE1;--goal-bg2:#DFBCC2;
  --goal-border:#CA9EA5;--goal-text:#40282C;--goal-sub:#7E5259;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#CA9EA5;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#DFBCC2;
}
/* ── THEME: OLIVE (뮤트 올리브) ── */
body.theme-olive{
  --bg:#F6F6F4;--surface:#FFFFFF;--s2:#F0F0EB;--s3:#E6E6DD;
  --border:#D1D1C2;--border2:#BCBCA8;
  --rc-bg:#EBEBE2;--rc-header:#9E9E88;--rc-dot:#82826E;
  --accent:#8F8F79;--al:#E6E6DC;
  --goal-bg1:#E6E6DD;--goal-bg2:#D1D1C2;
  --goal-border:#BCBCA8;--goal-text:#323228;--goal-sub:#616150;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#BCBCA8;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#D1D1C2;
}

/* ── THEME: CUSTOM ── */
body.theme-custom{
  --bg:var(--ct-light);--surface:#FFFFFF;--s2:var(--ct-lighter);--s3:var(--ct-mid);
  --border:var(--ct-border);--border2:var(--ct-border2);
  --rc-bg:var(--ct-lighter);--rc-header:var(--ct-dark);--rc-dot:var(--ct-dark);
  --accent:var(--ct-dark);--al:var(--ct-lighter);
  --goal-bg1:var(--ct-mid);--goal-bg2:var(--ct-border);
  --goal-border:var(--ct-border2);--goal-text:#1a1a1a;--goal-sub:var(--ct-dark);
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:var(--ct-border);
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:var(--ct-border);
}

html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:var(--sw);min-width:var(--sw);background:var(--s2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:100;transition:transform .3s}
.sb-head{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.logo{font-family:var(--serif);font-size:1.5714em;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.logo-sub{font-size:0.7857em;color:var(--t3);font-family:var(--mono);margin-top:2px}
.sb-sc{overflow-y:auto;flex:1}
.sb-sc::-webkit-scrollbar{width:3px}
.sb-sc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-sec{padding:12px 8px 4px}
.sb-lbl{font-size:0.7143em;font-weight:500;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;padding:0 8px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.nav{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--rsm);cursor:pointer;color:var(--t2);font-size:0.9643em;border:none;background:none;width:100%;text-align:left;transition:all .15s;font-family:var(--sans)}
.nav:hover{background:var(--s3);color:var(--text)}
.nav.on{background:var(--al);color:var(--accent)}
.nav-ic{font-size:1.0714em;width:18px;text-align:center;flex-shrink:0}
.nav-bd{margin-left:auto;background:var(--accent);color:#fff;font-size:0.7143em;padding:1px 6px;border-radius:99px;font-family:var(--mono)}
.pnav{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--rsm);cursor:pointer;color:var(--t2);font-size:0.9286em;transition:all .15s}
.pnav:hover,.pnav.on{background:var(--s2);color:var(--text)}
.pdot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.sb-ft{padding:12px 8px;border-top:1px solid var(--border)}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{height:48px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.tb-title{font-size:1em;font-weight:500}
.tb-date{font-family:var(--mono);font-size:0.7857em;color:var(--t3);margin-left:auto}
.hbg{display:none;background:none;border:none;cursor:pointer;color:var(--text);font-size:1.2857em;padding:4px}
.content{flex:1;overflow-y:auto;padding:28px 32px;background:var(--bg)}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── PAGE ── */
.ph{margin-bottom:20px}
.pt{font-family:var(--serif);font-size:2.2857em;font-weight:300;letter-spacing:-.5px;line-height:1.2}
.ps{font-size:0.9286em;color:var(--t3);margin-top:6px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pc{animation:fi .22s ease}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ct{font-size:0.9286em;font-weight:500;display:flex;align-items:center;gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

/* ── STAT ── */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.sl{font-size:0.7857em;color:var(--t3);font-family:var(--sans);letter-spacing:.04em;font-weight:500}
.sv{font-family:var(--serif);font-size:1em;line-height:1.2;margin:4px 0 2px}
.ss{font-size:0.8571em;color:var(--t3)}

/* ── PROGRESS ── */
.pw{background:var(--s3);border-radius:99px;height:6px;overflow:hidden}
.pb{height:100%;border-radius:99px;transition:width .6s ease}
.pl{display:flex;justify-content:space-between;font-size:0.7857em;color:var(--t3);margin-top:4px;font-family:var(--mono)}

/* ── CHECK ── */
.ci{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ci:last-child{border-bottom:none;padding-bottom:0}
.ci:first-child{padding-top:0}
.cb{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.cb.on{background:var(--green);border-color:var(--green)}
.cb.on::after{content:'✓';color:#fff;font-size:0.7143em;font-weight:600}
.ck{flex:1;font-size:0.9643em}
.ck.done{color:var(--t3);text-decoration:line-through}
.cd{font-size:0.8571em;color:var(--t3);display:block;margin-top:1px}

/* ── BTN ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rsm);font-size:0.9286em;font-family:var(--sans);border:1px solid transparent;cursor:pointer;transition:all .15s;font-weight:400;text-decoration:none}
.bp{background:var(--accent);color:#fff;border-color:var(--accent)}
.bp:hover{opacity:.9}
.bg{background:transparent;color:var(--t2);border-color:var(--border)}
.bg:hover{background:var(--s2);color:var(--text)}
.bsm{padding:5px 10px;font-size:0.8571em}
.bi{padding:6px;background:none;border:none;cursor:pointer;color:var(--t3);border-radius:6px;display:inline-flex;transition:all .15s}
.bi:hover{background:var(--s2);color:var(--text)}

/* ── INPUT ── */
.inp,.ta,.sel{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 12px;font-size:0.9643em;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s;width:100%}
.inp:focus,.ta:focus,.sel:focus{border-color:var(--accent);background:var(--surface)}
.ta{resize:vertical;min-height:80px;line-height:1.6}
.fg{margin-bottom:12px}
.fl{font-size:0.8571em;color:var(--t2);margin-bottom:5px;display:block}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.md{background:var(--surface);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:translateY(8px);transition:transform .2s}
.mo.open .md{transform:translateY(0)}
.mh{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-family:var(--serif);font-size:1.5714em}
.mb{padding:20px 24px}
.mf{padding:0 24px 20px;display:flex;gap:8px;justify-content:flex-end}

/* ── COLORS ── */
.cops{display:flex;gap:8px;flex-wrap:wrap}
.cop{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cop.on,.cop:hover{border-color:var(--text);transform:scale(1.15)}

/* ── DEADLINE ── */
.dl{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.dl:last-child{border-bottom:none;padding-bottom:0}
.db{min-width:44px;text-align:center;background:var(--s2);border-radius:8px;padding:6px 8px}
.dm{font-size:0.7143em;color:var(--t3);font-family:var(--mono);text-transform:uppercase}
.dd{font-size:1.2857em;font-weight:600;font-family:var(--mono);line-height:1}

/* ── MILESTONE ── */
.msi{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.msi:last-child{border-bottom:none}
.mss{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.mss.on{background:var(--green);border-color:var(--green)}
.mss.on::after{content:'✓';color:#fff;font-size:0.7143em;font-weight:700}

/* ── DAYBTN ── */
.daybtn{display:inline-flex;align-items:center;cursor:pointer;font-size:0.9286em;padding:5px 10px;border-radius:99px;border:1px solid var(--border);transition:all .15s;background:none;font-family:var(--sans)}

/* ── LIFE AREA ── */
.la-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.la-card{background:var(--surface);border-radius:14px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;border:1.5px solid transparent}
.la-add{background:transparent;border:1.5px dashed var(--border2);border-radius:14px;padding:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:130px;transition:all .2s}
.la-add:hover{border-color:var(--accent);background:var(--al)}

/* ── PROJECT CARD ── */
.pj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.pj-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:var(--sh);transition:box-shadow .2s,transform .2s;display:flex;flex-direction:column}
.pj-card:hover{box-shadow:var(--shm);transform:translateY(-2px)}
.pj-bar{height:4px}
.pj-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:10px}

/* ── BACK ── */
.back{display:inline-flex;align-items:center;gap:6px;color:var(--t3);font-size:0.9286em;cursor:pointer;margin-bottom:20px;transition:color .15s;border:none;background:none}
.back:hover{color:var(--text)}

/* ── TODAY LAYOUT ── */
.today-wrap{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start}

/* ── ROUTINE CARD (screenshot style) ── */
.rc{background:var(--rc-bg);border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
.rc-head{background:var(--rc-header);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.rc-head-title{color:#fff;font-size:1.0714em;font-weight:600;display:flex;align-items:center;gap:8px}
.rc-head-date{color:rgba(255,255,255,.85);font-size:0.9286em;font-family:var(--sans)}
.rc-nav{display:flex;align-items:center;gap:6px}
.rc-nav-btn{background:rgba(255,255,255,.25);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;transition:background .15s}
.rc-nav-btn:hover{background:rgba(255,255,255,.4)}
.rc-body{padding:16px}
.rc-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.rc-item:last-child{border-bottom:none;padding-bottom:0}
.rc-item:first-child{padding-top:0}
.rc-dot{width:10px;height:10px;border-radius:50%;background:var(--rc-dot);flex-shrink:0;margin-top:5px}
.rc-dot.done{background:var(--green)}
.rc-time{font-size:0.8571em;color:var(--rc-header);font-weight:600;font-family:var(--mono);margin-bottom:2px;font-variant-numeric:tabular-nums;letter-spacing:.03em}
.rc-task{font-size:1em;font-weight:400;color:var(--text);cursor:pointer;transition:color .15s}
.rc-task:hover{color:var(--rc-header)}
.rc-task.done{text-decoration:line-through;color:var(--t3)}
.rc-detail{font-size:0.8571em;color:var(--t2);margin-top:1px}
.rc-empty{padding:24px;text-align:center;color:var(--t3);font-size:0.9286em}
.rc-progress{padding:12px 16px 16px;display:flex;align-items:center;gap:10px}
.rc-pbar-wrap{flex:1;background:rgba(0,0,0,.05);border-radius:99px;height:6px;overflow:hidden}
.rc-pbar{height:100%;border-radius:99px;background:var(--rc-header);transition:width .6s}
.rc-pct{font-size:0.8571em;color:var(--rc-header);font-weight:600;font-family:var(--mono);flex-shrink:0;font-variant-numeric:tabular-nums}

/* ── DOW TABS ── */
.dow-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.dow-tab{padding:4px 10px;border-radius:99px;font-size:0.8571em;cursor:pointer;border:1px solid var(--border);background:none;color:var(--t2);font-family:var(--sans);transition:all .15s}
.dow-tab.on{background:var(--rc-header);color:#fff;border-color:var(--rc-header)}

/* ── QUOTE ── */
.quote{font-family:var(--serif);font-style:italic;font-size:1.1429em;color:var(--t2);line-height:1.5;border-left:3px solid var(--accent);padding-left:14px;margin-bottom:20px}

/* ── SAVINGS ── */
.sbig{font-family:var(--serif);font-size:2.8571em;letter-spacing:-1px}

hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.empty{text-align:center;padding:28px 20px;color:var(--t3)}
.diary-cell{position:relative;}
.diary-preview{
  display:none;position:absolute;z-index:200;
  left:50%;transform:translateX(-50%);
  bottom:calc(100% + 8px);
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
  width:220px;pointer-events:none;
  animation:fi .15s ease;
}
.diary-preview::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--border);
}
.diary-cell:hover .diary-preview{display:block;}
.cal-cell{transition:background .1s;cursor:pointer;}
.cal-cell:hover{background:var(--s2) !important;}
.mini-cal-cell:hover{background:var(--s2) !important;}
.ei{font-size:2.1429em;margin-bottom:6px}

@media(max-width:900px){
  .today-wrap{grid-template-columns:1fr}
  .pj-grid,.la-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){

// Firestore 저장/로드
async function saveToCloud(data) {
  if (!currentUser) return;
  try {
    const chunks = chunkData(data);
    const batch = db.batch();
    Object.entries(chunks).forEach(([key, val]) => {
      const ref = db.collection('users').doc(currentUser.uid).collection('data').doc(key);
      batch.set(ref, { value: JSON.stringify(val), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    });
    await batch.commit();
  } catch(e) { console.error('Cloud save error:', e); }
}

async function loadFromCloud() {
  if (!currentUser) return null;
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('data').get();
    if (snap.empty) return null;
    const merged = {};
    snap.forEach(doc => {
      try { merged[doc.id] = JSON.parse(doc.data().value); } catch(e) {}
    });
    return mergeChunks(merged);
  } catch(e) { console.error('Cloud load error:', e); return null; }
}

// 큰 데이터를 필드별로 나눠서 저장 (Firestore 1MB 제한 대응)
function chunkData(data) {
  const FIELDS = ['routines','checks','projects','deadlines','savings','notes','calEvents',
    'lifeGoal','theme','customThemeColor','diaryEntries','monthlyGoals','monthlyMemo',
    'weeklyGoals','weeklyMemo','diaryStickers','font','fontSize','fontWeight','customFonts',
    'lifeAreas','todoList','todoListTmr'];
  const chunks = {};
  FIELDS.forEach(f => { if (data[f] !== undefined) chunks[f] = data[f]; });
  // customFontData는 Firestore 용량 초과 → 저장 제외 (localStorage에만)
  // 나머지 소형 데이터
  const rest = {};
  Object.keys(data).forEach(k => {
    if (!FIELDS.includes(k) && k !== 'customFontData') rest[k] = data[k];
  });
  if (Object.keys(rest).length > 0) chunks['_misc'] = rest;
  return chunks;
}
function mergeChunks(chunks) {
  const result = {};
  Object.entries(chunks).forEach(([k, v]) => {
    if (k === '_misc') Object.assign(result, v);
    else result[k] = v;
  });
  return result;
}

let pjFilter = '';
let viewDate = todStr();

const titles = {today:'Today',diary:'Thanks Diary',calendar:'Monthly',routine:'루틴 설정',life:'나의 라이프',projects:'프로젝트',deadlines:'마감 관리',savings:'저축 목표',settings:'설정',ledger:'가계부'};

function go(p, pid, _fromPopstate){
  page=p; activePid=pid||null; if(p!=='projects') pjFilter='';
  // 브라우저 히스토리에 상태 추가 (popstate로 인한 호출이 아닐 때만)
  if(!_fromPopstate){
    const state={page:p,pid:pid||null};
    const url='#'+p+(pid?'/'+pid:'');
    history.pushState(state,'',(p==='today'&&!pid)?window.location.pathname:url);
  }
  document.querySelectorAll('.nav').forEach(e=>e.classList.remove('on'));
  const n=document.getElementById('nav-'+p);
  if(n) n.classList.add('on');
  const tbTitle=document.getElementById('tb-title');
  const topbar=document.querySelector('.topbar');
  const isMobile=window.innerWidth<=768;
  const hideTopbarPages=['ledger','today','calendar','diary','deadlines'];

  // 모바일에서는 항상 탑바 표시, 데스크탑에서만 hideTopbarPages 적용
  if(!isMobile && hideTopbarPages.includes(p)){
    if(topbar) topbar.style.display='none';
  } else {
    if(topbar) topbar.style.display='';
  }

  // 플로팅 햄버거는 항상 숨김 (모바일 탑바로 대체)
  const fhbg=document.getElementById('float-hbg');
  if(fhbg) fhbg.style.display='none';

  if(pid){
    const proj=S.projects.find(x=>x.id===pid)||{name:'프로젝트'};
    const area=(S.lifeAreas||[]).find(a=>a.id===proj.lifeAreaId);
    const colorDot='<span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:'+(proj.color||'#999')+';margin-right:6px;vertical-align:middle;flex-shrink:0"></span>';
    const areaBadge=area?'<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:0.78em;font-weight:500;background:'+area.color+'18;color:'+area.color+';margin-left:8px;vertical-align:middle">'+area.emoji+' '+area.name+'</span>':'';
    tbTitle.innerHTML=colorDot+proj.name+areaBadge;
  } else {
    tbTitle.textContent=titles[p]||'';
  }
  render(); closeSB();
}

function toggleSB(){document.getElementById('sb').classList.toggle('open');document.getElementById('sb-ov').style.display=document.getElementById('sb').classList.contains('open')?'block':'none';}
function closeSB(){document.getElementById('sb').classList.remove('open');document.getElementById('sb-ov').style.display='none';}

// ═══════════ MODAL ═══════════
function openMo(t,b,f){
  document.getElementById('mo-t').textContent=t;
  document.getElementById('mo-b').innerHTML=b;
  document.getElementById('mo-f').innerHTML=f;
  document.getElementById('mo').classList.add('open');
}
function closeMo(){document.getElementById('mo').classList.remove('open');}
function moOut(e){if(e.target===document.getElementById('mo'))closeMo();}

// ═══════════ RENDER ═══════════
function render(){
  const el=document.getElementById('main');
  const div=document.createElement('div');
  div.className='pc';
  if(page==='today') div.innerHTML=renderToday();
  else if(page==='diary') div.innerHTML=renderDiary();
  else if(page==='routine') div.innerHTML=renderRoutinePage();
  else if(page==='calendar') div.innerHTML=renderCalendar();
  else if(page==='life') div.innerHTML=renderLife();
  else if(page==='projects') div.innerHTML=activePid?renderPjDetail(activePid):renderProjects();
  else if(page==='deadlines') div.innerHTML=renderDeadlines();
  else if(page==='savings') div.innerHTML=renderSavings();
  else if(page==='settings') div.innerHTML=renderSettings();
  else if(page==='ledger') div.innerHTML=renderLedger();
  el.innerHTML=''; el.appendChild(div);
  updateSB();
  
  // Event Delegation
  setTimeout(function(){
    document.querySelectorAll('.mini-cal-cell').forEach(function(el){
      el.addEventListener('click',function(){
        window.diaryDate=this.dataset.ds;
        go('diary');
      });
    });
    var cp=document.getElementById('custom-color-picker');
    if(cp){
      cp.addEventListener('input',function(){
        S.customThemeColor=this.value;
        S.theme='custom';
        save();
        applyTheme('custom');
        var preview=document.querySelector('[data-theme-preview="custom"]');
        if(preview) preview.style.background='linear-gradient(135deg,'+this.value+','+this.value+')';
      });
    }
    document.querySelectorAll('.diary-cell').forEach(function(el){
      el.addEventListener('click',function(){
        openDiaryModal(this.dataset.ds);
      });
    });
    // 투두 입력창 이벤트 바인딩 (draggable 버그 우회)
    document.querySelectorAll('[data-todo-input="1"]').forEach(function(inp){
      function handleEnter(e){
        if(e.key==='Enter'||e.keyCode===13){
          e.preventDefault(); e.stopPropagation();
          addTodoInline(inp.dataset.ds, inp.id);
        }
      }
      inp.addEventListener('keydown', handleEnter);
      inp.addEventListener('keyup', handleEnter);
      // 모바일 소프트키보드 "완료/보내기" 대응
      inp.addEventListener('input', function(e){
        if(inp.value.endsWith('\n')){
          inp.value=inp.value.replace(/\n/g,'');
          addTodoInline(inp.dataset.ds, inp.id);
        }
      });
    });
  },0);
}

function updateSB(){
  const t=todStr(),checks=S.checks[t]||{};
  const rods=routinesForDate(t);
  const done=rods.filter(r=>checks[r.id]).length;
  const bd=document.getElementById('today-bd');
  if(done>0){bd.style.display='';bd.textContent=done+'/'+rods.length;}else bd.style.display='none';
  const sec=document.getElementById('pj-nav-sec'),list=document.getElementById('pj-nav-list');
  if(S.projects.length>0){
    sec.style.display='';
    list.innerHTML=S.projects.map(p=>'<div class="pnav '+(activePid===p.id?'on':'')+'" onclick="go(\'projects\',\''+p.id+'\')"><div class="pdot" style="background:'+p.color+'"></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.name+'</span></div>').join('');
  } else sec.style.display='none';
}

// ═══════════ ROUTINE CARD ═══════════
function routineCard(ds){
  const dow=dowOf(ds);
  const dayName=DOW_KO[dow];
  const checks=S.checks[ds]||{};
  const rods=routinesForDate(ds);
  const done=rods.filter(r=>checks[r.id]).length;
  const pct=rods.length?Math.round(done/rods.length*100):0;
  const isToday=ds===todStr();

  const dt=new Date(ds+'T00:00:00');
  const dateLabel=(dt.getMonth()+1)+'월 '+dt.getDate()+'일 ('+dayName+')';

  let itemsHtml='';
  if(rods.length===0){
    itemsHtml='<div class="rc-empty">이 요일 루틴이 없어요<br><small>루틴 설정에서 추가하세요</small></div>';
  } else {
    rods.forEach(r=>{
      const isDone=!!checks[r.id];
      itemsHtml+='<div class="rc-item" onclick="toggleCheck(\''+r.id+'\',\''+ds+'\')">'+
        '<div class="rc-dot '+(isDone?'done':'')+'"></div>'+
        '<div style="flex:1">'+
          '<div style="display:flex;align-items:baseline;gap:8px">'+
            '<div class="rc-time">'+r.time+'</div>'+
            '<div class="rc-task '+(isDone?'done':'')+'">'+r.task+'</div>'+
          '</div>'+
          (r.detail?'<div class="rc-detail">'+r.detail+'</div>':'')+
        '</div>'+
        (isDone?'<div style="color:var(--green);font-size:1.1429em">✓</div>':'')+
      '</div>';
    });
  }

  return '<div class="rc">'+
    '<div class="rc-head" style="flex-wrap:nowrap;gap:6px">'+
      '<div class="rc-head-title" style="white-space:nowrap;flex-shrink:0">⏰ 데일리 루틴</div>'+
      '<div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end;min-width:0">'+
        '<div class="rc-head-date" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+dateLabel+'</div>'+
        '<div class="rc-nav" style="flex-shrink:0">'+
          '<button class="rc-nav-btn" onclick="event.stopPropagation();shiftView(-1)">‹</button>'+
          (viewDate!==todStr()?'<button class="rc-nav-btn" onclick="event.stopPropagation();resetView()" title="오늘로" style="font-size:0.7143em;width:32px;border-radius:8px">오늘</button>':'')+
          '<button class="rc-nav-btn" onclick="event.stopPropagation();shiftView(1)">›</button>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="rc-body">'+itemsHtml+'</div>'+
    (rods.length>0?'<div class="rc-progress"><div class="rc-pbar-wrap"><div class="rc-pbar" style="width:'+pct+'%"></div></div><div class="rc-pct">'+done+'/'+rods.length+'</div></div>':'')+
  '</div>';
}

function toggleCheck(rid, ds){
  if(!S.checks[ds]) S.checks[ds]={};
  S.checks[ds][rid]=!S.checks[ds][rid];
  save(); render();
}
let _shiftBusy=false;
function shiftView(d){if(_shiftBusy)return;_shiftBusy=true;viewDate=addDays(viewDate,d);render();setTimeout(function(){_shiftBusy=false;},300);}
function resetView(){viewDate=todStr();render();}

// ═══════════ TODAY PAGE ═══════════
function renderToday(){
  const t=todStr();
  const checks=S.checks[t]||{};
  const rods=routinesForDate(t);
  const done=rods.filter(r=>checks[r.id]).length;
  const total=rods.length;
  const pct=total?Math.round(done/total*100):0;
  const spct=S.savings.goal?Math.min(100,Math.round(S.savings.current/S.savings.goal*100)):0;

  // 이번 달 목표
  const ym=t.slice(0,7);
  const monthGoals=S.monthlyGoals[ym]||[];
  const MN_KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const curMonthName=MN_KO[new Date().getMonth()];

  // 이번 주 마감
  const upcoming=S.deadlines.filter(d=>{const n=dLeft(d.date);return n>=0&&n<=7;}).sort((a,b)=>a.date.localeCompare(b.date));

  // 오늘 할일
  if(!S.todoList)S.todoList={};
  if(!S.todoList[t])S.todoList[t]=[];

  // 30일 이전 데이터 자동 정리
  const cutoff=addDays(t,-30);
  Object.keys(S.todoList).forEach(function(k){if(k<cutoff)delete S.todoList[k];});

  // 자동 이월: 어제 미완료 항목을 오늘로
  const yest=addDays(t,-1);
  if(S.todoList[yest]){
    const carry=S.todoList[yest].filter(item=>!item.done&&!item._carried);
    carry.forEach(function(item){
      const already=S.todoList[t].some(x=>x.text===item.text&&x._carried);
      if(!already) S.todoList[t].unshift({id:gid(),text:item.text,done:false,_carried:true});
    });
    if(carry.length>0)save();
  }

  const todayItems=S.todoList[t];

  function renderTodoList(items,ds,label){
    const safeDs=ds.replace(/-/g,'_');
    return '<div class="card" style="margin-bottom:0">'+
      '<div class="ct" style="margin-bottom:10px">'+label+'</div>'+
      (items.length===0?'':
        items.map(function(item,i){
          return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">'+
            '<div onclick="togTodoItem(\''+ds+'\','+i+')" style="width:16px;height:16px;border-radius:4px;border:1.5px solid '+(item.done?'var(--green)':'var(--border2)')+';background:'+(item.done?'var(--green)':'transparent')+';cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">'+
            (item.done?'<span style="color:#fff;font-size:0.6em">✓</span>':'')+
            '</div>'+
            '<div style="flex:1;font-size:0.9em;'+(item.done?'text-decoration:line-through;color:var(--t3)':'')+(item._carried?';color:var(--accent)':'')+'">'+
              item.text+(item._carried?'<span style="font-size:0.72em;color:var(--accent);margin-left:4px">↩이월</span>':'')+
            '</div>'+
            '<button class="bi" onclick="delTodoItem(\''+ds+'\','+i+')" style="font-size:0.8em;color:var(--t3)">✕</button>'+
          '</div>';
        }).join(''))+
      '<div style="display:flex;align-items:center;gap:8px;padding-top:8px">'+
        '<div style="width:16px;height:16px;border-radius:4px;border:1.5px dashed var(--border2);flex-shrink:0"></div>'+
        '<input id="todo-inp-'+safeDs+'" class="inp" style="flex:1;padding:5px 8px;font-size:0.9em;background:transparent;border-color:transparent;border-bottom:1px solid var(--border);border-radius:0" placeholder="할 일 추가..." data-ds="'+ds+'" data-todo-input="1" enterkeyhint="send" inputmode="text">'+
        '<button onclick="addTodoInline(\''+ds+'\',\'todo-inp-'+safeDs+'\')" style="flex-shrink:0;width:28px;height:28px;border-radius:8px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;line-height:1">+</button>'+
      '</div>'+
    '</div>';
  }


  var goalBar=(S.lifeGoal&&S.lifeGoal.text)
    ? '<div style="padding:10px 0 16px;font-size:0.9286em;color:var(--t2);font-style:italic;border-bottom:1px solid var(--border);margin-bottom:20px">🎯 '+S.lifeGoal.text+'</div>'
    : '';

  var entry=(S.diaryEntries||{})[t]||{};

  // 고정 카드 정의
  var statsCard='<div class="g2" style="margin-bottom:0">'+
    '<div class="stat"><div class="sl">루틴 달성</div><div class="sv">'+pct+'%</div><div class="pw" style="margin-top:6px"><div class="pb" style="width:'+pct+'%;background:var(--green)"></div></div><div class="ss">'+done+' / '+total+' 완료</div></div>'+
    '<div class="stat"><div class="sl">저축 달성</div><div class="sv">'+spct+'%</div><div class="pw" style="margin-top:6px"><div class="pb" style="width:'+spct+'%;background:var(--accent)"></div></div><div class="ss">'+money(S.savings.current)+'</div></div>'+
    '</div>';

  var deadlinesCard='<div class="card" style="margin-bottom:0;height:100%">'+
    '<div class="ch"><div class="ct">🚨 이번 주 마감</div></div>'+
    (upcoming.length===0?'<div style="font-size:0.85em;color:var(--t3)">마감 없음 🎉</div>':
      upcoming.slice(0,4).map(function(d){var f=fmtDateObj(d.date),dd=dLeft(d.date);
        return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">'+
          '<div style="min-width:36px;text-align:center;background:var(--s2);border-radius:6px;padding:3px 5px"><div style="font-size:0.62em;color:var(--t3)">'+f.month+'</div><div style="font-size:0.85em;font-weight:600">'+f.day+'</div></div>'+
          '<div style="flex:1;font-size:0.88em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+d.title+'</div>'+
          '<div style="font-size:0.78em;font-weight:600;color:'+(dd===0?'var(--red)':dd<=3?'var(--accent)':'var(--t3)')+'">'+( dd===0?'오늘':'D-'+dd)+'</div></div>';
      }).join(''))+
    '</div>';

  var monthlyGoalCard='<div class="card" style="margin-bottom:0;height:100%">'+
    '<div class="ch"><div class="ct">🎯 '+curMonthName+' 목표</div></div>'+
    (monthGoals.length===0?'<div style="font-size:0.85em;color:var(--t3)">목표가 없어요</div>':
      '<div style="display:flex;flex-direction:column;gap:5px">'+monthGoals.slice(0,4).map(function(g,i){
        return '<div style="display:flex;align-items:center;gap:7px;font-size:0.88em">'+
          '<div onclick="togMonthlyGoal(\''+ym+'\','+i+')" style="width:14px;height:14px;border-radius:3px;border:1.5px solid '+(g.done?'var(--green)':'var(--border2)')+';background:'+(g.done?'var(--green)':'transparent')+';cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">'+
          (g.done?'<span style="color:#fff;font-size:0.6em">✓</span>':'')+
          '</div><span style="'+(g.done?'text-decoration:line-through;color:var(--t3)':'')+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+g.text+'</span></div>';
      }).join('')+(monthGoals.length>4?'<div style="font-size:0.78em;color:var(--t3)">+ '+(monthGoals.length-4)+'개 더</div>':'')+
      '</div>')+
    '</div>';

  var projectsCard=S.projects.length>0?
    '<div class="card" style="margin-bottom:0"><div class="ch"><div class="ct">🗂️ 진행 중 프로젝트</div></div>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">'+
    S.projects.slice(0,6).map(function(p){var tk=p.tasks||[],dn=tk.filter(function(t2){return t2.done;}).length,pc=tk.length?Math.round(dn/tk.length*100):0;
      return '<div onclick="go(\'projects\',\''+p.id+'\')" style="cursor:pointer;border:1px solid var(--border);border-radius:10px;padding:12px;transition:box-shadow .2s" onmouseenter="this.style.boxShadow=\'var(--shm)\'" onmouseleave="this.style.boxShadow=\'none\'">'+
        '<div style="display:flex;align-items:center;gap:7px;margin-bottom:8px"><div style="width:9px;height:9px;border-radius:2px;background:'+p.color+';flex-shrink:0"></div><div style="font-size:0.88em;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.name+'</div></div>'+
        '<div class="pw" style="height:4px"><div class="pb" style="width:'+pc+'%;background:'+p.color+'"></div></div>'+
        '<div class="pl" style="margin-top:3px"><span>'+dn+'/'+tk.length+'</span><span>'+pc+'%</span></div></div>';
    }).join('')+'</div></div>':'';

  var diaryCard='<div class="card" style="border:1.5px solid var(--al)">'+
    '<div class="ch" style="margin-bottom:10px"><div class="ct">✨ 오늘의 감사 일기</div></div>'+
    '<textarea id="today-diary-ta" class="ta" style="min-height:90px;font-size:0.9em;resize:none;background:transparent;border:none;padding:0;outline:none" placeholder="오늘 감사한 것을 적어요..." onblur="saveTodayDiaryDirect(\''+t+'\',this.value)">'+( entry.text||'')+'</textarea>'+
    '</div>';

  // 고정 그리드: 이미지의 순서대로 배치
  var rightGrid=
    // 1행: 루틴달성(1칸) + 저축달성(1칸) → statsCard가 g2로 2칸 차지
    '<div style="grid-column:span 2">'+statsCard+'</div>'+
    // 2행: 이번주마감(1칸) + 5월목표(1칸)
    '<div>'+deadlinesCard+'</div>'+
    '<div>'+monthlyGoalCard+'</div>'+
    // 3행: 오늘할일(1칸) + 감사일기(1칸)
    '<div>'+renderTodoList(todayItems,t,'✅ 오늘 할 일')+'</div>'+
    '<div>'+diaryCard+'</div>'+
    // 4행: 진행중 프로젝트(2칸)
    (projectsCard?'<div style="grid-column:span 2">'+projectsCard+'</div>':'');

  return goalBar+
    '<div class="today-wrap">'+
    '<div>'+routineCard(viewDate)+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-content:start">'+
      rightGrid+
    '</div></div>';
}

// ═══════════ TODO 체크리스트 ═══════════
let _todoAdding=false;
function addTodoInline(ds,inputId){
  if(_todoAdding) return;
  const el=document.getElementById(inputId);
  if(!el)return;
  const text=el.value.trim();
  if(!text)return;
  _todoAdding=true;
  el.value='';
  if(!S.todoList)S.todoList={};
  if(!S.todoList[ds])S.todoList[ds]=[];
  S.todoList[ds].push({id:gid(),text,done:false});
  save(); render();
  setTimeout(()=>{ _todoAdding=false; const inp=document.getElementById(inputId); if(inp) inp.focus(); },100);
}
function togTodoItem(ds,i){
  if(!S.todoList||!S.todoList[ds]||!S.todoList[ds][i])return;
  S.todoList[ds][i].done=!S.todoList[ds][i].done;
  save();
  // DOM만 업데이트 (깜빡임 방지)
  const list=S.todoList[ds];
  const item=list[i];
  // 해당 체크박스 찾기 - onclick 속성으로 찾기
  const allBoxes=document.querySelectorAll('[onclick*="togTodoItem"]');
  allBoxes.forEach(function(box){
    const attr=box.getAttribute('onclick')||'';
    if(attr.includes('\''+ds+'\'')&&attr.includes(','+i+')')){
      box.style.background=item.done?'var(--green)':'transparent';
      box.style.borderColor=item.done?'var(--green)':'var(--border2)';
      box.innerHTML=item.done?'<span style="color:#fff;font-size:0.6em">✓</span>':'';
      const textDiv=box.parentElement.querySelector('[style*="font-size:0.9em"]');

function getWeekDates(offset){
  const now=new Date();
  const dow=now.getDay();
  const monday=new Date(now);
  monday.setDate(now.getDate()-dow+1+(offset*7));
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(dateStr(d));}
  return days;
}

        '</div>':'')+

  var curMonthCnt=Object.keys(S.diaryEntries||{}).filter(function(k){

function detectPdf(input){
  const file=input.files[0];
  if(!file)return;
  // 제목 자동 입력
  const titleEl=document.getElementById('mat-title');
  if(titleEl&&!titleEl.value) titleEl.value=file.name.replace(/\.pdf$/i,'');

  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const bytes=new Uint8Array(e.target.result);
      // 바이너리를 latin1 문자열로 변환 (PDF 내부 구조 파싱용)
      let str='';
      for(let i=0;i<bytes.length;i++) str+=String.fromCharCode(bytes[i]);

      let pages=0;

      // 방법 1: /N 숫자 (Pages 딕셔너리 안)
      const m1=str.match(/\/N\s+(\d+)/);
      if(m1) pages=parseInt(m1[1]);

      // 방법 2: /Count 숫자
      if(!pages){
        const counts=[...str.matchAll(/\/Count\s+(\d+)/g)].map(m=>parseInt(m[1]));
        if(counts.length) pages=Math.max(...counts);
      }

      // 방법 3: PDF 전체에서 페이지 오브젝트 개수 세기
      if(!pages){
        const pageObjs=(str.match(/\/Type\s*\/Page[^s]/g)||[]).length;
        if(pageObjs>0) pages=pageObjs;
      }

      // 방법 4: trailer의 /Size로 추정 (부정확하지만 없는 것보다 나음)
      if(!pages){
        const trailer=str.match(/\/Size\s+(\d+)/);
        if(trailer) pages=Math.max(1,parseInt(trailer[1])-1);
      }

      const totalEl=document.getElementById('mat-total');
      if(totalEl&&pages>0){
        totalEl.value=pages;
        document.getElementById('mat-unit').value='p';
      } else if(totalEl){
        totalEl.placeholder='페이지 수 직접 입력';
      }
    }catch(err){console.log('PDF 파싱 오류',err);}
  };
  // 앞 1MB 읽기 (페이지 정보는 대부분 앞부분에 있음)
  reader.readAsArrayBuffer(file.slice(0,1024*1024));
}

let calY=new Date().getFullYear(), calM=new Date().getMonth();
function renderCalendar(){
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MN_KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const ts=todStr();
  const ym=calY+'-'+String(calM+1).padStart(2,'0');

  var monthCards='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px;padding-bottom:4px">'+
    '<div style="display:grid;grid-template-columns:repeat(12,minmax(56px,1fr));gap:4px;min-width:600px">';
  for(var m=0;m<12;m++){
    var isCur=m===calM;
    var key=calY+'-'+String(m+1).padStart(2,'0');
    var evCount=(S.calEvents||[]).filter(e=>e.date.startsWith(key)).length;
    var dlCount=(S.deadlines||[]).filter(d=>d.date.startsWith(key)).length;
    monthCards+='<div data-m="'+m+'" onclick="calM=parseInt(this.dataset.m);render()" style="'+
      'border-radius:10px;padding:9px 4px;cursor:pointer;text-align:center;'+
      'background:'+(isCur?'var(--accent)':'var(--surface)')+';'+
      'border:1.5px solid '+(isCur?'var(--accent)':'var(--border)')+';transition:all .2s">'+
      '<div style="font-size:13px;font-weight:700;color:'+(isCur?'#fff':'var(--accent)')+'">'+MN[m]+'</div>'+
    '</div>';
  }
  monthCards+='</div></div>';

  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0),sdow=first.getDay();
  const prevLast=new Date(calY,calM,0);
  var cells=[];
  for(var i=sdow-1;i>=0;i--){var pd=prevLast.getDate()-i,pm=calM===0?11:calM-1,py=calM===0?calY-1:calY;cells.push({d:pd,m:pm,y:py,cur:false});}
  for(var d=1;d<=last.getDate();d++)cells.push({d:d,m:calM,y:calY,cur:true});
  var rem=42-cells.length;
  for(var d=1;d<=rem;d++){var nm=calM===11?0:calM+1,ny=calM===11?calY+1:calY;cells.push({d:d,m:nm,y:ny,cur:false});}

  var evMap={};
  (S.calEvents||[]).forEach(e=>{
    if(!evMap[e.date])evMap[e.date]=[];
    // 프로젝트 색상 실시간 반영
    const pr=e.projectId?S.projects.find(p=>p.id===e.projectId):null;
    evMap[e.date].push(Object.assign({},e,{color:pr?pr.color:(e.color||'var(--accent)')}));
  });
  (S.deadlines||[]).forEach(dl=>{if(!evMap[dl.date])evMap[dl.date]=[];const pr=S.projects.find(p=>p.id===dl.projectId);evMap[dl.date].push(Object.assign({},dl,{isDl:true,color:pr?pr.color:'#C14A3C'}));});

  var calHtml='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="min-width:560px">'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">';
  ['일','월','화','수','목','금','토'].forEach(function(d,i){
    calHtml+='<div style="text-align:center;padding:8px 0;font-size:0.75em;font-weight:500;color:'+(i===0?'var(--red)':i===6?'var(--blue)':'var(--t3)')+'">'+d+'</div>';
  });
  calHtml+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr)">';

  for(var idx2=0;idx2<cells.length;idx2++){
    var cell=cells[idx2];
    var ri=Math.floor(idx2/7),ci=idx2%7;
    var ds=cell.y+'-'+String(cell.m+1).padStart(2,'0')+'-'+String(cell.d).padStart(2,'0');
    var isT=ds===ts;

      'min-height:100px;padding:6px 8px;'+
      'border-right:'+(ci===6?'none':'1px solid var(--border)')+';'+
      'border-bottom:'+(ri===5?'none':'1px solid var(--border)')+';'+
      'background:'+(isT?'var(--accent)15':'transparent')+'">'+
      '<div style="width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;'+
        'background:'+(isT?'var(--accent)25':'transparent')+';'+
        'font-size:0.85em;font-weight:'+(isT?'700':'500')+';margin-bottom:3px;'+
        'color:'+(isT?'var(--accent)':!cell.cur?'var(--t3)':ci===0?'var(--red)':ci===6?'var(--blue)':'var(--text)')+'">'+cell.d+'</div>';
    evs.slice(0,3).forEach(function(ev){
      if(ev.isDl) {
        calHtml+='<div style="background:'+(ev.color||'var(--accent)')+'14;color:#555;'+
          'border-left:2px solid '+(ev.color||'var(--accent)')+'60;border-radius:0 4px 4px 0;'+
          'font-size:0.78em;padding:2px 5px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:400;line-height:1.4">'+
          '🚨 '+ev.title+'</div>';
      } else {
        calHtml+='<div onclick="event.stopPropagation();openEvDetailModal(\''+ev.id+'\')" style="background:'+(ev.color||'var(--accent)')+'14;color:#555;'+
          'border-left:2px solid '+(ev.color||'var(--accent)')+'60;border-radius:0 4px 4px 0;'+
          'font-size:0.78em;padding:2px 5px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:400;line-height:1.4;cursor:pointer">'+
          ev.title+'</div>';
      }
    });
    if(evs.length>3) calHtml+='<div style="font-size:0.65em;color:var(--t3);text-align:right">+'+(evs.length-3)+'</div>';
    calHtml+='</div>';
  }
  calHtml+='</div></div></div>'; // grid close + min-width wrapper + scroll wrapper

  var goals=S.monthlyGoals&&S.monthlyGoals[ym]||[];
  var goalHtml='';
  goals.forEach(function(g,i){
    var doneBg=g.done?'var(--accent)':'transparent';

      '<div data-ym="'+ym+'" data-idx="'+i+'" onclick="togMonthlyGoal(this.dataset.ym,parseInt(this.dataset.idx))" '+
        'style="width:15px;height:15px;border-radius:4px;border:1.5px solid '+doneBd+';background:'+doneBg+';cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">'+
        (g.done?'<span style="color:#fff;font-size:0.6em">&#10003;</span>':'')+

function loadCustomFont(input, slot){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var name=file.name.replace(/\.[^.]+$/,'');
  var reader=new FileReader();
  reader.onload=function(e){
    var fontName='UserFont'+(slot+1);
    var fontFace=new FontFace(fontName, e.target.result);
    fontFace.load().then(function(ff){
      document.fonts.add(ff);
      if(!S.customFonts) S.customFonts=['','',''];
      if(!S.customFontData) S.customFontData=['','',''];
      S.customFonts[slot]=name;
      S.customFontData[slot]=e.target.result;
      S.font='custom'+(slot+1);
      save(); applyTheme(S.theme||'sky'); render();
    });
  };
  reader.readAsArrayBuffer(file);
}
function clearCustomFont(slot){
  if(!S.customFonts) S.customFonts=['','',''];
  if(!S.customFontData) S.customFontData=['','',''];
  S.customFonts[slot]=''; S.customFontData[slot]='';
  if(S.font==='custom'+(slot+1)) S.font='pretendard';
  save(); applyTheme(S.theme||'sky'); render();
}
function restoreCustomFont(){
  if(!S.customFontData) return;
  S.customFontData.forEach(function(data, i){
    if(!data) return;
    var fontFace=new FontFace('UserFont'+(i+1), data);
    fontFace.load().then(function(ff){ document.fonts.add(ff); });
  });
}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function lighten(hex,amt){
  var c=hexToRgb(hex);
  var r=Math.min(255,Math.round(c.r+(255-c.r)*amt));
  var g=Math.min(255,Math.round(c.g+(255-c.g)*amt));
  var b=Math.min(255,Math.round(c.b+(255-c.b)*amt));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function darken(hex,amt){
  var c=hexToRgb(hex);
  var r=Math.max(0,Math.round(c.r*(1-amt)));
  var g=Math.max(0,Math.round(c.g*(1-amt)));
  var b=Math.max(0,Math.round(c.b*(1-amt)));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function setCustomThemeVars(hex){
  var root=document.documentElement.style;
  root.setProperty('--ct-light', lighten(hex,0.35));
  root.setProperty('--ct-lighter', lighten(hex,0.55));
  root.setProperty('--ct-mid', lighten(hex,0.2));
  root.setProperty('--ct-border', lighten(hex,0.1));
  root.setProperty('--ct-border2', hex);
  root.setProperty('--ct-dark', darken(hex,0.25));
}

function applyTheme(t){
  var validThemes = ['sky','sand','lightBeige','lightGray','steel','sage','matcha','lavender','blush','dustyRose','olive','custom'];
  if(!validThemes.includes(t)) t = 'sky';

  var cls='theme-'+t;
  if(t==='custom'){
    var hex=S.customThemeColor||'#F9D0CD';
    setCustomThemeVars(hex);
    var root2=document.documentElement.style;
    root2.setProperty('--bg','var(--ct-light)');
    root2.setProperty('--s2','var(--ct-lighter)');
    root2.setProperty('--s3','var(--ct-mid)');
    root2.setProperty('--border','var(--ct-border)');
    root2.setProperty('--border2','var(--ct-border2)');
    root2.setProperty('--accent','var(--ct-dark)');
    root2.setProperty('--al','var(--ct-lighter)');
  } else {
    var root3=document.documentElement.style;
    ['--bg','--s2','--s3','--border','--border2','--accent','--al'].forEach(function(v){root3.removeProperty(v);});
  }
  
  var f=S.font||'pretendard';
  if(f!=='pretendard') cls+=' font-'+f;
  document.body.className=cls;

  // Noto Serif KR Google Font 동적 로드
  if(f==='notoserif' && !document.getElementById('notoserif-font')){
    var link=document.createElement('link');
    link.id='notoserif-font';
    link.rel='stylesheet';
    link.href='https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap';
    document.head.appendChild(link);
  }

  var fontMap={
    pretendard:"'Pretendard','Apple SD Gothic Neo',sans-serif",
    serif:"'Instrument Serif',Georgia,serif",
    notoserif:"'Noto Serif KR','Nanum Myeongjo',serif",
    custom1: S.customFonts&&S.customFonts[0] ? "'UserFont1',sans-serif" : "'Pretendard',sans-serif",
    custom2: S.customFonts&&S.customFonts[1] ? "'UserFont2',sans-serif" : "'Pretendard',sans-serif",
  };
  var chosen = fontMap[f] || fontMap.pretendard;
  var root = document.documentElement.style;
  root.setProperty('--sans', chosen);
  
  var fs = S.fontSize || 14;
  
  // ★ 핵심 폰트 상속 로직 변경: 
  // 영문/숫자에 강제 적용되던 별도 폰트(Geist Mono, Instrument Serif)를 해제하고,
  // 작가님이 선택하신 폰트 하나로 모든 요소(영문, 숫자 포함)가 완벽하게 통일되어 렌더링되도록 수정했습니다.
  var styleEl = document.getElementById('dynamic-theme-style');
  if(!styleEl){
    styleEl = document.createElement('style');
    styleEl.id = 'dynamic-theme-style';
    document.head.appendChild(styleEl);
  }
  var fw = S.fontWeight || '400';
  styleEl.textContent =
    'html, body { font-size: '+fs+'px !important; font-weight: '+fw+' !important; }' +
    '.app, .app * { font-weight: '+fw+' !important; }' +
    ':root { --sans: '+chosen+'; --serif: '+chosen+'; --mono: '+chosen+'; }';
}

function syncRzToRoutines(){
  (S.projects||[]).forEach(function(p){
    (p.routinized||[]).forEach(function(entry){
      var exists = S.routines.some(function(r){ return r.id === entry.id; });
      if(!exists){
        S.routines.push({
          id: entry.id,
          time: entry.time||'00:00',
          task: entry.task,
          detail: p.name+' 루틴화',
          days: entry.days||[],
          isRz: true,
          rzProjectId: p.id
        });
      }
    });
  });
  S.routines = S.routines.filter(function(r){
    if(!r.isRz) return true;
    return (S.projects||[]).some(function(p){
      return (p.routinized||[]).some(function(e){ return e.id === r.id; });
    });
  });
  S.routines.sort(function(a,b){ return a.time.localeCompare(b.time); });
}

    '세금/예비비': ['종합소득세 대비 저축','기타 예비비']
  },
  transfer: { '자산 이동': ['카드대금 납부','계좌 이체','현금 인출'] }
};
const defaultLedgerBudgets = {'고정 생활비':1000000,'변동 생활비':800000,'작업 유지비':500000};
const defaultLedgerAccounts = ['사업용 기업은행','생활비 신한은행','신한 신용카드','국민 신용카드'];
const defaultLedgerAssets = [
  {id:'lda1',type:'asset',category:'현금/입출금',name:'사업용 기업은행',amount:0},
  {id:'lda2',type:'asset',category:'예적금',name:'정기예금',amount:0,interestRate:0,maturityDate:''},
];
const defaultLedgerFixedItems = [];

let LD = {
  transactions: [],
  categories: JSON.parse(JSON.stringify(defaultLedgerCategories)),
  budgets: {...defaultLedgerBudgets},
  accounts: [...defaultLedgerAccounts],
  assets: JSON.parse(JSON.stringify(defaultLedgerAssets)),
  fixedItems: [...defaultLedgerFixedItems],
};

function loadLedger(){try{const d=localStorage.getItem(LEDGER_KEY);if(d)LD=Object.assign({},LD,JSON.parse(d));}catch(e){}}
function saveLedger(){
  localStorage.setItem(LEDGER_KEY,JSON.stringify(LD));
  scheduleSaveLedger();
}

let ledgerYear=new Date().getFullYear(), ledgerMonth=new Date().getMonth();
let ledgerShowTxForm=false, ledgerEditTx=null, ledgerTxDate='', ledgerShowDayModal=false, ledgerDayModalDate='';

function renderLedger(){
  loadLedger();
  const tabs=[
    {id:'dashboard',label:'대시보드',ic:'📊'},
    {id:'calendar',label:'캘린더',ic:'📅'},
    {id:'assets',label:'자산 현황',ic:'🏦'},
    {id:'settings',label:'설정',ic:'⚙️'},
  ];
  let html='<div style="margin-bottom:20px;display:flex;justify-content:flex-end">';
  html+='<div style="display:flex;gap:4px;background:var(--s2);border-radius:10px;padding:4px;border:1px solid var(--border);display:inline-flex">';
  tabs.forEach(function(tab){
    const on=ledgerTab===tab.id;
    html+='<button onclick="ledgerTab=\''+tab.id+'\';render()" style="'+
      'padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-size:0.88em;font-family:var(--sans);'+
      'background:'+(on?'var(--surface)':'transparent')+';'+
      'color:'+(on?'var(--accent)':'var(--t2)')+';'+
      'box-shadow:'+(on?'var(--sh)':'none')+';transition:all .15s">'+
      tab.ic+' '+tab.label+'</button>';
  });
  html+='</div></div>';
  if(ledgerTab==='dashboard') html+=renderLedgerDashboard();
  else if(ledgerTab==='calendar') html+=renderLedgerCalendar();
  else if(ledgerTab==='assets') html+=renderLedgerAssets();
  else if(ledgerTab==='settings') html+=renderLedgerSettings();
  return html;
}

function fmtMoney(n){if(!n&&n!==0)return '0원';return new Intl.NumberFormat('ko-KR').format(Math.round(n))+'원';}

function openYearlyDashboard(year){
  let totalInc=0,totalExp=0,totalSav=0;
  const incCats={},expCats={};
  (LD.fixedItems||[]).forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input'){
      const amt=Number(fi.amount)||0;
      totalExp+=amt*12;
      if(!expCats['고정 지출'])expCats['고정 지출']={total:0,subs:{}};
      expCats['고정 지출'].total+=amt*12;
      expCats['고정 지출'].subs[fi.title||'고정']=(expCats['고정 지출'].subs[fi.title||'고정']||0)+amt*12;
    }
  });
  (LD.transactions||[]).forEach(function(tx){
    if(!tx.date.startsWith(year+'-'))return;
    if(tx.type==='income'){
      totalInc+=tx.amount;
      if(!incCats[tx.majorCategory])incCats[tx.majorCategory]={total:0,subs:{}};
      incCats[tx.majorCategory].total+=tx.amount;
      const s=tx.minorCategory||'기타';
      incCats[tx.majorCategory].subs[s]=(incCats[tx.majorCategory].subs[s]||0)+tx.amount;
    } else if(tx.type==='expense'){
      totalExp+=tx.amount;
      if(!expCats[tx.majorCategory])expCats[tx.majorCategory]={total:0,subs:{}};
      expCats[tx.majorCategory].total+=tx.amount;
      const s=tx.minorCategory||'기타';
      expCats[tx.majorCategory].subs[s]=(expCats[tx.majorCategory].subs[s]||0)+tx.amount;
    }
  });
  (S.savings&&S.savings.entries||[]).forEach(function(e){
    if(e.date&&e.date.startsWith(year+'-'))totalSav+=e.amount||0;
  });
  function catRows(map,color){
    return Object.entries(map).sort((a,b)=>b[1].total-a[1].total).map(function([major,data]){
      let r='<div style="margin-bottom:10px">';
      r+='<div style="display:flex;justify-content:space-between;font-size:0.9em;font-weight:600;padding:4px 0;border-bottom:1px solid var(--border)"><span>'+major+'</span><span style="color:'+color+'">'+fmtMoney(data.total)+'</span></div>';
      Object.entries(data.subs).sort((a,b)=>b[1]-a[1]).forEach(function([sub,amt]){
        r+='<div style="display:flex;justify-content:space-between;font-size:0.78em;color:var(--t3);padding-left:10px;margin-top:2px"><span>'+sub+'</span><span>'+fmtMoney(amt)+'</span></div>';
      });
      return r+'</div>';
    }).join('');
  }
  const body=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">연간 총 수입</div><div style="font-size:1.3em;font-weight:700;color:var(--green)">'+fmtMoney(totalInc)+'</div></div>'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">연간 총 지출</div><div style="font-size:1.3em;font-weight:700;color:var(--red)">'+fmtMoney(totalExp)+'</div></div>'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">연간 저축</div><div style="font-size:1.3em;font-weight:700;color:var(--accent)">'+fmtMoney(totalSav)+'</div></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'+
    '<div><div style="font-size:0.88em;font-weight:600;color:var(--t2);margin-bottom:10px">💚 수입</div>'+catRows(incCats,'var(--green)')+'</div>'+
    '<div><div style="font-size:0.88em;font-weight:600;color:var(--t2);margin-bottom:10px">❤️ 지출</div>'+catRows(expCats,'var(--red)')+'</div>'+
    '</div>';
  openMo(year+'년 연간 대시보드',body,'<button class=\"btn bg\" onclick=\"closeMo()\">닫기</button>');
}
function ledgerPrevMonth(){if(ledgerMonth===0){ledgerMonth=11;ledgerYear--;}else ledgerMonth--;render();}
function ledgerNextMonth(){if(ledgerMonth===11){ledgerMonth=0;ledgerYear++;}else ledgerMonth++;render();}

function renderLedgerDashboard(){
  const ym=ledgerYear+'-'+String(ledgerMonth+1).padStart(2,'0');
  const prevYm=ledgerMonth===0?(ledgerYear-1)+'-12':(ledgerYear)+'-'+String(ledgerMonth).padStart(2,'0');
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let curInc=0,curExp=0,prevExp=0;

  // 카테고리별 지출 (먼저 선언)
  const catMap={};

  // 고정 지출 이번달 합산
  const fixedItems=LD.fixedItems||[];
  fixedItems.forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input'){
      const amt=Number(fi.amount)||0;
      curExp+=amt;
      const major=fi.majorCategory||'고정 지출';
      catMap[major]=(catMap[major]||0)+amt;
    }
  });
  (LD.transactions||[]).forEach(function(tx){
    const txYm=tx.date.slice(0,7);
    if(txYm===ym){
      if(tx.type==='income')curInc+=tx.amount;
      else if(tx.type==='expense'){
        curExp+=tx.amount;
        catMap[tx.majorCategory]=(catMap[tx.majorCategory]||0)+tx.amount;
      }
    }
    if(txYm===prevYm&&tx.type==='expense')prevExp+=tx.amount;
  });
  const diff=curExp-prevExp;
  const diffPct=prevExp===0?0:(diff/prevExp*100);
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  // 예산 진행
  const totalBudget=Object.values(LD.budgets||{}).reduce((a,b)=>a+(b||0),0);
  const budgetedCats=Object.keys((LD.categories||{}).expense||{}).filter(c=>!c.includes('저축')&&!c.includes('투자'));
  const totalSpent=budgetedCats.reduce((a,c)=>a+(catMap[c]||0),0);
  const totalPct=totalBudget===0?0:Math.min(100,Math.round(totalSpent/totalBudget*100));

  // 12개월 흐름
  let monthBars='';
  const maxVal=Math.max(1,...Array.from({length:12},(_,i)=>{
    const k=ledgerYear+'-'+String(i+1).padStart(2,'0');
    let inc=0,exp=0;
    (LD.transactions||[]).forEach(function(tx){if(tx.date.slice(0,7)===k){if(tx.type==='income')inc+=tx.amount;else if(tx.type==='expense')exp+=tx.amount;}});
    return Math.max(inc,exp);
  }));
  for(let i=0;i<12;i++){
    const k=ledgerYear+'-'+String(i+1).padStart(2,'0');
    let inc=0,exp=0;
    (LD.transactions||[]).forEach(function(tx){if(tx.date.slice(0,7)===k){if(tx.type==='income')inc+=tx.amount;else if(tx.type==='expense')exp+=tx.amount;}});
    const isCur=(i===ledgerMonth);
    monthBars+='<div onclick="ledgerMonth='+i+';render()" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">';
    monthBars+='<div style="width:100%;height:60px;display:flex;align-items:flex-end;gap:1px;justify-content:center">';
    monthBars+='<div style="width:44%;background:var(--green);opacity:0.35;border-radius:3px 3px 0 0;height:'+Math.round(inc/maxVal*56)+'px;min-height:'+(inc>0?4:0)+'px"></div>';
    monthBars+='<div style="width:44%;background:'+(isCur?'var(--accent)':'var(--border2)')+';border-radius:3px 3px 0 0;height:'+Math.round(exp/maxVal*56)+'px;min-height:'+(exp>0?4:0)+'px"></div>';
    monthBars+='</div>';
    monthBars+='<div style="font-size:0.65em;color:'+(isCur?'var(--accent)':'var(--t3)')+'">'+MN[i].replace('월','')+'</div>';
    monthBars+='</div>';
  }

  // 카테고리별 수입
  const incCatMap={}, expCatMapDetail={};
  const recent=[...(LD.transactions||[])].filter(tx=>tx.date.slice(0,7)===ym).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,8);
  // 고정 지출을 expCatMapDetail에 추가
  (LD.fixedItems||[]).forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input'){
      const amt=Number(fi.amount)||0;
      const major=fi.majorCategory||'고정 지출';
      const sub=fi.minorCategory||fi.title||'고정';
      if(!expCatMapDetail[major])expCatMapDetail[major]={total:0,subs:{}};
      expCatMapDetail[major].total+=amt;
      expCatMapDetail[major].subs[sub]=(expCatMapDetail[major].subs[sub]||0)+amt;
    }
  });
  (LD.transactions||[]).forEach(function(tx){
    if(tx.date.slice(0,7)!==ym)return;
    if(tx.type==='income'){
      if(!incCatMap[tx.majorCategory])incCatMap[tx.majorCategory]={total:0,subs:{}};
      incCatMap[tx.majorCategory].total+=tx.amount;
      const sub=tx.minorCategory||'기타';
      incCatMap[tx.majorCategory].subs[sub]=(incCatMap[tx.majorCategory].subs[sub]||0)+tx.amount;
    } else if(tx.type==='expense'){
      if(!expCatMapDetail[tx.majorCategory])expCatMapDetail[tx.majorCategory]={total:0,subs:{}};
      expCatMapDetail[tx.majorCategory].total+=tx.amount;
      const sub=tx.minorCategory||'기타';
      expCatMapDetail[tx.majorCategory].subs[sub]=(expCatMapDetail[tx.majorCategory].subs[sub]||0)+tx.amount;
    }
  });

  let html='';
  // 헤더
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">';
  html+='<div style="display:flex;align-items:center;gap:8px">';
  html+='<button class="btn bg bsm" onclick="ledgerPrevMonth()">‹</button>';
  html+='<div style="font-size:1.1em;font-weight:500;min-width:80px;text-align:center">'+ledgerYear+'년 '+MN[ledgerMonth]+'</div>';
  html+='<button class="btn bg bsm" onclick="ledgerNextMonth()">›</button>';
  html+='</div>';
  html+='<button class="btn bg bsm" onclick="openYearlyDashboard('+ledgerYear+')">📅 연 대시보드</button>';
  html+='</div>';

  // 1행: 수입카드(대분류만) + 지출카드(대분류만)
  html+='<div class="g2" style="margin-bottom:16px">';

  // 수입 카드 — 대분류만
  html+='<div class="card" style="margin-bottom:0">';
  html+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">';
  html+='<div style="font-size:0.82em;color:var(--t3)">이번 달 수입</div>';
  html+='<div style="font-size:1.5em;font-weight:600;color:var(--green)">'+fmtMoney(curInc)+'</div></div>';
  Object.entries(incCatMap).sort((a,b)=>b[1].total-a[1].total).forEach(function([major,data]){
    html+='<div style="display:flex;justify-content:space-between;font-size:0.88em;padding:5px 0;border-bottom:1px solid var(--border)">';
    html+='<span style="font-weight:500">'+major+'</span><span style="color:var(--green)">'+fmtMoney(data.total)+'</span></div>';
  });
  html+='</div>';

  // 지출 카드 — 대분류만
  html+='<div class="card" style="margin-bottom:0">';
  html+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">';
  html+='<div style="font-size:0.82em;color:var(--t3)">이번 달 지출</div>';
  html+='<div style="font-size:1.5em;font-weight:600;color:var(--red)">'+fmtMoney(curExp)+'</div></div>';
  Object.entries(expCatMapDetail).sort((a,b)=>b[1].total-a[1].total).forEach(function([major,data]){
    html+='<div style="display:flex;justify-content:space-between;font-size:0.88em;padding:5px 0;border-bottom:1px solid var(--border)">';
    html+='<span style="font-weight:500">'+major+'</span><span style="color:var(--red)">'+fmtMoney(data.total)+'</span></div>';
  });
  html+='</div></div>';

  // 2행: 예산진행률(왼) + 이번달 지출 대+소분류(오)
  html+='<div class="g2" style="margin-bottom:16px">';

  // 왼쪽: 예산 진행률
  if(totalBudget>0){
    html+='<div class="card" style="margin-bottom:0">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
    html+='<div class="ct">🎯 월 예산 진행률</div>';
    html+='<div style="font-size:0.88em;color:var(--t2)">'+fmtMoney(totalSpent)+' / '+fmtMoney(totalBudget)+'</div></div>';
    html+='<div class="pw" style="height:10px;margin-bottom:6px"><div class="pb" style="width:'+totalPct+'%;background:'+(totalPct>=100?'var(--red)':'var(--accent)')+'"></div></div>';
    html+='<div style="font-size:0.78em;color:var(--t3);text-align:right;margin-bottom:10px">'+totalPct+'% 사용</div>';
    budgetedCats.forEach(function(cat){
      const b=LD.budgets[cat]||0; if(!b)return;
      const sp=catMap[cat]||0;
      const pct=Math.min(100,Math.round(sp/b*100));
      const over=sp>b;
      html+='<div style="margin-top:12px">';
      html+='<div style="display:flex;justify-content:space-between;font-size:0.88em;font-weight:500;margin-bottom:4px">';
      html+='<span>'+cat+'</span>';
      html+='<span style="color:'+(over?'var(--red)':'var(--text)')+'">'+fmtMoney(sp)+' <span style="color:var(--t3);font-weight:400">/ '+fmtMoney(b)+'</span></span></div>';
      html+='<div class="pw" style="height:5px;margin-bottom:4px"><div class="pb" style="width:'+pct+'%;background:'+(over?'var(--red)':'var(--green)')+'"></div></div>';
      html+='</div>';
    });
    html+='</div>';
  } else {
    html+='<div class="card" style="margin-bottom:0"><div class="empty">설정에서 예산을 등록해요</div></div>';
  }

  // 오른쪽: 이번달 지출 대분류+소분류 전체
  html+='<div class="card" style="margin-bottom:0"><div class="ct" style="margin-bottom:14px">📊 이번달 지출 상세</div>';
  if(Object.keys(expCatMapDetail).length===0){
    html+='<div class="empty">지출 내역이 없어요</div>';
  } else {
    Object.entries(expCatMapDetail).sort((a,b)=>b[1].total-a[1].total).forEach(function([major,data]){
      const pct=curExp===0?0:Math.round(data.total/curExp*100);
      html+='<div style="margin-bottom:12px">';
      html+='<div style="display:flex;justify-content:space-between;font-size:0.9em;font-weight:500;margin-bottom:4px">';
      html+='<span>'+major+'</span><span style="color:var(--red)">'+fmtMoney(data.total)+' <span style="font-size:0.82em;color:var(--t3);font-weight:400">'+pct+'%</span></span></div>';
      html+='<div class="pw" style="height:4px;margin-bottom:5px"><div class="pb" style="width:'+pct+'%;background:var(--red);opacity:0.6"></div></div>';
      Object.entries(data.subs).sort((a,b)=>b[1]-a[1]).forEach(function([sub,amt]){
        html+='<div style="display:flex;justify-content:space-between;font-size:0.78em;color:var(--t3);padding-left:10px;margin-top:2px">';
        html+='<span>'+sub+'</span><span>'+fmtMoney(amt)+'</span></div>';
      });
      html+='</div>';
    });
  }
  html+='</div></div>';

  // 월별 흐름
  html+='<div class="card" style="margin-bottom:16px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  html+='<div class="ct">📈 '+ledgerYear+'년 월별 흐름</div>';
  html+='<div style="display:flex;gap:12px;font-size:0.75em"><span style="color:var(--green)">■ 수입</span><span style="color:var(--accent)">■ 지출</span></div></div>';
  html+='<div style="display:flex;gap:2px;align-items:flex-end;height:80px">'+monthBars+'</div>';
  html+='</div>';

  // 최근 내역
  html+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
  html+='<div class="ct">📋 '+MN[ledgerMonth]+' 내역</div>';
  html+='<button class="btn bp bsm" onclick="openLedgerTxForm(\'\')">+ 추가</button></div>';
  if(recent.length===0){
    html+='<div class="empty">내역이 없어요</div>';
  } else {
    recent.forEach(function(tx){
      html+=ledgerTxRow(tx);
    });
    const total=(LD.transactions||[]).filter(tx=>tx.date.slice(0,7)===ym).length;
    if(total>8)html+='<div style="text-align:center;padding:12px 0"><button class="btn bg bsm" onclick="showAllLedgerTx(\''+ym+'\')" style="font-size:0.85em">+ '+(total-8)+'개 더 보기</button></div>';
  }
  html+='</div>';

  // tx form modal
  if(ledgerShowTxForm)html+=renderLedgerTxModal();
  return html;
}

function showAllLedgerTx(ym){
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const m=parseInt(ym.split('-')[1])-1;
  const all=[...(LD.transactions||[])].filter(tx=>tx.date.slice(0,7)===ym).sort((a,b)=>a.date.localeCompare(b.date));
  let body='<div style="max-height:60vh;overflow-y:auto">';
  all.forEach(function(tx){ body+=ledgerTxRow(tx); });
  body+='</div>';
  openMo(MN[m]+' 전체 내역 ('+all.length+'건)', body, '<button class="btn bg" onclick="closeMo()">닫기</button>');
}
function ledgerTxRow(tx){
  const sign=tx.type==='income'?'+':tx.type==='transfer'?'±':'-';
  const color=tx.type==='income'?'var(--green)':tx.type==='transfer'?'var(--blue)':'var(--text)';
