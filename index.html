  function rzLabel(rz){
    if(rz.isMonthly) return '매월 '+(rz.monthDays||[]).map(function(d){return d==='last'?'말':d;}).join('·')+'일';
    if(!rz.days||rz.days.length===0) return '매일';
    return '매주 '+rz.days.map(function(d){return DOW_KO[DOWS.indexOf(d)];}).join('·');
  }

  function renderPjBlock(p){
    const dls=(S.deadlines||[]).filter(function(d){return d.projectId===p.id&&d.date&&!d.done&&dLeft(d.date)>=0;}).sort(function(a,b){return a.date.localeCompare(b.date);});
    const rzs=p.routinized||[];
    const tasks=(p.tasks||[]).filter(function(t){return !t.done;});
    const allTasks=p.tasks||[];
    const doneCnt=allTasks.filter(function(t){return t.done;}).length;
    const totalCnt=allTasks.length;
    const pct=totalCnt>0?Math.round(doneCnt/totalCnt*100):0;

    // 왼쪽: 태스크
    var leftCol='';
    if(tasks.length>0){
      leftCol+='<div style="font-size:0.75em;color:var(--t3);font-weight:600;letter-spacing:0.04em;margin-bottom:6px">태스크</div>';
      tasks.forEach(function(t){
        leftCol+='<div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:5px">'+
          '<div style="width:13px;height:13px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:2px"></div>'+
          '<div style="font-size:0.875em;line-height:1.4;color:var(--text)">'+t.text+
            (t.dueDate?'<span style="display:block;font-size:0.8em;color:var(--t3)">'+t.dueDate.slice(5)+'</span>':'')+
          '</div>'+
        '</div>';
      });
    } else {
      leftCol='<div style="font-size:0.8em;color:var(--t3)">태스크 없음</div>';
    }

    // 오른쪽: 마감일 + 루틴화
    var rightCol='';
    if(dls.length>0){
      rightCol+='<div style="font-size:0.75em;color:var(--t3);font-weight:600;letter-spacing:0.04em;margin-bottom:6px">마감일</div>';
      dls.forEach(function(d){
        var dd=dLeft(d.date),f=fmtDateObj(d.date);
        var uc=dd<=7?'var(--red)':dd<=30?'var(--accent)':'var(--t2)';
        rightCol+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'+
          '<div style="background:var(--s2);border-radius:6px;padding:3px 7px;text-align:center;flex-shrink:0">'+
            '<div style="font-size:0.6em;color:var(--t3);font-weight:600;text-transform:uppercase;line-height:1.2">'+f.month+'</div>'+
            '<div style="font-size:0.95em;font-weight:700;color:var(--text);line-height:1.2">'+f.day+'</div>'+
          '</div>'+
          '<div style="flex:1;font-size:0.875em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+d.title+'</div>'+
          '<div style="font-size:0.75em;font-weight:600;color:'+uc+';flex-shrink:0">'+(dd===0?'오늘':'D-'+dd)+'</div>'+
        '</div>';
      });
    }
    if(rzs.length>0){
      rightCol+='<div style="font-size:0.75em;color:var(--t3);font-weight:600;letter-spacing:0.04em;margin:'+(dls.length>0?'10px':'0')+'px 0 6px">루틴화 일정</div>';
      rzs.forEach(function(rz){
        rightCol+='<div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:5px">'+
          '<div style="width:7px;height:7px;border-radius:50%;background:'+p.color+';flex-shrink:0;margin-top:4px"></div>'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:0.875em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+rz.task+'</div>'+
            '<div style="font-size:0.75em;color:var(--t3)">'+rzLabel(rz)+(rz.until?' ~ '+rz.until.slice(0,7):'')+(rz.saveAmount>0?' · 💰'+rz.saveAmount.toLocaleString()+'만원':'')+'</div>'+
          '</div>'+
        '</div>';
      });
    }
    if(!rightCol) rightCol='<div style="font-size:0.8em;color:var(--t3)">마감·루틴 없음</div>';

    return '<div style="margin-bottom:12px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)">'+
      // 헤더
      '<div style="display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border)" onclick="go(\'projects\',\''+p.id+'\')">'+
        '<div style="width:9px;height:9px;border-radius:2px;background:'+p.color+';flex-shrink:0"></div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:0.9286em;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.name+'</div>'+
          (totalCnt>0?'<div style="font-size:0.75em;color:var(--t3)">'+doneCnt+'/'+totalCnt+'개 완료 ('+pct+'%)</div>':'')+
        '</div>'+
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" style="flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>'+
      '</div>'+
      // 2열 본문
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0">'+
        '<div style="padding:12px 14px;border-right:1px solid var(--border)">'+leftCol+'</div>'+
        '<div style="padding:12px 14px">'+rightCol+'</div>'+
      '</div>'+
    '</div>';
  }

  if(areas.length===0 && (S.projects||[]).length===0){
    html+='<div class="empty"><div class="ei">🗺️</div>라이프 목표와 프로젝트를 먼저 추가해보세요</div>';
    return html;
  }

  areas.forEach(function(area){
    var pjs=pjByArea[area.id]||[];
    html+=
      '<div style="display:flex;align-items:center;gap:9px;margin:16px 0 10px">'+
        '<div style="width:30px;height:30px;border-radius:8px;background:'+area.color+'20;display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0">'+area.emoji+'</div>'+
        '<div style="font-size:0.95em;font-weight:700;color:var(--text)">'+area.name+'</div>'+
        '<div style="flex:1;height:1.5px;background:linear-gradient(to right,'+area.color+'50,transparent);border-radius:2px"></div>'+
        '<div style="font-size:0.75em;color:var(--t3)">'+pjs.length+'개</div>'+
      '</div>';
    if(pjs.length===0){
      html+='<div style="font-size:0.82em;color:var(--t3);padding:8px 10px;margin-bottom:12px;background:var(--s2);border-radius:8px">연결된 프로젝트 없음</div>';
    } else {
      pjs.forEach(function(p){ html+=renderPjBlock(p); });
    }
  });

  if(pjNoArea.length>0){
    html+=
      '<div style="display:flex;align-items:center;gap:9px;margin:16px 0 10px">'+
        '<div style="width:30px;height:30px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0">📁</div>'+
        '<div style="font-size:0.95em;font-weight:700;color:var(--text)">영역 미지정</div>'+
        '<div style="flex:1;height:1.5px;background:linear-gradient(to right,var(--border),transparent);border-radius:2px"></div>'+
        '<div style="font-size:0.75em;color:var(--t3)">'+pjNoArea.length+'개</div>'+
      '</div>';
    pjNoArea.forEach(function(p){ html+=renderPjBlock(p); });
  }

  return html;
}

function printOverview(){
  const today=todStr();
  const yr=new Date().getFullYear();
  const areas=(S.lifeAreas||[]).filter(a=>a.name);
  const pjByArea={}, pjNoArea=[];
  (S.projects||[]).forEach(function(p){
    if(p.lifeAreaId){ if(!pjByArea[p.lifeAreaId]) pjByArea[p.lifeAreaId]=[]; pjByArea[p.lifeAreaId].push(p); }
    else pjNoArea.push(p);
  });

  function rzLabel(rz){
    if(rz.isMonthly) return '매월 '+(rz.monthDays||[]).map(function(d){return d==='last'?'말':d;}).join('·')+'일';
    if(!rz.days||rz.days.length===0) return '매일';
    return '매주 '+rz.days.map(function(d){return DOW_KO[DOWS.indexOf(d)];}).join('·');
  }

  // 현재 앱에서 사용 중인 폰트 패밀리 가져오기
  const appFont=getComputedStyle(document.documentElement).getPropertyValue('--sans').trim()||"'Pretendard','Apple SD Gothic Neo',sans-serif";
  const appFontSize=S.fontSize||14;
  const appFontWeight=S.fontWeight||'400';

  // 구글 폰트 링크 (앱에서 이미 로드된 것들)
  const existingFontLinks=Array.from(document.querySelectorAll('link[rel="stylesheet"]')).map(function(l){return l.href;}).filter(function(h){return h.includes('fonts.googleapis.com');}).map(function(h){return '<link rel="stylesheet" href="'+h+'">';}).join('\n');

  const lifeGoal=S.lifeGoal||{};
  const goalTitle=lifeGoal.text||'';
  const goalSub=lifeGoal.sub||'';
  const goalDday=lifeGoal.dday||'';
  const savingsAmt=(S.savings&&S.savings.goal>0)?money(S.savings.goal):'';

  function buildPjCard(p){
    const dls=(S.deadlines||[]).filter(function(d){return d.projectId===p.id&&d.date&&!d.done&&dLeft(d.date)>=0;}).sort(function(a,b){return a.date.localeCompare(b.date);});
    const rzs=p.routinized||[];
    const tasks=p.tasks||[];

    // 왼쪽: 태스크
    var leftHtml='<div class="col-label">태스크</div>';
    if(tasks.length===0){
      leftHtml+='<div class="col-empty">없음</div>';
    } else {
      tasks.forEach(function(t){
        leftHtml+='<div class="task-row'+(t.done?' task-done':'')+'">'+
          '<span class="task-box">'+(t.done?'✓':'')+'</span>'+
          '<span class="task-text">'+t.text+'</span>'+
          (t.dueDate?'<span class="task-due">'+t.dueDate.slice(5)+'</span>':'')+
        '</div>';
      });
    }

    // 오른쪽: 마감일 + 루틴화
    var rightHtml='';
    if(dls.length>0){
      rightHtml+='<div class="col-label">마감일</div>';
      dls.forEach(function(d){
        var dd=dLeft(d.date);
        var uc=dd<=7?'#c0392b':dd<=30?'#c07a2b':'#555';
        rightHtml+='<div class="dl-row">'+
          '<span class="dl-date">'+d.date.slice(5).replace('-','/')+'</span>'+
          '<span class="dl-title">'+d.title+'</span>'+
          '<span class="dl-dday" style="color:'+uc+'">'+(dd===0?'오늘':'D-'+dd)+'</span>'+
        '</div>';
      });
    }
    if(rzs.length>0){
      rightHtml+='<div class="col-label" style="margin-top:'+(dls.length?'10':'0')+'px">루틴화 일정</div>';
      rzs.forEach(function(rz){
        var label=rzLabel(rz);
        var until=rz.until?rz.until.slice(0,7):'';
        var amtStr=rz.saveAmount>0?(' · '+rz.saveAmount.toLocaleString()+'만원'):'';
        rightHtml+='<div class="rz-row">'+
          '<span class="rz-dot" style="background:'+p.color+'"></span>'+
          '<span class="rz-text">'+rz.task+'<span class="rz-meta">'+label+(until?' ~ '+until:'')+amtStr+'</span></span>'+
        '</div>';
      });
    }
    if(!rightHtml) rightHtml='<div class="col-empty">없음</div>';

    return '<div class="pj-card">'+
      '<div class="pj-header">'+
        '<span class="pj-dot" style="background:'+p.color+'"></span>'+
        '<span class="pj-name">'+p.name+'</span>'+
        (p.dday?'<span class="pj-dday">목표 '+p.dday+'</span>':'')+
      '</div>'+
      '<div class="pj-body">'+
        '<div class="pj-left">'+leftHtml+'</div>'+
        '<div class="pj-right">'+rightHtml+'</div>'+
      '</div>'+
    '</div>';
  }

  var sectionsHtml='';
  areas.forEach(function(area){
    var pjs=pjByArea[area.id]||[];
    sectionsHtml+='<div class="area-section">'+
      '<div class="area-header"><span class="area-emoji">'+area.emoji+'</span><span class="area-name">'+area.name+'</span></div>'+
      (pjs.length===0?'<p class="col-empty">이 영역에 연결된 프로젝트가 없어요</p>':pjs.map(buildPjCard).join(''))+
    '</div>';
  });
  if(pjNoArea.length>0){
    sectionsHtml+='<div class="area-section">'+
      '<div class="area-header"><span class="area-emoji">📁</span><span class="area-name">기타</span></div>'+
      pjNoArea.map(buildPjCard).join('')+
    '</div>';
  }

  const printHtml=`<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<title>${yr} 목표 계획서</title>
${existingFontLinks}
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:${appFont};color:#1a1a1a;background:#fff;font-size:${Math.max(11,appFontSize-1)}px;font-weight:${appFontWeight};line-height:1.6;}
  .page{max-width:760px;margin:0 auto;padding:44px 40px;}
  /* 헤더 */
  .report-header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2.5px solid #1a1a1a;padding-bottom:12px;margin-bottom:28px;}
  .report-title{font-size:24px;font-weight:700;letter-spacing:-0.5px;}
  .report-year{font-size:44px;font-weight:700;line-height:1;}
  /* 인생 목표 */
  .life-goal-banner{border:1.5px solid #1a1a1a;border-radius:6px;padding:12px 18px;margin-bottom:24px;display:flex;align-items:center;gap:16px;background:#fafaf8;}
  .life-goal-label{font-size:9.5px;font-weight:600;color:#888;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;}
  .life-goal-text{font-size:14px;font-weight:700;}
  .life-goal-amount{font-size:18px;font-weight:700;padding:0 18px;border-left:1px solid #ddd;border-right:1px solid #ddd;}
  /* 영역 */
  .area-section{margin-bottom:24px;}
  .area-header{display:flex;align-items:center;gap:7px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1a1a1a;}
  .area-emoji{font-size:14px;}
  .area-name{font-size:13.5px;font-weight:700;}
  /* 프로젝트 카드 */
  .pj-card{margin-bottom:10px;border:1px solid #e0e0e0;border-radius:6px;overflow:hidden;break-inside:avoid;}
  .pj-header{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#f5f5f2;}
  .pj-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;display:inline-block;}
  .pj-name{font-weight:600;font-size:12.5px;flex:1;}
  .pj-dday{font-size:10px;color:#666;}
  /* 2열 본문 */
  .pj-body{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #e8e8e8;}
  .pj-left{padding:10px 12px;border-right:1px solid #e8e8e8;}
  .pj-right{padding:10px 12px;}
  .col-label{font-size:9.5px;font-weight:600;color:#888;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;}
  .col-empty{font-size:10.5px;color:#bbb;}
  /* 태스크 */
  .task-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;font-size:11.5px;}
  .task-done .task-text{color:#aaa;text-decoration:line-through;}
  .task-box{width:12px;height:12px;border:1.5px solid #ccc;border-radius:2px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#555;}
  .task-text{flex:1;}
  .task-due{font-size:10px;color:#aaa;flex-shrink:0;}
  /* 마감일 */
  .dl-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11.5px;}
  .dl-date{font-size:10.5px;color:#666;flex-shrink:0;font-weight:600;min-width:36px;}
  .dl-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dl-dday{font-size:10.5px;font-weight:700;flex-shrink:0;}
  /* 루틴 */
  .rz-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;font-size:11.5px;}
  .rz-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;display:inline-block;}
  .rz-text{flex:1;}
  .rz-meta{display:block;font-size:10px;color:#888;}
  /* 푸터 */
  .report-footer{margin-top:36px;padding-top:10px;border-top:1px solid #ddd;display:flex;justify-content:space-between;font-size:10px;color:#aaa;}
  .sign-line{width:130px;border-bottom:1px solid #999;margin-top:22px;}
  .sign-label{font-size:10px;color:#999;margin-top:4px;}
  @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}.page{padding:30px 26px;}}
</style></head><body>
<div class="page">
  <div class="report-header">
    <div><div class="report-title">나의 목표 계획서</div><div style="font-size:10.5px;color:#888;margin-top:3px">작성일 ${today}</div></div>
    <div class="report-year">${yr}</div>
  </div>
  ${goalTitle?`<div class="life-goal-banner">
    <div style="flex:1"><div class="life-goal-label">인생 목표</div><div class="life-goal-text">${goalTitle}</div>${goalSub?`<div style="font-size:10.5px;color:#888;margin-top:2px">${goalSub}</div>`:''}</div>
    ${savingsAmt?`<div class="life-goal-amount">${savingsAmt}</div>`:''}
    ${goalDday?`<div><div class="life-goal-label">목표 기간</div><div style="font-size:11px;color:#555;">${goalDday}까지</div></div>`:''}
  </div>`:''}
  ${sectionsHtml}
  <div class="report-footer">
    <div><div class="sign-line"></div><div class="sign-label">서명</div></div>
    <div style="text-align:right;line-height:2"><div>Lucy's Space</div><div>${today} 기준</div></div>
  </div>
</div>
</body></html>`;

  const w=window.open('','_blank','width=820,height=950');
  w.document.write(printHtml);
  w.document.close();
  w.focus();
  setTimeout(function(){ w.print(); }, 800);
}

function renderHealth(){
  if(!S.health) S.health={schedules:[],records:[],memo:'',inbody:[],tab:'summary'};
  const H=S.health;
  if(!H.inbody) H.inbody=[];
  if(!H.tab||H.tab==='sched') H.tab='summary';
  if(!['summary','inbody','records','supps','memo'].includes(H.tab)) H.tab='summary';
  const tab=H.tab;

  // ── 탭 헤더 ──
  const tabIco={
    summary:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>',
    inbody:'<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;margin-right:4px"><rect x="3.5" y="12" width="3.4" height="8" rx="0.8"/><rect x="10.3" y="6.5" width="3.4" height="13.5" rx="0.8"/><rect x="17.1" y="2.5" width="3.4" height="17.5" rx="0.8"/></svg>',
    records:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M9 4h6a1 1 0 0 1 1 1v1h1a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h1V5a1 1 0 0 1 1-1z"/><rect x="8.5" y="2.5" width="7" height="3.5" rx="1"/><path d="M9 12h6M9 16h4"/></svg>',
    supps:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M10.5 3.5a4 4 0 0 1 0 5.66L5.16 14.5a4 4 0 1 1-5.66-5.66L4.84 3.5a4 4 0 0 1 5.66 0z" transform="translate(4 2)"/><line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/></svg>',
    memo:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M3.5 20.5l1-4 12-12a1.6 1.6 0 0 1 2.3 0l0.7 0.7a1.6 1.6 0 0 1 0 2.3l-12 12z"/><path d="M14 6l4 4"/></svg>'
  };
  const tabs=[{k:'summary',l:'건강 요약'},{k:'inbody',l:'인바디'},{k:'records',l:'검진 기록'},{k:'supps',l:'식품 정리'},{k:'memo',l:'메모'}];
  let html='<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">';
  tabs.forEach(function(t){
    var on=tab===t.k;
    html+='<button class="btn '+(on?'bp':'bg')+' bsm" onclick="setHealthTab(\''+t.k+'\')" style="flex:1;min-width:0">'+tabIco[t.k]+t.l+'</button>';

              (r.normal?'<div style="margin-top:5px"><span style="font-size:0.72em;font-weight:600;color:#2d8653;background:#e6f4ec;padding:1px 6px;border-radius:4px">✅ 정상 범위</span><div style="font-size:0.82em;color:var(--t2);margin-top:3px;white-space:pre-wrap">'+r.normal+'</div></div>':'')+

function openSuppEditModal(slotKey,id){
  if(!S.health||!S.health.supplements)return;
  var it=(S.health.supplements[slotKey]||[]).find(function(x){return x.id===id;});
  if(!it)return;
  openHealthMo('영양제 수정',
    '<div class="fg"><label class="fl">이름</label><input class="inp" id="supp-name" value="'+it.name+'"></div>'+

var _suppDragSlot='',_suppDragId='',_suppDragEnterCount=0;
function suppDragStart(e,slot,id){
  _suppDragSlot=slot; _suppDragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
}
function suppCalNav(dir){
  window._suppCalMonthOffset=(window._suppCalMonthOffset||0)+dir;
  render();
}
function suppDragEnter(e,el){
  e.preventDefault();
  _suppDragEnterCount++;
  el.style.outline='2px dashed var(--accent)';
  el.style.outlineOffset='2px';
}
function suppDragLeave(e,el){
  _suppDragEnterCount--;
  if(_suppDragEnterCount<=0){
    _suppDragEnterCount=0;
    el.style.outline='none';
  }
}
function suppDrop(e,toSlot,el){
  e.preventDefault();
  _suppDragEnterCount=0;
  if(el)el.style.outline='none';
  if(!_suppDragId||_suppDragSlot===toSlot)return;
  if(!S.health)return;
  if(!S.health.supplements)S.health.supplements={};
  var supps=S.health.supplements;
  var fromArr=supps[_suppDragSlot]||[];
  var item=fromArr.find(function(x){return x.id===_suppDragId;});
  if(!item)return;
  supps[_suppDragSlot]=fromArr.filter(function(x){return x.id!==_suppDragId;});
  if(!supps[toSlot])supps[toSlot]=[];
  supps[toSlot].push(item);
  _suppDragSlot='';_suppDragId='';
  save();render();
}
function delSupp(slotKey,id){
  if(!S.health||!S.health.supplements||!S.health.supplements[slotKey])return;
  S.health.supplements[slotKey]=S.health.supplements[slotKey].filter(x=>x.id!==id);
  save();render();
}

// 이미지를 canvas로 리사이즈·압축해서 base64 반환 (용량 초과 방지)
function compressImage(file, maxW, maxH, quality){
  return new Promise(function(resolve){
    if(!file.type.startsWith('image/')){
      const reader=new FileReader();
      reader.onload=function(e){resolve({name:file.name,type:file.type,data:e.target.result});};
      reader.readAsDataURL(file);
      return;
    }
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve({name:file.name,type:'image/jpeg',data:canvas.toDataURL('image/jpeg',quality||0.7)});
    };
    img.onerror=function(){resolve(null);};
    img.src=url;
  });
}

function previewHealthFiles(input){
  var files=Array.from(input.files);
  // 병렬 압축 후 순서 유지
  Promise.all(files.map(function(file){
    return compressImage(file, 1200, 1200, 0.72);
  })).then(function(results){
    window._hrFiles=window._hrFiles||[];
    results.forEach(function(r){if(r) window._hrFiles.push(r);});
    refreshHrPreview();
  });
}

function refreshHrPreview(){
  var prev=document.getElementById('hr-preview');if(!prev)return;
  prev.innerHTML=(window._hrFiles||[]).map(function(f,i){

}

// ════ 회고 & 통계 ════
function renderInsights(){
  const today=todStr();
  let cells30=[];
  for(let i=29;i>=0;i--){
    const ds=addDays(today,-i);
    const rods=routinesForDate(ds);
    const ck=S.checks[ds]||{};
    const done=rods.filter(r=>ck[r.id]).length;
    const pct=rods.length?Math.round(done/rods.length*100):0;
    cells30.push({ds,done,total:rods.length,pct});
  }
  // 이번 주(최근 7일) 평균
  const last7=cells30.slice(-7);
  const avg7=last7.length?Math.round(last7.reduce((s,c)=>s+c.pct,0)/last7.length):0;
  const avg30=cells30.length?Math.round(cells30.reduce((s,c)=>s+c.pct,0)/cells30.length):0;

  // ── 2) 연속 달성(스트릭): 오늘부터 거꾸로, 그날 루틴 100% 달성한 날 ──
  let streak=0;
  for(let i=0;i<365;i++){
    const ds=addDays(today,-i);
    const rods=routinesForDate(ds);
    if(rods.length===0){ if(i===0)continue; else break; }
    const ck=S.checks[ds]||{};
    const allDone=rods.every(r=>ck[r.id]);
    if(allDone)streak++; else break;
  }

      html+='<div style="font-size:0.8em;color:var(--t2);margin-bottom:8px">⏰ 마감 전후 컨디션 (5점 만점)</div>';

      html+='<div><div style="font-size:0.72em;color:var(--t3)">평상시</div><div style="font-family:var(--serif);font-size:1.4em">'+farAvg+'</div><div style="font-size:0.68em;color:var(--t3)">'+farArr.length+'일 기준</div></div>';
      html+='</div>';
      html+='<div style="font-size:0.82em;color:var(--text);line-height:1.5">'+msg+'</div></div>';
    }
    html+='</div>';
  })();

  // 잘 지킨 / 자주 놓친 루틴
  html+='<div class="g2">';
  html+='<div class="card"><div class="ct" style="margin-bottom:12px">💚 잘 지킨 루틴</div>';

  html+='</div>';
  html+='<div class="card"><div class="ct" style="margin-bottom:12px">💛 자주 놓친 루틴</div>';
  if(worst.length===0||worst[0].total===0){html+='<div class="empty">데이터가 쌓이면 보여요</div>';}
  else{worst.forEach(function(s){html+='<div style="display:flex;align-items:center;gap:10px;padding:7px 0"><div style="flex:1;font-size:0.88em">'+s.task+'</div><div style="flex:1.2;display:flex;align-items:center;gap:8px"><div class="pw" style="flex:1;height:7px"><div class="pb" style="width:'+s.rate+'%;background:var(--accent)"></div></div><span style="font-size:0.78em;color:var(--t3);font-family:var(--mono);width:34px;text-align:right">'+s.rate+'%</span></div></div>';});}
  html+='</div>';
  html+='</div>';

  // 가계부 월 비교 + 저축 추이
  html+='<div class="g2">';
  html+='<div class="card"><div class="ct" style="margin-bottom:14px">📈 지난달 대비</div>';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:0.85em;color:var(--t3)">이번 달 수입</div><div style="font-size:1.1em;font-weight:600;color:var(--green)">'+money(incThis)+'</div></div><div style="font-size:0.85em">'+diffLabel(incThis,incPrev)+'</div></div>';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0"><div><div style="font-size:0.85em;color:var(--t3)">이번 달 지출</div><div style="font-size:1.1em;font-weight:600;color:var(--red)">'+money(expThis)+'</div></div><div style="font-size:0.85em">'+diffLabel(expThis,expPrev)+'</div></div>';
  html+='</div>';
  html+='<div class="card"><div class="ct" style="margin-bottom:14px">💰 월별 저축 추이</div>';
  html+='<div style="display:flex;gap:8px;align-items:flex-end;height:90px">';
  svMonths.forEach(function(x){
    var h=Math.round(x.amount/svMax*70);
    html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div title="'+money(x.amount)+'" style="width:60%;background:var(--accent);border-radius:3px 3px 0 0;height:'+h+'px;min-height:'+(x.amount>0?3:0)+'px"></div><div style="font-size:0.68em;color:var(--t3)">'+x.m+'</div></div>';
  });

  if(lookbacks.length>0){

      html+='<div style="padding:10px 14px;background:var(--s2);border-radius:10px;margin-bottom:8px"><div style="font-size:0.75em;color:var(--accent);font-weight:600;margin-bottom:4px">'+lb.label+' · '+lb.date+'</div><div style="font-size:0.9em;color:var(--text);line-height:1.5">'+lb.text+'</div></div>';
    });
  }
  if(diaryEntries.length>0){

    const rand=diaryEntries[Math.floor(Math.random()*diaryEntries.length)];

  }
  if(lookbacks.length===0&&diaryEntries.length===0){

// ═══════════ 연말 결산 ═══════════
function openYearReview(Y){
  var pfx=Y+'-';
  // ── 일기 ──
  var diaryDays=0, totalChars=0, dist={}, longest={ds:'',len:0};
  var monthCnt=Array(12).fill(0);
  Object.keys(S.diaryEntries||{}).forEach(function(ds){
    if(ds.slice(0,5)!==pfx)return;
    var e=S.diaryEntries[ds];if(!e)return;
    var has=!!(e.text||e.title||e.mood);
    if(!has)return;
    diaryDays++;
    monthCnt[parseInt(ds.slice(5,7))-1]++;
    var len=(e.text||'').length;
    totalChars+=len;
    if(len>longest.len)longest={ds:ds,len:len};
    if(e.mood)dist[e.mood]=(dist[e.mood]||0)+1;
  });
  var topMood='', topMoodCnt=0;
  Object.keys(dist).forEach(function(m){if(dist[m]>topMoodCnt){topMood=m;topMoodCnt=dist[m];}});
  // ── 루틴 ──
  var today=todStr();
  var rtSum=0,rtDays=0,perfectDays=0,bestStreak=0,curStreak=0;
  var rtStats={};
  var endDs=(Y===new Date().getFullYear())?today:Y+'-12-31';
  for(var ds=Y+'-01-01';ds<=endDs;ds=addDays(ds,1)){
    var rods=routinesForDate(ds),ck=S.checks[ds]||{};
    if(rods.length===0){continue;}
    var dn=rods.filter(r=>ck[r.id]).length;
    var p=Math.round(dn/rods.length*100);
    rtDays++;rtSum+=p;
    if(p===100){perfectDays++;curStreak++;if(curStreak>bestStreak)bestStreak=curStreak;}
    else curStreak=0;
    rods.forEach(function(r){
      if(!rtStats[r.id])rtStats[r.id]={task:r.task,done:0,total:0};
      rtStats[r.id].total++;if(ck[r.id])rtStats[r.id].done++;
    });
  }
  var rtAvg=rtDays?Math.round(rtSum/rtDays):0;
  var bestRt=null;
  Object.values(rtStats).forEach(function(s){
    if(s.total<10)return;
    s.rate=Math.round(s.done/s.total*100);
    if(!bestRt||s.rate>bestRt.rate)bestRt=s;
  });
  // ── 저축 / 가계부 / 마감 ──
  var yearSv=(S.savings&&S.savings.entries||[]).filter(function(e){return e.date&&e.date.slice(0,5)===pfx;}).reduce(function(s,e){return s+e.amount;},0);
  var yInc=0,yExp=0;
  (LD.transactions||[]).forEach(function(tx){
    if(tx.date.slice(0,5)!==pfx)return;
    if(tx.type==='income')yInc+=tx.amount;else if(tx.type==='expense')yExp+=tx.amount;
  });
  var dlDone=(S.deadlines||[]).filter(function(d){return d.done&&d.date&&d.date.slice(0,5)===pfx;}).length;

  // ════ HTML ════
  function tile(emoji,label,val,sub){
    return '<div style="background:var(--s2);border-radius:12px;padding:14px 12px;text-align:center">'+
      '<div style="font-size:1.3em;margin-bottom:4px">'+emoji+'</div>'+
      '<div style="font-family:var(--serif);font-size:1.25em;line-height:1.2;color:var(--text)">'+val+'</div>'+
      '<div style="font-size:0.7em;color:var(--t3);margin-top:3px">'+label+(sub?'<br>'+sub:'')+'</div></div>';
  }
  var body='<div style="text-align:center;margin-bottom:16px">'+
    '<div style="font-family:var(--serif);font-size:1.5em;color:var(--accent)">'+Y+'년의 루시</div>'+
    '<div style="font-size:0.78em;color:var(--t3);margin-top:2px">'+(Y===new Date().getFullYear()?'오늘까지의 기록이에요':'1년간의 기록이에요')+'</div></div>';

  body+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">';
  body+=tile('✍️','일기 쓴 날',diaryDays+'<span style="font-size:0.55em;color:var(--t3)">일</span>',totalChars>0?'총 '+totalChars.toLocaleString()+'자':'');
  body+=tile(topMood||'🌱','가장 많았던 기분',topMood?topMoodCnt+'<span style="font-size:0.55em;color:var(--t3)">일</span>':'-','');
  body+=tile('🔥','최장 연속 달성',bestStreak+'<span style="font-size:0.55em;color:var(--t3)">일</span>','100% 달성 '+perfectDays+'일');
  body+=tile('📈','루틴 연 평균',rtAvg+'<span style="font-size:0.55em;color:var(--t3)">%</span>','');
  body+=tile('💰','올해 모은 돈',money(yearSv),'');
  body+=tile('✅','끝낸 마감',dlDone+'<span style="font-size:0.55em;color:var(--t3)">개</span>','');
  body+='</div>';

  // 월별 일기 미니 차트
  var maxM=Math.max(1,...monthCnt);
  body+='<div style="margin-bottom:14px"><div style="font-size:0.78em;color:var(--t2);margin-bottom:6px">월별 일기</div>';
  body+='<div style="display:flex;gap:4px;align-items:flex-end;height:50px">';
  monthCnt.forEach(function(c,i){
    var h=Math.round(c/maxM*40);
    body+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div title="'+(i+1)+'월 '+c+'일" style="width:70%;background:var(--accent);opacity:'+(c>0?1:0.15)+';border-radius:3px 3px 0 0;height:'+Math.max(h,3)+'px"></div><div style="font-size:0.6em;color:var(--t3)">'+(i+1)+'</div></div>';
  });
  body+='</div></div>';

  // 기분 분포 (색상)
  var distKeys=Object.keys(dist);
  if(distKeys.length>0){
    var maxD=Math.max.apply(null,Object.values(dist));
    body+='<div style="margin-bottom:14px"><div style="font-size:0.78em;color:var(--t2);margin-bottom:6px">올해의 기분</div>';
    MOODS.forEach(function(m){
      var c=dist[m.v]||0;if(c===0)return;
      body+='<div style="display:flex;align-items:center;gap:8px;padding:3px 0">'+
        '<span style="width:22px;text-align:center;font-size:0.95em">'+m.v+'</span>'+
        '<div class="pw" style="flex:1;height:8px"><div class="pb" style="width:'+Math.round(c/maxD*100)+'%;background:'+(MOOD_COLORS[m.v]||'var(--accent)')+'"></div></div>'+
        '<span style="font-size:0.72em;color:var(--t3);font-family:var(--mono);width:34px;text-align:right">'+c+'일</span></div>';
    });
    body+='</div>';
  }

  // 하이라이트
  var highlights=[];
  if(bestRt)highlights.push('제일 잘 지킨 루틴은 <b>「'+bestRt.task+'」</b> ('+bestRt.rate+'%)');
  if(longest.len>0)highlights.push('가장 길게 쓴 일기는 <b>'+longest.ds+'</b> ('+longest.len.toLocaleString()+'자)');
  if(yInc>0||yExp>0)highlights.push('올해 수입 <b style="color:var(--green)">'+money(yInc)+'</b> · 지출 <b style="color:var(--red)">'+money(yExp)+'</b>');
  if(highlights.length>0){
    body+='<div style="padding:12px 14px;background:var(--al);border-radius:12px;font-size:0.85em;line-height:1.8">';
    highlights.forEach(function(h){body+='<div>· '+h+'</div>';});
    body+='</div>';
  }
  if(diaryDays===0&&rtSum===0&&yearSv===0&&yInc===0&&yExp===0&&dlDone===0){
    body+='<div class="empty">'+Y+'년 기록이 아직 없어요</div>';
  }

  openMo('🎁 '+Y+'년 결산',body,'<button class="btn bg" onclick="closeMo()">닫기</button>');
}

// ═══════════ CALENDAR ═══════════
let calY=new Date().getFullYear(), calM=new Date().getMonth();
// ═══════════ 캘린더 날짜별 루틴 체크 모달 ═══════════
function openDayRoutineModal(ds){
  const old=document.getElementById('day-routine-overlay');
  if(old)old.remove();

  // 캘린더에서는 프로젝트에서 추가한 루틴(루틴화)만 표시
  const rods=routinesForDate(ds).filter(function(r){return r.isRz;});
  const dls=(S.deadlines||[]).filter(function(d){return d.date===ds;}).sort((a,b)=>(a.done?1:0)-(b.done?1:0));
  const evts=(S.calEvents||[]).filter(function(e){return e.date===ds&&!e.rzId;});
  const checks=S.checks[ds]||{};
  const dt=new Date(ds+'T00:00:00');
  const dow=DOW_KO[dt.getDay()];
  const dateLabel=(dt.getMonth()+1)+'월 '+dt.getDate()+'일 ('+dow+')';
  const done=rods.filter(r=>checks[r.id]).length;
  const pct=rods.length?Math.round(done/rods.length*100):0;

  var itemsHtml='';
  if(rods.length===0&&dls.length===0&&evts.length===0){
    itemsHtml='<div style="text-align:center;padding:30px 0;color:var(--t3);font-size:0.9em">이 날 일정이 없어요</div>';
  } else {
    rods.forEach(function(r){
      const isDone=!!checks[r.id];
      itemsHtml+='<div onclick="dayRoutineToggle(\''+r.id+'\',\''+ds+'\')" style="display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;margin-bottom:6px;cursor:pointer;background:'+(isDone?'var(--al)':'var(--s2)')+';transition:background .15s">'+
        '<div style="width:20px;height:20px;border-radius:6px;border:2px solid '+(isDone?'var(--green)':'var(--border2)')+';background:'+(isDone?'var(--green)':'transparent')+';flex-shrink:0;display:flex;align-items:center;justify-content:center">'+
        (isDone?'<span style="color:#fff;font-size:0.7em">&#10003;</span>':'')+
        '</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">'+
            (r.time?'<span style="font-size:0.8em;color:var(--accent);font-family:var(--mono);font-weight:600">'+r.time+'</span>':'')+
            '<span style="font-size:0.92em;font-weight:500;'+(isDone?'text-decoration:line-through;color:var(--t3)':'')+'">'+r.task+'</span>'+
            (r.saveAmount>0?'<span style="font-size:0.72em;background:'+(isDone?'var(--green)':'var(--al)')+';color:'+(isDone?'#fff':'var(--accent)')+';padding:1px 7px;border-radius:99px;font-weight:600">💰 '+money(r.saveAmount)+'</span>':'')+
          '</div>'+
          (r.detail?'<div style="font-size:0.78em;color:var(--t3);margin-top:2px">'+r.detail+'</div>':'')+
        '</div>'+
      '</div>';
    });
    dls.forEach(function(d){
      var pr=S.projects.find(p=>p.id===d.projectId);
      var dd=dLeft(d.date);
      var dDone=!!d.done;
      itemsHtml+='<div onclick="dayDlToggle(\''+d.id+'\',\''+ds+'\')" style="display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;margin-bottom:6px;cursor:pointer;background:'+(dDone?'var(--al)':'var(--s2)')+';transition:background .15s">'+
        '<div style="width:20px;height:20px;border-radius:50%;border:2px solid '+(dDone?'var(--green)':'var(--border2)')+';background:'+(dDone?'var(--green)':'transparent')+';flex-shrink:0;display:flex;align-items:center;justify-content:center">'+
        (dDone?'<span style="color:#fff;font-size:0.7em">&#10003;</span>':'')+
        '</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">'+
            '<span style="font-size:0.92em;font-weight:500;'+(dDone?'text-decoration:line-through;color:var(--t3)':'')+'">🚨 '+d.title+'</span>'+
            (dDone?'':'<span style="font-family:var(--mono);font-size:0.72em;font-weight:600;color:'+(dd<=0?'var(--red)':dd<=3?'var(--accent)':'var(--t3)')+'">'+(dd<0?'D+'+Math.abs(dd):dd===0?'오늘':'D-'+dd)+'</span>')+
          '</div>'+
          (pr?'<div style="font-size:0.78em;color:var(--t3);margin-top:2px">🗂️ '+pr.name+'</div>':'')+
        '</div>'+
      '</div>';
    });
    evts.forEach(function(e){
      var pr=e.projectId?S.projects.find(p=>p.id===e.projectId):null;
      var color=pr?pr.color:(e.color||'var(--accent)');
      itemsHtml+='<div onclick="closeDayOverlayAnd(function(){openEvDetailModal(\''+e.id+'\')})" style="display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;margin-bottom:6px;cursor:pointer;background:var(--s2);border-left:3px solid '+color+'">'+
        '<div style="flex:1;min-width:0;font-size:0.92em;font-weight:500">'+e.title+'</div>'+
      '</div>';
    });
  }

  const inner=
    '<div style="padding:20px 24px 12px;display:flex;align-items:center;justify-content:space-between">'+
      '<div><div style="font-size:1.1em;font-weight:600">'+dateLabel+'</div>'+
      (rods.length>0?'<div style="font-size:0.82em;color:var(--t3);margin-top:2px">'+done+'/'+rods.length+' 완료 · '+pct+'%</div>':'')+
      '</div>'+
      '<button class="bi" onclick="document.getElementById(\'day-routine-overlay\').remove()">✕</button>'+
    '</div>'+
    '<div style="padding:4px 24px 20px;overflow-y:auto;flex:1">'+itemsHtml+'</div>';

  const overlay=document.createElement('div');
  overlay.id='day-routine-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1001;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML='<div style="background:var(--surface);border-radius:16px;width:100%;max-width:420px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)">'+inner+'</div>';
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}
// 모달 안에서 체크 토글 (저축 연동 포함) → 모달 즉시 갱신
function dayRoutineToggle(rid,ds){
  toggleCheck(rid,ds);
  openDayRoutineModal(ds); // 모달 다시 그려서 체크 상태 반영
}
// 모달 안에서 마감 완료 토글 → 모달 즉시 갱신 (완료되면 목록에서 사라짐)
function dayDlToggle(id,ds){
  togDlDone(id);
  openDayRoutineModal(ds);

  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0),sdow=first.getDay();

  for(var d=1;d<=last.getDate();d++)cells.push({d:d,m:calM,y:calY,cur:true});
  var rem=42-cells.length;

  var evMap={};

    if(!evMap[e.date])evMap[e.date]=[];
    // 프로젝트 색상 실시간 반영
    const pr=e.projectId?S.projects.find(p=>p.id===e.projectId):null;

  (S.deadlines||[]).forEach(dl=>{if(!dl.date)return;if(!evMap[dl.date])evMap[dl.date]=[];const pr=S.projects.find(p=>p.id===dl.projectId);evMap[dl.date].push(Object.assign({},dl,{isDl:true,color:pr?pr.color:'#C14A3C'}));});

  ((S.health&&S.health.schedules)||[]).filter(s=>!s.done).forEach(s=>{

  });

  var calHtml='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="min-width:560px">'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">';
  ['일','월','화','수','목','금','토'].forEach(function(d,i){
    calHtml+='<div style="text-align:center;padding:8px 0;font-size:0.75em;font-weight:500;color:'+(i===0?'var(--red)':i===6?'var(--blue)':'var(--t3)')+'">'+d+'</div>';
  });

      } else if(ev.isRzCell) {

      } else if(ev.isHealthSched) {

    });
    calHtml+='</div>';
  }
  calHtml+='</div></div></div>'; // grid close + min-width wrapper + scroll wrapper

  var goals=S.monthlyGoals&&S.monthlyGoals[ym]||[];
  var goalHtml='';
  goals.forEach(function(g,i){
    var doneBg=g.done?'var(--accent)':'transparent';

  var dlHtml='';

    var pr=S.projects.find(p=>p.id===d.projectId);
    var area=pr?(S.lifeAreas||[]).find(a=>a.id===pr.lifeAreaId):null;

function openEvModal(pre){
  closeMo();
  openMo('일정 추가',
    '<div class="fg"><label class="fl">날짜</label><input type="date" class="inp" id="ev-date" value="'+(pre||todStr())+'"></div>'+
    '<div class="fg"><label class="fl">제목</label><input class="inp" id="ev-title" placeholder="일정 제목"></div>'+
    '<div class="fg"><label class="fl">색상</label><div class="cops">'+COLORS.map((c,i)=>'<div class="cop '+(i===0?'on':'')+'" style="background:'+c+'" onclick="pickEvC(this,\''+c+'\')"></div>').join('')+'</div></div>',
    '<button class="btn bg" onclick="closeMo()">취소</button><button class="btn bp" onclick="saveEv()">저장</button>');
  selEvC=COLORS[0];
}
function pickEvC(el,c){selEvC=c;document.querySelectorAll('.cop').forEach(e=>e.classList.remove('on'));el.classList.add('on');}
function saveEv(){var date=document.getElementById('ev-date').value,title=document.getElementById('ev-title').value.trim();if(!date||!title)return;S.calEvents.push({id:gid(),date,title,color:selEvC});save();closeMo();render();}
function openEvDetailModal(id){
  const ev=S.calEvents.find(e=>e.id===id);if(!ev)return;
  openMo('일정',
    '<div style="font-size:1em;font-weight:500;margin-bottom:6px">'+ev.title+'</div>'+
    '<div style="font-size:0.88em;color:var(--t3)">📅 '+ev.date+'</div>',
    '<button class="btn bg" onclick="closeMo()">닫기</button>'+
    '<button class="btn" style="background:var(--rl);color:var(--red)" onclick="delEv(\''+id+'\')">🗑 삭제</button>');
}
function delEv(id){S.calEvents=S.calEvents.filter(e=>e.id!==id);save();closeMo();render();}

function loadCustomFont(input, slot){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var name=file.name.replace(/\.[^.]+$/,'');
  var reader=new FileReader();
  reader.onload=function(e){
    var fontName='UserFont'+(slot+1);
    var fontFace=new FontFace(fontName, e.target.result);
    fontFace.load().then(function(ff){
      document.fonts.add(ff);
      if(!S.customFonts) S.customFonts=['','',''];
      if(!S.customFontData) S.customFontData=['','',''];
      S.customFonts[slot]=name;
      S.customFontData[slot]=e.target.result;
      S.font='custom'+(slot+1);
      save(); applyTheme(S.theme||'sky'); render();
    });
  };
  reader.readAsArrayBuffer(file);
}
function clearCustomFont(slot){
  if(!S.customFonts) S.customFonts=['','',''];
  if(!S.customFontData) S.customFontData=['','',''];
  S.customFonts[slot]=''; S.customFontData[slot]='';
  if(S.font==='custom'+(slot+1)) S.font='pretendard';
  save(); applyTheme(S.theme||'sky'); render();
}
function restoreCustomFont(){
  if(!S.customFontData) return;
  S.customFontData.forEach(function(data, i){
    if(!data) return;
    var fontFace=new FontFace('UserFont'+(i+1), data);
    fontFace.load().then(function(ff){ document.fonts.add(ff); });
  });
}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function lighten(hex,amt){
  var c=hexToRgb(hex);
  var r=Math.min(255,Math.round(c.r+(255-c.r)*amt));
  var g=Math.min(255,Math.round(c.g+(255-c.g)*amt));
  var b=Math.min(255,Math.round(c.b+(255-c.b)*amt));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function darken(hex,amt){
  var c=hexToRgb(hex);
  var r=Math.max(0,Math.round(c.r*(1-amt)));
  var g=Math.max(0,Math.round(c.g*(1-amt)));
  var b=Math.max(0,Math.round(c.b*(1-amt)));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function setCustomThemeVars(hex){
  var root=document.documentElement.style;
  root.setProperty('--ct-light', lighten(hex,0.35));
  root.setProperty('--ct-lighter', lighten(hex,0.55));
  root.setProperty('--ct-mid', lighten(hex,0.2));
  root.setProperty('--ct-border', lighten(hex,0.1));
  root.setProperty('--ct-border2', hex);
  root.setProperty('--ct-dark', darken(hex,0.25));
}

function applyTheme(t){
  var validThemes = ['sky','sand','lightBeige','lightGray','coral','mint','cream','ocean','lilac','peach','charcoal','crumple','custom'];
  if(!validThemes.includes(t)) t = 'sky';

  var cls='theme-'+t;
  if(t==='custom'){
    var hex=S.customThemeColor||'#F9D0CD';
    setCustomThemeVars(hex);
    var root2=document.documentElement.style;
    root2.setProperty('--bg','var(--ct-light)');
    root2.setProperty('--s2','var(--ct-lighter)');
    root2.setProperty('--s3','var(--ct-mid)');
    root2.setProperty('--border','var(--ct-border)');
    root2.setProperty('--border2','var(--ct-border2)');
    root2.setProperty('--accent','var(--ct-dark)');
    root2.setProperty('--al','var(--ct-lighter)');
  } else {
    var root3=document.documentElement.style;
    ['--bg','--s2','--s3','--border','--border2','--accent','--al'].forEach(function(v){root3.removeProperty(v);});
  }
  
  var f=S.font||'pretendard';
  if(f!=='pretendard') cls+=' font-'+f;
  document.body.className=cls;

  // Noto Serif KR Google Font 동적 로드
  if(f==='notoserif' && !document.getElementById('notoserif-font')){
    var link=document.createElement('link');
    link.id='notoserif-font';
    link.rel='stylesheet';
    link.href='https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap';
    document.head.appendChild(link);
  }

  var fontMap={
    pretendard:"'Pretendard','Apple SD Gothic Neo',sans-serif",
    serif:"'Instrument Serif',Georgia,serif",
    notoserif:"'Noto Serif KR','Nanum Myeongjo',serif",
    nanummyeongjo:"'Nanum Myeongjo',serif",
    nanumpen:"'Nanum Pen Script',cursive",
    sunflower:"'Sunflower','Pretendard',sans-serif",
    himelody:"'Hi Melody',cursive",
    stylish:"'Stylish','Pretendard',sans-serif",
    custom1: S.customFonts&&S.customFonts[0] ? "'UserFont1',sans-serif" : "'Pretendard',sans-serif",
    custom2: S.customFonts&&S.customFonts[1] ? "'UserFont2',sans-serif" : "'Pretendard',sans-serif",
  };
  var chosen = fontMap[f] || fontMap.pretendard;
  var root = document.documentElement.style;
  root.setProperty('--sans', chosen);

  // 로고 글씨체 적용
  var logoFontMap={
    montserrat:"'Montserrat','Pretendard',sans-serif",
    dancing:"'Dancing Script',cursive",
    sacramento:"'Sacramento',cursive",
    allura:"'Allura',cursive",
    kaushan:"'Kaushan Script',cursive"
  };
  root.setProperty('--logo-font', logoFontMap[S.logoFont||'montserrat']||logoFontMap.montserrat);
  // 로고 italic/size 보정 (필기체는 italic 해제). 헤더 높이 고정이라 크기 늘어도 안 넘침
  (function(){
    var lg=document.querySelector('.logo');
    if(lg){
      var sc=(S.logoFont&&S.logoFont!=='montserrat');
      lg.style.fontStyle=sc?'normal':'italic';
      lg.style.fontSize=sc?'1.75em':'1.4em';
    }
  })();
  
  var fs = S.fontSize || 14;
  
  // ★ 핵심 폰트 상속 로직 변경: 
  // 영문/숫자에 강제 적용되던 별도 폰트(Geist Mono, Instrument Serif)를 해제하고,
  // 작가님이 선택하신 폰트 하나로 모든 요소(영문, 숫자 포함)가 완벽하게 통일되어 렌더링되도록 수정했습니다.
  var styleEl = document.getElementById('dynamic-theme-style');
  if(!styleEl){
    styleEl = document.createElement('style');
    styleEl.id = 'dynamic-theme-style';
    document.head.appendChild(styleEl);
  }
  var fw = S.fontWeight || '400';
  styleEl.textContent =
    'html, body { font-size: '+fs+'px !important; font-weight: '+fw+' !important; }' +
    '.app, .app * { font-weight: '+fw+' !important; }' +
    ':root { --sans: '+chosen+'; --serif: '+chosen+'; --mono: '+chosen+'; }';

  applyNavMarkers();
}

function syncRzToRoutines(){
  (S.projects||[]).forEach(function(p){
    (p.routinized||[]).forEach(function(entry){
      var exists = S.routines.some(function(r){ return r.id === entry.id; });
      if(!exists){
        S.routines.push({
          id: entry.id,
          time: entry.time||'',
          task: entry.task,
          detail: p.name+' 루틴화',
          days: entry.days||[],
          monthDays: entry.monthDays||[],
          isMonthly: !!entry.isMonthly,
          saveAmount: entry.saveAmount||0,
          startDate: entry.startDate||'',
          until: entry.until||'',
          isRz: true,
          rzProjectId: p.id
        });
      } else {
        // 기존 루틴에 최신 정보 전체 반영
        S.routines.forEach(function(r){
          if(r.id===entry.id){
            r.time=entry.time||'';
            r.task=entry.task;
            r.detail=p.name+' 루틴화';
            r.days=entry.days||[];
            r.monthDays=entry.monthDays||[];
            r.isMonthly=!!entry.isMonthly;
            r.saveAmount=entry.saveAmount||0;
            r.startDate=entry.startDate||'';
            r.until=entry.until||'';
          }
        });
      }
    });
  });
  S.routines = S.routines.filter(function(r){
    if(!r.isRz) return true;
    return (S.projects||[]).some(function(p){
      return (p.routinized||[]).some(function(e){ return e.id === r.id; });
    });
  });
  S.routines.sort(function(a,b){ return a.time.localeCompare(b.time); });
}

const LEDGER_KEY = 'lucy_ledger_v1';
let ledgerTab = 'dashboard'; // dashboard | calendar | assets | settings

const defaultLedgerCategories = {
  income: {
    '인세 수익': ['원트미','후아유99','후아유69','도민아','타락감자/오렌지말머리'],
    '기타 수익': ['외주/강연','이자/투자','기타']
  },
  expense: {
    '저축/투자': ['정기 예/적금','주식/ETF','주택청약','파킹통장 예치'],
    '작업 유지비': ['표지/삽화 외주','자료 구입비','소프트웨어/구독','장비 구입'],
    '고정 생활비': ['주거비(월세/대출)','공과금/통신비','보험료'],
    '변동 생활비': ['식비','쇼핑/문화','교통/차량'],
    '세금/예비비': ['종합소득세 대비 저축','기타 예비비']
  },
  transfer: { '자산 이동': ['카드대금 납부','계좌 이체','현금 인출'] }
};
const defaultLedgerBudgets = {'고정 생활비':1000000,'변동 생활비':800000,'작업 유지비':500000};
const defaultLedgerAccounts = ['사업용 기업은행','생활비 신한은행','신한 신용카드','국민 신용카드'];
const defaultLedgerAssets = [
  {id:'lda1',type:'asset',category:'현금/입출금',name:'사업용 기업은행',amount:0},
  {id:'lda2',type:'asset',category:'예적금',name:'정기예금',amount:0,interestRate:0,maturityDate:''},
];
const defaultLedgerFixedItems = [];

let LD = {
  transactions: [],
  categories: JSON.parse(JSON.stringify(defaultLedgerCategories)),
  budgets: {...defaultLedgerBudgets},
  accounts: [...defaultLedgerAccounts],
  assets: JSON.parse(JSON.stringify(defaultLedgerAssets)),
  fixedItems: [...defaultLedgerFixedItems],
};

function loadLedger(){try{const d=localStorage.getItem(LEDGER_KEY);if(d)LD=Object.assign({},LD,JSON.parse(d));}catch(e){}}
function saveLedger(){
  localStorage.setItem(LEDGER_KEY,JSON.stringify(LD));
  scheduleSaveLedger();
}

let ledgerYear=new Date().getFullYear(), ledgerMonth=new Date().getMonth();
let ledgerShowTxForm=false, ledgerEditTx=null, ledgerTxDate='', ledgerShowDayModal=false, ledgerDayModalDate='';

function renderLedger(){
  loadLedger();
  const tabs=[
    {id:'dashboard',label:'대시보드',ic:'📊'},
    {id:'calendar',label:'캘린더',ic:'📅'},
    {id:'assets',label:'자산 현황',ic:'🏦'},
    {id:'settings',label:'설정',ic:'⚙️'},
  ];
  let html='<div style="margin-bottom:20px;display:flex;justify-content:flex-end">';
  html+='<div style="display:flex;gap:4px;background:var(--s2);border-radius:10px;padding:4px;border:1px solid var(--border);display:inline-flex">';
  tabs.forEach(function(tab){
    const on=ledgerTab===tab.id;
    html+='<button onclick="ledgerTab=\''+tab.id+'\';render()" style="'+
      'padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-size:0.88em;font-family:var(--sans);'+
      'background:'+(on?'var(--surface)':'transparent')+';'+
      'color:'+(on?'var(--accent)':'var(--t2)')+';'+
      'box-shadow:'+(on?'var(--sh)':'none')+';transition:all .15s">'+
      tab.ic+' '+tab.label+'</button>';
  });
  html+='</div></div>';
  if(ledgerTab==='dashboard') html+=renderLedgerDashboard();
  else if(ledgerTab==='calendar') html+=renderLedgerCalendar();
  else if(ledgerTab==='assets') html+=renderLedgerAssets();
  else if(ledgerTab==='settings') html+=renderLedgerSettings();
  return html;
}

function fmtMoney(n){if(!n&&n!==0)return '0원';return new Intl.NumberFormat('ko-KR').format(Math.round(n))+'원';}

// ═══════════ 월간 리포트 ═══════════
function openMonthlyLedgerReport(){
  const ym=ledgerYear+'-'+String(ledgerMonth+1).padStart(2,'0');
  const prevYm=ledgerMonth===0?(ledgerYear-1)+'-12':ledgerYear+'-'+String(ledgerMonth).padStart(2,'0');
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  function collect(targetYm){
    var inc=0,exp=0,cats={};
    (LD.fixedItems||[]).forEach(function(fi){
      if(fi.amount&&fi.amount!=='req_input'){
        var amt=Number(fi.amount)||0;exp+=amt;
        var major=fi.majorCategory||'고정 지출';
        cats[major]=(cats[major]||0)+amt;
      }
    });
    (LD.transactions||[]).forEach(function(tx){
      if(tx.date.slice(0,7)!==targetYm)return;
      if(tx.type==='income')inc+=tx.amount;
      else if(tx.type==='expense'){exp+=tx.amount;cats[tx.majorCategory]=(cats[tx.majorCategory]||0)+tx.amount;}
    });
    return {inc:inc,exp:exp,cats:cats};
  }
  var cur=collect(ym), prev=collect(prevYm);
  var net=cur.inc-cur.exp;
  var saveRate=cur.inc>0?Math.round(net/cur.inc*100):0;

  function diffTag(c,p){
    if(p===0)return c>0?'<span style="font-size:0.78em;color:var(--t3)">신규</span>':'<span style="font-size:0.78em;color:var(--t3)">-</span>';
    var d=Math.round((c-p)/p*100);
    if(d===0)return '<span style="font-size:0.78em;color:var(--t3)">동일</span>';
    return '<span style="font-size:0.78em;color:'+(d>0?'var(--red)':'var(--green)')+'">'+(d>0?'▲':'▼')+' '+Math.abs(d)+'%</span>';
  }
  function diffTagInc(c,p){
    if(p===0)return c>0?'<span style="font-size:0.78em;color:var(--green)">신규</span>':'-';
    var d=Math.round((c-p)/p*100);
    if(d===0)return '<span style="font-size:0.78em;color:var(--t3)">동일</span>';
    return '<span style="font-size:0.78em;color:'+(d>0?'var(--green)':'var(--red)')+'">'+(d>0?'▲':'▼')+' '+Math.abs(d)+'%</span>';
  }

  var body='';
  // 요약 3칸
  body+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">';
  body+='<div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center"><div style="font-size:0.72em;color:var(--t3);margin-bottom:4px">수입</div><div style="font-weight:600;color:var(--green);font-size:0.95em">'+fmtMoney(cur.inc)+'</div><div style="margin-top:3px">'+diffTagInc(cur.inc,prev.inc)+'</div></div>';
  body+='<div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center"><div style="font-size:0.72em;color:var(--t3);margin-bottom:4px">지출</div><div style="font-weight:600;color:var(--red);font-size:0.95em">'+fmtMoney(cur.exp)+'</div><div style="margin-top:3px">'+diffTag(cur.exp,prev.exp)+'</div></div>';
  body+='<div style="background:var(--al);border-radius:10px;padding:12px;text-align:center"><div style="font-size:0.72em;color:var(--t3);margin-bottom:4px">남긴 돈</div><div style="font-weight:600;color:var(--accent);font-size:0.95em">'+fmtMoney(net)+'</div><div style="margin-top:3px;font-size:0.78em;color:var(--t2)">수입의 '+saveRate+'%</div></div>';
  body+='</div>';

  // 카테고리별 증감
  var allCats=Object.keys(Object.assign({},prev.cats,cur.cats));
  allCats.sort(function(a,b){return (cur.cats[b]||0)-(cur.cats[a]||0);});
  if(allCats.length>0){
    body+='<div style="font-size:0.85em;font-weight:600;margin-bottom:8px">카테고리별 지출 (전월 대비)</div>';
    var maxCat=Math.max(1,...allCats.map(function(c){return cur.cats[c]||0;}));
    allCats.forEach(function(c){
      var cv=cur.cats[c]||0, pv=prev.cats[c]||0;
      if(cv===0&&pv===0)return;
      var w=Math.round(cv/maxCat*100);
      body+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">'+
        '<span style="font-size:0.85em;width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">'+c+'</span>'+
        '<div class="pw" style="flex:1;height:7px"><div class="pb" style="width:'+w+'%;background:var(--accent)"></div></div>'+
        '<span style="font-size:0.8em;font-family:var(--mono);width:84px;text-align:right;flex-shrink:0">'+fmtMoney(cv)+'</span>'+
        '<span style="width:54px;text-align:right;flex-shrink:0">'+diffTag(cv,pv)+'</span></div>';
    });
  }

  // 저축 목표 진행률
  if(S.savings&&S.savings.goal){
    var sp=Math.min(100,Math.round((S.savings.current||0)/S.savings.goal*100));
    var monthSv=(S.savings.entries||[]).filter(function(e){return e.date&&e.date.slice(0,7)===ym;}).reduce(function(s,e){return s+e.amount;},0);
    body+='<div style="margin-top:16px;padding:12px 14px;background:var(--s2);border-radius:10px">';
    body+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">';
    body+='<span style="font-size:0.85em;font-weight:600">💰 저축 목표'+(S.savings.goalName?' · '+S.savings.goalName:'')+'</span>';
    body+='<span style="font-size:0.8em;color:var(--accent);font-weight:600">'+sp+'%</span></div>';
    body+='<div class="pw" style="height:9px;margin-bottom:6px"><div class="pb" style="width:'+sp+'%;background:var(--accent)"></div></div>';
    body+='<div style="display:flex;justify-content:space-between;font-size:0.78em;color:var(--t2)">';
    body+='<span>'+money(S.savings.current||0)+' / '+money(S.savings.goal)+'</span>';
    body+='<span>이번 달 +'+money(monthSv)+'</span></div>';
    if(S.savings.goalDate){var dd=dLeft(S.savings.goalDate);body+='<div style="font-size:0.75em;color:var(--t3);margin-top:4px;text-align:right">'+(dd>=0?'목표일까지 D-'+dd:'목표일 D+'+Math.abs(dd))+'</div>';}
    body+='</div>';
  }

  openMo('📋 '+ledgerYear+'년 '+MN[ledgerMonth]+' 리포트',body,'<button class="btn bg" onclick="closeMo()">닫기</button>');
}

function openYearlyDashboard(year){
  let totalInc=0,totalExp=0,totalSav=0;
  const incCats={},expCats={};
  (LD.fixedItems||[]).forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input'){
      const amt=Number(fi.amount)||0;
      totalExp+=amt*12;
      if(!expCats['고정 지출'])expCats['고정 지출']={total:0,subs:{}};
      expCats['고정 지출'].total+=amt*12;
      expCats['고정 지출'].subs[fi.title||'고정']=(expCats['고정 지출'].subs[fi.title||'고정']||0)+amt*12;
    }
  });
  (LD.transactions||[]).forEach(function(tx){
    if(!tx.date.startsWith(year+'-'))return;
    if(tx.type==='income'){
      totalInc+=tx.amount;
      if(!incCats[tx.majorCategory])incCats[tx.majorCategory]={total:0,subs:{}};
      incCats[tx.majorCategory].total+=tx.amount;
      const s=tx.minorCategory||'기타';
      incCats[tx.majorCategory].subs[s]=(incCats[tx.majorCategory].subs[s]||0)+tx.amount;
    } else if(tx.type==='expense'){
      totalExp+=tx.amount;
      if(!expCats[tx.majorCategory])expCats[tx.majorCategory]={total:0,subs:{}};
      expCats[tx.majorCategory].total+=tx.amount;
      const s=tx.minorCategory||'기타';
      expCats[tx.majorCategory].subs[s]=(expCats[tx.majorCategory].subs[s]||0)+tx.amount;
    }
  });
  (S.savings&&S.savings.entries||[]).forEach(function(e){
    if(e.date&&e.date.startsWith(year+'-'))totalSav+=e.amount||0;
  });
  function catRows(map,color){
    return Object.entries(map).sort((a,b)=>b[1].total-a[1].total).map(function([major,data]){
      let r='<div style="margin-bottom:10px">';
      r+='<div style="display:flex;justify-content:space-between;font-size:0.9em;font-weight:600;padding:4px 0;border-bottom:1px solid var(--border)"><span>'+major+'</span><span style="color:'+color+'">'+fmtMoney(data.total)+'</span></div>';
      Object.entries(data.subs).sort((a,b)=>b[1]-a[1]).forEach(function([sub,amt]){
        r+='<div style="display:flex;justify-content:space-between;font-size:0.78em;color:var(--t3);padding-left:10px;margin-top:2px"><span>'+sub+'</span><span>'+fmtMoney(amt)+'</span></div>';
      });
      return r+'</div>';
    }).join('');
  }
  const body=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">연간 총 수입</div><div style="font-size:1.3em;font-weight:700;color:var(--green)">'+fmtMoney(totalInc)+'</div></div>'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">연간 총 지출</div><div style="font-size:1.3em;font-weight:700;color:var(--red)">'+fmtMoney(totalExp)+'</div></div>'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">연간 저축</div><div style="font-size:1.3em;font-weight:700;color:var(--accent)">'+fmtMoney(totalSav)+'</div></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'+
    '<div><div style="font-size:0.88em;font-weight:600;color:var(--t2);margin-bottom:10px">💚 수입</div>'+catRows(incCats,'var(--green)')+'</div>'+
    '<div><div style="font-size:0.88em;font-weight:600;color:var(--t2);margin-bottom:10px">❤️ 지출</div>'+catRows(expCats,'var(--red)')+'</div>'+
    '</div>';
  openMo(year+'년 연간 대시보드',body,'<button class=\"btn bg\" onclick=\"closeMo()\">닫기</button>');
}
function ledgerPrevMonth(){if(ledgerMonth===0){ledgerMonth=11;ledgerYear--;}else ledgerMonth--;render();}
function ledgerNextMonth(){if(ledgerMonth===11){ledgerMonth=0;ledgerYear++;}else ledgerMonth++;render();}

function renderLedgerDashboard(){
  const ym=ledgerYear+'-'+String(ledgerMonth+1).padStart(2,'0');
  const prevYm=ledgerMonth===0?(ledgerYear-1)+'-12':(ledgerYear)+'-'+String(ledgerMonth).padStart(2,'0');
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let curInc=0,curExp=0,prevExp=0;

  // 카테고리별 지출 (먼저 선언)
  const catMap={};

  // 고정 지출 이번달 합산
  const fixedItems=LD.fixedItems||[];
  fixedItems.forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input'){
      const amt=Number(fi.amount)||0;
      curExp+=amt;
      const major=fi.majorCategory||'고정 지출';
      catMap[major]=(catMap[major]||0)+amt;
    }
  });
  (LD.transactions||[]).forEach(function(tx){
    const txYm=tx.date.slice(0,7);
    if(txYm===ym){
      if(tx.type==='income')curInc+=tx.amount;
      else if(tx.type==='expense'){
        curExp+=tx.amount;
        catMap[tx.majorCategory]=(catMap[tx.majorCategory]||0)+tx.amount;
      }
    }
    if(txYm===prevYm&&tx.type==='expense')prevExp+=tx.amount;
  });
  const diff=curExp-prevExp;
  const diffPct=prevExp===0?0:(diff/prevExp*100);
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  // 예산 진행
  const totalBudget=Object.values(LD.budgets||{}).reduce((a,b)=>a+(b||0),0);
  const budgetedCats=Object.keys((LD.categories||{}).expense||{}).filter(c=>!c.includes('저축')&&!c.includes('투자'));
  const totalSpent=budgetedCats.reduce((a,c)=>a+(catMap[c]||0),0);
  const totalPct=totalBudget===0?0:Math.min(100,Math.round(totalSpent/totalBudget*100));

  // 12개월 흐름
  let monthBars='';
  const maxVal=Math.max(1,...Array.from({length:12},(_,i)=>{
    const k=ledgerYear+'-'+String(i+1).padStart(2,'0');
    let inc=0,exp=0;
    (LD.transactions||[]).forEach(function(tx){if(tx.date.slice(0,7)===k){if(tx.type==='income')inc+=tx.amount;else if(tx.type==='expense')exp+=tx.amount;}});
    return Math.max(inc,exp);
  }));
  for(let i=0;i<12;i++){
    const k=ledgerYear+'-'+String(i+1).padStart(2,'0');
    let inc=0,exp=0;
    (LD.transactions||[]).forEach(function(tx){if(tx.date.slice(0,7)===k){if(tx.type==='income')inc+=tx.amount;else if(tx.type==='expense')exp+=tx.amount;}});
    const isCur=(i===ledgerMonth);
    const tipTxt=MN[i]+'  수입 +'+new Intl.NumberFormat('ko-KR').format(inc)+'  지출 -'+new Intl.NumberFormat('ko-KR').format(exp);
    monthBars+='<div onclick="ledgerMonth='+i+';render()" data-tip="'+tipTxt.replace(/"/g,'&quot;')+'" onmouseover="showLedgerTip(this,event)" onmousemove="moveLedgerTip(event)" onmouseout="hideLedgerTip()" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">';
    monthBars+='<div style="width:100%;height:60px;display:flex;align-items:flex-end;gap:1px;justify-content:center">';
    monthBars+='<div style="width:44%;background:var(--green);opacity:0.35;border-radius:3px 3px 0 0;height:'+Math.round(inc/maxVal*56)+'px;min-height:'+(inc>0?4:0)+'px"></div>';
    monthBars+='<div style="width:44%;background:'+(isCur?'var(--accent)':'var(--border2)')+';border-radius:3px 3px 0 0;height:'+Math.round(exp/maxVal*56)+'px;min-height:'+(exp>0?4:0)+'px"></div>';
    monthBars+='</div>';
    monthBars+='<div style="font-size:0.65em;color:'+(isCur?'var(--accent)':'var(--t3)')+'">'+MN[i].replace('월','')+'</div>';
    monthBars+='</div>';
  }

  // 카테고리별 수입
  const incCatMap={}, expCatMapDetail={};
  const recent=[...(LD.transactions||[])].filter(tx=>tx.date.slice(0,7)===ym).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,8);
  // 고정 지출을 expCatMapDetail에 추가
  (LD.fixedItems||[]).forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input'){
      const amt=Number(fi.amount)||0;
      const major=fi.majorCategory||'고정 지출';
      const sub=fi.minorCategory||fi.title||'고정';
      if(!expCatMapDetail[major])expCatMapDetail[major]={total:0,subs:{}};
      expCatMapDetail[major].total+=amt;
      expCatMapDetail[major].subs[sub]=(expCatMapDetail[major].subs[sub]||0)+amt;
    }
  });
  (LD.transactions||[]).forEach(function(tx){
    if(tx.date.slice(0,7)!==ym)return;
    if(tx.type==='income'){
      if(!incCatMap[tx.majorCategory])incCatMap[tx.majorCategory]={total:0,subs:{}};
      incCatMap[tx.majorCategory].total+=tx.amount;
      const sub=tx.minorCategory||'기타';
      incCatMap[tx.majorCategory].subs[sub]=(incCatMap[tx.majorCategory].subs[sub]||0)+tx.amount;
    } else if(tx.type==='expense'){
      if(!expCatMapDetail[tx.majorCategory])expCatMapDetail[tx.majorCategory]={total:0,subs:{}};
      expCatMapDetail[tx.majorCategory].total+=tx.amount;
      const sub=tx.minorCategory||'기타';
      expCatMapDetail[tx.majorCategory].subs[sub]=(expCatMapDetail[tx.majorCategory].subs[sub]||0)+tx.amount;
    }
  });

  let html='';
  // 헤더
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">';
  html+='<div style="display:flex;align-items:center;gap:8px">';
  html+='<button class="btn bg bsm" onclick="ledgerPrevMonth()">‹</button>';
  html+='<div style="font-size:1.1em;font-weight:500;min-width:80px;text-align:center">'+ledgerYear+'년 '+MN[ledgerMonth]+'</div>';
  html+='<button class="btn bg bsm" onclick="ledgerNextMonth()">›</button>';
  html+='</div>';
  html+='<div style="display:flex;gap:6px"><button class="btn bp bsm" onclick="openMonthlyLedgerReport()">📋 월간 리포트</button>';

  html+='<div class="card" style="margin-bottom:0">';
  html+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">';
  html+='<div style="font-size:0.82em;color:var(--t3)">이번 달 지출</div>';
  html+='<div style="font-size:1.5em;font-weight:600;color:var(--red)">'+fmtMoney(curExp)+'</div></div>';
  Object.entries(expCatMapDetail).sort((a,b)=>b[1].total-a[1].total).forEach(function([major,data]){
    html+='<div style="display:flex;justify-content:space-between;font-size:0.88em;padding:5px 0;border-bottom:1px solid var(--border)">';
