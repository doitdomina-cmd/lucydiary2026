<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lucy's Space</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Noto+Serif+KR:wght@400;500;600;700&family=Nanum+Pen+Script&family=Gaegu:wght@400;700&family=Montserrat:ital,wght@1,700;1,800&family=Dancing+Script:wght@600;700&family=Sacramento&family=Allura&family=Kaushan+Script&family=Geist+Mono:wght@300;400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F2;--surface:#FFF;--s2:#F2EFE9;--s3:#EAE6DE;
  --border:#E2DDD5;--border2:#D4CFC6;
  --text:#1C1917;--t2:#6B6560;--t3:#A39E97;
  --accent:#C17C3C;--al:#F5E8D8;
  --green:#4A7C6F;--gl:#E0EDEA;
  --red:#C14A3C;--rl:#F5DDD8;
  --r:12px;--rsm:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sw:240px;
  
  /* вфевЊа ВўЂВЌГ(ВўЂвгИ, ВѕФВъљ ьЈгьЋе)ВЮё ВёаьЃЮьЋю ьЈ░ьіИвАю ВЎёв▓йьъѕ ьєхВЮ╝ */
  --sans:'Pretendard','Apple SD Gothic Neo',sans-serif;
  --serif:var(--sans);
  --serif-fancy:'Instrument Serif','Noto Serif KR',serif;
  --hand:'Gaegu','Nanum Pen Script',cursive;
  --logo-font:'Montserrat','Pretendard',sans-serif;
  --mono:var(--sans);

  /* Routine card colors */
  --rc-bg:#E8F0F5;--rc-header:#648EA4;--rc-dot:#5A9AB8;

  /* Goal section vars */
  --goal-bg1:#E8F4F8;--goal-bg2:#D6EAF4;
  --goal-border:#B8D9EC;--goal-text:#1a3a4a;--goal-sub:#5a8fa8;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#B8D9EC;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#cce4f0;
}
/* РћђРћђ THEME: SKY (1в▓ѕ ьЁївДѕ) РћђРћђ */
body.theme-sky{
  --bg:#F4F8F9;--surface:#FFFFFF;--s2:#EDF3F5;--s3:#E2EDF0;
  --border:#D3E3E8;--border2:#B8D0D8;
  --rc-bg:#FFFFFF;--rc-header:#6D898D;--rc-dot:#86A8AD;
  --accent:#86A8AD;--al:#E8F0F2;
  --goal-bg1:#F4F8F9;--goal-bg2:#EDF3F5;
  --goal-border:#D3E3E8;--goal-text:#2C3E42;--goal-sub:#6A868C;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#D3E3E8;
  --goal-item-bg:rgba(255,255,255,.8);--goal-item-border:#D3E3E8;
}
/* РћђРћђ THEME: SAND (2в▓ѕ ьЁївДѕ - ВЃївЊю в▓аВЮ┤ВДђ) РћђРћђ */
body.theme-sand{
  --bg:#F8F6F4;--surface:#FFFFFF;--s2:#F3EFEA;--s3:#EAE4DC;
  --border:#DFD8CE;--border2:#D1C8BC;
  --rc-bg:#F0EBE4;--rc-header:#928980;--rc-dot:#968A7D;
  --accent:#A39688;--al:#F3EFEA;
  --goal-bg1:#EFE9E2;--goal-bg2:#E6DFD6;
  --goal-border:#D1C8BC;--goal-text:#3B342C;--goal-sub:#6A6157;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#D1C8BC;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#DFD8CE;
}
/* РћђРћђ THEME: LIGHT BEIGE (3в▓ѕ ьЁївДѕ - ВЌ░ьЋю в▓аВЮ┤ВДђ) РћђРћђ */
body.theme-lightBeige{
  --bg:#FDFBF7;--surface:#FFFFFF;--s2:#F5F3ED;--s3:#EAE7DF;
  --border:#E0DCD3;--border2:#C8C3BA;
  --rc-bg:#FFFFFF;--rc-header:#9D9488;--rc-dot:#C0B5A7;
  --accent:#C0B5A7;--al:#F3EFE9;
  --goal-bg1:#FDFBF7;--goal-bg2:#F5F3ED;
  --goal-border:#E0DCD3;--goal-text:#4A443B;--goal-sub:#8A8275;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#E0DCD3;
  --goal-item-bg:rgba(255,255,255,.8);--goal-item-border:#E0DCD3;
}
/* РћђРћђ THEME: LIGHT GRAY (4в▓ѕ ьЁївДѕ - ВЌ░ьЋю ьџїВЃЅ) РћђРћђ */
body.theme-lightGray{
  --bg:#F5F6F8;--surface:#FFFFFF;--s2:#EDEFF2;--s3:#DFE3E8;
  --border:#D0D5DB;--border2:#A8B1BC;
  --rc-bg:#FFFFFF;--rc-header:#838C94;--rc-dot:#A0ABB5;
  --accent:#A0ABB5;--al:#EAF0F5;
  --goal-bg1:#F5F6F8;--goal-bg2:#EDEFF2;
  --goal-border:#D0D5DB;--goal-text:#3E454C;--goal-sub:#7A8693;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#D0D5DB;
  --goal-item-bg:rgba(255,255,255,.8);--goal-item-border:#D0D5DB;
}
/* РћђРћђ THEME: CORAL (Вйћвъё ьЋЉьЂг - Royalty віљвѓї) РћђРћђ */
body.theme-coral{
  --bg:#F4F8F8;--surface:#FFFFFF;--s2:#ECF4F3;--s3:#DDEEED;
  --border:#C5E2E1;--border2:#9BD4D1;
  --rc-bg:#DDEEED;--rc-header:#40B5AF;--rc-dot:#40B5AF;
  --accent:#3BB0AA;--al:#E2EEED;
  --goal-bg1:#DDEEED;--goal-bg2:#C5E2E1;
  --goal-border:#9BD4D1;--goal-text:#246B68;--goal-sub:#38A8A3;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#9BD4D1;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#C5E2E1;
}
/* РћђРћђ THEME: MINT (в»╝ьіИ - MOSTKET віљвѓї) РћђРћђ */
body.theme-mint{
  --bg:#FCF5F5;--surface:#FFFFFF;--s2:#FBEEEF;--s3:#F9E1E2;
  --border:#F6CACC;--border2:#F4A4A8;
  --rc-bg:#F9E1E2;--rc-header:#FFD3D5;--rc-dot:#FFD3D5;
  --accent:#FFD3D5;--al:#F9E6E7;
  --goal-bg1:#F9E1E2;--goal-bg2:#F6CACC;
  --goal-border:#F4A4A8;--goal-text:#993338;--goal-sub:#CB4D53;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#F4A4A8;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#F6CACC;
}
/* РћђРћђ THEME: CREAM (вћ░вю╗ьЋю ьЂгвд╝ ВўљвАюВџ░) РћђРћђ */
body.theme-cream{
  --bg:#F4F8F5;--surface:#FFFFFF;--s2:#EEF4F0;--s3:#E0EDE5;
  --border:#CBE2D2;--border2:#A5CFB3;
  --rc-bg:#E0EDE5;--rc-header:#4F9265;--rc-dot:#4F9265;
  --accent:#498D60;--al:#E6EFE9;
  --goal-bg1:#E0EDE5;--goal-bg2:#CBE2D2;
  --goal-border:#A5CFB3;--goal-text:#2C593B;--goal-sub:#45875B;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#A5CFB3;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#CBE2D2;
}
/* РћђРћђ THEME: OCEAN (ВєїьћёьіИ вИћвБе) РћђРћђ */
body.theme-ocean{
  --bg:#F1F6FB;--surface:#FFFFFF;--s2:#E2EDF8;--s3:#CFE0F2;
  --border:#AECAE9;--border2:#84ADDD;
  --rc-bg:#DDEAF7;--rc-header:#3B7AC0;--rc-dot:#3B7AC0;
  --accent:#3576BE;--al:#DDEAF7;
  --goal-bg1:#CFE0F2;--goal-bg2:#AECAE9;
  --goal-border:#84ADDD;--goal-text:#1A3A5C;--goal-sub:#2D5C92;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#84ADDD;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#AECAE9;
}
/* РћђРћђ THEME: LILAC (вЮ╝ВЮ╝вЮй ьЇ╝ьћї) РћђРћђ */
body.theme-lilac{
  --bg:#F8EFF2;--surface:#FFFFFF;--s2:#F4E6EB;--s3:#EDD6DE;
  --border:#E3BFCB;--border2:#D496AB;
  --rc-bg:#EDD6DE;--rc-header:#BD4C72;--rc-dot:#BD4C72;
  --accent:#BF406A;--al:#F0DEE4;
  --goal-bg1:#EDD6DE;--goal-bg2:#E3BFCB;
  --goal-border:#D496AB;--goal-text:#632137;--goal-sub:#9D3457;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#D496AB;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#E3BFCB;
}
/* РћђРћђ THEME: PEACH (ьћ╝В╣ў Вѓ┤Жхг) РћђРћђ */
body.theme-peach{
  --bg:#F4F8F5;--surface:#FFFFFF;--s2:#EFF5F0;--s3:#E2EEE4;
  --border:#CEE4D1;--border2:#A8D2AE;
  --rc-bg:#E2EEE4;--rc-header:#BDE3C3;--rc-dot:#BDE3C3;
  --accent:#BDE3C3;--al:#E9F2EA;
  --goal-bg1:#E2EEE4;--goal-bg2:#CEE4D1;
  --goal-border:#A8D2AE;--goal-text:#2E6B37;--goal-sub:#40964D;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#A8D2AE;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#CEE4D1;
}
/* РћђРћђ THEME: CHARCOAL (В░евХёьЋю В░еВйю) РћђРћђ */
body.theme-charcoal{
  --bg:#F5F5F6;--surface:#FFFFFF;--s2:#ECECEE;--s3:#DEDEE1;
  --border:#C7C7CC;--border2:#A8A8AF;
  --rc-bg:#E6E6E9;--rc-header:#54545C;--rc-dot:#54545C;
  --accent:#56565E;--al:#E6E6E9;
  --goal-bg1:#DEDEE1;--goal-bg2:#C7C7CC;
  --goal-border:#A8A8AF;--goal-text:#2A2A2E;--goal-sub:#56565E;
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:#A8A8AF;
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:#C7C7CC;
}

/* РЋљРЋљРЋљ ьЁївДѕв│ё вћћВъљВЮИ В░ев│ёьЎћ (вЉЦЖИђЖИ░/ЖиИвд╝Въљ/В╣┤вЊю вг┤вЊю) РЋљРЋљРЋљ */
/* Вйћвъё Рђћ Royalty віљвѓї: ьЂ░ вЉЦЖИђЖИ░ + вХђвЊювЪйЖ│а вёЊВЮђ ЖиИвд╝Въљ */
body.theme-coral{--r:18px;--rsm:12px;--sh:0 6px 20px rgba(210,103,78,.10),0 2px 6px rgba(210,103,78,.06)}
body.theme-coral .card{padding:22px 24px}
body.theme-coral .btn{border-radius:99px}
body.theme-coral .rc{border-radius:22px}

/* в»╝ьіИ Рђћ MOSTKET віљвѓї: Ж░ЂВДё вфеВёювдг + ЖиИвд╝Въљ ВЌєВЮ┤ ьЁївЉљвдгвАю Ж╣ћвЂћьЋўЖ▓ї */
body.theme-mint{--r:8px;--rsm:6px;--sh:none}
body.theme-mint .card{border:1.5px solid var(--border);box-shadow:none}
body.theme-mint .btn{border-radius:8px}
body.theme-mint .rc{border-radius:10px;box-shadow:none;border:1.5px solid var(--border)}
/* accentЖ░ђ вДцВџ░ ВЌ░ьЋ┤Вёю ьЮ░ ЖИђВћеЖ░ђ ВЋѕ в│┤ВЮ┤віћ Ж││ВЮђ Вќ┤вЉљВџ┤ ЖИђВћевАю */
body.theme-mint .rc-head-title{color:#8A3338}
body.theme-mint .rc-head-date{color:rgba(138,51,56,.75)}
body.theme-mint .rc-nav-btn{color:#8A3338}
body.theme-mint .logo{color:#8A3338}
body.theme-mint .btn.bp{color:#8A3338}
body.theme-mint .rc-time{color:#C56B70}

/* ьЂгвд╝ Рђћ вћ░вю╗ьЋю ВбЁВЮ┤ віљвѓї: ВцЉЖ░ё вЉЦЖИђЖИ░ + ВаљВёа віљвѓїВЮў вХђвЊювЪгВџ┤ ьЁївЉљвдг, ЖиИвд╝Въљ ВЋйьЋўЖ▓ї */
body.theme-cream{--r:14px;--rsm:10px;--sh:0 2px 4px rgba(73,141,96,.08)}
body.theme-cream .card{border:1.5px solid var(--border)}
body.theme-cream .rc{border-radius:18px}

/* ВўцВЁў Рђћ вфевЇў Ж╣ћвЂћ: ВаЂвІ╣ьЋю вЉЦЖИђЖИ░ + ВёавфЁьЋю ВъЉВЮђ ЖиИвд╝Въљ */
body.theme-ocean{--r:12px;--rsm:8px;--sh:0 2px 8px rgba(53,118,190,.10)}
body.theme-ocean .rc{border-radius:14px}

/* вЮ╝ВЮ╝вЮй Рђћ вфйьЎўВаЂ: ВЋёВБ╝ ьЂ░ вЉЦЖИђЖИ░ + ВДёьЋўЖ│а ьЇ╝ВДђвіћ ЖиИвд╝Въљ */
body.theme-lilac{--r:22px;--rsm:14px;--sh:0 8px 28px rgba(130,84,188,.14),0 3px 8px rgba(130,84,188,.08)}
body.theme-lilac .card{padding:24px 26px}
body.theme-lilac .btn{border-radius:99px}
body.theme-lilac .rc{border-radius:26px}

/* ьћ╝В╣ў Рђћ вЁИьіИ/вгИЖхг віљвѓї: Ж░ЂВДё вфеВёювдг + ЖххВЮђ ьЁївЉљвдг, ЖиИвд╝Въљ ВЌєВЮї */
body.theme-peach{--r:6px;--rsm:5px;--sh:none}
body.theme-peach .card{border:2px solid var(--border);box-shadow:none}
body.theme-peach .btn{border-radius:6px;border-width:1.5px}
body.theme-peach .rc{border-radius:8px;box-shadow:none;border:2px solid var(--border)}
/* accentЖ░ђ ВЌ░ьЋ┤Вёю ьЮ░ ЖИђВћеЖ░ђ ВЋѕ в│┤ВЮ┤віћ Ж││ВЮђ Вќ┤вЉљВџ┤ ЖИђВћевАю */
body.theme-peach .rc-head-title{color:#2E6B37}
body.theme-peach .rc-head-date{color:rgba(46,107,55,.75)}
body.theme-peach .rc-nav-btn{color:#2E6B37}
body.theme-peach .logo{color:#2E6B37}
body.theme-peach .btn.bp{color:#2E6B37}
body.theme-peach .rc-time{color:#499568}

/* В░еВйю Рђћ в»ИвІѕвЕђ ВІюьЂг: ВъЉВЮђ вЉЦЖИђЖИ░ + ВЋёВБ╝ ВўЁВЮђ ЖиИвд╝Въљ */
body.theme-charcoal{--r:10px;--rsm:7px;--sh:0 1px 3px rgba(0,0,0,.08)}
body.theme-charcoal .rc{border-radius:12px}

/* РћђРћђ THEME: CUSTOM РћђРћђ */
body.theme-custom{
  --bg:var(--ct-light);--surface:#FFFFFF;--s2:var(--ct-lighter);--s3:var(--ct-mid);
  --border:var(--ct-border);--border2:var(--ct-border2);
  --rc-bg:var(--ct-lighter);--rc-header:var(--ct-dark);--rc-dot:var(--ct-dark);
  --accent:var(--ct-dark);--al:var(--ct-lighter);
  --goal-bg1:var(--ct-mid);--goal-bg2:var(--ct-border);
  --goal-border:var(--ct-border2);--goal-text:#1a1a1a;--goal-sub:var(--ct-dark);
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:var(--ct-border);
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:var(--ct-border);
}

html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.app{display:flex;height:100vh;overflow:hidden}

/* РћђРћђ SIDEBAR РћђРћђ */
.sb{width:var(--sw);min-width:var(--sw);background:var(--s2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:100;transition:transform .3s}
.sb-head{height:52px;box-sizing:border-box;padding:0 16px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);background:var(--accent);background:color-mix(in srgb, var(--accent) 72%, white);overflow:hidden}
.logo{font-family:var(--logo-font);font-size:1.4em;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:-0.3px;font-weight:800;font-style:italic;color:#fff;line-height:1;white-space:nowrap}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.logo-sub{font-size:0.7857em;color:var(--t3);font-family:var(--mono);margin-top:2px}
.sb-sc{flex:0 0 auto}
.sb-sc::-webkit-scrollbar{width:3px}
.sb-sc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-sec{padding:12px 8px 4px}
.sb-pj-wrap{flex:1;min-height:0;display:flex;flex-direction:column;margin:6px 10px 10px;background:transparent;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.sb-pj-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;user-select:none;flex-shrink:0;transition:background .15s}
.sb-pj-hd:hover{background:var(--s2)}
.sb-pj-title{font-size:0.82em;font-weight:600;color:var(--t2);letter-spacing:.02em}
.sb-pj-arrow{font-size:0.9em;color:var(--t3);transition:transform .2s;display:inline-block}
.sb-pj-wrap.collapsed .sb-pj-arrow{transform:rotate(-90deg)}
.sb-pj-body{flex:1;min-height:0;overflow-y:auto;padding:6px 6px;scrollbar-width:none;-ms-overflow-style:none}
.sb-pj-wrap.collapsed{flex:0 0 auto}
.sb-pj-wrap.collapsed .sb-pj-hd{border-bottom:none}
.sb-pj-wrap.collapsed .sb-pj-body{display:none}
.sb-pj-body::-webkit-scrollbar{width:0;height:0;display:none}
.sb-lbl{font-size:0.7143em;font-weight:500;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;padding:0 8px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.nav{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--rsm);cursor:pointer;color:var(--t2);font-size:0.9643em;border:none;background:none;width:100%;text-align:left;transition:all .15s;font-family:var(--sans)}
.nav:hover{background:var(--s3);color:var(--text)}
.nav.on{background:var(--al);color:var(--accent)}
.nav-ic{font-size:1.0714em;width:18px;text-align:center;flex-shrink:0}
.nav-bd{margin-left:auto;background:var(--accent);color:#fff;font-size:0.7143em;padding:1px 6px;border-radius:99px;font-family:var(--mono)}
.pnav{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--rsm);cursor:pointer;color:var(--t2);font-size:0.9286em;transition:all .15s}
.pnav:hover,.pnav.on{background:var(--s2);color:var(--text)}
.pdot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.pj-group-hd{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--rsm);cursor:pointer;color:var(--t2);font-size:0.88em;font-weight:500;transition:background .15s;user-select:none}
.pj-group-hd:hover{background:var(--s2)}
.pj-group-hd .pj-arrow{transition:transform .2s;display:inline-block;font-size:1em;color:var(--t3);flex-shrink:0;transform:rotate(90deg)}
.pj-group-hd.collapsed .pj-arrow{transform:rotate(0deg)}
.pj-group-body{overflow:hidden;transition:max-height .25s ease}
.pj-group-body.collapsed{max-height:0!important}
.pj-group-box{margin:1px 0 6px 8px;padding-left:6px;border-left:2px solid var(--border)}
.pj-group-box .pnav{padding:5px 9px;font-size:0.84em;border-radius:7px}
.pj-group-box .pnav:hover,.pj-group-box .pnav.on{background:var(--s2)}
.pj-group-box .pnav .pdot{width:6px;height:6px}
.sb-ft{padding:12px 8px;border-top:1px solid var(--border)}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}

/* РћђРћђ MAIN РћђРћђ */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{height:48px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.tb-title{font-size:1em;font-weight:500}
.tb-date{font-family:var(--mono);font-size:0.7857em;color:var(--t3);margin-left:auto}
.hbg{display:none;background:none;border:none;cursor:pointer;color:var(--text);font-size:1.2857em;padding:4px}
.content{flex:1;overflow-y:auto;padding:28px 32px;background:var(--bg)}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* РћђРћђ PAGE РћђРћђ */
.ph{margin-bottom:20px}
.pt{font-family:var(--serif);font-size:2.2857em;font-weight:300;letter-spacing:-.5px;line-height:1.2}
.ps{font-size:0.9286em;color:var(--t3);margin-top:6px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pc{animation:fi .22s ease}

/* РћђРћђ CARDS РћђРћђ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ct{font-size:0.9286em;font-weight:500;display:flex;align-items:center;gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

/* РћђРћђ STAT РћђРћђ */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.sl{font-size:0.7857em;color:var(--t3);font-family:var(--sans);letter-spacing:.04em;font-weight:500}
.sv{font-family:var(--serif);font-size:1em;line-height:1.2;margin:4px 0 2px}
.ss{font-size:0.8571em;color:var(--t3)}

/* РћђРћђ PROGRESS РћђРћђ */
.pw{background:var(--s3);border-radius:99px;height:6px;overflow:hidden}
.pb{height:100%;border-radius:99px;transition:width .6s ease}
.pl{display:flex;justify-content:space-between;font-size:0.7857em;color:var(--t3);margin-top:4px;font-family:var(--mono)}

/* РћђРћђ CHECK РћђРћђ */
.ci{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ci:last-child{border-bottom:none;padding-bottom:0}
.ci:first-child{padding-top:0}
.cb{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.cb.on{background:var(--green);border-color:var(--green)}
.cb.on::after{content:'РюЊ';color:#fff;font-size:0.7143em;font-weight:600}
.ck{flex:1;font-size:0.9643em}
.ck.done{color:var(--t3);text-decoration:line-through}
.cd{font-size:0.8571em;color:var(--t3);display:block;margin-top:1px}

/* РћђРћђ BTN РћђРћђ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rsm);font-size:0.9286em;font-family:var(--sans);border:1px solid transparent;cursor:pointer;transition:all .15s;font-weight:400;text-decoration:none}
.bp{background:var(--accent);color:#fff;border-color:var(--accent)}
.bp:hover{opacity:.9}
.bg{background:transparent;color:var(--t2);border-color:var(--border)}
.bg:hover{background:var(--s2);color:var(--text)}
.bsm{padding:5px 10px;font-size:0.8571em}
.bi{padding:6px;background:none;border:none;cursor:pointer;color:var(--t3);border-radius:6px;display:inline-flex;transition:all .15s}
.bi:hover{background:var(--s2);color:var(--text)}

/* РћђРћђ INPUT РћђРћђ */
.inp,.ta,.sel{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 12px;font-size:0.9643em;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s;width:100%}
.inp:focus,.ta:focus,.sel:focus{border-color:var(--accent);background:var(--surface)}
.ta{resize:vertical;min-height:80px;line-height:1.6}
.fg{margin-bottom:12px}
.fl{font-size:0.8571em;color:var(--t2);margin-bottom:5px;display:block}

/* РћђРћђ MODAL РћђРћђ */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.md{background:var(--surface);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:translateY(8px);transition:transform .2s}
.mo.open .md{transform:translateY(0)}
.mh{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-family:var(--serif);font-size:1.5714em}
.mb{padding:20px 24px}
.mf{padding:0 24px 20px;display:flex;gap:8px;justify-content:flex-end}

/* РћђРћђ COLORS РћђРћђ */
.cops{display:flex;gap:8px;flex-wrap:wrap}
.cop{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cop.on,.cop:hover{border-color:var(--text);transform:scale(1.15)}

/* РћђРћђ DEADLINE РћђРћђ */
.dl{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.dl:last-child{border-bottom:none;padding-bottom:0}
.db{min-width:44px;text-align:center;background:var(--s2);border-radius:8px;padding:6px 8px}
.dm{font-size:0.7143em;color:var(--t3);font-family:var(--mono);text-transform:uppercase}
.dd{font-size:1.2857em;font-weight:600;font-family:var(--mono);line-height:1}

/* РћђРћђ MILESTONE РћђРћђ */
.msi{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.msi:last-child{border-bottom:none}
.mss{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.mss.on{background:var(--green);border-color:var(--green)}
.mss.on::after{content:'РюЊ';color:#fff;font-size:0.7143em;font-weight:700}

/* РћђРћђ DAYBTN РћђРћђ */
.daybtn{display:inline-flex;align-items:center;cursor:pointer;font-size:0.9286em;padding:5px 10px;border-radius:99px;border:1px solid var(--border);transition:all .15s;background:none;font-family:var(--sans)}

/* РћђРћђ LIFE AREA РћђРћђ */
.la-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.la-card{background:var(--surface);border-radius:14px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;border:1.5px solid transparent}
.la-add{background:transparent;border:1.5px dashed var(--border2);border-radius:14px;padding:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:130px;transition:all .2s}
.la-add:hover{border-color:var(--accent);background:var(--al)}
.la-card.drag-over{border-color:var(--accent) !important;background:var(--al);box-shadow:0 0 0 2px var(--accent)40}
.la-card.dragging{opacity:.4;transform:scale(.97)}
.la-card[draggable="true"]{cursor:grab}
.la-card[draggable="true"]:active{cursor:grabbing}
.pj-drag-item{cursor:grab;user-select:none}
.pj-drag-item.dragging{opacity:.4}
.pj-drag-item.drag-over-top{border-top:2px solid var(--accent) !important}

/* РћђРћђ PROJECT CARD РћђРћђ */
.pj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.pj-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:var(--sh);transition:box-shadow .2s,transform .2s;display:flex;flex-direction:column}
.pj-card:hover{box-shadow:var(--shm);transform:translateY(-2px)}
.pj-bar{height:4px}
.pj-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:10px}

/* РћђРћђ BACK РћђРћђ */
.back{display:inline-flex;align-items:center;gap:6px;color:var(--t3);font-size:0.9286em;cursor:pointer;margin-bottom:20px;transition:color .15s;border:none;background:none}
.back:hover{color:var(--text)}

/* РћђРћђ TODAY LAYOUT РћђРћђ */
.today-wrap{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start}

/* РћђРћђ ROUTINE CARD (screenshot style) РћђРћђ */
.rc{background:var(--s2);border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
.rc-head{background:var(--rc-header);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.rc-head-title{color:#fff;font-size:1.0714em;font-weight:600;display:flex;align-items:center;gap:8px}
.rc-head-date{color:rgba(255,255,255,.85);font-size:0.9286em;font-family:var(--sans)}
.rc-nav{display:flex;align-items:center;gap:6px}
.rc-nav-btn{background:rgba(255,255,255,.25);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;transition:background .15s}
.rc-nav-btn:hover{background:rgba(255,255,255,.4)}
.rc-body{padding:16px}
.rc-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.rc-item:last-child{border-bottom:none;padding-bottom:0}
.rc-item:first-child{padding-top:0}
.rc-dot{width:10px;height:10px;border-radius:50%;background:var(--rc-dot);flex-shrink:0;margin-top:5px}
.rc-dot.done{background:var(--green)}
.rc-time{font-size:0.8571em;color:var(--rc-header);font-weight:600;font-family:var(--mono);margin-bottom:2px;font-variant-numeric:tabular-nums;letter-spacing:.03em}
.rc-task{font-size:1em;font-weight:400;color:var(--text);cursor:pointer;transition:color .15s}
.rc-task:hover{color:var(--rc-header)}
.rc-task.done{text-decoration:line-through;color:var(--t3)}
.rc-detail{font-size:0.8571em;color:var(--t2);margin-top:1px}
.rc-empty{padding:24px;text-align:center;color:var(--t3);font-size:0.9286em}
.rc-progress{padding:12px 16px 16px;display:flex;align-items:center;gap:10px}
.rc-pbar-wrap{flex:1;background:rgba(0,0,0,.05);border-radius:99px;height:6px;overflow:hidden}
.rc-pbar{height:100%;border-radius:99px;background:var(--rc-header);transition:width .6s}
.rc-pct{font-size:0.8571em;color:var(--rc-header);font-weight:600;font-family:var(--mono);flex-shrink:0;font-variant-numeric:tabular-nums}

/* РћђРћђ DOW TABS РћђРћђ */
.dow-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.dow-tab{padding:4px 10px;border-radius:99px;font-size:0.8571em;cursor:pointer;border:1px solid var(--border);background:none;color:var(--t2);font-family:var(--sans);transition:all .15s}
.dow-tab.on{background:var(--rc-header);color:#fff;border-color:var(--rc-header)}

/* РћђРћђ QUOTE РћђРћђ */
.quote{font-family:var(--serif);font-style:italic;font-size:1.1429em;color:var(--t2);line-height:1.5;border-left:3px solid var(--accent);padding-left:14px;margin-bottom:20px}

/* РћђРћђ SAVINGS РћђРћђ */
.sbig{font-family:var(--serif);font-size:2.8571em;letter-spacing:-1px}

hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.empty{text-align:center;padding:28px 20px;color:var(--t3)}
.diary-cell{position:relative;}
.diary-preview{
  display:none;position:absolute;z-index:200;
  left:50%;transform:translateX(-50%);
  bottom:calc(100% + 8px);
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
  width:220px;pointer-events:none;
  animation:fi .15s ease;
}
.diary-preview::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--border);
}
.diary-cell:hover .diary-preview{display:block;}
.cal-cell{transition:background .1s;cursor:pointer;}
.cal-cell:hover{background:var(--s2) !important;}
.mini-cal-cell:hover{background:var(--s2) !important;}
.ei{font-size:2.1429em;margin-bottom:6px}

@media(max-width:900px){
  .today-wrap{grid-template-columns:1fr}
  .pj-grid,.la-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .sb{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  .sb.open{transform:translateX(0)}
  .sb-ov{display:block}
  .hbg{display:flex}
  .content{padding:20px 14px}
  .g2,.g3,.pj-grid,.la-grid{grid-template-columns:1fr}
  .topbar{padding:0 14px;display:flex !important}
  .pt{font-size:1.8571em}
  .today-wrap{grid-template-columns:1fr}
  .tb-date{display:block !important}
}
</style>

// Firestore ВађВъЦ/вАювЊю
async function saveToCloud(data) {
  if (!currentUser) return;
  try {
    const chunks = chunkData(data);
    const batch = db.batch();
    Object.entries(chunks).forEach(([key, val]) => {
      const ref = db.collection('users').doc(currentUser.uid).collection('data').doc(key);
      batch.set(ref, { value: JSON.stringify(val), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    });
    await batch.commit();
  } catch(e) { console.error('Cloud save error:', e); }
}

async function loadFromCloud() {
  if (!currentUser) return null;
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('data').get();
    if (snap.empty) return null;
    const merged = {};
    snap.forEach(doc => {
      try { merged[doc.id] = JSON.parse(doc.data().value); } catch(e) {}
    });
    return mergeChunks(merged);
  } catch(e) { console.error('Cloud load error:', e); return null; }
}

// ьЂ░ вЇ░ВЮ┤ьё░вЦ╝ ьЋёвЊюв│ёвАю вѓўвѕаВёю ВађВъЦ (Firestore 1MB ВаюьЋю вїђВЮЉ)
function chunkData(data) {
  const FIELDS = ['routines','checks','projects','deadlines','savings','notes','calEvents',
    'lifeGoal','theme','customThemeColor','diaryEntries','monthlyGoals','monthlyMemo',
    'weeklyGoals','weeklyMemo','diaryStickers','font','fontSize','fontWeight','customFonts','logoFont','navMarker',
    'lifeAreas','todoList','todoListTmr'];
  const chunks = {};
  FIELDS.forEach(f => { if (data[f] !== undefined) chunks[f] = data[f]; });
  // customFontDataвіћ Firestore ВџЕвЪЅ В┤ѕЖ│╝ Рєњ ВађВъЦ ВаюВЎИ (localStorageВЌљвДї)
  // вѓўвеИВДђ ВєїьўЋ вЇ░ВЮ┤ьё░
  const rest = {};
  Object.keys(data).forEach(k => {
    if (!FIELDS.includes(k) && k !== 'customFontData') rest[k] = data[k];
  });
  if (Object.keys(rest).length > 0) chunks['_misc'] = rest;
  return chunks;
}
function mergeChunks(chunks) {
  const result = {};
  Object.entries(chunks).forEach(([k, v]) => {
    if (k === '_misc') Object.assign(result, v);
    else result[k] = v;
  });
  return result;
}

function togglePjBox(){

function togglePjGroup(aid){
  if(!window._pjGroupCollapsed) window._pjGroupCollapsed={};
  const col=!window._pjGroupCollapsed[aid];
  window._pjGroupCollapsed[aid]=col;
  const hd=document.querySelector('.pj-group-hd[onclick*="'+aid+'"]');
  const body=document.getElementById('pjg-'+aid);
  if(!hd||!body) return;
  hd.classList.toggle('collapsed',col);
  if(col){
    body.style.maxHeight=body.scrollHeight+'px';
    requestAnimationFrame(function(){body.style.maxHeight='0';});
    body.classList.add('collapsed');
  } else {
    body.classList.remove('collapsed');
    body.style.maxHeight=body.scrollHeight+'px';
    setTimeout(function(){if(!window._pjGroupCollapsed[aid])body.style.maxHeight='none';},260);
  }
}

function toggleCheck(rid, ds){
  if(!S.checks[ds]) S.checks[ds]={};
  const nowChecked=!S.checks[ds][rid];
  S.checks[ds][rid]=nowChecked;

  // ВађВХЋ ЖИѕВЋАВЮ┤ Въѕвіћ вБеьІ┤ВЮ┤вЕ┤ ВађВХЋ вфЕьЉюВЌљ ВъљвЈЎ в░ўВўЂ
  const r=(S.routines||[]).find(x=>x.id===rid);
  if(r&&r.saveAmount>0){
    if(!S.savings)S.savings={goal:0,current:0,entries:[]};
    if(!S.savings.entries)S.savings.entries=[];
    const svId='rzsave-'+rid+'-'+ds; // вБеьІ┤+вѓаВДюв│ё Ж│аВюа ID
    const existIdx=S.savings.entries.findIndex(e=>e.id===svId);
    // ьћёвАюВаЮьіИ ВаЋв│┤ В░ЙЖИ░
    const proj=r.rzProjectId?(S.projects||[]).find(p=>p.id===r.rzProjectId):null;
    if(nowChecked){
      // В▓┤ьЂг Рєњ ВађВХЋ ВъЁЖИѕ (ВцЉв│х в░ЕВДђ)
      if(existIdx<0){
        S.savings.entries.push({id:svId,amount:r.saveAmount,note:r.task+' (вБеьІ┤ вІгВё▒)',date:ds,projectId:r.rzProjectId||'',projectName:proj?proj.name:''});
        S.savings.current+=r.saveAmount;
      }
    } else {
      // В▓┤ьЂг ьЋ┤Ваю Рєњ ВађВХЋ ьџїВѕў
      if(existIdx>=0){
        S.savings.current-=S.savings.entries[existIdx].amount;
        S.savings.entries.splice(existIdx,1);
      }
    }
  }
  save(); render();
}

let _todoAdding=false;
function addTodoInline(ds,inputId){
  if(_todoAdding) return;
  const el=document.getElementById(inputId);
  if(!el)return;
  const text=el.value.trim();
  if(!text)return;
  _todoAdding=true;
  el.value='';
  if(!S.todoList)S.todoList={};
  if(!S.todoList[ds])S.todoList[ds]=[];
  S.todoList[ds].push({id:gid(),text,done:false});
  save(); render();
  setTimeout(()=>{ _todoAdding=false; const inp=document.getElementById(inputId); if(inp) inp.focus(); },100);
}
function togTodoItem(ds,i){
  if(!S.todoList||!S.todoList[ds]||!S.todoList[ds][i])return;
  S.todoList[ds][i].done=!S.todoList[ds][i].done;
  save();
  // DOMвДї ВЌЁвЇ░ВЮ┤ьіИ (Ж╣юв╣АВъё в░ЕВДђ)
  const list=S.todoList[ds];
  const item=list[i];
  // ьЋ┤вІ╣ В▓┤ьЂгв░ЋВіц В░ЙЖИ░ - onclick ВєЇВё▒Вю╝вАю В░ЙЖИ░
  const allBoxes=document.querySelectorAll('[onclick*="togTodoItem"]');
  allBoxes.forEach(function(box){
    const attr=box.getAttribute('onclick')||'';
    if(attr.includes('\''+ds+'\'')&&attr.includes(','+i+')')){
      box.style.background=item.done?'var(--green)':'transparent';
      box.style.borderColor=item.done?'var(--green)':'var(--border2)';
      box.innerHTML=item.done?'<span style="color:#fff;font-size:0.6em">РюЊ</span>':'';
      const textDiv=box.parentElement.querySelector('[style*="font-size:0.9em"]');
      if(textDiv)textDiv.style.textDecoration=item.done?'line-through':'';
    }
  });
}
function delTodoItem(ds,i){
  if(!S.todoList||!S.todoList[ds])return;
  S.todoList[ds].splice(i,1);
  save();render();
}

let weekOffset=0;

function getWeekDates(offset){
  const now=new Date();
  const dow=now.getDay();
  const monday=new Date(now);
  monday.setDate(now.getDate()-dow+1+(offset*7));
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(dateStr(d));}
  return days;
}

window._laDragging = false;
var _dragAreaId = null;   // вЊювъўЖиИ ВцЉВЮИ вЮ╝ВЮ┤ьћё В╣┤вЊю aid
var _dragPjId = null;     // вЊювъўЖиИ ВцЉВЮИ ьћёвАюВаЮьіИ pid

document.addEventListener('dragstart', function(e){
  // pj-drag-item ВЋѕВЌљВёю ВІюВъЉьќѕвіћВДђ ве╝Вађ ьЎЋВЮИ (вХђвфе В╣┤вЊюв│┤вІц Вџ░Вёа)
  var pj = e.target.closest('.pj-drag-item[draggable]');
  var card = e.target.closest('.la-card[draggable]');

  if(pj){
    // ьћёвАюВаЮьіИ вЊювъўЖиИ - вЮ╝ВЮ┤ьћё В╣┤вЊю вЊювъўЖиИ В░евІе
    e.stopPropagation();
    window._laDragging = true;
    _dragPjId = pj.dataset.pid;
    _dragAreaId = null;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('type','pj');
    setTimeout(function(){pj.classList.add('dragging');},0);
  } else if(card && !e.target.closest('.pj-drop-zone')){
    // вЮ╝ВЮ┤ьћё В╣┤вЊю вЊювъўЖиИ (ьћёвАюВаЮьіИ ВўЂВЌГВЌљВёю ВІюВъЉьЋю Ж▓ї ВЋёвІљ вЋївДї)
    window._laDragging = true;
    _dragAreaId = card.dataset.aid;
    _dragPjId = null;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('type','area');
    setTimeout(function(){card.classList.add('dragging');},0);
  } else {
    // вЊювъўЖиИ ВиеВєї
    e.preventDefault();
  }
});

document.addEventListener('dragend', function(e){
  window._laDragging = false;
  _dragAreaId = null; _dragPjId = null;
  document.querySelectorAll('.la-card.dragging,.pj-drag-item.dragging').forEach(function(el){el.classList.remove('dragging');});
  document.querySelectorAll('.la-card.drag-over,.pj-drop-zone.drag-over').forEach(function(el){el.classList.remove('drag-over');});
});

document.addEventListener('dragover', function(e){
  e.preventDefault();
  var type = e.dataTransfer.getData('type') || (_dragPjId?'pj':_dragAreaId?'area':'');

  if(type==='pj'||_dragPjId){
    // ьћёвАюВаЮьіИвЦ╝ вЮ╝ВЮ┤ьћё В╣┤вЊю ВюёвАю
    var zone = e.target.closest('.pj-drop-zone');
    var card = e.target.closest('.la-card');
    document.querySelectorAll('.pj-drop-zone.drag-over').forEach(function(el){el.classList.remove('drag-over');});
    if(zone) zone.classList.add('drag-over');
    else if(card){ var z=card.querySelector('.pj-drop-zone'); if(z) z.classList.add('drag-over'); }
  } else if(type==='area'||_dragAreaId){
    // вЮ╝ВЮ┤ьћё В╣┤вЊю ВѕюВёю в│ђЖ▓й
    var targetCard = e.target.closest('.la-card[draggable]');
    document.querySelectorAll('.la-card.drag-over').forEach(function(el){el.classList.remove('drag-over');});
    if(targetCard && targetCard.dataset.aid !== _dragAreaId) targetCard.classList.add('drag-over');
  }
});

document.addEventListener('dragleave', function(e){
  if(!e.currentTarget.contains(e.relatedTarget)){
    document.querySelectorAll('.pj-drop-zone.drag-over,.la-card.drag-over').forEach(function(el){el.classList.remove('drag-over');});
  }
});

document.addEventListener('drop', function(e){
  e.preventDefault();
  document.querySelectorAll('.pj-drop-zone.drag-over,.la-card.drag-over').forEach(function(el){el.classList.remove('drag-over');});

  if(_dragPjId){
    // ьћёвАюВаЮьіИ Рєњ вЮ╝ВЮ┤ьћё В╣┤вЊю ВЮ┤вЈЎ
    var zone = e.target.closest('.pj-drop-zone');
    var card = e.target.closest('.la-card');
    var targetAid = zone ? zone.dataset.aid : (card ? card.dataset.aid : null);
    if(targetAid){
      var pj = S.projects.find(function(p){return p.id===_dragPjId;});
      if(pj && pj.lifeAreaId !== targetAid){
        pj.lifeAreaId = targetAid;
        save(); render();
      }
    }
  } else if(_dragAreaId){
    // вЮ╝ВЮ┤ьћё В╣┤вЊю ВѕюВёю в│ђЖ▓й
    var targetCard = e.target.closest('.la-card[draggable]');
    if(targetCard && targetCard.dataset.aid !== _dragAreaId){
      var areas = S.lifeAreas;
      var fromIdx = areas.findIndex(function(a){return a.id===_dragAreaId;});
      var toIdx   = areas.findIndex(function(a){return a.id===targetCard.dataset.aid;});
      if(fromIdx>-1 && toIdx>-1){
        var moved = areas.splice(fromIdx,1)[0];
        areas.splice(toIdx,0,moved);
        save(); render();
      }
    }
  }
  window._laDragging = false;
  _dragAreaId = null; _dragPjId = null;
});

function detectPdf(input){
  const file=input.files[0];
  if(!file)return;
  // ВаювфЕ ВъљвЈЎ ВъЁваЦ
  const titleEl=document.getElementById('mat-title');
  if(titleEl&&!titleEl.value) titleEl.value=file.name.replace(/\.pdf$/i,'');

  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const bytes=new Uint8Array(e.target.result);
      // в░ћВЮ┤вёѕвдгвЦ╝ latin1 вгИВъљВЌ┤вАю в│ђьЎў (PDF вѓ┤вХђ ЖхгВА░ ьїїВІ▒ВџЕ)
      let str='';
      for(let i=0;i<bytes.length;i++) str+=String.fromCharCode(bytes[i]);

      let pages=0;

      // в░Ев▓Ћ 1: /N ВѕФВъљ (Pages вћЋВЁћвёѕвдг ВЋѕ)
      const m1=str.match(/\/N\s+(\d+)/);
      if(m1) pages=parseInt(m1[1]);

      // в░Ев▓Ћ 2: /Count ВѕФВъљ
      if(!pages){
        const counts=[...str.matchAll(/\/Count\s+(\d+)/g)].map(m=>parseInt(m[1]));
        if(counts.length) pages=Math.max(...counts);
      }

      // в░Ев▓Ћ 3: PDF ВаёВ▓┤ВЌљВёю ьјўВЮ┤ВДђ ВўцвИїВаЮьіИ Ж░юВѕў ВёИЖИ░
      if(!pages){
        const pageObjs=(str.match(/\/Type\s*\/Page[^s]/g)||[]).length;
        if(pageObjs>0) pages=pageObjs;
      }

      // в░Ев▓Ћ 4: trailerВЮў /SizeвАю ВХћВаЋ (вХђВаЋьЎЋьЋўВДђвДї ВЌєвіћ Ж▓Ѓв│┤вІц вѓўВЮї)
      if(!pages){
        const trailer=str.match(/\/Size\s+(\d+)/);
        if(trailer) pages=Math.max(1,parseInt(trailer[1])-1);
      }

      const totalEl=document.getElementById('mat-total');
      if(totalEl&&pages>0){
        totalEl.value=pages;
        document.getElementById('mat-unit').value='p';
      } else if(totalEl){
        totalEl.placeholder='ьјўВЮ┤ВДђ Вѕў ВДЂВаЉ ВъЁваЦ';
      }
    }catch(err){console.log('PDF ьїїВІ▒ ВўцвЦў',err);}
  };
  // ВЋъ 1MB ВЮйЖИ░ (ьјўВЮ┤ВДђ ВаЋв│┤віћ вїђвХђвХё ВЋъвХђвХёВЌљ ВъѕВЮї)
  reader.readAsArrayBuffer(file.slice(0,1024*1024));
}

}

function saveMatEdit(pid,i){
  const type=document.getElementById('mat-type').value;
  const title=document.getElementById('mat-title').value.trim();
  const total=parseInt(document.getElementById('mat-total').value)||0;
  const unit=document.getElementById('mat-unit').value;
  const current=parseInt(document.getElementById('mat-cur').value)||0;
  const memo=document.getElementById('mat-memo').value.trim();
  if(!title)return;
  const p=S.projects.find(x=>x.id===pid);
  p.materials[i]=Object.assign({},p.materials[i],{type,title,total,unit,current,memo});
  save();closeMo();render();
}
function updateMatProgress(pid,i,val){
  const p=S.projects.find(x=>x.id===pid);if(!p||!p.materials[i])return;
  p.materials[i].current=parseInt(val)||0;
  save();
}
function delMat(pid,i){
  if(!confirm('ВѓГВаюьЋаЖ╣їВџћ?'))return;
  const p=S.projects.find(x=>x.id===pid);
  p.materials.splice(i,1);
  save();render();
}

function saveRz(pid){
  const task=document.getElementById('rz-t').value.trim();
  const time=document.getElementById('rz-ti').value;
  const dur=document.getElementById('rz-du').value;
  const saveAmtEl=document.getElementById('rz-save');
  const saveAmt=saveAmtEl&&saveAmtEl.value?Math.round(parseFloat(saveAmtEl.value)*10000):0;
  const until=document.getElementById('rz-until').value;
  const isMonthly=(document.getElementById('rz-mode-month')&&document.getElementById('rz-mode-month').dataset.on==='1');

  if(!task){alert('ьЋа ВЮ╝ ВЮ┤вдёВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ');return;}
  if(!until){alert('вЊ▒вАЮ вДѕЖ░љВЮ╝ВЮё ВёаьЃЮьЋ┤ВБ╝ВёИВџћ');return;}

  let days=[], monthDays=[];
  if(isMonthly){
    monthDays=Array.from(document.querySelectorAll('#rz-mdays [data-md]')).filter(el=>el.dataset.on==='1').map(el=>el.dataset.md==='last'?'last':parseInt(el.dataset.md));
    if(!monthDays.length){alert('вѓаВДювЦ╝ ВёаьЃЮьЋ┤ВБ╝ВёИВџћ');return;}
  } else {
    days=DOWS.filter(k=>{const el=document.getElementById('rzd-'+k);return el&&el.dataset.on==='1';});
    if(!days.length){alert('ВџћВЮ╝ВЮё ВёаьЃЮьЋ┤ВБ╝ВёИВџћ');return;}
  }

  const p=S.projects.find(x=>x.id===pid);if(!p.routinized)p.routinized=[];
  const entry={id:gid(),task,days:isMonthly?[]:days,monthDays:isMonthly?monthDays:[],isMonthly:!!isMonthly,time,duration:dur,projectId:pid,until,saveAmount:saveAmt};
  p.routinized.push(entry);
  S.routines.push({id:entry.id,time:time||'00:00',task,detail:p.name+' вБеьІ┤ьЎћ',days:isMonthly?[]:days,monthDays:isMonthly?monthDays:[],isMonthly:!!isMonthly,isRz:true,rzProjectId:pid,saveAmount:saveAmt});
  S.routines.sort((a,b)=>a.time.localeCompare(b.time));

  // В║ўвд░вЇћ вЊ▒вАЮ: Вўцвіў ~ вДѕЖ░љВЮ╝Ж╣їВДђ
  const untilDate=new Date(until+'T00:00:00');
  const now=new Date(); now.setHours(0,0,0,0);
  if(isMonthly){
    // вДцВЏћ: Вўцвіў~вДѕЖ░љВЮ╝ ВѓгВЮ┤ВЌљ ьЋ┤вІ╣ ВЮ╝Въљ(вДљВЮ╝ ьЈгьЋе)Ж░ђ ВъѕВю╝вЕ┤ вЊ▒вАЮ
    const hasLast=monthDays.includes('last');
    let cur=new Date(now);
    while(cur<=untilDate){
      const lastDayOfMonth=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();
      const isLastDay=hasLast&&cur.getDate()===lastDayOfMonth;
      if(monthDays.includes(cur.getDate())||isLastDay){
        S.calEvents.push({id:gid(),date:dateStr(cur),title:(time?time+' ':'')+task,color:p.color,rzId:entry.id,projectId:pid});
      }
      cur.setDate(cur.getDate()+1);
    }
  } else {
    // вДцВБ╝: Вўцвіў~вДѕЖ░љВЮ╝ ВѓгВЮ┤ВЌљ ВёаьЃЮ ВџћВЮ╝ вЊ▒вАЮ
    const DM={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};
    let cur=new Date(now);
    while(cur<=untilDate){
      const dow=['sun','mon','tue','wed','thu','fri','sat'][cur.getDay()];
      if(days.includes(dow)){
        S.calEvents.push({id:gid(),date:dateStr(cur),title:(time?time+' ':'')+task,color:p.color,rzId:entry.id,projectId:pid});
      }
      cur.setDate(cur.getDate()+1);
    }
  }
  syncRzToRoutines();
  restoreCustomFont();
  save();closeMo();render();
}

function saveRzEdit(pid, idx){
  const task=document.getElementById('rze-t').value.trim();
  const time=document.getElementById('rze-ti').value;
  const dur=document.getElementById('rze-du').value;
  const saveAmtEl=document.getElementById('rze-saveamt');
  const saveAmt=saveAmtEl&&saveAmtEl.value?Math.round(parseFloat(saveAmtEl.value)*10000):0;
  const days=Array.from(document.querySelectorAll('.rzed-btn')).filter(el=>el.dataset.on==='1').map(el=>el.dataset.k);
  if(!task||!days.length){ alert('ьЋа ВЮ╝ ВЮ┤вдёЖ│╝ ВџћВЮ╝ВЮё ВёаьЃЮьЋ┤ВБ╝ВёИВџћ'); return; }
  const p=S.projects.find(x=>x.id===pid); if(!p) return;
  const old=p.routinized[idx];
  S.calEvents=S.calEvents.filter(e=>e.rzId!==old.id);
  p.routinized[idx]=Object.assign({},old,{task,days,time,duration:dur,saveAmount:saveAmt});
  // ВЮ┤в»И ВаЂвдйвљю ВађВХЋ вѓ┤ВЌГ ЖИѕВЋАВЮё ВЃѕ ЖИѕВЋАВю╝вАю ВъгВаЋВѓ░
  if(S.savings&&S.savings.entries){
    const prefix='rzsave-'+old.id+'-';
    S.savings.entries.forEach(function(e){
      if(e.id&&e.id.indexOf(prefix)===0){
        const diff=saveAmt-e.amount;
        e.amount=saveAmt;
        S.savings.current+=diff;
        e.note=task+' (вБеьІ┤ вІгВё▒)';
      }
    });
    if(S.savings.current<0)S.savings.current=0;
  }
  const DM={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};
  const now=new Date();
  for(let w=0;w<8;w++){days.forEach(d=>{const t=new Date(now),diff=(DM[d]-now.getDay()+7)%7+w*7;t.setDate(now.getDate()+diff);S.calEvents.push({id:gid(),date:dateStr(t),title:(time?time+' ':'')+task,color:p.color,rzId:old.id,projectId:pid});});}
  syncRzToRoutines();
  save(); closeMo(); render();
}
function delRz(pid,i){
  const p=S.projects.find(x=>x.id===pid);
  const rm=p.routinized[i];
  p.routinized.splice(i,1);
  S.calEvents=S.calEvents.filter(e=>e.rzId!==rm.id);
  // ВЮ┤ вБеьІ┤Вю╝вАю ВаЂвдйвљю ВађВХЋ вѓ┤ВЌГ ьџїВѕў
  if(S.savings&&S.savings.entries){
    const prefix='rzsave-'+rm.id+'-';
    const removed=S.savings.entries.filter(e=>e.id&&e.id.indexOf(prefix)===0);
    removed.forEach(e=>{S.savings.current-=e.amount;});
    S.savings.entries=S.savings.entries.filter(e=>!(e.id&&e.id.indexOf(prefix)===0));
    if(S.savings.current<0)S.savings.current=0;
  }
  syncRzToRoutines();save();render();
}

// РЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљ SAVINGS РЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљ
function renderSavings(){
  const s=S.savings,pct=s.goal?Math.min(100,Math.round(s.current/s.goal*100)):0,rem=Math.max(0,s.goal-s.current);
  const entries=(s.entries||[]).slice().reverse();

  // ьћёвАюВаЮьіИв│ё ьЋЕВѓ░
  const byProject={};
  const noProject={amount:0,count:0};
  (s.entries||[]).forEach(function(e){
    if(e.projectId&&e.projectName){
      if(!byProject[e.projectId])byProject[e.projectId]={name:e.projectName,amount:0,count:0,color:''};
      byProject[e.projectId].amount+=e.amount;
      byProject[e.projectId].count++;
    } else {
      noProject.amount+=e.amount;
      noProject.count++;
    }
  });
  // ьћёвАюВаЮьіИ ВЃЅВЃЂ вДцВ╣Г
  Object.keys(byProject).forEach(function(pid){
    const proj=(S.projects||[]).find(p=>p.id===pid);
    byProject[pid].color=proj?proj.color:'var(--accent)';
  });

  // ВађВХЋ ЖИѕВЋАВЮ┤ вЊ▒вАЮвљю вБеьІ┤ВЮ┤ Въѕвіћ ьћёвАюВаЮьіИвіћ ВаЂвдй 0ВЮ┤Вќ┤вЈё В╣┤вЊю ьЉюВІю
  (S.routines||[]).forEach(function(r){
    if(r.saveAmount>0&&r.rzProjectId){
      const proj=(S.projects||[]).find(p=>p.id===r.rzProjectId);
      if(proj&&!byProject[proj.id]){
        byProject[proj.id]={name:proj.name,amount:0,count:0,color:proj.color||'var(--accent)'};
      }
    }
  });

  var projectCards='';
  const pids=Object.keys(byProject);
  if(pids.length>0||noProject.count>0){
    // Ж░ђВъЦ ьЂ░ ЖИѕВЋА ЖИ░ВцђВю╝вАю вДЅвїђ в╣ёВюе Ж│ёВѓ░
    var allAmts=pids.map(function(pid){return byProject[pid].amount;});
    if(noProject.count>0)allAmts.push(noProject.amount);
    var maxAmt=Math.max(1,...allAmts);

    projectCards='<div style="margin-bottom:6px;display:flex;align-items:center;gap:8px;font-size:0.9286em;font-weight:500;color:var(--text)"><svg width="17" height="17" viewBox="0 0 24 24" fill="var(--accent)" style="flex-shrink:0"><path d="M2 6a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/></svg>ьЋГвфЕв│ё ВађВХЋ ьўёьЎЕ</div>';
    projectCards+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px">';

    function svCard(name,amount,count,color){
      var barPct=Math.round(amount/maxAmt*100);
      return '<div class="card" style="margin-bottom:0;padding:16px 18px">'+
        '<div style="display:flex;align-items:center;gap:7px;margin-bottom:10px">'+
          '<div style="width:9px;height:9px;border-radius:3px;background:'+color+';flex-shrink:0"></div>'+
          '<div style="font-size:0.88em;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+name+'</div>'+
        '</div>'+
        '<div style="font-family:var(--serif);font-size:1.7em;letter-spacing:-0.5px;color:var(--text);line-height:1.1;margin-bottom:8px">'+money(amount)+'</div>'+
        '<div class="pw" style="height:8px;margin-bottom:6px"><div class="pb" style="width:'+barPct+'%;background:'+color+'"></div></div>'+
        '<div style="font-size:0.75em;color:var(--t3)">'+count+'ьџї ВаЂвдй</div>'+
      '</div>';
    }

    pids.forEach(function(pid){
      const g=byProject[pid];
      projectCards+=svCard(g.name,g.amount,g.count,g.color);
    });
    if(noProject.count>0){
      projectCards+=svCard('ЖИ░ьЃђ (ВДЂВаЉ ВъЁваЦ)',noProject.amount,noProject.count,'var(--t3)');
    }
    projectCards+='</div>';
  }

  // ВађВХЋ вѓ┤ВЌГВЮё вБеьІ┤(note+projectName)в│ёвАю ЖиИвБ╣ьЎћ
  var histGroups={};
  (s.entries||[]).forEach(function(e){
    var key=(e.projectName||'')+'|'+(e.note||'ВађВХЋ');
    if(!histGroups[key]){
      var proj=e.projectId?(S.projects||[]).find(p=>p.id===e.projectId):null;
      histGroups[key]={note:(e.note||'ВађВХЋ').replace(/ \(вБеьІ┤ вІгВё▒\)$/,''),projectName:e.projectName||'',color:proj?proj.color:'var(--t3)',total:0,items:[]};
    }
    histGroups[key].total+=e.amount;
    histGroups[key].items.push(e);
  });
  var histKeys=Object.keys(histGroups);
  var histHtml='';
  if(histKeys.length===0){
    histHtml='<div class="empty">вѓ┤ВЌГВЮ┤ ВЌєВќ┤Вџћ</div>';
  } else {
    histHtml='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px">';
    histKeys.forEach(function(k){
      var g=histGroups[k];
      // ВхюВІа вѓаВДюВѕю ВаЋваг
      g.items.sort(function(a,b){return b.date.localeCompare(a.date);});
      var itemsHtml=g.items.map(function(e){
        return '<div style="display:flex;align-items:center;justify-content:space-between;gap:4px;padding:3px 0;font-size:0.7em">'+
          '<span style="color:var(--t3);font-family:var(--mono)">'+e.date.slice(5)+'</span>'+
          '<span style="display:flex;align-items:center;gap:3px"><span style="color:var(--green);font-family:var(--mono)">'+money(e.amount)+'</span>'+
          '<button class="bi" onclick="delSv(\''+e.id+'\')" style="font-size:0.85em;color:var(--t3);padding:0 2px">РюЋ</button></span>'+
        '</div>';
      }).join('');
      histHtml+='<div class="card" style="margin-bottom:0;padding:13px 14px">'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+
          '<div style="width:8px;height:8px;border-radius:3px;background:'+g.color+';flex-shrink:0"></div>'+
          '<div style="font-size:0.8em;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+g.note+'</div>'+
        '</div>'+
        (g.projectName?'<div style="font-size:0.68em;color:var(--t3);margin-bottom:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+g.projectName+'</div>':'')+
        '<div style="font-family:var(--serif);font-size:1.25em;color:var(--text);margin-bottom:8px;line-height:1.1">'+money(g.total)+'</div>'+
        '<div style="border-top:1px solid var(--border);padding-top:5px">'+itemsHtml+'</div>'+
      '</div>';
    });
    histHtml+='</div>';
  }

  return ''+
    '<div class="card" style="margin-bottom:16px"><div style="text-align:center;padding:16px 0 24px"><div style="font-size:1em;color:var(--t3);margin-bottom:8px">ьўёВъг ВађВХЋЖИѕВЋА</div><div style="font-family:var(--serif);font-size:2.8571em;letter-spacing:-1px">'+money(s.current)+'</div><div style="font-size:1.1em;color:var(--t2);margin-top:6px">вфЕьЉю: '+money(s.goal)+'</div><div style="margin:20px auto;max-width:400px"><div class="pw" style="height:18px"><div class="pb" style="width:'+pct+'%;background:var(--accent)"></div></div><div class="pl" style="font-size:0.95em;margin-top:6px"><span>'+pct+'% вІгВё▒</span><span>'+money(rem)+' вѓеВЮї</span></div></div></div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn bp" onclick="openSvAdd()">+ ЖИѕВЋА ВХћЖ░ђ</button><button class="btn bg" onclick="openSvGoal()">вфЕьЉю ВѕўВаЋ</button></div></div>'+
    projectCards+
    '<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:0.9286em;font-weight:500;color:var(--text)">­Ъњ│ ВађВХЋ вѓ┤ВЌГ</div>'+histHtml;
}
function openSvAdd(){openMo('ЖИѕВЋА ВХћЖ░ђ','<div class="fg"><label class="fl">ЖИѕВЋА</label><div style="display:flex;align-items:center;gap:8px"><input type="number" class="inp" id="sv-a" placeholder="Вўѕ: 50" step="1" style="flex:1"><span style="color:var(--t2);white-space:nowrap;font-size:0.95em">вДїВЏљ</span></div></div><div class="fg"><label class="fl">вЕћвфе</label><input class="inp" id="sv-n" placeholder="Вўѕ: ВЮ┤в▓ѕ вІг ВЏћЖИЅ"></div><div class="fg"><label class="fl">вѓаВДю</label><input type="date" class="inp" id="sv-d" value="'+todStr()+'"></div>','<button class="btn bg" onclick="closeMo()">ВиеВєї</button><button class="btn bp" onclick="saveSv()">ВађВъЦ</button>');}

// РЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљ ьџїЖ│а & ьєхЖ│ё РЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљ
function renderInsights(){
  const today=todStr();
  // РћђРћђ 1) ВхюЖи╝ 30ВЮ╝ вБеьІ┤ вІгВё▒вЦа РћђРћђ
  let cells30=[];
  for(let i=29;i>=0;i--){
    const ds=addDays(today,-i);
    const rods=routinesForDate(ds);
    const ck=S.checks[ds]||{};
    const done=rods.filter(r=>ck[r.id]).length;
    const pct=rods.length?Math.round(done/rods.length*100):0;
    cells30.push({ds,done,total:rods.length,pct});
  }
  // ВЮ┤в▓ѕ ВБ╝(ВхюЖи╝ 7ВЮ╝) ьЈЅЖиа
  const last7=cells30.slice(-7);
  const avg7=last7.length?Math.round(last7.reduce((s,c)=>s+c.pct,0)/last7.length):0;
  const avg30=cells30.length?Math.round(cells30.reduce((s,c)=>s+c.pct,0)/cells30.length):0;

  // РћђРћђ 2) ВЌ░ВєЇ вІгВё▒(ВіцьіИвдГ): ВўцвіўвХђьё░ Ж▒░ЖЙИвАю, ЖиИвѓа вБеьІ┤ 100% вІгВё▒ьЋю вѓа РћђРћђ
  let streak=0;
  for(let i=0;i<365;i++){
    const ds=addDays(today,-i);
    const rods=routinesForDate(ds);
    if(rods.length===0){ if(i===0)continue; else break; }
    const ck=S.checks[ds]||{};
    const allDone=rods.every(r=>ck[r.id]);
    if(allDone)streak++; else break;
  }

  // РћђРћђ 3) вБеьІ┤в│ё вІгВё▒ ьџЪВѕў (ВхюЖи╝ 30ВЮ╝) РћђРћђ
  let routineStats={};
  cells30.forEach(c=>{
    const rods=routinesForDate(c.ds);
    const ck=S.checks[c.ds]||{};
    rods.forEach(r=>{
      if(!routineStats[r.id])routineStats[r.id]={task:r.task,done:0,total:0};
      routineStats[r.id].total++;
      if(ck[r.id])routineStats[r.id].done++;
    });
  });
  let statArr=Object.values(routineStats).map(function(s){s.rate=s.total?Math.round(s.done/s.total*100):0;return s;});
  statArr.sort((a,b)=>b.rate-a.rate);
  const best=statArr.slice(0,3);
  const worst=statArr.slice().sort((a,b)=>a.rate-b.rate).slice(0,3);

  // РћђРћђ 4) Ж░ђЖ│ёвХђ ВЏћ в╣ёЖхљ РћђРћђ
  const now=new Date();
  const ymThis=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const prev=new Date(now.getFullYear(),now.getMonth()-1,1);
  const ymPrev=prev.getFullYear()+'-'+String(prev.getMonth()+1).padStart(2,'0');
  function sumMonth(ym,type){return (LD.transactions||[]).filter(t=>t.date.slice(0,7)===ym&&t.type===type).reduce((s,t)=>s+t.amount,0);}
  const incThis=sumMonth(ymThis,'income'),incPrev=sumMonth(ymPrev,'income');
  const expThis=sumMonth(ymThis,'expense'),expPrev=sumMonth(ymPrev,'expense');
  function diffLabel(cur,prev){
    if(prev===0)return cur>0?'<span style="color:var(--green)">ВІаЖию</span>':'-';
    const d=Math.round((cur-prev)/prev*100);
    if(d===0)return '<span style="color:var(--t3)">в│ђьЎћ ВЌєВЮї</span>';
    const up=d>0;
    return '<span style="color:'+(up?'var(--green)':'var(--red)')+'">'+(up?'Рќ▓':'Рќ╝')+' '+Math.abs(d)+'%</span>';
  }

  // РћђРћђ 5) ВађВХЋ ВЏћв│ё ВХћВЮ┤ (ВхюЖи╝ 6Ж░юВЏћ вѕёВаЂ) РћђРћђ
  let svByMonth={};
  (S.savings&&S.savings.entries||[]).forEach(function(e){
    const m=e.date.slice(0,7);
    svByMonth[m]=(svByMonth[m]||0)+e.amount;
  });
  let svMonths=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const m=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    svMonths.push({m:(d.getMonth()+1)+'ВЏћ',amount:svByMonth[m]||0});
  }
  const svMax=Math.max(1,...svMonths.map(x=>x.amount));

  // РћђРћђ 6) Ж░љВѓг ВЮ╝ЖИ░ вЈїВЋёв│┤ЖИ░ РћђРћђ
  const diaryEntries=Object.keys(S.diaryEntries||{}).filter(k=>S.diaryEntries[k]&&S.diaryEntries[k].text).sort((a,b)=>b.localeCompare(a));
  // ВъЉвЁё Вўцвіў / ьЋювІг Ваё
  const monthAgo=addDays(today,-30);
  const lookbacks=[];
  if(S.diaryEntries&&S.diaryEntries[monthAgo]&&S.diaryEntries[monthAgo].text)lookbacks.push({label:'ьЋю вІг Ваё',date:monthAgo,text:S.diaryEntries[monthAgo].text});
  const yearAgo=(now.getFullYear()-1)+today.slice(4);
  if(S.diaryEntries&&S.diaryEntries[yearAgo]&&S.diaryEntries[yearAgo].text)lookbacks.push({label:'ВъЉвЁё Вўцвіў',date:yearAgo,text:S.diaryEntries[yearAgo].text});

  // РЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљ HTML РЋљРЋљРЋљРЋљРЋљРЋљРЋљРЋљ
  let html='';

  // ВЃЂвІе ВџћВЋй 4В╣И
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px">';
  html+='<div class="card" style="margin-bottom:0;padding:16px 18px"><div style="font-size:0.8em;color:var(--t3);margin-bottom:6px">­ЪћЦ ВЌ░ВєЇ вІгВё▒</div><div style="font-family:var(--serif);font-size:1.9em;line-height:1;color:var(--text)">'+streak+'<span style="font-size:0.5em;color:var(--t3)"> ВЮ╝</span></div></div>';
  html+='<div class="card" style="margin-bottom:0;padding:16px 18px"><div style="font-size:0.8em;color:var(--t3);margin-bottom:6px">ВЮ┤в▓ѕ ВБ╝ ьЈЅЖиа</div><div style="font-family:var(--serif);font-size:1.9em;line-height:1;color:var(--text)">'+avg7+'<span style="font-size:0.5em;color:var(--t3)"> %</span></div></div>';
  html+='<div class="card" style="margin-bottom:0;padding:16px 18px"><div style="font-size:0.8em;color:var(--t3);margin-bottom:6px">ВхюЖи╝ 30ВЮ╝ ьЈЅЖиа</div><div style="font-family:var(--serif);font-size:1.9em;line-height:1;color:var(--text)">'+avg30+'<span style="font-size:0.5em;color:var(--t3)"> %</span></div></div>';
  html+='<div class="card" style="margin-bottom:0;padding:16px 18px"><div style="font-size:0.8em;color:var(--t3);margin-bottom:6px">ьўёВъг ВађВХЋ</div><div style="font-family:var(--serif);font-size:1.6em;line-height:1;color:var(--text)">'+money(S.savings?S.savings.current:0)+'</div></div>';
  html+='</div>';

  // ВхюЖи╝ 30ВЮ╝ ьъѕьіИвДх
  html+='<div class="card"><div class="ct" style="margin-bottom:14px">­ЪЊі ВхюЖи╝ 30ВЮ╝ вБеьІ┤ вІгВё▒</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(15,1fr);gap:5px">';
  cells30.forEach(function(c){
    var bg=c.total===0?'var(--s2)':c.pct===0?'var(--s3)':c.pct<50?'color-mix(in srgb,var(--accent) 30%,transparent)':c.pct<100?'color-mix(in srgb,var(--accent) 60%,transparent)':'var(--accent)';
    var dnum=c.ds.slice(8);
    html+='<div title="'+c.ds+' ┬и '+c.done+'/'+c.total+'" style="aspect-ratio:1;border-radius:5px;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:0.6em;color:'+(c.pct>=100?'#fff':'var(--t3)')+'">'+parseInt(dnum)+'</div>';
  });
  html+='</div><div style="display:flex;align-items:center;gap:6px;margin-top:10px;font-size:0.7em;color:var(--t3)"><span>ВаЂВЮї</span><div style="width:12px;height:12px;border-radius:3px;background:var(--s3)"></div><div style="width:12px;height:12px;border-radius:3px;background:color-mix(in srgb,var(--accent) 30%,transparent)"></div><div style="width:12px;height:12px;border-radius:3px;background:color-mix(in srgb,var(--accent) 60%,transparent)"></div><div style="width:12px;height:12px;border-radius:3px;background:var(--accent)"></div><span>вДјВЮї</span></div></div>';

  // Въў ВДђьѓе / ВъљВБ╝ вєЊВ╣ю вБеьІ┤
  html+='<div class="g2">';

function loadCustomFont(input, slot){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var name=file.name.replace(/\.[^.]+$/,'');
  var reader=new FileReader();
  reader.onload=function(e){
    var fontName='UserFont'+(slot+1);
    var fontFace=new FontFace(fontName, e.target.result);
    fontFace.load().then(function(ff){
      document.fonts.add(ff);
      if(!S.customFonts) S.customFonts=['','',''];
      if(!S.customFontData) S.customFontData=['','',''];
      S.customFonts[slot]=name;
      S.customFontData[slot]=e.target.result;
      S.font='custom'+(slot+1);
      save(); applyTheme(S.theme||'sky'); render();
    });
  };
  reader.readAsArrayBuffer(file);
}
function clearCustomFont(slot){
  if(!S.customFonts) S.customFonts=['','',''];
  if(!S.customFontData) S.customFontData=['','',''];
  S.customFonts[slot]=''; S.customFontData[slot]='';
  if(S.font==='custom'+(slot+1)) S.font='pretendard';
  save(); applyTheme(S.theme||'sky'); render();
}
function restoreCustomFont(){
  if(!S.customFontData) return;
  S.customFontData.forEach(function(data, i){
    if(!data) return;
    var fontFace=new FontFace('UserFont'+(i+1), data);
    fontFace.load().then(function(ff){ document.fonts.add(ff); });
  });
}

function resetD(){
  if(!confirm('вфевЊа вЇ░ВЮ┤ьё░вЦ╝ ВѓГВаюьЋаЖ╣їВџћ?\nВЮ┤ ВъЉВЌЁВЮђ вљўвЈївд┤ Вѕў ВЌєВќ┤Вџћ.'))return;
  // localStorage ВѓГВаю
  localStorage.removeItem(KEY);

  // FirestoreвЈё ВѓГВаю
  if(currentUser){
    db.collection('users').doc(currentUser.uid).collection('data').get().then(function(snap){
      const batch=db.batch();
      snap.forEach(function(doc){batch.delete(doc.ref);});

    }).then(function(){location.reload();}).catch(function(){location.reload();});
  } else {
    location.reload();
  }
}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function lighten(hex,amt){
  var c=hexToRgb(hex);
  var r=Math.min(255,Math.round(c.r+(255-c.r)*amt));
  var g=Math.min(255,Math.round(c.g+(255-c.g)*amt));
  var b=Math.min(255,Math.round(c.b+(255-c.b)*amt));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function darken(hex,amt){
  var c=hexToRgb(hex);
  var r=Math.max(0,Math.round(c.r*(1-amt)));
  var g=Math.max(0,Math.round(c.g*(1-amt)));
  var b=Math.max(0,Math.round(c.b*(1-amt)));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function setCustomThemeVars(hex){
  var root=document.documentElement.style;
  root.setProperty('--ct-light', lighten(hex,0.35));
  root.setProperty('--ct-lighter', lighten(hex,0.55));
  root.setProperty('--ct-mid', lighten(hex,0.2));
  root.setProperty('--ct-border', lighten(hex,0.1));
  root.setProperty('--ct-border2', hex);
  root.setProperty('--ct-dark', darken(hex,0.25));
}

function applyTheme(t){
  var validThemes = ['sky','sand','lightBeige','lightGray','coral','mint','cream','ocean','lilac','peach','charcoal','custom'];
  if(!validThemes.includes(t)) t = 'sky';

  var cls='theme-'+t;
  if(t==='custom'){
    var hex=S.customThemeColor||'#F9D0CD';
    setCustomThemeVars(hex);
    var root2=document.documentElement.style;
    root2.setProperty('--bg','var(--ct-light)');
    root2.setProperty('--s2','var(--ct-lighter)');
    root2.setProperty('--s3','var(--ct-mid)');
    root2.setProperty('--border','var(--ct-border)');
    root2.setProperty('--border2','var(--ct-border2)');
    root2.setProperty('--accent','var(--ct-dark)');
    root2.setProperty('--al','var(--ct-lighter)');
  } else {
    var root3=document.documentElement.style;
    ['--bg','--s2','--s3','--border','--border2','--accent','--al'].forEach(function(v){root3.removeProperty(v);});
  }
  
  var f=S.font||'pretendard';
  if(f!=='pretendard') cls+=' font-'+f;
  document.body.className=cls;

  // Noto Serif KR Google Font вЈЎВаЂ вАювЊю
  if(f==='notoserif' && !document.getElementById('notoserif-font')){
    var link=document.createElement('link');
    link.id='notoserif-font';
    link.rel='stylesheet';
    link.href='https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap';
    document.head.appendChild(link);
  }

  var fontMap={
    pretendard:"'Pretendard','Apple SD Gothic Neo',sans-serif",
    serif:"'Instrument Serif',Georgia,serif",
    notoserif:"'Noto Serif KR','Nanum Myeongjo',serif",
    custom1: S.customFonts&&S.customFonts[0] ? "'UserFont1',sans-serif" : "'Pretendard',sans-serif",
    custom2: S.customFonts&&S.customFonts[1] ? "'UserFont2',sans-serif" : "'Pretendard',sans-serif",
  };
  var chosen = fontMap[f] || fontMap.pretendard;
  var root = document.documentElement.style;
  root.setProperty('--sans', chosen);

  // вАюЖ│а ЖИђВћеВ▓┤ ВаЂВџЕ
  var logoFontMap={
    montserrat:"'Montserrat','Pretendard',sans-serif",
    dancing:"'Dancing Script',cursive",
    sacramento:"'Sacramento',cursive",
    allura:"'Allura',cursive",
    kaushan:"'Kaushan Script',cursive"
  };
  root.setProperty('--logo-font', logoFontMap[S.logoFont||'montserrat']||logoFontMap.montserrat);
  // вАюЖ│а italic/size в│┤ВаЋ (ьЋёЖИ░В▓┤віћ italic ьЋ┤Ваю). ьЌцвЇћ вєњВЮ┤ Ж│аВаЋВЮ┤вЮ╝ ьЂгЖИ░ віўВќ┤вЈё ВЋѕ вёўВ╣е
  (function(){
    var lg=document.querySelector('.logo');
    if(lg){
      var sc=(S.logoFont&&S.logoFont!=='montserrat');
      lg.style.fontStyle=sc?'normal':'italic';
      lg.style.fontSize=sc?'1.75em':'1.4em';
    }
  })();
  
  var fs = S.fontSize || 14;
  
  // РўЁ ьЋхВІг ьЈ░ьіИ ВЃЂВєЇ вАюВДЂ в│ђЖ▓й: 
  // ВўЂвгИ/ВѕФВъљВЌљ Ж░ЋВаю ВаЂВџЕвљўвЇў в│ёвЈё ьЈ░ьіИ(Geist Mono, Instrument Serif)вЦ╝ ьЋ┤ВаюьЋўЖ│а,
  // ВъЉЖ░ђвІўВЮ┤ ВёаьЃЮьЋўВІа ьЈ░ьіИ ьЋўвѓўвАю вфевЊа ВџћВєї(ВўЂвгИ, ВѕФВъљ ьЈгьЋе)Ж░ђ ВЎёв▓йьЋўЖ▓ї ьєхВЮ╝вљўВќ┤ ваївЇћвДЂвљўвЈёвАЮ ВѕўВаЋьќѕВіхвІѕвІц.
  var styleEl = document.getElementById('dynamic-theme-style');
  if(!styleEl){
    styleEl = document.createElement('style');
    styleEl.id = 'dynamic-theme-style';
    document.head.appendChild(styleEl);
  }
  var fw = S.fontWeight || '400';
  styleEl.textContent =
    'html, body { font-size: '+fs+'px !important; font-weight: '+fw+' !important; }' +
    '.app, .app * { font-weight: '+fw+' !important; }' +
    ':root { --sans: '+chosen+'; --serif: '+chosen+'; --mono: '+chosen+'; }';

  applyNavMarkers();
}

function syncRzToRoutines(){
  (S.projects||[]).forEach(function(p){
    (p.routinized||[]).forEach(function(entry){
      var exists = S.routines.some(function(r){ return r.id === entry.id; });
      if(!exists){
        S.routines.push({
          id: entry.id,
          time: entry.time||'00:00',
          task: entry.task,
          detail: p.name+' вБеьІ┤ьЎћ',
          days: entry.days||[],
          monthDays: entry.monthDays||[],
          isMonthly: !!entry.isMonthly,
          saveAmount: entry.saveAmount||0,
          isRz: true,
          rzProjectId: p.id
        });
      } else {
        // ЖИ░ВА┤ вБеьІ┤ВЌљ saveAmount вЊ▒ ВхюВІа ВаЋв│┤ в░ўВўЂ
        S.routines.forEach(function(r){
          if(r.id===entry.id){
            r.saveAmount=entry.saveAmount||0;
            r.monthDays=entry.monthDays||[];
            r.isMonthly=!!entry.isMonthly;
          }
        });
      }
    });
  });
  S.routines = S.routines.filter(function(r){
    if(!r.isRz) return true;
    return (S.projects||[]).some(function(p){
      return (p.routinized||[]).some(function(e){ return e.id === r.id; });
    });
  });
  S.routines.sort(function(a,b){ return a.time.localeCompare(b.time); });
}

function fmtMoney(n){if(!n&&n!==0)return '0ВЏљ';return new Intl.NumberFormat('ko-KR').format(Math.round(n))+'ВЏљ';}

function openYearlyDashboard(year){
  let totalInc=0,totalExp=0,totalSav=0;
  const incCats={},expCats={};
  (LD.fixedItems||[]).forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input'){
      const amt=Number(fi.amount)||0;
      totalExp+=amt*12;
      if(!expCats['Ж│аВаЋ ВДђВХю'])expCats['Ж│аВаЋ ВДђВХю']={total:0,subs:{}};
      expCats['Ж│аВаЋ ВДђВХю'].total+=amt*12;
      expCats['Ж│аВаЋ ВДђВХю'].subs[fi.title||'Ж│аВаЋ']=(expCats['Ж│аВаЋ ВДђВХю'].subs[fi.title||'Ж│аВаЋ']||0)+amt*12;
    }
  });
  (LD.transactions||[]).forEach(function(tx){
    if(!tx.date.startsWith(year+'-'))return;
    if(tx.type==='income'){
      totalInc+=tx.amount;
      if(!incCats[tx.majorCategory])incCats[tx.majorCategory]={total:0,subs:{}};
      incCats[tx.majorCategory].total+=tx.amount;
      const s=tx.minorCategory||'ЖИ░ьЃђ';
      incCats[tx.majorCategory].subs[s]=(incCats[tx.majorCategory].subs[s]||0)+tx.amount;
    } else if(tx.type==='expense'){
      totalExp+=tx.amount;
      if(!expCats[tx.majorCategory])expCats[tx.majorCategory]={total:0,subs:{}};
      expCats[tx.majorCategory].total+=tx.amount;
      const s=tx.minorCategory||'ЖИ░ьЃђ';
      expCats[tx.majorCategory].subs[s]=(expCats[tx.majorCategory].subs[s]||0)+tx.amount;
    }
  });
  (S.savings&&S.savings.entries||[]).forEach(function(e){
    if(e.date&&e.date.startsWith(year+'-'))totalSav+=e.amount||0;
  });
  function catRows(map,color){
    return Object.entries(map).sort((a,b)=>b[1].total-a[1].total).map(function([major,data]){
      let r='<div style="margin-bottom:10px">';
      r+='<div style="display:flex;justify-content:space-between;font-size:0.9em;font-weight:600;padding:4px 0;border-bottom:1px solid var(--border)"><span>'+major+'</span><span style="color:'+color+'">'+fmtMoney(data.total)+'</span></div>';
      Object.entries(data.subs).sort((a,b)=>b[1]-a[1]).forEach(function([sub,amt]){
        r+='<div style="display:flex;justify-content:space-between;font-size:0.78em;color:var(--t3);padding-left:10px;margin-top:2px"><span>'+sub+'</span><span>'+fmtMoney(amt)+'</span></div>';
      });
      return r+'</div>';
    }).join('');
  }
  const body=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">ВЌ░Ж░ё В┤Ю ВѕўВъЁ</div><div style="font-size:1.3em;font-weight:700;color:var(--green)">'+fmtMoney(totalInc)+'</div></div>'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">ВЌ░Ж░ё В┤Ю ВДђВХю</div><div style="font-size:1.3em;font-weight:700;color:var(--red)">'+fmtMoney(totalExp)+'</div></div>'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">ВЌ░Ж░ё ВађВХЋ</div><div style="font-size:1.3em;font-weight:700;color:var(--accent)">'+fmtMoney(totalSav)+'</div></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'+
    '<div><div style="font-size:0.88em;font-weight:600;color:var(--t2);margin-bottom:10px">­Ъњџ ВѕўВъЁ</div>'+catRows(incCats,'var(--green)')+'</div>'+
    '<div><div style="font-size:0.88em;font-weight:600;color:var(--t2);margin-bottom:10px">РЮц№ИЈ ВДђВХю</div>'+catRows(expCats,'var(--red)')+'</div>'+
    '</div>';
  openMo(year+'вЁё ВЌ░Ж░ё вїђВІюв│┤вЊю',body,'<button class=\"btn bg\" onclick=\"closeMo()\">вІФЖИ░</button>');
}
function ledgerPrevMonth(){if(ledgerMonth===0){ledgerMonth=11;ledgerYear--;}else ledgerMonth--;render();}

function renderLedgerDashboard(){
  const ym=ledgerYear+'-'+String(ledgerMonth+1).padStart(2,'0');
  const prevYm=ledgerMonth===0?(ledgerYear-1)+'-12':(ledgerYear)+'-'+String(ledgerMonth).padStart(2,'0');
  const MN=['1ВЏћ','2ВЏћ','3ВЏћ','4ВЏћ','5ВЏћ','6ВЏћ','7ВЏћ','8ВЏћ','9ВЏћ','10ВЏћ','11ВЏћ','12ВЏћ'];

  let curInc=0,curExp=0,prevExp=0;

  // В╣┤ьЁїЖ│авдгв│ё ВДђВХю (ве╝Вађ ВёаВќИ)
  const catMap={};

  // Ж│аВаЋ ВДђВХю ВЮ┤в▓ѕвІг ьЋЕВѓ░
  const fixedItems=LD.fixedItems||[];
  fixedItems.forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input'){
      const amt=Number(fi.amount)||0;
      curExp+=amt;
      const major=fi.majorCategory||'Ж│аВаЋ ВДђВХю';
      catMap[major]=(catMap[major]||0)+amt;
    }
  });
  (LD.transactions||[]).forEach(function(tx){
    const txYm=tx.date.slice(0,7);
    if(txYm===ym){
      if(tx.type==='income')curInc+=tx.amount;
      else if(tx.type==='expense'){
        curExp+=tx.amount;
        catMap[tx.majorCategory]=(catMap[tx.majorCategory]||0)+tx.amount;
      }
    }
    if(txYm===prevYm&&tx.type==='expense')prevExp+=tx.amount;
  });
  const diff=curExp-prevExp;
  const diffPct=prevExp===0?0:(diff/prevExp*100);
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  // ВўѕВѓ░ ВДёьќЅ
  const totalBudget=Object.values(LD.budgets||{}).reduce((a,b)=>a+(b||0),0);
  const budgetedCats=Object.keys((LD.categories||{}).expense||{}).filter(c=>!c.includes('ВађВХЋ')&&!c.includes('ьѕгВъљ'));
  const totalSpent=budgetedCats.reduce((a,c)=>a+(catMap[c]||0),0);
  const totalPct=totalBudget===0?0:Math.min(100,Math.round(totalSpent/totalBudget*100));

  // 12Ж░юВЏћ ьЮљвдё
  let monthBars='';
  const maxVal=Math.max(1,...Array.from({length:12},(_,i)=>{
    const k=ledgerYear+'-'+String(i+1).padStart(2,'0');
    let inc=0,exp=0;
    (LD.transactions||[]).forEach(function(tx){if(tx.date.slice(0,7)===k){if(tx.type==='income')inc+=tx.amount;else if(tx.type==='expense')exp+=tx.amount;}});
    return Math.max(inc,exp);
  }));
  for(let i=0;i<12;i++){
    const k=ledgerYear+'-'+String(i+1).padStart(2,'0');
    let inc=0,exp=0;
    (LD.transactions||[]).forEach(function(tx){if(tx.date.slice(0,7)===k){if(tx.type==='income')inc+=tx.amount;else if(tx.type==='expense')exp+=tx.amount;}});
    const isCur=(i===ledgerMonth);
    const tipTxt=MN[i]+'  ВѕўВъЁ +'+new Intl.NumberFormat('ko-KR').format(inc)+'  ВДђВХю -'+new Intl.NumberFormat('ko-KR').format(exp);
    monthBars+='<div onclick="ledgerMonth='+i+';render()" data-tip="'+tipTxt.replace(/"/g,'&quot;')+'" onmouseover="showLedgerTip(this,event)" onmousemove="moveLedgerTip(event)" onmouseout="hideLedgerTip()" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">';
    monthBars+='<div style="width:100%;height:60px;display:flex;align-items:flex-end;gap:1px;justify-content:center">';
    monthBars+='<div style="width:44%;background:var(--green);opacity:0.35;border-radius:3px 3px 0 0;height:'+Math.round(inc/maxVal*56)+'px;min-height:'+(inc>0?4:0)+'px"></div>';

function _ensureLedgerTip(){
  var tip=document.getElementById('ledger-cal-tip');
  if(!tip){
    tip=document.createElement('div');
    tip.id='ledger-cal-tip';
    tip.style.cssText='position:fixed;z-index:99999;pointer-events:none;display:none;background:rgba(40,40,45,0.95);color:#fff;padding:8px 11px;border-radius:8px;font-size:0.8em;line-height:1.5;white-space:pre;box-shadow:0 4px 16px rgba(0,0,0,0.25);max-width:260px';
    document.body.appendChild(tip);
  }
  return tip;
}
function showLedgerTip(el,e){
  var txt=el.getAttribute('data-tip');
  if(!txt)return;
  var tip=_ensureLedgerTip();
  tip.textContent=txt.replace(/&#10;/g,'\n').replace(/&quot;/g,'"');
  tip.style.display='block';
  moveLedgerTip(e);
}
function moveLedgerTip(e){
  var tip=document.getElementById('ledger-cal-tip');
  if(!tip||tip.style.display==='none')return;
  var x=e.clientX+14, y=e.clientY+14;
  var tw=tip.offsetWidth, th=tip.offsetHeight;
  if(x+tw>window.innerWidth-10) x=e.clientX-tw-14;
  if(y+th>window.innerHeight-10) y=e.clientY-th-14;
  tip.style.left=x+'px';
  tip.style.top=y+'px';
}
function hideLedgerTip(){
  var tip=document.getElementById('ledger-cal-tip');
  if(tip)tip.style.display='none';
}

function renderLedgerCalendar(){

  const ts=todStr();
  const first=new Date(ledgerYear,ledgerMonth,1),last=new Date(ledgerYear,ledgerMonth+1,0),sdow=first.getDay();

  const rem=42-cells.length;
  for(let d=1;d<=rem;d++){const nm=ledgerMonth===11?0:ledgerMonth+1,ny=ledgerMonth===11?ledgerYear+1:ledgerYear;cells.push({d,m:nm,y:ny,cur:false});}

    html+='<div style="text-align:center;font-size:0.72em;color:'+(i===0?'var(--red)':i===6?'var(--blue)':'var(--t3)')+';padding:4px 0;font-weight:500">'+d+'</div>';

function saveLedgerFixed(){
  const day=parseInt(document.getElementById('lf-day').value);
  const acc=document.getElementById('lf-acc')?document.getElementById('lf-acc').value:'';
  const major=document.getElementById('lf-major')?document.getElementById('lf-major').value:'';
  const minor=document.getElementById('lf-minor')?document.getElementById('lf-minor').value:'';
  const amtVal=document.getElementById('lf-amt')?document.getElementById('lf-amt').value.trim():'';
  const memo=(document.getElementById('lf-memo')?document.getElementById('lf-memo').value.trim():'')||major||'Ж│аВаЋ ВДђВХю';
  if(!day||isNaN(day)||day<1||day>31)return;
  const amount=amtVal?parseInt(amtVal,10):'req_input';
  if(!LD.fixedItems)LD.fixedItems=[];
  LD.fixedItems.push({id:gid(),day,type:'expense',account:acc,majorCategory:major,minorCategory:minor,amount,memo});
  LD.fixedItems.sort((a,b)=>a.day-b.day);
