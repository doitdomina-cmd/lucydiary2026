            { id: '7', text: '저녁 쉐이크 가볍게 먹기', completed: false, icon: 'aroma_night' },
        ];

        const dietPlan = {
            monthly: [
                { month: "5월", goal: "체중 감량 궤도 진입 (70kg 진입)", task: "1일 2식(저녁 쉐이크) 정착, 헬스장 주 4회 (목표: -2kg)" },
                { month: "6월", goal: "가속화 및 체지방 컷팅 (68kg 진입)", task: "밀가루/액상과당 완벽 차단, 유산소 강도 증가 (목표: -2kg)" },

        const monthNames = ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"];

        let state = {
            activeTab: 'today',

            weeklyPlanning: {},
            currentWeight: 72.0,  
            weightGoal: 64.0,

            editing: null,

            calendarMonth: new Date().getMonth()

        let lastNotifiedTime = "";

        // Custom Toast UI (대체 alert)
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl z-[100] font-bold text-sm transition-all duration-300 transform translate-y-0 opacity-100 ${isError ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => { 
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300); 
            }, 3000);
        }

        // --- Firebase Data Fetching ---
        function loadData() {
            if (!docRef || firebaseConfig.apiKey.includes("여기에")) {
                showToast("Firebase가 아직 연결되지 않았습니다. config 값을 세팅하세요.", true);
                hideLoading();
                render(); 
                return;
            }

            docRef.get().then((doc) => {
                if (doc.exists) {
                    const parsed = doc.data();
                    state = { ...state, ...parsed, editing: null }; 
                    
                    if(!state.calendarEvents) state.calendarEvents = [];
                    if(state.calendarYear === undefined) state.calendarYear = new Date().getFullYear();
                    if(state.calendarMonth === undefined) state.calendarMonth = new Date().getMonth();

                    if(state.todos.daily) state.todos.daily = state.todos.daily.map(t => ({...t, id: String(t.id)}));
                    if(state.healthChecklist) state.healthChecklist = state.healthChecklist.map(t => ({...t, id: String(t.id)}));
                    
                    const savedTheme = themes.find(t => t.id === parsed.themeId);
                    if (savedTheme) state.theme = savedTheme;
                    
                    const now = new Date();
                    now.setHours(now.getHours() - 2);
                    const todayDate = now.toDateString();
                    
                    if (state.lastRoutineDate !== todayDate) {
                        state.routine = state.routine.map(item => ({ ...item, completed: false }));
                        state.dayFinished = false;
                        state.lastRoutineDate = todayDate;
                        saveData(); 
                    } else {
                        hideLoading();
                        render();
                    }
                } else {
                    // 최초 접속
                    saveData();
                }
            }).catch((error) => {
                console.error("데이터 로드 실패:", error);
                showToast("데이터를 불러오는데 실패했습니다.", true);
                hideLoading();
                render();
            });
        }

        // --- Firebase Data Saving ---
        function saveData() {
            const { editing, ...dataToSave } = state;
            dataToSave.themeId = state.theme.id;
            
            if (docRef && !firebaseConfig.apiKey.includes("여기에")) {
                docRef.set(dataToSave).then(() => {
                    hideLoading();
                    requestAnimationFrame(render);
                }).catch((error) => {
                    console.error("데이터 저장 실패:", error);
                    showToast("저장 실패. 네트워크 상태를 확인하세요.", true);
                });
            } else {
                hideLoading();
                requestAnimationFrame(render);
            }
        }

        function hideLoading() {
            document.getElementById('loading-spinner').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('footer').classList.remove('hidden');
        }

        function getTodayStr() { 
            const d = new Date(); 
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }
        function getTomorrowStr() { 
            const d = new Date(); d.setDate(d.getDate() + 1); 
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }
        function getYesterdayStr() { 
            const d = new Date(); d.setDate(d.getDate() - 1); 
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }
        
        function getWeeksForMonth(year, month) {
            const weeks = [];
            const firstDayOfMonth = new Date(year, month, 1);
            const dayOfWeek = firstDayOfMonth.getDay();
            const offsetToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            let currentMonday = new Date(firstDayOfMonth);
            currentMonday.setDate(firstDayOfMonth.getDate() - offsetToMonday);
            const checkThursday = new Date(currentMonday);
            checkThursday.setDate(currentMonday.getDate() + 3);
            if (checkThursday.getMonth() !== month) currentMonday.setDate(currentMonday.getDate() + 7);
            while (true) {
                const currentThursday = new Date(currentMonday);
                currentThursday.setDate(currentMonday.getDate() + 3);
                if (currentThursday.getMonth() !== month) break; 
                const weekEnd = new Date(currentMonday);
                weekEnd.setDate(currentMonday.getDate() + 6);
                weeks.push({ start: new Date(currentMonday), end: new Date(weekEnd), label: `${currentMonday.getMonth() + 1}/${currentMonday.getDate()} - ${weekEnd.getMonth() + 1}/${weekEnd.getDate()}` });
                currentMonday.setDate(currentMonday.getDate() + 7);
            }
            return weeks;
        }
        
        function getIconName(type) {
            switch(type) {
                case 'water': return 'droplets';
                case 'meal': return 'pen-tool'; 
                case 'food': return 'utensils';
                case 'gym': return 'dumbbell';
                case 'sleep': return 'moon';
                case 'aroma_day': return 'smartphone-off';
                case 'aroma_night': return 'coffee';
                default: return 'flower-2';
            }
        }

        function render() {
            applyTheme();
            renderHeader();
            const main = document.getElementById('main-content');
            main.innerHTML = '';
            
            if (state.activeTab === 'today') renderToday(main);
            else if (state.activeTab === 'calendar') renderCalendar(main); 
            else if (state.activeTab === 'planning') renderPlanning(main);
            else if (state.activeTab === 'health') renderHealth(main);
            else if (state.activeTab === 'settings') renderSettings(main);
            
            if (window.lucide) window.lucide.createIcons();

            if (focusTargetId && !state.editing) { 
                const el = document.getElementById(focusTargetId);
                if (el) {
                    el.focus();
                    const len = el.value.length;
                    el.setSelectionRange(len, len);
                }
                focusTargetId = null;
            }
        }

        function applyTheme() {
            const t = state.theme;
            const body = document.getElementById('body');
            if (t.customBg) body.className = `${t.customBg} text-${t.secondary}-900 font-sans transition-colors duration-500`;
            else body.className = `bg-${t.bg}-50 text-${t.secondary}-900 font-sans transition-colors duration-500`;
            const title = document.getElementById('app-title');
            title.className = `text-3xl font-bold flex items-center gap-2 text-${t.primary}-900 transition-colors`;
            const titleIcon = title.querySelector('i');
            if(titleIcon) titleIcon.className = `w-8 h-8 text-${t.primary}-600`;
            document.getElementById('nav-tabs').className = `flex bg-white p-1.5 rounded-2xl shadow-sm border border-${t.secondary}-100 overflow-x-auto transition-colors`;
            document.getElementById('footer').className = `mt-12 pb-8 text-center text-${t.secondary}-400 text-xs transition-colors hidden md:block`;
        }

        function renderHeader() {
            const nav = document.getElementById('nav-tabs');
            const tabs = [
                { id: 'today', label: '오늘', icon: 'clock' },
                { id: 'calendar', label: '월간 일정', icon: 'calendar-days' }, 
                { id: 'planning', label: '장기 계획', icon: 'layout' },
                { id: 'health', label: '건강 관리', icon: 'heart' },
                { id: 'settings', label: '설정', icon: 'settings' }
            ];
            nav.innerHTML = tabs.map(tab => {
                const isActive = state.activeTab === tab.id;
                const activeClass = `bg-${state.theme.primary}-500 text-white shadow-md`;
                const inactiveClass = `text-${state.theme.secondary}-500 hover:bg-${state.theme.bg || 'white'}-50`; 
                const iconColor = tab.id === 'health' && !isActive ? `text-${state.theme.accent}-500` : '';
                return `<button onclick="setState('activeTab', '${tab.id}')" class="flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold transition-all whitespace-nowrap ${isActive ? activeClass : inactiveClass}"><i data-lucide="${tab.icon}" class="w-4 h-4 ${iconColor}"></i> ${tab.label}</button>`;
            }).join('');
        }

        // --- Calendar Functions ---
        function renderCalendar(container) {
            const t = state.theme;
            const year = state.calendarYear;
            const month = state.calendarMonth;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();
            
            const days = [];
            for(let i = firstDay - 1; i >= 0; i--) {
                days.push({ date: new Date(year, month - 1, prevMonthDays - i), isCurrentMonth: false });
            }
            for(let i = 1; i <= daysInMonth; i++) {
                days.push({ date: new Date(year, month, i), isCurrentMonth: true });
            }
            const remainingDays = 42 - days.length; 
            for(let i = 1; i <= remainingDays; i++) {
                days.push({ date: new Date(year, month + 1, i), isCurrentMonth: false });
            }

            container.innerHTML = `
                <div class="bg-white rounded-3xl shadow-sm border border-${t.secondary}-100 p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold flex items-center gap-3 text-${t.primary}-900">
                            <i data-lucide="calendar-days" class="w-7 h-7 text-${t.primary}-600"></i> ${year}.${String(month + 1).padStart(2, '0')}
                        </h2>
                        <div class="flex items-center gap-4">
                            <div class="flex gap-1 bg-${t.bg || 'slate'}-100 p-1.5 rounded-xl">
                                <button onclick="changeCalendarMonth(-1)" class="p-2 hover:bg-white rounded-lg transition-all"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                                <button onclick="setCalendarToToday()" class="px-4 py-1 text-sm font-bold text-${t.secondary}-700 hover:bg-white rounded-lg transition-all">오늘</button>
                                <button onclick="changeCalendarMonth(1)" class="p-2 hover:bg-white rounded-lg transition-all"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                            </div>
                            <button onclick="openEventModal()" class="bg-${t.primary}-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md hover:bg-${t.primary}-600 transition-all flex items-center gap-2">
                                <i data-lucide="plus" class="w-4 h-4"></i> 새 일정 만들기
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-7 gap-px bg-${t.secondary}-200 border-t border-l border-r border-${t.secondary}-200 rounded-t-xl overflow-hidden">
                        ${['일', '월', '화', '수', '목', '금', '토'].map((day, i) => `
                            <div class="bg-${t.bg || 'slate'}-50 text-center py-3 text-xs font-bold ${i===0?'text-red-500':i===6?'text-blue-500':`text-${t.secondary}-500`}">${day}</div>
                        `).join('')}
                    </div>

                    <div class="grid grid-cols-7 gap-px bg-${t.secondary}-200 border border-${t.secondary}-200 rounded-b-xl overflow-hidden">
                        ${days.map((dayObj) => {
                            const d = dayObj.date;
                            const ymd = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                            const isToday = ymd === getTodayStr();
                            const isCurrent = dayObj.isCurrentMonth;

                            const dayEvents = state.calendarEvents.filter(ev => {
                                const start = ev.start;
                                const end = ev.end || ev.start;
                                return ymd >= start && ymd <= end;
                            }).sort((a,b) => a.start.localeCompare(b.start));

                            return `
                                <div class="bg-white min-h-[140px] p-1.5 flex flex-col hover:bg-slate-50/50 transition-colors cursor-pointer relative group" 
                                     onclick="openEventModal(null, '${ymd}')"
                                     ondragover="calendarAllowDrop(event)"
                                     ondragenter="calendarDragEnter(event)"
                                     ondragleave="calendarDragLeave(event)"
                                     ondrop="calendarDrop(event, '${ymd}')">
                                    <div class="text-right mb-1 pr-1">
                                        <span class="text-xs font-bold ${isToday ? `bg-${t.primary}-500 text-white w-6 h-6 inline-flex items-center justify-center rounded-full shadow-sm` : (isCurrent ? (d.getDay()===0?'text-red-500':d.getDay()===6?'text-blue-500':`text-${t.secondary}-700`) : `text-${t.secondary}-300`)}">
                                            ${d.getDate()}
                                        </span>
                                    </div>
                                    <div class="flex-1 overflow-y-auto space-y-1.5 scrollbar-hide pb-2">
                                        ${dayEvents.map(ev => {
                                            const isStart = ymd === ev.start;
                                            const isEnd = ymd === (ev.end || ev.start);
                                            
                                            let roundedClass = '';
                                            let marginClass = 'mx-1';
                                            if(isStart && isEnd) { roundedClass = 'rounded-md'; }
                                            else if(isStart) { roundedClass = 'rounded-l-md rounded-r-none border-r-0'; marginClass = 'ml-1 mr-[-6px]'; }
                                            else if(isEnd) { roundedClass = 'rounded-r-md rounded-l-none border-l-0'; marginClass = 'mr-1 ml-[-6px]'; }
                                            else { roundedClass = 'rounded-none border-l-0 border-r-0'; marginClass = 'mx-[-6px]'; }

                                            return `
                                                <div draggable="true" 
                                                     ondragstart="calendarDragStart(event, '${ev.id}')"
                                                     onclick="event.stopPropagation(); openEventModal('${ev.id}')" 
                                                     class="text-[11px] px-2 py-1 truncate bg-${ev.color}-100 text-${ev.color}-800 ${roundedClass} ${marginClass} border border-${ev.color}-200 relative z-10 hover:opacity-80 transition-opacity flex items-center gap-1 cursor-move shadow-sm">
                                                    ${isStart ? `<span class="font-bold flex items-center gap-1 w-full overflow-hidden"><span class="w-4 h-4 shrink-0 inline-flex items-center justify-center">${getIconHtml(ev.icon)}</span><span class="truncate">${ev.title}</span></span>` : '&nbsp;'}
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                    <div class="absolute inset-0 border-2 border-transparent group-hover:border-${t.primary}-200 pointer-events-none transition-colors"></div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function changeCalendarMonth(delta) {
            state.calendarMonth += delta;
            if (state.calendarMonth < 0) { state.calendarMonth = 11; state.calendarYear--; } 
            else if (state.calendarMonth > 11) { state.calendarMonth = 0; state.calendarYear++; }
            saveData();
        }

        function setCalendarToToday() {
            const now = new Date();
            state.calendarYear = now.getFullYear();
            state.calendarMonth = now.getMonth();
            saveData();
        }

        function calendarAllowDrop(ev) { ev.preventDefault(); }
        function calendarDragEnter(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over-calendar'); }
        function calendarDragLeave(ev) { ev.currentTarget.classList.remove('drag-over-calendar'); }
        function calendarDragStart(ev, id) { 
            ev.dataTransfer.setData("text/plain", id); 
            setTimeout(() => ev.target.classList.add('opacity-50'), 0);
        }
        function calendarDrop(ev, targetDateStr) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over-calendar');
            const eventId = ev.dataTransfer.getData("text/plain");
            if (!eventId) return;

            const eventIndex = state.calendarEvents.findIndex(e => e.id === eventId);
            if (eventIndex === -1) return;

            const targetEvent = state.calendarEvents[eventIndex];
            const oldStart = new Date(targetEvent.start);
            const oldEnd = new Date(targetEvent.end || targetEvent.start);
            
            const duration = oldEnd.getTime() - oldStart.getTime();

            const newStart = new Date(targetDateStr);
            const newEnd = new Date(newStart.getTime() + duration);

            const formatDate = (d) => {
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            state.calendarEvents[eventIndex].start = formatDate(newStart);
            state.calendarEvents[eventIndex].end = formatDate(newEnd);

            saveData(); 
        }

        function getIconHtml(iconData) {
            if (!iconData) return '📝';
            if (iconData.startsWith('data:image')) {
                return `<img src="${iconData}" class="w-full h-full object-cover rounded shadow-sm" alt="icon" />`;
            }
            return iconData;
        }

        function toggleIconPicker() {
            const picker = document.getElementById('icon-picker');
            picker.classList.toggle('hidden');
        }

        function selectIcon(icon) {
            document.getElementById('ev-icon').value = icon;
            document.getElementById('icon-display-btn').innerHTML = getIconHtml(icon);
            toggleIconPicker();
        }

        function handleIconUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 64; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/png');
                    
                    document.getElementById('ev-icon').value = dataUrl;
                    document.getElementById('icon-display-btn').innerHTML = getIconHtml(dataUrl);
                    toggleIconPicker();
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function openEventModal(eventId = null, targetDate = null) {
            let ev = { id: '', title: '', start: targetDate || getTodayStr(), end: targetDate || getTodayStr(), color: 'slate', desc: '', icon: '📝' };
            if (eventId) {
                ev = state.calendarEvents.find(e => e.id === eventId) || ev;
            }

            const colors = ['slate', 'red', 'orange', 'amber', 'green', 'blue', 'indigo', 'purple', 'pink'];
            const iconsList = ['📝', '💻', '✍️', '📚', '💡', '🚀', '⏳', '⏰', '📅', '📌', '🏆', '⭐', '🔥', '💰', '💌', '🎉', '🏃‍♀️', '☕', '💊', '🌙'];
            const t = state.theme;

            const modalHTML = `
                <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" onclick="closeEventModal()">
                    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all" onclick="event.stopPropagation()">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                            <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2"><i data-lucide="${eventId ? 'edit' : 'calendar-plus'}" class="w-5 h-5 text-${t.primary}-500"></i> ${eventId ? '일정 수정' : '새 일정 등록'}</h3>
                            <button onclick="closeEventModal()" class="text-slate-400 hover:text-slate-600 bg-white p-1 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <div class="p-6 space-y-5">
                            <div class="flex gap-3 relative">
                                <div class="relative">
                                    <button type="button" onclick="toggleIconPicker()" id="icon-display-btn" class="w-14 h-full min-h-[46px] p-2 border border-slate-200 rounded-xl flex items-center justify-center bg-slate-50 text-2xl shadow-sm hover:bg-slate-100 transition-colors cursor-pointer" title="아이콘 선택">
                                        ${getIconHtml(ev.icon)}
                                    </button>
                                    <input type="hidden" id="ev-icon" value="${ev.icon}">
                                    
                                    <div id="icon-picker" class="hidden absolute top-full left-0 mt-2 p-3 bg-white border border-slate-200 rounded-2xl shadow-xl w-[280px] z-50">
                                        <div class="grid grid-cols-5 gap-1.5 mb-3">
                                            ${iconsList.map(icon => `
                                                <button type="button" onclick="selectIcon('${icon}')" class="text-2xl hover:bg-slate-100 p-2 rounded-xl transition-colors flex items-center justify-center aspect-square">${icon}</button>
                                            `).join('')}
                                        </div>
                                        <div class="border-t border-slate-100 pt-3">
                                            <label class="flex items-center justify-center gap-2 w-full py-2 bg-slate-50 hover:bg-slate-100 text-sm font-bold text-slate-600 rounded-lg cursor-pointer transition-colors border border-slate-200">
                                                <i data-lucide="upload" class="w-4 h-4"></i> 내 이미지 업로드
                                                <input type="file" accept="image/*" class="hidden" onchange="handleIconUpload(event)">
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <input type="text" id="ev-title" value="${ev.title}" placeholder="프로젝트/일정 제목" class="flex-1 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-${t.primary}-200 focus:outline-none bg-slate-50 font-bold text-slate-800 shadow-sm text-sm">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">시작일</label>
                                    <input type="date" id="ev-start" value="${ev.start}" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-${t.primary}-200 focus:outline-none text-sm text-slate-700 shadow-sm font-medium">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">종료일 (선택)</label>
                                    <input type="date" id="ev-end" value="${ev.end}" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-${t.primary}-200 focus:outline-none text-sm text-slate-700 shadow-sm font-medium">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">테마 색상 (필명/장르별 분류 권장)</label>
                                <div class="flex gap-2 flex-wrap bg-slate-50 p-3 rounded-xl border border-slate-100">
                                    ${colors.map(c => `
                                        <label class="cursor-pointer relative">
                                            <input type="radio" name="ev-color" value="${c}" class="peer sr-only" ${ev.color === c ? 'checked' : ''}>
                                            <div class="w-8 h-8 rounded-full bg-${c}-100 border-2 border-transparent peer-checked:border-${c}-500 transition-all flex items-center justify-center hover:scale-110">
                                                <div class="w-4 h-4 rounded-full bg-${c}-500"></div>
                                            </div>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">세부 내용 및 메모</label>
                                <textarea id="ev-desc" rows="3" placeholder="예: 공미 110,000자 달성 목표" class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-${t.primary}-200 focus:outline-none text-sm text-slate-700 resize-none shadow-sm">${ev.desc || ''}</textarea>
                            </div>
                        </div>
                        <div class="p-5 bg-slate-50 flex justify-between items-center border-t border-slate-100">
                            ${eventId ? `<button onclick="deleteEvent('${eventId}')" class="text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center gap-1"><i data-lucide="trash-2" class="w-4 h-4"></i> 삭제</button>` : `<div></div>`}
                            <div class="flex gap-2">
                                <button onclick="closeEventModal()" class="px-5 py-2.5 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-200 transition-colors">취소</button>
                                <button onclick="saveEvent('${eventId || ''}')" class="bg-${t.primary}-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-${t.primary}-700 shadow-md transition-colors flex items-center gap-2"><i data-lucide="save" class="w-4 h-4"></i> 저장하기</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal-container').innerHTML = modalHTML;
            if (window.lucide) window.lucide.createIcons();
        }

        function closeEventModal() {
            document.getElementById('modal-container').innerHTML = '';
        }

        function saveEvent(id) {
            const title = document.getElementById('ev-title').value.trim();
            const start = document.getElementById('ev-start').value;
            let end = document.getElementById('ev-end').value;
            const desc = document.getElementById('ev-desc').value.trim();
            const icon = document.getElementById('ev-icon').value.trim() || '📝';
            const color = document.querySelector('input[name="ev-color"]:checked').value;

            if (!title || !start) {
                showToast('일정 제목과 시작일은 필수입니다.', true);
                return;
            }
            
            if (end && start > end) {
                end = start; 
            }

            const eventObj = {
                id: id || Date.now().toString(),
                title, start, end, desc, icon, color
            };

            if (id) {
                state.calendarEvents = state.calendarEvents.map(e => e.id === id ? eventObj : e);
            } else {
                state.calendarEvents.push(eventObj);
            }

            closeEventModal();
            saveData();
        }

        function deleteEvent(id) {
            if (confirm('해당 일정을 삭제하시겠습니까? (삭제된 일정은 복구할 수 없습니다)')) {
                state.calendarEvents = state.calendarEvents.filter(e => e.id !== id);
                closeEventModal();
                saveData();
            }
        }

        // --- 기타 기존 Functions ---
        function renderToday(container) {
            const t = state.theme;
            const shiftedDate = new Date(); 
            const todayStr = getTodayStr();
            const tomorrowStr = getTomorrowStr();
            const activeTodos = state.todos.daily.filter(todo => {
                const tDate = todo.date || todayStr;
                return tDate === todayStr || (!todo.completed && tDate < todayStr);
            }).sort((a, b) => (a.completed === b.completed ? 0 : a.completed ? 1 : -1));
            const tomorrowTodos = state.todos.daily.filter(todo => todo.date === tomorrowStr);
            const yesterdayTodos = state.todos.daily.filter(todo => todo.completed && todo.date === getYesterdayStr());
            const monthIdx = shiftedDate.getMonth();
            const currentMonthGoals = (state.monthlyGoals[state.currentYear] && state.monthlyGoals[state.currentYear][monthIdx]) || [];
            const weeks = getWeeksForMonth(shiftedDate.getFullYear(), monthIdx);
            const weekIdx = weeks.findIndex(w => shiftedDate >= w.start && shiftedDate <= w.end);
            const weekKey = `week-${weekIdx !== -1 ? weekIdx : 0}`;
            const currentWeekGoals = (state.weeklyPlanning[state.currentYear] && state.weeklyPlanning[state.currentYear][monthIdx] && state.weeklyPlanning[state.currentYear][monthIdx][weekKey]) || [];
            const totalRoutine = state.routine.length;
            const completedRoutine = state.routine.filter(r => r.completed).length;
            const progressPercent = totalRoutine === 0 ? 0 : Math.round((completedRoutine / totalRoutine) * 100);
            const isPerfect = progressPercent === 100 && totalRoutine > 0;

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <section class="lg:col-span-4 bg-white rounded-3xl shadow-sm border border-${t.secondary}-100 overflow-hidden h-fit">
                        <div class="bg-${t.primary}-500 p-5 text-white flex justify-between items-center">
                            <h2 class="text-lg font-bold flex items-center gap-2"><i data-lucide="clock" class="w-5 h-5"></i> 데일리 루틴</h2>
                            <span class="text-sm opacity-90 font-medium">${shiftedDate.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric'})}</span>
                        </div>
                        <div class="p-4 relative">
                            <div class="absolute left-[29px] top-6 bottom-6 w-0.5 bg-${t.primary}-100 z-0"></div>
                            <div class="space-y-3 relative z-10"> 
                                ${state.routine.map(item => `
                                    <div class="flex gap-4 items-start group cursor-pointer" onclick="toggleRoutine('${item.id}')">
                                        <div class="flex flex-col items-center mt-1">
                                            <div class="w-2.5 h-2.5 rounded-full ${item.completed ? `bg-${t.success}-500 ring-4 ring-${t.success}-100` : `bg-${t.primary}-500 ring-4 ring-white`} shadow-sm transition-all"></div>
                                        </div>
                                        <div class="flex-1 -mt-1 p-2 rounded-xl transition-all ${item.completed ? `bg-${t.secondary}-50 opacity-60 border border-${t.secondary}-100` : `hover:bg-${t.bg || 'slate'}-50`}">
                                            <div class="flex items-center gap-2 mb-1">
                                                <span class="text-sm font-black ${item.completed ? `text-${t.secondary}-400 bg-${t.secondary}-100` : `text-${t.primary}-700 bg-${t.primary}-50`} px-2 py-0.5 rounded-md">${item.time}</span>
                                                ${item.completed ? `<i data-lucide="check" class="w-3 h-3 text-${t.success}-500"></i>` : ''}
                                            </div>
                                            <h3 class="text-base font-bold ${item.completed ? `text-${t.secondary}-400 line-through` : `text-${t.secondary}-800`} mb-0.5">${item.task}</h3>
                                            <p class="text-sm ${item.completed ? `text-${t.secondary}-300` : `text-${t.secondary}-500`} leading-relaxed">${item.detail}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </section>

                    <div class="lg:col-span-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-white p-6 rounded-3xl shadow-sm border border-${t.primary}-100 flex flex-col h-full">
                                <h2 class="text-base font-bold text-${t.primary}-900 mb-4 flex items-center gap-2"><i data-lucide="star" class="w-5 h-5 text-amber-400 fill-amber-400"></i> ${monthNames[monthIdx]} 목표</h2>
                                <div class="flex-1 space-y-2 overflow-y-auto max-h-[150px]">
                                    ${currentMonthGoals.length === 0 ? `<p class="text-sm text-${t.secondary}-400 italic">이번 달 목표를 '장기 계획' 탭에서 설정하세요.</p>` : 
                                    currentMonthGoals.map(g => {
                                        const isEditing = state.editing && state.editing.type === 'monthly' && String(state.editing.id) === String(g.id);
                                        return `<div class="flex items-start gap-2 justify-between group/item p-1 hover:bg-slate-50 rounded-lg">
                                            <div class="flex items-start gap-2 flex-1">
                                                <div class="mt-0.5 cursor-pointer p-1 rounded-md hover:bg-slate-200" onclick="toggleMonthlyGoal('${monthIdx}', '${g.id}')">
                                                    <i data-lucide="${g.completed ? 'check-square' : 'square'}" class="w-4 h-4 ${g.completed ? `text-${t.success}-500` : `text-${t.secondary}-300`}"></i>
                                                </div>
                                                ${isEditing 
                                                    ? `<input type="text" value="${g.text}" class="edit-input font-medium text-sm text-${t.secondary}-700" id="edit-input-${g.id}" onblur="finishEdit(this.value)" onkeydown="if(event.key==='Enter') this.blur()">`
                                                    : `<span class="text-sm py-1 px-1 rounded hover:bg-white cursor-text flex-1 ${g.completed ? `line-through text-${t.secondary}-300` : `text-${t.secondary}-700`}" onclick="startEdit('monthly', '${g.id}', '${monthIdx}')">${g.text}</span>`
                                                }
                                            </div>
                                            <button onclick="event.stopPropagation(); deleteMonthlyGoal('${monthIdx}', '${g.id}')" class="opacity-0 group-hover/item:opacity-100 text-${t.secondary}-300 hover:text-${t.accent}-500 transition-opacity p-1"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                        </div>`
                                    }).join('')}
                                </div>
                            </div>
                            <div class="bg-${t.primary}-50 p-6 rounded-3xl shadow-sm border border-${t.primary}-100 flex flex-col h-full">
                                <h2 class="text-base font-bold text-${t.primary}-900 mb-4 flex items-center gap-2"><i data-lucide="target" class="w-5 h-5 text-${t.primary}-600"></i> 이번 주 목표 (${weekIdx + 1}주차)</h2>
                                <div class="flex-1 space-y-2 overflow-y-auto max-h-[150px]">
                                    ${currentWeekGoals.length === 0 ? `<p class="text-sm text-${t.primary}-300 italic">이번 주 목표를 '장기 계획' 탭에서 설정하세요.</p>` :

                                        <div class="p-1 rounded-full flex-shrink-0 ${item.completed ? 'bg-white/20' : `bg-${t.success}-100`}"><i data-lucide="${getIconName(item.icon)}" class="w-4 h-4"></i></div>
                                        <span class="font-bold text-sm flex-1">${item.text}</span>
                                        <button onclick="event.stopPropagation(); deleteHealthCheck('${item.id}')" class="absolute right-2 opacity-0 group-hover:opacity-100 p-2 rounded-lg transition-all text-white/80"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        ${item.completed ? '<i data-lucide="check-circle-2" class="w-5 h-5 flex-shrink-0"></i>' : ''}
                                    </div>
                                `).join('')}
                            </div>
                            <form onsubmit="addHealthCheck(event)" class="flex gap-2"><input type="text" id="health-input" placeholder="새로운 습관 추가..." class="flex-1 bg-white border border-${t.success}-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-${t.success}-300"><button type="submit" class="bg-${t.success}-600 text-white p-3 rounded-xl hover:bg-${t.success}-700 shadow-lg shadow-${t.success}-200"><i data-lucide="plus" class="w-5 h-5"></i></button></form>
                        </section>
                    </div>
                    <div class="md:col-span-7 space-y-6">
                        <section class="bg-white p-8 rounded-3xl shadow-sm border border-${t.secondary}-100"><h2 class="text-xl font-bold text-${t.secondary}-800 mb-6 flex items-center gap-2"><i data-lucide="flag" class="w-6 h-6 text-${t.primary}-500"></i> 다이어트 로드맵</h2><div class="mb-8"><h3 class="text-sm font-bold text-${t.secondary}-400 uppercase tracking-widest mb-4">월간 핵심 목표</h3><div class="grid grid-cols-1 gap-4">${dietPlan.monthly.map(plan => `<div class="flex gap-4 p-4 rounded-2xl bg-${t.bg || 'slate'}-50 border border-${t.secondary}-100 items-center"><div class="bg-white px-3 py-1 rounded-lg border border-${t.secondary}-200 text-sm font-black text-${t.primary}-600 whitespace-nowrap">${plan.month}</div><div><p class="font-bold text-${t.secondary}-800 text-sm">${plan.goal}</p><p class="text-xs text-${t.secondary}-500 mt-1">${plan.task}</p></div></div>`).join('')}</div></div><div><h3 class="text-sm font-bold text-${t.secondary}-400 uppercase tracking-widest mb-4">주간 실천 가이드</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-4">${dietPlan.weekly.map((tip, i) => `<div class="flex items-center gap-3 p-4 bg-${t.primary}-50/50 rounded-2xl border border-${t.primary}-50"><div class="w-6 h-6 rounded-full bg-${t.primary}-100 text-${t.primary}-600 flex items-center justify-center text-xs font-bold shrink-0">${i + 1}</div><span class="text-sm text-${t.primary}-900 font-medium leading-tight">${tip}</span></div>`).join('')}</div></div></section>
                        <section class="bg-gradient-to-br from-${t.accent}-500 to-orange-500 p-8 rounded-3xl text-white shadow-lg shadow-${t.accent}-100"><div class="flex gap-5 items-center"><div class="bg-white/20 p-4 rounded-full backdrop-blur-md"><i data-lucide="target" class="w-8 h-8 text-white"></i></div><div><h3 class="text-lg font-bold mb-1">목표 체중 ${state.weightGoal}kg 달성!</h3><p class="text-sm text-white/90 leading-relaxed font-medium">지금의 절제력이 새로운 작가님을 만듭니다.<br>매일 체크리스트를 채우고, ${(state.currentWeight - state.weightGoal).toFixed(1)}kg 감량의 주인공이 되세요.</p></div></div></section>
                    </div>
                </div>`;
        }

        function renderSettings(container) {
            const t = state.theme;
            container.innerHTML = `
                <section class="bg-white p-8 rounded-3xl shadow-sm border border-${t.secondary}-100">
                    <div class="mb-10 border-b border-slate-100 pb-10"><h2 class="text-xl font-bold text-${t.secondary}-800 flex items-center gap-2 mb-6"><i data-lucide="palette" class="w-6 h-6"></i> 테마 설정</h2><div class="grid grid-cols-2 md:grid-cols-5 gap-4">${themes.map(theme => `<button onclick="setTheme('${theme.id}')" class="relative p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-3 ${state.theme.id === theme.id ? `border-${t.primary}-500 bg-${t.primary}-50` : 'border-slate-100 hover:border-slate-200'}"><div class="flex gap-1"><div class="w-4 h-4 rounded-full bg-${theme.primary}-500"></div><div class="w-4 h-4 rounded-full bg-${theme.accent}-500"></div></div><span class="text-sm font-bold ${state.theme.id === theme.id ? `text-${t.primary}-700` : 'text-slate-500'}">${theme.name}</span>${state.theme.id === theme.id ? `<div class="absolute top-2 right-2 w-2 h-2 rounded-full bg-${t.primary}-500"></div>` : ''}</button>`).join('')}</div></div>
                    <div class="flex justify-between items-center mb-8 border-b pb-4"><h2 class="text-xl font-bold text-${t.secondary}-800 flex items-center gap-2"><i data-lucide="settings" class="w-6 h-6"></i> 루틴 설정</h2><button onclick="saveData()" class="bg-${t.primary}-500 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-${t.primary}-100"><i data-lucide="save" class="w-4 h-4"></i> 저장하기</button></div>
                    <div class="space-y-4 max-w-4xl">${state.routine.map((item, index) => `<div class="grid grid-cols-12 gap-4 items-center bg-${t.bg || 'slate'}-50 p-4 rounded-2xl border border-${t.secondary}-100"><div class="col-span-2"><input type="text" value="${item.time}" onchange="updateRoutine('${index}', 'time', this.value)" class="w-full bg-white border border-${t.secondary}-200 rounded-lg px-2 py-1 text-sm font-bold text-${t.primary}-600" /></div><div class="col-span-4"><input type="text" value="${item.task}" onchange="updateRoutine('${index}', 'task', this.value)" class="w-full bg-white border border-${t.secondary}-200 rounded-lg px-3 py-1 text-sm font-bold text-${t.secondary}-800" /></div><div class="col-span-5"><input type="text" value="${item.detail}" onchange="updateRoutine('${index}', 'detail', this.value)" class="w-full bg-white border border-${t.secondary}-200 rounded-lg px-3 py-1 text-sm text-${t.secondary}-500" /></div><div class="col-span-1 flex justify-end"><button onclick="deleteRoutine('${index}')" class="text-${t.secondary}-300 hover:text-${t.accent}-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`).join('')}<button onclick="addRoutine()" class="w-full py-4 border-2 border-dashed border-${t.secondary}-200 rounded-2xl text-${t.secondary}-400 font-medium flex items-center justify-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> 루틴 추가</button></div>
                    <div class="mt-12 pt-8 border-t border-${t.secondary}-100">
                        <h2 class="text-xl font-bold text-${t.secondary}-800 flex items-center gap-2 mb-6">
                            <i data-lucide="database" class="w-6 h-6"></i> 데이터 관리
                        </h2>
                        <div class="flex flex-wrap gap-4">
                            <button onclick="exportData()" class="flex items-center gap-2 px-5 py-3 bg-${t.bg || 'slate'}-100 text-${t.secondary}-700 rounded-xl font-bold hover:bg-${t.bg || 'slate'}-200 transition-colors border border-${t.secondary}-200">
                                <i data-lucide="download" class="w-4 h-4"></i> 내보내기 (백업)
                            </button>
                            <label class="flex items-center gap-2 px-5 py-3 bg-${t.bg || 'slate'}-100 text-${t.secondary}-700 rounded-xl font-bold hover:bg-${t.bg || 'slate'}-200 transition-colors border border-${t.secondary}-200 cursor-pointer">
                                <i data-lucide="upload" class="w-4 h-4"></i> 불러오기 (복원)
                                <input type="file" id="import-file" style="display:none" onchange="importData(this)" accept=".json">
                            </label>
                            <button onclick="requestNotificationPermission()" class="flex items-center gap-2 px-5 py-3 bg-indigo-50 text-indigo-600 rounded-xl font-bold hover:bg-indigo-100 transition-colors border border-indigo-200">
                                <i data-lucide="bell" class="w-4 h-4"></i> 알림 권한 켜기
                            </button>
                        </div>
                    </div>
                </section>`;
        }

        // --- Functions ---
        function startEdit(type, id, param1, param2) {
            state.editing = { type, id, param1, param2 };
            render();
            requestAnimationFrame(() => {
                const input = document.getElementById(`edit-input-${id}`);
                if(input) { input.focus(); input.select(); }
            });
        }
        function finishEdit(value) {
            if (!state.editing) return;
            const { type, id, param1, param2 } = state.editing;
            const val = value.trim();
            if (val) {
                if (type === 'daily') {
                     state.todos.daily = state.todos.daily.map(t => String(t.id) === String(id) ? { ...t, text: val } : t);
                } else if (type === 'monthly') {
                     const yearKey = String(state.currentYear);
                     if(state.monthlyGoals[yearKey] && state.monthlyGoals[yearKey][param1]) {
                         state.monthlyGoals[yearKey][param1] = state.monthlyGoals[yearKey][param1].map(g => String(g.id) === String(id) ? { ...g, text: val } : g);
                     }
                } else if (type === 'weekly') {
                     const yearKey = String(state.currentYear);
                     if(state.weeklyPlanning[yearKey] && state.weeklyPlanning[yearKey][param1] && state.weeklyPlanning[yearKey][param1][param2]) {
                         state.weeklyPlanning[yearKey][param1][param2] = state.weeklyPlanning[yearKey][param1][param2].map(g => String(g.id) === String(id) ? { ...g, text: val } : g);
                     }
                }
            }
            state.editing = null; saveData();
        }
        function setState(key, value) { state[key] = value; saveData(); }
        function setTheme(themeId) { const theme = themes.find(t => t.id === themeId); if (theme) { state.theme = theme; saveData(); } }
        function toggleDailyTodo(id) { state.todos.daily = state.todos.daily.map(t => String(t.id) === String(id) ? { ...t, completed: !t.completed } : t); saveData(); }
        function deleteDailyTodo(id) { state.todos.daily = state.todos.daily.filter(t => String(t.id) !== String(id)); saveData(); }
        function addDailyTodo(e) { e.preventDefault(); const input = document.getElementById('daily-todo-input'); const text = input.value.trim(); if (!text) return; state.todos.daily.push({ id: Date.now().toString(), text, completed: false, date: getTodayStr() }); focusTargetId = 'daily-todo-input'; saveData(); }
        function addTomorrowTodo(e) { e.preventDefault(); const input = document.getElementById('tomorrow-todo-input'); const text = input.value.trim(); if (!text) return; state.todos.daily.push({ id: Date.now().toString(), text, completed: false, date: getTomorrowStr() }); focusTargetId = 'tomorrow-todo-input'; saveData(); }
        function toggleMonthlyGoal(monthIdx, id) { const yearKey = String(state.currentYear); if(!state.monthlyGoals[yearKey]) state.monthlyGoals[yearKey] = {}; if(!state.monthlyGoals[yearKey][monthIdx]) return; state.monthlyGoals[yearKey][monthIdx] = state.monthlyGoals[yearKey][monthIdx].map(g => String(g.id) === String(id) ? { ...g, completed: !g.completed } : g); saveData(); }
        function deleteMonthlyGoal(monthIdx, id) { const yearKey = String(state.currentYear); if(!state.monthlyGoals[yearKey] || !state.monthlyGoals[yearKey][monthIdx]) return; state.monthlyGoals[yearKey][monthIdx] = state.monthlyGoals[yearKey][monthIdx].filter(g => String(g.id) !== String(id)); saveData(); }
        function handleAddMonthlyGoal(e, monthIdx) { e.preventDefault(); const input = document.getElementById(`monthly-goal-input-${monthIdx}`); const text = input.value.trim(); if (!text) return; const yearKey = String(state.currentYear); if(!state.monthlyGoals[yearKey]) state.monthlyGoals[yearKey] = {}; if(!state.monthlyGoals[yearKey][monthIdx]) state.monthlyGoals[yearKey][monthIdx] = []; state.monthlyGoals[yearKey][monthIdx].push({ id: Date.now().toString(), text, completed: false }); focusTargetId = `monthly-goal-input-${monthIdx}`; saveData(); }
        function toggleWeeklyTodo(monthIdx, weekKey, id) { const yearKey = String(state.currentYear); if(!state.weeklyPlanning[yearKey]) return; if(!state.weeklyPlanning[yearKey][monthIdx]) return; if(!state.weeklyPlanning[yearKey][monthIdx][weekKey]) return; state.weeklyPlanning[yearKey][monthIdx][weekKey] = state.weeklyPlanning[yearKey][monthIdx][weekKey].map(g => String(g.id) === String(id) ? { ...g, completed: !g.completed } : g); saveData(); }
        function handleAddWeeklyTodo(e, weekKey) { e.preventDefault(); const input = document.getElementById(`weekly-todo-input-${weekKey}`); const text = input.value.trim(); if(!text) return; const yearKey = String(state.currentYear); const monthIdx = state.selectedMonth; if(!state.weeklyPlanning[yearKey]) state.weeklyPlanning[yearKey] = {}; if(!state.weeklyPlanning[yearKey][monthIdx]) state.weeklyPlanning[yearKey][monthIdx] = {}; if(!state.weeklyPlanning[yearKey][monthIdx][weekKey]) state.weeklyPlanning[yearKey][monthIdx][weekKey] = []; state.weeklyPlanning[yearKey][monthIdx][weekKey].push({ id: Date.now().toString(), text, completed: false }); focusTargetId = `weekly-todo-input-${weekKey}`; saveData(); }
        function deleteWeeklyTodo(monthIdx, weekKey, id) { const yearKey = String(state.currentYear); if(!state.weeklyPlanning[yearKey]) return; if(!state.weeklyPlanning[yearKey][monthIdx]) return; state.weeklyPlanning[yearKey][monthIdx][weekKey] = state.weeklyPlanning[yearKey][monthIdx][weekKey].filter(g => String(g.id) !== String(id)); saveData(); }
        function toggleHealthCheck(id) { state.healthChecklist = state.healthChecklist.map(i => String(i.id) === String(id) ? { ...i, completed: !i.completed } : i); saveData(); }
        function deleteHealthCheck(id) { state.healthChecklist = state.healthChecklist.filter(i => String(i.id) !== String(id)); saveData(); }
        function addHealthCheck(e) { e.preventDefault(); const input = document.getElementById('health-input'); const text = input.value.trim(); if(!text) return; state.healthChecklist.push({ id: Date.now().toString(), text, completed: false, icon: 'plus' }); focusTargetId = 'health-input'; saveData(); }
        function updateRoutine(index, field, value) { state.routine[index][field] = value; saveData(); }
        function deleteRoutine(index) { state.routine = state.routine.filter((_, i) => i != index); saveData(); }
        function addRoutine() { state.routine.push({ id: Date.now().toString(), time: '00:00', task: '', detail: '' }); saveData(); }
        function updateWeight(val) { state.currentWeight = Number(val); saveData(); }
        function updateWeightGoal(val) { state.weightGoal = Number(val); saveData(); }
        function toggleRoutine(id) { state.routine = state.routine.map(item => String(item.id) === String(id) ? { ...item, completed: !item.completed } : item ); saveData(); }
        function toggleDayFinish() { state.dayFinished = !state.dayFinished; saveData(); }

        // --- Drag and Drop ---
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev, type, sourceKey, id) { ev.dataTransfer.setData("text/plain", JSON.stringify({ type: type, sourceKey: sourceKey, id: id })); ev.target.classList.add('dragging'); }
        function dropItem(ev, targetType, targetKey) { ev.preventDefault(); ev.currentTarget.classList.remove('drag-over'); const dataStr = ev.dataTransfer.getData("text/plain"); if (!dataStr) return; const data = JSON.parse(dataStr); const sourceItem = findAndRemoveItem(data.type, data.sourceKey, data.id); if (sourceItem) { addItemToTarget(sourceItem, targetType, targetKey); saveData(); } }
        function findAndRemoveItem(type, sourceKey, id) { const yearKey = String(state.currentYear); let item = null; if (type === 'monthly') { if (state.monthlyGoals[yearKey] && state.monthlyGoals[yearKey][sourceKey]) { const idx = state.monthlyGoals[yearKey][sourceKey].findIndex(g => String(g.id) === String(id)); if (idx > -1) { item = state.monthlyGoals[yearKey][sourceKey][idx]; state.monthlyGoals[yearKey][sourceKey].splice(idx, 1); } } } else if (type === 'weekly') { const monthIdx = state.selectedMonth; if (state.weeklyPlanning[yearKey] && state.weeklyPlanning[yearKey][monthIdx] && state.weeklyPlanning[yearKey][monthIdx][sourceKey]) { const idx = state.weeklyPlanning[yearKey][monthIdx][sourceKey].findIndex(g => String(g.id) === String(id)); if (idx > -1) { item = state.weeklyPlanning[yearKey][monthIdx][sourceKey][idx]; state.weeklyPlanning[yearKey][monthIdx][sourceKey].splice(idx, 1); } } } return item; }
        function addItemToTarget(item, targetType, targetKey) { const yearKey = String(state.currentYear); if (targetType === 'monthly') { if (!state.monthlyGoals[yearKey]) state.monthlyGoals[yearKey] = {}; if (!state.monthlyGoals[yearKey][targetKey]) state.monthlyGoals[yearKey][targetKey] = []; state.monthlyGoals[yearKey][targetKey].push(item); } else if (targetType === 'weekly') { const monthIdx = state.selectedMonth; if (!state.weeklyPlanning[yearKey]) state.weeklyPlanning[yearKey] = {}; if (!state.weeklyPlanning[yearKey][monthIdx]) state.weeklyPlanning[yearKey][monthIdx] = {}; if (!state.weeklyPlanning[yearKey][monthIdx][targetKey]) state.weeklyPlanning[yearKey][monthIdx][targetKey] = []; state.weeklyPlanning[yearKey][monthIdx][targetKey].push(item); } }

        // --- Data Management (Export/Import) ---
        function exportData() { 
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state)); 
            const downloadAnchorNode = document.createElement('a'); 
            downloadAnchorNode.setAttribute("href", dataStr); 
            downloadAnchorNode.setAttribute("download", "writer_diary_backup_" + new Date().toISOString().slice(0, 10) + ".json"); 
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click(); 
            downloadAnchorNode.remove(); 
            showToast("백업 데이터 다운로드를 시작합니다.");
        }
        function importData(input) { 
            const file = input.files[0]; 
            if (!file) return; 
            const reader = new FileReader(); 
            reader.onload = function(e) { 
                try { 
                    const content = e.target.result; 
                    const parsedData = JSON.parse(content); 
                    if (!parsedData.currentYear || !parsedData.routine) { 
                        showToast("올바르지 않은 데이터 파일입니다.", true); 
                        return; 
                    } 
                    if (parsedData.themeId) { 
                        const theme = themes.find(t => t.id === parsedData.themeId); 
                        if(theme) parsedData.theme = theme; 
                    } else { 
                        parsedData.theme = themes[0]; 
                    } 
                    state = parsedData;
                    saveData();
                    showToast("데이터 복원이 완료되었습니다."); 
                } catch (err) { 
                    console.error(err); 
                    showToast("파일을 읽는 중 오류가 발생했습니다.", true); 
                } 
            }; 
            reader.readAsText(file); 
        }
        
        // --- Notifications ---
        function requestNotificationPermission() { 
            if (!("Notification" in window)) { 
                showToast("이 브라우저는 알림을 지원하지 않습니다.", true); 
                return; 
            } 
            Notification.requestPermission().then(permission => { 
                if (permission === "granted") { 
                    showToast("알림 권한이 허용되었습니다! 루틴 시간에 맞춰 알려드릴게요."); 
                    new Notification("Writer Diary", { body: "알림 테스트: 성공적으로 설정되었습니다!" }); 
                } else { 
                    showToast("알림 권한이 거부되었습니다.", true); 
                } 
            }); 
        }
        function checkRoutineTime() { 
            if (Notification.permission !== "granted") return; 
            const now = new Date(); 
            const currentTime = now.toTimeString().slice(0, 5); 
            if (lastNotifiedTime === currentTime) return; 
            const matchingRoutines = state.routine.filter(r => r.time === currentTime); 
            matchingRoutines.forEach(routine => { 
                new Notification(`작업 알림: ${routine.time}`, { body: `${routine.task}\n${routine.detail}`, icon: 'https://cdn-icons-png.flaticon.com/512/2693/2693507.png' }); 
                lastNotifiedTime = currentTime; 
            }); 
        }

        // --- Init ---
        // 비동기로 데이터를 불러오고 완료 시 render() 호출
        loadData(); 
        setInterval(checkRoutineTime, 30000);
    </script>
</body>
</html>
