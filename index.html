function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function lighten(hex,amt){
  var c=hexToRgb(hex);
  var r=Math.min(255,Math.round(c.r+(255-c.r)*amt));
  var g=Math.min(255,Math.round(c.g+(255-c.g)*amt));
  var b=Math.min(255,Math.round(c.b+(255-c.b)*amt));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function darken(hex,amt){
  var c=hexToRgb(hex);
  var r=Math.max(0,Math.round(c.r*(1-amt)));
  var g=Math.max(0,Math.round(c.g*(1-amt)));
  var b=Math.max(0,Math.round(c.b*(1-amt)));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function setCustomThemeVars(hex){
  var root=document.documentElement.style;
  root.setProperty('--ct-light', lighten(hex,0.35));
  root.setProperty('--ct-lighter', lighten(hex,0.55));
  root.setProperty('--ct-mid', lighten(hex,0.2));
  root.setProperty('--ct-border', lighten(hex,0.1));
  root.setProperty('--ct-border2', hex);
  root.setProperty('--ct-dark', darken(hex,0.25));
}

function applyTheme(t){
  var validThemes = ['sky','sand','lightBeige','lightGray','coral','mint','cream','ocean','lilac','peach','charcoal','crumple','custom'];
  if(!validThemes.includes(t)) t = 'sky';

  var cls='theme-'+t;
  if(t==='custom'){
    var hex=S.customThemeColor||'#F9D0CD';
    setCustomThemeVars(hex);
    var root2=document.documentElement.style;
    root2.setProperty('--bg','var(--ct-light)');
    root2.setProperty('--s2','var(--ct-lighter)');
    root2.setProperty('--s3','var(--ct-mid)');
    root2.setProperty('--border','var(--ct-border)');
    root2.setProperty('--border2','var(--ct-border2)');
    root2.setProperty('--accent','var(--ct-dark)');
    root2.setProperty('--al','var(--ct-lighter)');
  } else {
    var root3=document.documentElement.style;
    ['--bg','--s2','--s3','--border','--border2','--accent','--al'].forEach(function(v){root3.removeProperty(v);});
  }
  
  var f=S.font||'pretendard';
  if(f!=='pretendard') cls+=' font-'+f;
  document.body.className=cls;

  // Noto Serif KR Google Font 동적 로드
  if(f==='notoserif' && !document.getElementById('notoserif-font')){
    var link=document.createElement('link');
    link.id='notoserif-font';
    link.rel='stylesheet';
    link.href='https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap';
    document.head.appendChild(link);
  }

  var fontMap={
    pretendard:"'Pretendard','Apple SD Gothic Neo',sans-serif",
    serif:"'Instrument Serif',Georgia,serif",
    notoserif:"'Noto Serif KR','Nanum Myeongjo',serif",
    nanummyeongjo:"'Nanum Myeongjo',serif",
    nanumpen:"'Nanum Pen Script',cursive",
    sunflower:"'Sunflower','Pretendard',sans-serif",
    himelody:"'Hi Melody',cursive",
    stylish:"'Stylish','Pretendard',sans-serif",
    custom1: S.customFonts&&S.customFonts[0] ? "'UserFont1',sans-serif" : "'Pretendard',sans-serif",
    custom2: S.customFonts&&S.customFonts[1] ? "'UserFont2',sans-serif" : "'Pretendard',sans-serif",
  };
  var chosen = fontMap[f] || fontMap.pretendard;
  var root = document.documentElement.style;
  root.setProperty('--sans', chosen);

  // 로고 글씨체 적용
  var logoFontMap={
    montserrat:"'Montserrat','Pretendard',sans-serif",
    dancing:"'Dancing Script',cursive",
    sacramento:"'Sacramento',cursive",
    allura:"'Allura',cursive",
    kaushan:"'Kaushan Script',cursive"
  };
  root.setProperty('--logo-font', logoFontMap[S.logoFont||'montserrat']||logoFontMap.montserrat);
  // 로고 italic/size 보정 (필기체는 italic 해제). 헤더 높이 고정이라 크기 늘어도 안 넘침
  (function(){
    var lg=document.querySelector('.logo');
    if(lg){
      var sc=(S.logoFont&&S.logoFont!=='montserrat');
      lg.style.fontStyle=sc?'normal':'italic';
      lg.style.fontSize=sc?'1.75em':'1.4em';
    }
  })();
  
  var fs = S.fontSize || 14;
  
  // ★ 핵심 폰트 상속 로직 변경: 
  // 영문/숫자에 강제 적용되던 별도 폰트(Geist Mono, Instrument Serif)를 해제하고,

function syncRzToRoutines(){
  (S.projects||[]).forEach(function(p){
    (p.routinized||[]).forEach(function(entry){
      var exists = S.routines.some(function(r){ return r.id === entry.id; });
      if(!exists){
        S.routines.push({
          id: entry.id,
          time: entry.time||'00:00',
          task: entry.task,
          detail: p.name+' 루틴화',
          days: entry.days||[],
          monthDays: entry.monthDays||[],
          isMonthly: !!entry.isMonthly,
          saveAmount: entry.saveAmount||0,
          isRz: true,
          rzProjectId: p.id
        });
      } else {
        // 기존 루틴에 saveAmount 등 최신 정보 반영
        S.routines.forEach(function(r){
          if(r.id===entry.id){
            r.saveAmount=entry.saveAmount||0;
            r.monthDays=entry.monthDays||[];
            r.isMonthly=!!entry.isMonthly;
          }
        });
      }
    });
  });
  S.routines = S.routines.filter(function(r){
    if(!r.isRz) return true;
    return (S.projects||[]).some(function(p){
      return (p.routinized||[]).some(function(e){ return e.id === r.id; });
    });
  });
  S.routines.sort(function(a,b){ return a.time.localeCompare(b.time); });
}

function fmtMoney(n){if(!n&&n!==0)return '0원';return new Intl.NumberFormat('ko-KR').format(Math.round(n))+'원';}

function openYearlyDashboard(year){
  let totalInc=0,totalExp=0,totalSav=0;
  const incCats={},expCats={};
  (LD.fixedItems||[]).forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input'){
      const amt=Number(fi.amount)||0;
      totalExp+=amt*12;
      if(!expCats['고정 지출'])expCats['고정 지출']={total:0,subs:{}};
      expCats['고정 지출'].total+=amt*12;
      expCats['고정 지출'].subs[fi.title||'고정']=(expCats['고정 지출'].subs[fi.title||'고정']||0)+amt*12;
    }
  });
  (LD.transactions||[]).forEach(function(tx){
    if(!tx.date.startsWith(year+'-'))return;
    if(tx.type==='income'){
      totalInc+=tx.amount;
      if(!incCats[tx.majorCategory])incCats[tx.majorCategory]={total:0,subs:{}};
      incCats[tx.majorCategory].total+=tx.amount;
      const s=tx.minorCategory||'기타';
      incCats[tx.majorCategory].subs[s]=(incCats[tx.majorCategory].subs[s]||0)+tx.amount;
    } else if(tx.type==='expense'){
      totalExp+=tx.amount;
      if(!expCats[tx.majorCategory])expCats[tx.majorCategory]={total:0,subs:{}};
      expCats[tx.majorCategory].total+=tx.amount;
      const s=tx.minorCategory||'기타';
      expCats[tx.majorCategory].subs[s]=(expCats[tx.majorCategory].subs[s]||0)+tx.amount;
    }
  });
  (S.savings&&S.savings.entries||[]).forEach(function(e){
    if(e.date&&e.date.startsWith(year+'-'))totalSav+=e.amount||0;
  });
  function catRows(map,color){
    return Object.entries(map).sort((a,b)=>b[1].total-a[1].total).map(function([major,data]){
      let r='<div style="margin-bottom:10px">';
      r+='<div style="display:flex;justify-content:space-between;font-size:0.9em;font-weight:600;padding:4px 0;border-bottom:1px solid var(--border)"><span>'+major+'</span><span style="color:'+color+'">'+fmtMoney(data.total)+'</span></div>';
      Object.entries(data.subs).sort((a,b)=>b[1]-a[1]).forEach(function([sub,amt]){
        r+='<div style="display:flex;justify-content:space-between;font-size:0.78em;color:var(--t3);padding-left:10px;margin-top:2px"><span>'+sub+'</span><span>'+fmtMoney(amt)+'</span></div>';
      });
      return r+'</div>';
    }).join('');
  }
  const body=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">연간 총 수입</div><div style="font-size:1.3em;font-weight:700;color:var(--green)">'+fmtMoney(totalInc)+'</div></div>'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">연간 총 지출</div><div style="font-size:1.3em;font-weight:700;color:var(--red)">'+fmtMoney(totalExp)+'</div></div>'+
    '<div style="text-align:center;padding:16px;background:var(--s2);border-radius:12px"><div style="font-size:0.78em;color:var(--t3);margin-bottom:4px">연간 저축</div><div style="font-size:1.3em;font-weight:700;color:var(--accent)">'+fmtMoney(totalSav)+'</div></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'+
    '<div><div style="font-size:0.88em;font-weight:600;color:var(--t2);margin-bottom:10px">💚 수입</div>'+catRows(incCats,'var(--green)')+'</div>'+

    '</div>';
  openMo(year+'년 연간 대시보드',body,'<button class=\"btn bg\" onclick=\"closeMo()\">닫기</button>');

function ledgerPrevMonth(){if(ledgerMonth===0){ledgerMonth=11;ledgerYear--;}else ledgerMonth--;render();}

function renderLedgerDashboard(){
  const ym=ledgerYear+'-'+String(ledgerMonth+1).padStart(2,'0');
  const prevYm=ledgerMonth===0?(ledgerYear-1)+'-12':(ledgerYear)+'-'+String(ledgerMonth).padStart(2,'0');
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let curInc=0,curExp=0,prevExp=0;

  // 카테고리별 지출 (먼저 선언)
  const catMap={};

  // 고정 지출 이번달 합산
  const fixedItems=LD.fixedItems||[];
  fixedItems.forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input'){
      const amt=Number(fi.amount)||0;
      curExp+=amt;
      const major=fi.majorCategory||'고정 지출';
      catMap[major]=(catMap[major]||0)+amt;
    }
  });
  (LD.transactions||[]).forEach(function(tx){
    const txYm=tx.date.slice(0,7);
    if(txYm===ym){
      if(tx.type==='income')curInc+=tx.amount;
      else if(tx.type==='expense'){
        curExp+=tx.amount;
        catMap[tx.majorCategory]=(catMap[tx.majorCategory]||0)+tx.amount;
      }
    }
    if(txYm===prevYm&&tx.type==='expense')prevExp+=tx.amount;
  });
  const diff=curExp-prevExp;
  const diffPct=prevExp===0?0:(diff/prevExp*100);
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  // 예산 진행
  const totalBudget=Object.values(LD.budgets||{}).reduce((a,b)=>a+(b||0),0);
  const budgetedCats=Object.keys((LD.categories||{}).expense||{}).filter(c=>!c.includes('저축')&&!c.includes('투자'));
  const totalSpent=budgetedCats.reduce((a,c)=>a+(catMap[c]||0),0);
  const totalPct=totalBudget===0?0:Math.min(100,Math.round(totalSpent/totalBudget*100));

  // 12개월 흐름
  let monthBars='';
  const maxVal=Math.max(1,...Array.from({length:12},(_,i)=>{
    const k=ledgerYear+'-'+String(i+1).padStart(2,'0');

    (LD.transactions||[]).forEach(function(tx){if(tx.date.slice(0,7)===k){if(tx.type==='income')inc+=tx.amount;else if(tx.type==='expense')exp+=tx.amount;}});
    return Math.max(inc,exp);
  }));
  for(let i=0;i<12;i++){
    const k=ledgerYear+'-'+String(i+1).padStart(2,'0');
    let inc=0,exp=0;
    (LD.transactions||[]).forEach(function(tx){if(tx.date.slice(0,7)===k){if(tx.type==='income')inc+=tx.amount;else if(tx.type==='expense')exp+=tx.amount;}});
    const isCur=(i===ledgerMonth);
    const tipTxt=MN[i]+'  수입 +'+new Intl.NumberFormat('ko-KR').format(inc)+'  지출 -'+new Intl.NumberFormat('ko-KR').format(exp);
    monthBars+='<div onclick="ledgerMonth='+i+';render()" data-tip="'+tipTxt.replace(/"/g,'&quot;')+'" onmouseover="showLedgerTip(this,event)" onmousemove="moveLedgerTip(event)" onmouseout="hideLedgerTip()" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">';

    monthBars+='</div>';
  }

  // 카테고리별 수입
  const incCatMap={}, expCatMapDetail={};
  const recent=[...(LD.transactions||[])].filter(tx=>tx.date.slice(0,7)===ym).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,8);

    html+='<div style="display:flex;justify-content:space-between;font-size:0.88em;padding:5px 0;border-bottom:1px solid var(--border)">';

  });

  // 지출 카드 — 대분류만
  html+='<div class="card" style="margin-bottom:0">';
  html+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">';
  html+='<div style="font-size:0.82em;color:var(--t3)">이번 달 지출</div>';
  html+='<div style="font-size:1.5em;font-weight:600;color:var(--red)">'+fmtMoney(curExp)+'</div></div>';

    html+='<span style="font-weight:500">'+major+'</span><span style="color:var(--red)">'+fmtMoney(data.total)+'</span></div>';
  });
  html+='</div></div>';

  // 2행: 예산진행률(왼) + 이번달 지출 대+소분류(오)
  html+='<div class="g2" style="margin-bottom:16px">';

  // 왼쪽: 예산 진행률
  if(totalBudget>0){
    html+='<div class="card" style="margin-bottom:0">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';

    html+='<div style="font-size:0.88em;color:var(--t2)">'+fmtMoney(totalSpent)+' / '+fmtMoney(totalBudget)+'</div></div>';

  html+='</div></div>';

  // 월별 흐름
  html+='<div class="card" style="margin-bottom:16px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  html+='<div class="ct"><svg width="17" height="17" viewBox="0 0 24 24" fill="var(--accent)" style="flex-shrink:0"><rect x="4" y="13" width="4" height="8" rx="1"/><rect x="10" y="3" width="4" height="18" rx="1"/><rect x="16" y="9" width="4" height="12" rx="1"/></svg>'+ledgerYear+'년 월별 흐름</div>';
  html+='<div style="display:flex;gap:12px;font-size:0.75em"><span style="color:var(--green)">■ 수입</span><span style="color:var(--accent)">■ 지출</span></div></div>';
  html+='<div style="display:flex;gap:2px;align-items:flex-end;height:80px">'+monthBars+'</div>';
  html+='</div>';

  // 최근 내역
  html+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
  html+='<div class="ct"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.3" fill="var(--accent)" stroke="none"/><circle cx="3.5" cy="12" r="1.3" fill="var(--accent)" stroke="none"/><circle cx="3.5" cy="18" r="1.3" fill="var(--accent)" stroke="none"/></svg>'+MN[ledgerMonth]+' 내역</div>';
  html+='<button class="btn bp bsm" onclick="openLedgerTxForm(\'\')">+ 추가</button></div>';
  if(recent.length===0){
    html+='<div class="empty">내역이 없어요</div>';
  } else {
    recent.forEach(function(tx){
      html+=ledgerTxRow(tx);
    });
    const total=(LD.transactions||[]).filter(tx=>tx.date.slice(0,7)===ym).length;
    if(total>8)html+='<div style="text-align:center;padding:12px 0"><button class="btn bg bsm" onclick="showAllLedgerTx(\''+ym+'\')" style="font-size:0.85em">+ '+(total-8)+'개 더 보기</button></div>';
  }
  html+='</div>';

  // tx form modal
  if(ledgerShowTxForm)html+=renderLedgerTxModal();
  return html;
}

function _ensureLedgerTip(){
  var tip=document.getElementById('ledger-cal-tip');
  if(!tip){
    tip=document.createElement('div');
    tip.id='ledger-cal-tip';
    tip.style.cssText='position:fixed;z-index:99999;pointer-events:none;display:none;background:rgba(40,40,45,0.95);color:#fff;padding:8px 11px;border-radius:8px;font-size:0.8em;line-height:1.5;white-space:pre;box-shadow:0 4px 16px rgba(0,0,0,0.25);max-width:260px';
    document.body.appendChild(tip);
  }
  return tip;
}
function showLedgerTip(el,e){
  var txt=el.getAttribute('data-tip');
  if(!txt)return;
  var tip=_ensureLedgerTip();
  tip.textContent=txt.replace(/&#10;/g,'\n').replace(/&quot;/g,'"');
  tip.style.display='block';
  moveLedgerTip(e);
}
function moveLedgerTip(e){
  var tip=document.getElementById('ledger-cal-tip');
  if(!tip||tip.style.display==='none')return;
  var x=e.clientX+14, y=e.clientY+14;
  var tw=tip.offsetWidth, th=tip.offsetHeight;
  if(x+tw>window.innerWidth-10) x=e.clientX-tw-14;
  if(y+th>window.innerHeight-10) y=e.clientY-th-14;
  tip.style.left=x+'px';
  tip.style.top=y+'px';
}
function hideLedgerTip(){
  var tip=document.getElementById('ledger-cal-tip');
  if(tip)tip.style.display='none';
}

function renderLedgerCalendar(){
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const ts=todStr();
  const first=new Date(ledgerYear,ledgerMonth,1),last=new Date(ledgerYear,ledgerMonth+1,0),sdow=first.getDay();
  const prevLast=new Date(ledgerYear,ledgerMonth,0);
  let cells=[];
  for(let i=sdow-1;i>=0;i--){const d=prevLast.getDate()-i,pm=ledgerMonth===0?11:ledgerMonth-1,py=ledgerMonth===0?ledgerYear-1:ledgerYear;cells.push({d,m:pm,y:py,cur:false});}
  for(let d=1;d<=last.getDate();d++)cells.push({d,m:ledgerMonth,y:ledgerYear,cur:true});
  const rem=42-cells.length;
  for(let d=1;d<=rem;d++){const nm=ledgerMonth===11?0:ledgerMonth+1,ny=ledgerMonth===11?ledgerYear+1:ledgerYear;cells.push({d,m:nm,y:ny,cur:false});}

  // day map (transactions + fixed items)
  const dayMap={};
  const fixedItems=LD.fixedItems||[];
  // 고정 지출을 이번 달 날짜에 매핑
  fixedItems.forEach(function(fi){
    const day=fi.day;
    const ds=ledgerYear+'-'+String(ledgerMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    if(!dayMap[ds])dayMap[ds]={inc:0,exp:0,txs:[],fixed:[]};
    dayMap[ds].fixed.push(fi);
    if(fi.amount&&fi.amount!=='req_input')dayMap[ds].exp+=fi.amount;
  });
  (LD.transactions||[]).forEach(function(tx){
    if(!dayMap[tx.date])dayMap[tx.date]={inc:0,exp:0,txs:[],fixed:[]};
    if(tx.type==='income')dayMap[tx.date].inc+=tx.amount;
    else if(tx.type==='expense')dayMap[tx.date].exp+=tx.amount;
    dayMap[tx.date].txs.push(tx);
  });

  // 이번 달 총 수입/지출 계산 (고정지출 포함)
  const ym=ledgerYear+'-'+String(ledgerMonth+1).padStart(2,'0');
  let calInc=0,calExp=0;
  // 고정 지출 합산
  (LD.fixedItems||[]).forEach(function(fi){
    if(fi.amount&&fi.amount!=='req_input') calExp+=Number(fi.amount)||0;
  });
  (LD.transactions||[]).forEach(function(tx){
    if(tx.date.slice(0,7)!==ym)return;
    if(tx.type==='income')calInc+=tx.amount;
    else if(tx.type==='expense')calExp+=tx.amount;
  });
  // 고정 지출 합계
  const fixedTotal=(LD.fixedItems||[]).reduce(function(s,fi){return s+(fi.amount&&fi.amount!=='req_input'?Number(fi.amount)||0:0);},0);

  let html='';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  html+='<div style="display:flex;align-items:center;gap:8px">';
  html+='<button class="btn bg bsm" onclick="ledgerPrevMonth()">‹</button>';
  html+='<div style="font-size:1.1em;font-weight:500;min-width:80px;text-align:center">'+ledgerYear+'년 '+MN[ledgerMonth]+'</div>';
  html+='<button class="btn bg bsm" onclick="ledgerNextMonth()">›</button>';
  html+='<span style="font-size:0.82em;color:var(--green);margin-left:8px">+'+fmtMoney(calInc)+'</span>';
  html+='<span style="font-size:0.82em;color:var(--red)">-'+fmtMoney(calExp)+'</span>';
  html+='</div>';
  html+='<button class="btn bp bsm" onclick="openLedgerTxForm(\'\')">+ 내역 추가</button></div>';

  html+='<div class="card" style="padding:12px;margin-bottom:16px">';
  html+='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="min-width:420px">';
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px">';
  ['일','월','화','수','목','금','토'].forEach(function(d,i){
    html+='<div style="text-align:center;font-size:0.72em;color:'+(i===0?'var(--red)':i===6?'var(--blue)':'var(--t3)')+';padding:4px 0;font-weight:500">'+d+'</div>';
  });
  html+='</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  cells.forEach(function(cell,idx){
    const ds=cell.y+'-'+String(cell.m+1).padStart(2,'0')+'-'+String(cell.d).padStart(2,'0');
    const isT=ds===ts;
    const di=dayMap[ds]||{inc:0,exp:0,fixed:[]};
    const dow=idx%7;
    const textColor=isT?'var(--accent)':!cell.cur?'var(--t3)':dow===0?'var(--red)':dow===6?'var(--blue)':'var(--text)';
    const hasPending=(di.fixed||[]).some(f=>!f.amount||f.amount==='req_input');
    // 툴팁용 내역 텍스트 생성
    var tipLines=[];
    (di.txs||[]).forEach(function(tx){
      var sign=tx.type==='income'?'+':'-';
      var label=tx.memo||tx.minorCategory||tx.majorCategory||'';
      tipLines.push(sign+new Intl.NumberFormat('ko-KR').format(tx.amount)+'  '+label);
    });
    (di.fixed||[]).forEach(function(fi){
      var amt=(!fi.amount||fi.amount==='req_input')?'금액미정':'-'+new Intl.NumberFormat('ko-KR').format(fi.amount);
      tipLines.push(amt+'  '+(fi.memo||'')+' (고정)');
    });
    var tipAttr=tipLines.length>0?' data-tip="'+tipLines.join('&#10;').replace(/"/g,'&quot;')+'"':'';
    html+='<div class="ledger-cal-cell" onclick="openLedgerDayModal(\''+ds+'\')"'+tipAttr+' style="position:relative;min-height:90px;border-radius:6px;padding:4px 5px;background:'+(isT?'var(--al)':'transparent')+';border:1px solid '+(isT?'var(--accent)':'var(--border)')+';cursor:pointer;transition:background .1s" onmouseover="this.style.background=\'var(--s2)\';showLedgerTip(this,event)" onmousemove="moveLedgerTip(event)" onmouseout="this.style.background=\''+(isT?'var(--al)':'transparent')+'\';hideLedgerTip()">';
    html+='<div style="font-size:0.75em;font-weight:'+(isT?'700':'500')+';color:'+textColor+';text-align:right;margin-bottom:2px">'+cell.d+(hasPending?'<span style="color:var(--accent);margin-left:2px">·</span>':'')+'</div>';
    if(di.inc>0)html+='<div style="text-align:right;margin-bottom:2px"><span style="display:inline-block;font-size:0.78em;color:#fff;background:var(--green);padding:1px 6px;border-radius:99px;font-weight:600">+'+new Intl.NumberFormat('ko-KR').format(di.inc)+'</span></div>';
    if(di.exp>0)html+='<div style="text-align:right"><span style="display:inline-block;font-size:0.78em;color:#fff;background:var(--red);padding:1px 6px;border-radius:99px;font-weight:600">-'+new Intl.NumberFormat('ko-KR').format(di.exp)+'</span></div>';
    html+='</div>';
  });
  html+='</div></div></div></div>';

  // 고정 지출 등록 섹션
  html+='<div class="card">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
  html+='<div style="display:flex;align-items:center;gap:10px"><div class="ct"><svg width="17" height="17" viewBox="0 0 24 24" fill="var(--accent)" style="flex-shrink:0"><path d="M8 2a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h5v4a1 1 0 0 0 2 0v-4h5a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4z"/></svg>고정 지출 관리</div>';
  if(fixedTotal>0)html+='<span style="font-size:0.88em;color:var(--red);font-weight:500">월 합계 -'+fmtMoney(fixedTotal)+'</span>';
  html+='</div>';
  html+='<button class="btn bp bsm" onclick="openLedgerFixedForm()">+ 등록</button></div>';
  if(fixedItems.length===0){
    html+='<div class="empty">고정 지출을 등록하면 매달 달력에 표시돼요</div>';
  } else {
    fixedItems.forEach(function(fi,i){
      const needInput=!fi.amount||fi.amount==='req_input';
      html+='<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">';
      html+='<div style="min-width:36px;text-align:center;background:var(--s2);border-radius:6px;padding:3px 6px;font-size:0.82em;font-weight:500">'+fi.day+'일</div>';
      html+='<div style="flex:1">';
      html+='<div style="font-size:0.9em">'+fi.memo+'</div>';
      html+='<div style="font-size:0.78em;color:var(--t3)">'+fi.majorCategory+' · '+fi.minorCategory+'</div></div>';
      html+='<div style="font-size:0.88em;font-weight:500;color:'+(needInput?'var(--accent)':'var(--text)')+'">'+
        (needInput?'<span style="background:var(--al);color:var(--accent);padding:2px 7px;border-radius:99px;font-size:0.9em">금액 미정</span>':'-'+fmtMoney(fi.amount))+'</div>';
      html+='<button class="bi" onclick="deleteLedgerFixed('+i+')" style="font-size:0.8em;color:var(--red)">✕</button>';
      html+='</div>';
    });
  }
  html+='</div>';

  if(ledgerShowTxForm)html+=renderLedgerTxModal();
  return html;
}

function deleteLedgerFixed(i){if(!confirm('삭제할까요?'))return;(LD.fixedItems||[]).splice(i,1);saveLedger();render();}
function changeLedgerFixedMajor(major){
  const cats=LD.categories||defaultLedgerCategories;
  const minors=(cats.expense||{})[major]||[];
  const sel=document.getElementById('lf-minor');
  if(sel)sel.innerHTML=minors.map(m=>'<option>'+m+'</option>').join('');
}
function addLedgerAssetCat(type){
  const id=type==='asset'?'new-asset-cat':'new-liab-cat';
  const el=document.getElementById(id); if(!el||!el.value.trim())return;
  if(type==='asset'){if(!LD.assetCats)LD.assetCats=['현금/입출금','예적금','주식/펀드','부동산','기타'];if(!LD.assetCats.includes(el.value.trim()))LD.assetCats.push(el.value.trim());}
  else{if(!LD.liabCats)LD.liabCats=['대출','신용카드값','할부','보증금 대출','기타'];if(!LD.liabCats.includes(el.value.trim()))LD.liabCats.push(el.value.trim());}
  saveLedger();render();
}
function saveLedgerFixed(){
  const day=parseInt(document.getElementById('lf-day').value);
  const acc=document.getElementById('lf-acc')?document.getElementById('lf-acc').value:'';
  const major=document.getElementById('lf-major')?document.getElementById('lf-major').value:'';
  const minor=document.getElementById('lf-minor')?document.getElementById('lf-minor').value:'';
  const amtVal=document.getElementById('lf-amt')?document.getElementById('lf-amt').value.trim():'';
  const memo=(document.getElementById('lf-memo')?document.getElementById('lf-memo').value.trim():'')||major||'고정 지출';
  if(!day||isNaN(day)||day<1||day>31)return;
  const amount=amtVal?parseInt(amtVal,10):'req_input';
  if(!LD.fixedItems)LD.fixedItems=[];
  LD.fixedItems.push({id:gid(),day,type:'expense',account:acc,majorCategory:major,minorCategory:minor,amount,memo});
  LD.fixedItems.sort((a,b)=>a.day-b.day);
  saveLedger();
  const ov=document.getElementById('ledger-fixed-overlay'); if(ov)ov.remove();
  render();
}
function deleteLedgerAssetCat(type,cat){
  if(type==='asset'){if(!LD.assetCats)LD.assetCats=['현금/입출금','예적금','주식/펀드','부동산','기타'];LD.assetCats=LD.assetCats.filter(c=>c!==cat);}
  else{if(!LD.liabCats)LD.liabCats=['대출','신용카드값','할부','보증금 대출','기타'];LD.liabCats=LD.liabCats.filter(c=>c!==cat);}
  saveLedger();render();
}
function updateLedgerAssetCats(type){
  const sel=document.getElementById('la-cat'); if(!sel)return;
  const list=type==='liability'?(LD.liabCats||['대출','신용카드값','할부','보증금 대출','기타']):(LD.assetCats||['현금/입출금','예적금','주식/펀드','부동산','기타']);
  sel.innerHTML=list.map(c=>'<option>'+c+'</option>').join('');
}
function saveLedgerAsset(){
  const type=document.getElementById('la-type').value;
  const cat=document.getElementById('la-cat').value;
  const name=document.getElementById('la-name').value.trim();
  const amt=parseInt(document.getElementById('la-amt').value)||0;
  const rate=parseFloat(document.getElementById('la-rate').value)||0;
  const mat=document.getElementById('la-mat').value;
  if(!name)return;
  if(!LD.assets)LD.assets=[];
  LD.assets.push({id:gid(),type,category:cat,name,amount:amt,interestRate:rate,maturityDate:mat});
  saveLedger();
  const ov=document.getElementById('ledger-asset-overlay'); if(ov)ov.remove();
  render();
}
function deleteLedgerAsset(id){if(!confirm('삭제할까요?'))return;LD.assets=(LD.assets||[]).filter(a=>a.id!==id);saveLedger();render();}

async function loadRoyaltyFromFirebase(){
  const statusEl=document.getElementById('royalty-status');
  if(statusEl)statusEl.textContent='불러오는 중...';
  try{
    // 로그인된 사용자 토큰으로 요청
    const user=auth.currentUser;
    if(!user)throw new Error('로그인 필요');
    const token=await user.getIdToken();
    const url='https://firestore.googleapis.com/v1/projects/writer-routine/databases/(default)/documents/royalty/latest';
    const res=await fetch(url,{headers:{Authorization:'Bearer '+token}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    const raw=json.fields&&json.fields.data&&json.fields.data.stringValue;
    if(!raw)throw new Error('데이터 없음');
    const royalty=JSON.parse(raw);
    showRoyaltyImportModal(royalty);
    if(statusEl)statusEl.textContent='';
  }catch(e){
    if(statusEl)statusEl.textContent='❌ 불러오기 실패: '+e.message;
  }
}

function showRoyaltyImportModal(royalty){
  const months=Object.keys(royalty).sort().reverse().slice(0,12);
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let monthOpts=months.map(m=>'<option value="'+m+'">'+m+'</option>').join('');
  let html='<div class="fg"><label class="fl">가져올 월 선택</label><select class="sel" id="roy-month" onchange="previewRoyalty(this.value)">'+monthOpts+'</select></div>';
  html+='<div id="roy-preview" style="margin-top:10px"></div>';

  openMo('📥 인세 정산 가져오기', html,
    '<button class="btn bg" onclick="closeMo()">취소</button>'+
    '<button class="btn bp" onclick="importRoyaltyMonth()">수입으로 등록</button>');

function previewRoyalty(ym){

  const prev=document.getElementById('roy-preview');
  if(!prev)return;
  let html='<div style="font-size:0.82em;color:var(--t3);margin-bottom:8px">등록될 수입 내역 (출판사별 입금일에 등록)</div>';
  let total=0;
  items.forEach(function(item){
    const day=item.paymentDay==='말일'?'말일':item.paymentDay?item.paymentDay+'일':'?';
    html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.88em">';
    html+='<span><span style="color:var(--t3);margin-right:6px">'+day+'</span>'+item.publisher+'</span>';
    html+='<span style="font-weight:500">'+new Intl.NumberFormat('ko-KR').format(item.amount)+'원</span>';

function importRoyaltyMonth(){
  const sel=document.getElementById('roy-month');
  if(!sel)return;
  const ym=sel.value;
  const royalty=window._royaltyData;
  if(!royalty||!royalty[ym])return;
  const items=royalty[ym];
  const [year,month]=ym.split('-').map(Number);

  let added=0, updated=0;
  items.forEach(function(item){
    // 입금일 계산
    let day=15;
    if(item.paymentDay==='말일'||item.paymentDay==='말'){
      day=new Date(year,month,0).getDate();
    } else if(item.paymentDay){
      day=parseInt(item.paymentDay)||15;
    }
    const dateStr=year+'-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');

    if(!LD.transactions)LD.transactions=[];

    // 같은 달 같은 출판사 정산이 있으면 금액/날짜 업데이트, 없으면 새로 추가
    const dupIdx=(LD.transactions).findIndex(function(t){
      return t.date.slice(0,7)===ym&&t.memo&&t.memo.includes(item.publisher)&&t._royalty;
    });
    if(dupIdx>-1){
      const existing=LD.transactions[dupIdx];
      if(existing.amount!==item.amount||existing.date!==dateStr){
        LD.transactions[dupIdx]=Object.assign({},existing,{amount:item.amount,date:dateStr});
        updated++;
      }
      return;
    }

    LD.transactions.push({
      id:gid(),
      type:'income',
      date:dateStr,
      account:(LD.accounts&&LD.accounts[0])||'사업용 기업은행',
      majorCategory:'인세 수익',
      minorCategory:item.publisher,
      amount:item.amount,
      memo:item.publisher+' '+ym.replace('-','년 ')+'월 정산',
      _royalty:true
    });
    added++;
  });

  // 카테고리에 출판사 소분류 자동 추가
  if(!LD.categories)LD.categories=JSON.parse(JSON.stringify(defaultLedgerCategories));
  if(!LD.categories.income)LD.categories.income={'인세 수익':[],'기타 수익':['외주/강연','이자/투자','기타']};
  if(!LD.categories.income['인세 수익'])LD.categories.income['인세 수익']=[];
  items.forEach(function(item){
    if(!LD.categories.income['인세 수익'].includes(item.publisher)){
      LD.categories.income['인세 수익'].push(item.publisher);
    }
  });

  LD.transactions.sort((a,b)=>b.date.localeCompare(a.date));
  saveLedger();
  closeMo();
  ledgerTab='dashboard';
  var msg=[];
  if(added>0) msg.push(added+'건 새로 등록');
  if(updated>0) msg.push(updated+'건 금액/날짜 업데이트');
  if(msg.length===0) msg.push('변경된 내용이 없어요');
  alert('정산 완료! '+msg.join(', ')+' 🎉');
  render();
}

function addLedgerAccount(){const v=document.getElementById('new-acc').value.trim();if(!v)return;if(!LD.accounts)LD.accounts=[];if(!LD.accounts.includes(v))LD.accounts.push(v);saveLedger();render();}

    const div=el.nextElementSibling;
    const on=el.value===v;
    div.style.background=on?'var(--surface)':'transparent';
    div.style.color=on?'var(--accent)':'var(--t2)';
    div.style.boxShadow=on?'var(--sh)':'none';
  });
  const cats=LD.categories||defaultLedgerCategories;
  const majors=Object.keys(cats[v]||{});
  const majorSel=document.getElementById('otx-major');
  if(majorSel){
    majorSel.innerHTML=majors.map(m=>'<option>'+m+'</option>').join('');
    _ltxMajorChange(majors[0]||'');
  }
}
function _ltxMajorChange(major){
  const typeSel=document.querySelector('[name="otx-type"]:checked');
  const type=typeSel?typeSel.value:'expense';
  const cats=LD.categories||defaultLedgerCategories;
  const minors=(cats[type]||{})[major]||[];
  const minorSel=document.getElementById('otx-minor');
  if(minorSel)minorSel.innerHTML=minors.map(m=>'<option>'+m+'</option>').join('');
}
function _ltxSave(editId){
  const typeSel=document.querySelector('[name="otx-type"]:checked');
  const type=typeSel?typeSel.value:'expense';
  const y=document.getElementById('otx-y').value;
  const m=document.getElementById('otx-m').value;
  const d=document.getElementById('otx-d').value;
  const date=y+'-'+m+'-'+d;
  const acc=document.getElementById('otx-acc').value;
  const major=document.getElementById('otx-major').value;
  const minor=document.getElementById('otx-minor').value;
  const amt=parseInt(document.getElementById('otx-amt').value)||0;
  const memo=document.getElementById('otx-memo').value;
  if(!date||!amt)return;
  if(!LD.transactions)LD.transactions=[];
  if(editId){
    LD.transactions=LD.transactions.map(t=>t.id===editId?Object.assign({},t,{type,date,account:acc,majorCategory:major,minorCategory:minor,amount:amt,memo}):t);
  } else {
    LD.transactions.push({id:gid(),type,date,account:acc,majorCategory:major,minorCategory:minor,amount:amt,memo});
  }
  // 저축/투자성 지출이면 자산에 자동 누적
  if(!editId) syncTxToAsset(type,major,minor,amt,memo);
  LD.transactions.sort((a,b)=>b.date.localeCompare(a.date));
  saveLedger();
  document.getElementById('ledger-tx-overlay').remove();
  // 달력 날짜 모달 업데이트
  const dayOv=document.getElementById('ledger-day-overlay');
  if(dayOv)dayOv.remove();
  render();
}

// 저축/투자성 지출을 자산에 자동 반영
function syncTxToAsset(type,major,minor,amt,memo){
  if(type!=='expense')return;
  // 저축/투자성 카테고리 키워드
  const savingKeywords=['저축','예금','적금','예적금','투자','ISA','isa','펀드','연금','청약','공제'];
  var hay=(major+' '+minor+' '+(memo||''));
  var isSaving=savingKeywords.some(function(k){return hay.indexOf(k)>=0;});
  if(!isSaving)return;
  if(!LD.assets)LD.assets=[];
  // 매칭: 메모 또는 소분류 이름과 같은 자산 찾기
  var nameKey=(memo&&memo.trim())?memo.trim():minor;
  var existing=LD.assets.find(function(a){
    return a.type==='asset'&&(a.name===nameKey||a.name===minor||a.name===memo);
  });
  if(existing){
    existing.amount=(existing.amount||0)+amt;
  } else {
    // 카테고리 추정
    var cat='예적금';
    if(/투자|펀드|ISA|isa/.test(hay))cat='투자';
    else if(/연금|청약|공제/.test(hay))cat='기타';
    LD.assets.push({id:gid(),type:'asset',category:cat,name:nameKey,amount:amt,interestRate:0,maturityDate:''});
  }
}
function deleteLedgerTx(id){
  if(!confirm('삭제할까요?'))return;
  LD.transactions=(LD.transactions||[]).filter(t=>t.id!==id);
  saveLedger();
  const dayOv=document.getElementById('ledger-day-overlay');
  if(dayOv)dayOv.remove();
  render();
}

// Firebase Auth 상태 감지 → 앱 시작점
auth.onAuthStateChanged(async function(user){
  if(user){
    currentUser = user;
    // 로딩 표시
    document.getElementById('login-screen').innerHTML=
      '<div style="text-align:center;color:#6B6560"><div style="font-size:2em;margin-bottom:12px">✨</div><div style="font-size:1.1em;font-weight:500">데이터 불러오는 중...</div></div>';
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-wrap').style.display='none';

    // 클라우드에서 데이터 로드
    const cloudData = await loadFromCloud();
    if(cloudData){
      // localStorage에서 폰트 데이터 미리 보존 (Firestore에 없으므로)
      let localFontData = ['','',''];
      try {
        const localRaw = localStorage.getItem(KEY);
        if(localRaw) {
          const localS = JSON.parse(localRaw);
          if(localS.customFontData) localFontData = localS.customFontData;
        }
      } catch(e) {}

      // 클라우드 데이터 적용
      const ledgerData = cloudData._ledger;
      delete cloudData._ledger;
      S = Object.assign({}, S, cloudData);
      if(ledgerData) LD = Object.assign({}, LD, ledgerData);

      // 폰트 데이터 복원 (클라우드엔 없으므로 localStorage 것 유지)
      S.customFontData = localFontData;

      // localStorage 업데이트
      localStorage.setItem(KEY, JSON.stringify(S));
      localStorage.setItem(LEDGER_KEY, JSON.stringify(LD));
    } else {
      // 클라우드에 없으면 localStorage 데이터를 클라우드에 올림
      load(); loadLedger();
      await saveToCloud({...S, _ledger: LD});
    }
    hideLoginScreen();
    initApp();
  } else {
    currentUser = null;
    showLoginScreen();
  }
});
