async function loadRoyaltyFromFirebase(){
  const statusEl=document.getElementById('royalty-status');
  if(statusEl)statusEl.textContent='вХѕвЪгВўцвіћ ВцЉ...';
  try{
    // вАюЖиИВЮИвљю ВѓгВџЕВъљ ьєаьЂ░Вю╝вАю ВџћВ▓Г
    const user=auth.currentUser;
    if(!user)throw new Error('вАюЖиИВЮИ ьЋёВџћ');
    const token=await user.getIdToken();
    const url='https://firestore.googleapis.com/v1/projects/writer-routine/databases/(default)/documents/royalty/latest';
    const res=await fetch(url,{headers:{Authorization:'Bearer '+token}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    const raw=json.fields&&json.fields.data&&json.fields.data.stringValue;
    if(!raw)throw new Error('вЇ░ВЮ┤ьё░ ВЌєВЮї');
    const royalty=JSON.parse(raw);
    showRoyaltyImportModal(royalty);
    if(statusEl)statusEl.textContent='';
  }catch(e){
    if(statusEl)statusEl.textContent='РЮї вХѕвЪгВўцЖИ░ ВІцьїе: '+e.message;
  }
}

function showRoyaltyImportModal(royalty){
  const months=Object.keys(royalty).sort().reverse().slice(0,12);
  const MN=['1ВЏћ','2ВЏћ','3ВЏћ','4ВЏћ','5ВЏћ','6ВЏћ','7ВЏћ','8ВЏћ','9ВЏћ','10ВЏћ','11ВЏћ','12ВЏћ'];

  let monthOpts=months.map(m=>'<option value="'+m+'">'+m+'</option>').join('');
  let html='<div class="fg"><label class="fl">Ж░ђВаИВўг ВЏћ ВёаьЃЮ</label><select class="sel" id="roy-month" onchange="previewRoyalty(this.value)">'+monthOpts+'</select></div>';
  html+='<div id="roy-preview" style="margin-top:10px"></div>';

  openMo('­ЪЊЦ ВЮИВёИ ВаЋВѓ░ Ж░ђВаИВўцЖИ░', html,
    '<button class="btn bg" onclick="closeMo()">ВиеВєї</button>'+
    '<button class="btn bp" onclick="importRoyaltyMonth()">ВѕўВъЁВю╝вАю вЊ▒вАЮ</button>');

  // ВађВъЦьЋ┤вЉљЖИ░
  window._royaltyData=royalty;
  // В▓Ф вІг в»Ивдгв│┤ЖИ░
  setTimeout(function(){previewRoyalty(months[0]);},100);
}

function previewRoyalty(ym){
  const royalty=window._royaltyData;
  if(!royalty||!royalty[ym])return;
  const items=royalty[ym];
  const prev=document.getElementById('roy-preview');
  if(!prev)return;
  let html='<div style="font-size:0.82em;color:var(--t3);margin-bottom:8px">вЊ▒вАЮвља ВѕўВъЁ вѓ┤ВЌГ (ВХюьїљВѓгв│ё ВъЁЖИѕВЮ╝ВЌљ вЊ▒вАЮ)</div>';
  let total=0;
  items.forEach(function(item){
    const day=item.paymentDay==='вДљВЮ╝'?'вДљВЮ╝':item.paymentDay?item.paymentDay+'ВЮ╝':'?';
    html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.88em">';
    html+='<span><span style="color:var(--t3);margin-right:6px">'+day+'</span>'+item.publisher+'</span>';

    html+='</div>';
    total+=item.amount;
  });
  html+='<div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:600;font-size:0.9em">';
  html+='<span>ьЋЕЖ│ё</span><span style="color:var(--green)">'+new Intl.NumberFormat('ko-KR').format(total)+'ВЏљ</span></div>';
  prev.innerHTML=html;
}

function importRoyaltyMonth(){
  const sel=document.getElementById('roy-month');
  if(!sel)return;
  const ym=sel.value;
  const royalty=window._royaltyData;
  if(!royalty||!royalty[ym])return;
  const items=royalty[ym];
  const [year,month]=ym.split('-').map(Number);

  let added=0, updated=0;
  items.forEach(function(item){
    // ВъЁЖИѕВЮ╝ Ж│ёВѓ░
    let day=15;
    if(item.paymentDay==='вДљВЮ╝'||item.paymentDay==='вДљ'){
      day=new Date(year,month,0).getDate();
    } else if(item.paymentDay){
      day=parseInt(item.paymentDay)||15;
    }
    const dateStr=year+'-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');

    if(!LD.transactions)LD.transactions=[];

    // Ж░ЎВЮђ вІг Ж░ЎВЮђ ВХюьїљВѓг ВаЋВѓ░ВЮ┤ ВъѕВю╝вЕ┤ ЖИѕВЋА/вѓаВДю ВЌЁвЇ░ВЮ┤ьіИ, ВЌєВю╝вЕ┤ ВЃѕвАю ВХћЖ░ђ
    const dupIdx=(LD.transactions).findIndex(function(t){
      return t.date.slice(0,7)===ym&&t.memo&&t.memo.includes(item.publisher)&&t._royalty;
    });
    if(dupIdx>-1){
      const existing=LD.transactions[dupIdx];
      if(existing.amount!==item.amount||existing.date!==dateStr){
        LD.transactions[dupIdx]=Object.assign({},existing,{amount:item.amount,date:dateStr});
        updated++;
      }
      return;
    }

    LD.transactions.push({
      id:gid(),
      type:'income',
      date:dateStr,
      account:(LD.accounts&&LD.accounts[0])||'ВѓгВЌЁВџЕ ЖИ░ВЌЁВЮђьќЅ',
      majorCategory:'ВЮИВёИ ВѕўВЮх',
      minorCategory:item.publisher,
      amount:item.amount,
      memo:item.publisher+' '+ym.replace('-','вЁё ')+'ВЏћ ВаЋВѓ░',
      _royalty:true
    });
    added++;
  });

  // В╣┤ьЁїЖ│авдгВЌљ ВХюьїљВѓг ВєївХёвЦў ВъљвЈЎ ВХћЖ░ђ
  if(!LD.categories)LD.categories=JSON.parse(JSON.stringify(defaultLedgerCategories));
  if(!LD.categories.income)LD.categories.income={'ВЮИВёИ ВѕўВЮх':[],'ЖИ░ьЃђ ВѕўВЮх':['ВЎИВБ╝/Ж░ЋВЌ░','ВЮ┤Въљ/ьѕгВъљ','ЖИ░ьЃђ']};
  if(!LD.categories.income['ВЮИВёИ ВѕўВЮх'])LD.categories.income['ВЮИВёИ ВѕўВЮх']=[];
  items.forEach(function(item){
    if(!LD.categories.income['ВЮИВёИ ВѕўВЮх'].includes(item.publisher)){
      LD.categories.income['ВЮИВёИ ВѕўВЮх'].push(item.publisher);
    }
  });

  LD.transactions.sort((a,b)=>b.date.localeCompare(a.date));
  saveLedger();
  closeMo();
  ledgerTab='dashboard';
  var msg=[];
  if(added>0) msg.push(added+'Ж▒┤ ВЃѕвАю вЊ▒вАЮ');
  if(updated>0) msg.push(updated+'Ж▒┤ ЖИѕВЋА/вѓаВДю ВЌЁвЇ░ВЮ┤ьіИ');
  if(msg.length===0) msg.push('в│ђЖ▓йвљю вѓ┤ВџЕВЮ┤ ВЌєВќ┤Вџћ');

function _ltxSave(editId){
  const typeSel=document.querySelector('[name="otx-type"]:checked');
  const type=typeSel?typeSel.value:'expense';
  const y=document.getElementById('otx-y').value;
  const m=document.getElementById('otx-m').value;
  const d=document.getElementById('otx-d').value;
  const date=y+'-'+m+'-'+d;
  const acc=document.getElementById('otx-acc').value;
  const major=document.getElementById('otx-major').value;
  const minor=document.getElementById('otx-minor').value;
  const amt=parseInt(document.getElementById('otx-amt').value)||0;
  const memo=document.getElementById('otx-memo').value;
  if(!date||!amt)return;
  if(!LD.transactions)LD.transactions=[];
  if(editId){
    LD.transactions=LD.transactions.map(t=>t.id===editId?Object.assign({},t,{type,date,account:acc,majorCategory:major,minorCategory:minor,amount:amt,memo}):t);
  } else {
    LD.transactions.push({id:gid(),type,date,account:acc,majorCategory:major,minorCategory:minor,amount:amt,memo});
  }
  // ВађВХЋ/ьѕгВъљВё▒ ВДђВХюВЮ┤вЕ┤ ВъљВѓ░ВЌљ ВъљвЈЎ вѕёВаЂ
  if(!editId) syncTxToAsset(type,major,minor,amt,memo);
  LD.transactions.sort((a,b)=>b.date.localeCompare(a.date));
  saveLedger();
  document.getElementById('ledger-tx-overlay').remove();
  // вІгваЦ вѓаВДю вфевІг ВЌЁвЇ░ВЮ┤ьіИ
  const dayOv=document.getElementById('ledger-day-overlay');
  if(dayOv)dayOv.remove();
  render();
}

// ВађВХЋ/ьѕгВъљВё▒ ВДђВХюВЮё ВъљВѓ░ВЌљ ВъљвЈЎ в░ўВўЂ
function syncTxToAsset(type,major,minor,amt,memo){
  if(type!=='expense')return;
  // ВађВХЋ/ьѕгВъљВё▒ В╣┤ьЁїЖ│авдг ьѓцВЏївЊю
  const savingKeywords=['ВађВХЋ','ВўѕЖИѕ','ВаЂЖИѕ','ВўѕВаЂЖИѕ','ьѕгВъљ','ISA','isa','ьјђвЊю','ВЌ░ЖИѕ','В▓ГВЋй','Ж│хВаю'];
  var hay=(major+' '+minor+' '+(memo||''));
  var isSaving=savingKeywords.some(function(k){return hay.indexOf(k)>=0;});
  if(!isSaving)return;
  if(!LD.assets)LD.assets=[];
  // вДцВ╣Г: вЕћвфе вўљвіћ ВєївХёвЦў ВЮ┤вдёЖ│╝ Ж░ЎВЮђ ВъљВѓ░ В░ЙЖИ░
  var nameKey=(memo&&memo.trim())?memo.trim():minor;
  var existing=LD.assets.find(function(a){
    return a.type==='asset'&&(a.name===nameKey||a.name===minor||a.name===memo);
  });
  if(existing){
    existing.amount=(existing.amount||0)+amt;
  } else {
    // В╣┤ьЁїЖ│авдг ВХћВаЋ
    var cat='ВўѕВаЂЖИѕ';
    if(/ьѕгВъљ|ьјђвЊю|ISA|isa/.test(hay))cat='ьѕгВъљ';
    else if(/ВЌ░ЖИѕ|В▓ГВЋй|Ж│хВаю/.test(hay))cat='ЖИ░ьЃђ';
    LD.assets.push({id:gid(),type:'asset',category:cat,name:nameKey,amount:amt,interestRate:0,maturityDate:''});
  }
}

// Firebase Auth ВЃЂьЃю Ж░љВДђ Рєњ ВЋ▒ ВІюВъЉВаљ
auth.onAuthStateChanged(async function(user){
  if(user){
    currentUser = user;
    // вАювћЕ ьЉюВІю
    document.getElementById('login-screen').innerHTML=
      '<div style="text-align:center;color:#6B6560"><div style="font-size:2em;margin-bottom:12px">Рюе</div><div style="font-size:1.1em;font-weight:500">вЇ░ВЮ┤ьё░ вХѕвЪгВўцвіћ ВцЉ...</div></div>';
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-wrap').style.display='none';

    // ьЂ┤вЮ╝Вџ░вЊюВЌљВёю вЇ░ВЮ┤ьё░ вАювЊю
    const cloudData = await loadFromCloud();
    if(cloudData){
      // localStorageВЌљВёю ьЈ░ьіИ вЇ░ВЮ┤ьё░ в»Ивдг в│┤ВА┤ (FirestoreВЌљ ВЌєВю╝в»ђвАю)
      let localFontData = ['','',''];
      try {
        const localRaw = localStorage.getItem(KEY);
        if(localRaw) {
          const localS = JSON.parse(localRaw);
          if(localS.customFontData) localFontData = localS.customFontData;
        }
      } catch(e) {}

      // ьЂ┤вЮ╝Вџ░вЊю вЇ░ВЮ┤ьё░ ВаЂВџЕ
      const ledgerData = cloudData._ledger;
      delete cloudData._ledger;
      S = Object.assign({}, S, cloudData);
      if(ledgerData) LD = Object.assign({}, LD, ledgerData);

      // ьЈ░ьіИ вЇ░ВЮ┤ьё░ в│хВЏљ (ьЂ┤вЮ╝Вџ░вЊюВЌћ ВЌєВю╝в»ђвАю localStorage Ж▓Ѓ ВюаВДђ)
      S.customFontData = localFontData;

      // localStorage ВЌЁвЇ░ВЮ┤ьіИ
      localStorage.setItem(KEY, JSON.stringify(S));
      localStorage.setItem(LEDGER_KEY, JSON.stringify(LD));
    } else {
      // ьЂ┤вЮ╝Вџ░вЊюВЌљ ВЌєВю╝вЕ┤ localStorage вЇ░ВЮ┤ьё░вЦ╝ ьЂ┤вЮ╝Вџ░вЊюВЌљ Вўгвд╝
      load(); loadLedger();
      await saveToCloud({...S, _ledger: LD});
    }
    hideLoginScreen();
    initApp();
  } else {
    currentUser = null;
    showLoginScreen();
  }
});


</script>
