*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

body.theme-crumple .content{
  background-image:var(--crumple-img);
  background-size:240px 240px;background-repeat:repeat;background-blend-mode:multiply;
}
body.theme-crumple .card,body.theme-crumple .rc,body.theme-crumple .sb{
  background-image:var(--crumple-img);
  background-size:240px 240px;background-repeat:repeat;background-blend-mode:multiply;
}
body.theme-crumple .rc{border-radius:5px}


body.theme-lightBeige{--r:6px;--rsm:5px;--sh:0 2px 6px rgba(0,0,0,.04)}
body.theme-lightBeige .rc{border-radius:6px}

/* 코랄 — Royalty 느낌: 큰 둥글기 + 부드럽고 넓은 그림자 */
body.theme-coral{--r:18px;--rsm:12px;--sh:0 2px 8px rgba(0,0,0,.06)}
body.theme-coral .card{padding:22px 24px}
body.theme-coral .btn{border-radius:99px}
body.theme-coral .rc{border-radius:22px}

/* 민트(베이비핑크) — 오션 스타일 디자인: 적당한 둥글기 + 작은 그림자 */
body.theme-mint{--r:12px;--rsm:8px;--sh:0 2px 6px rgba(0,0,0,.05)}
body.theme-mint .rc{border-radius:14px}
/* accent가 매우 연해서 흰 글씨가 안 보이는 곳은 어두운 글씨로 */
body.theme-mint .rc-head-title{color:#8A3338}
body.theme-mint .rc-head-date{color:rgba(138,51,56,.75)}
body.theme-mint .rc-nav-btn{color:#8A3338}
body.theme-mint .logo{color:#8A3338}
body.theme-mint .btn.bp{color:#8A3338}
body.theme-mint .rc-time{color:#C56B70}

/* 크림 — 따뜻한 종이 느낌: 중간 둥글기 + 점선 느낌의 부드러운 테두리, 그림자 약하게 */
body.theme-cream{--r:14px;--rsm:10px;--sh:0 2px 6px rgba(73,141,96,.05)}
body.theme-cream .card{border:1.5px solid var(--border)}
body.theme-cream .rc{border-radius:18px}

/* 오션 — 모던 깔끔: 적당한 둥글기 + 선명한 작은 그림자 */
body.theme-ocean{--r:12px;--rsm:8px;--sh:0 2px 8px rgba(53,118,190,.06)}
body.theme-ocean .rc{border-radius:14px}
/* 샌드(2번) — 오션 스타일 디자인 */
body.theme-sand{--r:12px;--rsm:8px;--sh:0 2px 6px rgba(0,0,0,.05)}
body.theme-sand .rc{border-radius:14px}

/* 라일락 — 몽환적: 아주 큰 둥글기 + 진하고 퍼지는 그림자 */
body.theme-lilac{--r:22px;--rsm:14px;--sh:0 3px 10px rgba(130,84,188,.06)}
body.theme-lilac .card{padding:24px 26px}
body.theme-lilac .btn{border-radius:99px}
body.theme-lilac .rc{border-radius:26px}

/* 피치 — 노트/문구 느낌: 각진 모서리 + 굵은 테두리, 그림자 없음 */
body.theme-peach{--r:6px;--rsm:5px;--sh:none}
body.theme-peach .card{border:2px solid var(--border);box-shadow:none}
body.theme-peach .btn{border-radius:6px;border-width:1.5px}
body.theme-peach .rc{border-radius:8px;box-shadow:none;border:2px solid var(--border)}
/* accent가 연해서 흰 글씨가 안 보이는 곳은 어두운 글씨로 */
body.theme-peach .rc-head-title{color:#2E6B37}
body.theme-peach .rc-head-date{color:rgba(46,107,55,.75)}
body.theme-peach .rc-nav-btn{color:#2E6B37}
body.theme-peach .logo{color:#2E6B37}
body.theme-peach .btn.bp{color:#2E6B37}
body.theme-peach .rc-time{color:#499568}

/* 차콜 — 미니멀 시크: 작은 둥글기 + 아주 옅은 그림자 */
body.theme-charcoal{--r:10px;--rsm:7px;--sh:0 1px 3px rgba(0,0,0,.08)}
body.theme-charcoal .rc{border-radius:12px}

/* ── THEME: CUSTOM ── */
body.theme-custom{
  --bg:var(--ct-light);--surface:#FEFDFB;--s2:var(--ct-lighter);--s3:var(--ct-mid);
  --border:var(--ct-border);--border2:var(--ct-border2);
  --rc-bg:var(--ct-lighter);--rc-header:var(--ct-dark);--rc-dot:var(--ct-dark);
  --accent:var(--ct-dark);--al:var(--ct-lighter);
  --goal-bg1:var(--ct-mid);--goal-bg2:var(--ct-border);
  --goal-border:var(--ct-border2);--goal-text:#1a1a1a;--goal-sub:var(--ct-dark);
  --goal-btn-bg:rgba(255,255,255,.5);--goal-btn-border:var(--ct-border);
  --goal-item-bg:rgba(255,255,255,.6);--goal-item-border:var(--ct-border);
}

html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:var(--sw);min-width:var(--sw);background:var(--s2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:100;transition:transform .3s}
.sb-head{height:48px;box-sizing:border-box;padding:0 16px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);background:var(--accent);background:color-mix(in srgb, var(--accent) 72%, white);overflow:hidden}
.logo{font-family:var(--logo-font);font-size:1.4em;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:-0.3px;font-weight:800;font-style:italic;color:#fff;line-height:1;white-space:nowrap}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.logo-sub{font-size:0.7857em;color:var(--t3);font-family:var(--mono);margin-top:2px}
.sb-sc{flex:0 0 auto}
.sb-sc::-webkit-scrollbar{width:3px}
.sb-sc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-sec{padding:12px 8px 4px}
.sb-pj-wrap{flex:1;min-height:0;display:flex;flex-direction:column;margin:6px 10px 10px;background:transparent;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.sb-pj-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;user-select:none;flex-shrink:0;transition:background .15s}
.sb-pj-hd:hover{background:var(--s2)}
.sb-pj-title{font-size:0.82em;font-weight:600;color:var(--t2);letter-spacing:.02em}
.sb-pj-arrow{font-size:0.9em;color:var(--t3);transition:transform .2s;display:inline-block}
.sb-pj-wrap.collapsed .sb-pj-arrow{transform:rotate(-90deg)}
.sb-pj-body{flex:1;min-height:0;overflow-y:auto;padding:6px 6px;scrollbar-width:none;-ms-overflow-style:none}
.sb-pj-wrap.collapsed{flex:0 0 auto}
.sb-pj-wrap.collapsed .sb-pj-hd{border-bottom:none}
.sb-pj-wrap.collapsed .sb-pj-body{display:none}
.sb-pj-body::-webkit-scrollbar{width:0;height:0;display:none}
.sb-lbl{font-size:0.7143em;font-weight:500;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;padding:0 8px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.nav{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--rsm);cursor:pointer;color:var(--t2);font-size:0.9643em;border:none;background:none;width:100%;text-align:left;transition:all .15s;font-family:var(--sans)}
.nav:hover{background:var(--s3);color:var(--text)}
.nav.on{background:var(--al);color:var(--accent)}
.nav-ic{font-size:1.0714em;width:18px;text-align:center;flex-shrink:0}
.nav-bd{margin-left:auto;background:var(--accent);color:#fff;font-size:0.7143em;padding:1px 6px;border-radius:99px;font-family:var(--mono)}
.pnav{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--rsm);cursor:pointer;color:var(--t2);font-size:0.9286em;transition:all .15s}
.pnav:hover,.pnav.on{background:var(--s2);color:var(--text)}
.pdot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.pj-group-hd{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--rsm);cursor:pointer;color:var(--t2);font-size:0.88em;font-weight:500;transition:background .15s;user-select:none}
.pj-group-hd:hover{background:var(--s2)}
.pj-group-hd .pj-arrow{transition:transform .2s;display:inline-block;font-size:1em;color:var(--t3);flex-shrink:0;transform:rotate(90deg)}
.pj-group-hd.collapsed .pj-arrow{transform:rotate(0deg)}
.pj-group-body{overflow:hidden;transition:max-height .25s ease}
.pj-group-body.collapsed{max-height:0!important}
.pj-group-box{margin:1px 0 6px 8px;padding-left:6px;border-left:2px solid var(--border)}
.pj-group-box .pnav{padding:5px 9px;font-size:0.84em;border-radius:7px}
.pj-group-box .pnav:hover,.pj-group-box .pnav.on{background:var(--s2)}
.pj-group-box .pnav .pdot{width:6px;height:6px}
.sb-ft{padding:12px 8px;border-top:1px solid var(--border)}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{height:48px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.topbar .hov-btns{opacity:0;transition:opacity .15s}
.topbar:hover .hov-btns{opacity:1}
.tb-title{font-size:1em;font-weight:500}
.tb-date{font-family:var(--mono);font-size:0.7857em;color:var(--t3);margin-left:auto}
.hbg{display:none;background:none;border:none;cursor:pointer;color:var(--text);font-size:1.2857em;padding:4px}
.content{flex:1;overflow-y:auto;padding:28px 32px;background:var(--bg)}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── PAGE ── */
.ph{margin-bottom:20px}
.pt{font-family:var(--serif);font-size:2.2857em;font-weight:300;letter-spacing:-.5px;line-height:1.2}
.ps{font-size:0.9286em;color:var(--t3);margin-top:6px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pc{animation:fi .22s ease;max-width:1400px;margin:0 auto}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ct{font-size:0.9286em;font-weight:500;display:flex;align-items:center;gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

/* ── STAT ── */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.sl{font-size:0.7857em;color:var(--t3);font-family:var(--sans);letter-spacing:.04em;font-weight:500}
.sv{font-family:var(--serif);font-size:1em;line-height:1.2;margin:4px 0 2px}
.ss{font-size:0.8571em;color:var(--t3)}

/* ── PROGRESS ── */
.pw{background:var(--s3);border-radius:99px;height:6px;overflow:hidden}
.pb{height:100%;border-radius:99px;transition:width .6s ease}
.pl{display:flex;justify-content:space-between;font-size:0.7857em;color:var(--t3);margin-top:4px;font-family:var(--mono)}

/* ── CHECK ── */
.ci{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ci:last-child{border-bottom:none;padding-bottom:0}
.ci:first-child{padding-top:0}
.cb{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.cb.on{background:var(--green);border-color:var(--green)}
.cb.on::after{content:'✓';color:#fff;font-size:0.7143em;font-weight:600}
.ck{flex:1;font-size:0.9643em}
.ck.done{color:var(--t3);text-decoration:line-through}
.cd{font-size:0.8571em;color:var(--t3);display:block;margin-top:1px}

/* ── BTN ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rsm);font-size:0.9286em;font-family:var(--sans);border:1px solid transparent;cursor:pointer;transition:all .15s;font-weight:400;text-decoration:none}
.bp{background:var(--accent);color:#fff;border-color:var(--accent)}
.bp:hover{opacity:.9}
.bg{background:transparent;color:var(--t2);border-color:var(--border)}
.bg:hover{background:var(--s2);color:var(--text)}
.bsm{padding:5px 10px;font-size:0.8571em}

.pj-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.pj-slot{min-width:0;position:relative;transition:all .2s}
.pj-slot .pj-edit-ctl{display:none;position:absolute;top:-8px;right:-4px;z-index:10;gap:4px}
.pj-editing .pj-slot{outline:2px dashed var(--border);outline-offset:2px;border-radius:var(--r)}
.pj-editing .pj-slot .pj-edit-ctl{display:flex}
.pj-editing .pj-slot[draggable=true]{cursor:grab}
.pj-editing .pj-slot.dragging{opacity:0.4}
.pj-editing .pj-slot.drag-over{outline-color:var(--accent);outline-style:solid}
.pj-ctl-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.7em;color:var(--t2);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.pj-ctl-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.bi{padding:6px;background:none;border:none;cursor:pointer;color:var(--t3);border-radius:6px;display:inline-flex;transition:all .15s}
.row-hov .hov-btns{opacity:0;transition:opacity .15s}
.row-hov:hover .hov-btns{opacity:1}
@media(hover:none){.row-hov .hov-btns{opacity:1}}
.bi:hover{background:var(--s2);color:var(--text)}

/* ── INPUT ── */
.inp,.ta,.sel{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 12px;font-size:0.9643em;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s;width:100%}
.inp:focus,.ta:focus,.sel:focus{border-color:var(--accent);background:var(--surface)}
.ta{resize:vertical;min-height:80px;line-height:1.6}
.fg{margin-bottom:12px}
.fl{font-size:0.8571em;color:var(--t2);margin-bottom:5px;display:block}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.md{background:var(--surface);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:translateY(8px);transition:transform .2s}
.mo.open .md{transform:translateY(0)}
.mh{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-family:var(--serif);font-size:1.5714em}
.mb{padding:20px 24px}
.mf{padding:0 24px 20px;display:flex;gap:8px;justify-content:flex-end}

/* ── COLORS ── */
.cops{display:flex;gap:8px;flex-wrap:wrap}
.cop{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cop.on,.cop:hover{border-color:var(--text);transform:scale(1.15)}

/* ── DEADLINE ── */
.dl{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.dl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:6px}
.dl-grid .dl{padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);box-shadow:var(--sh);min-width:0}
.dl-grid .dl .dl-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.dl:last-child{border-bottom:none;padding-bottom:0}
.dl-grid .dl:last-child{padding-bottom:14px;border-bottom:1px solid var(--border)}
.dl-done-scroll::-webkit-scrollbar{width:0;display:none}
.db{min-width:44px;text-align:center;background:var(--s2);border-radius:8px;padding:6px 8px}
.dm{font-size:0.7143em;color:var(--t3);font-family:var(--mono);text-transform:uppercase}
.dd{font-size:1.2857em;font-weight:600;font-family:var(--mono);line-height:1}

/* ── MILESTONE ── */
.msi{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.msi:last-child{border-bottom:none}
.mss{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.mss.on{background:var(--green);border-color:var(--green)}
.mss.on::after{content:'✓';color:#fff;font-size:0.7143em;font-weight:700}

/* ── DAYBTN ── */
.daybtn{display:inline-flex;align-items:center;cursor:pointer;font-size:0.9286em;padding:5px 10px;border-radius:99px;border:1px solid var(--border);transition:all .15s;background:none;font-family:var(--sans)}

/* ── LIFE AREA ── */
.la-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.la-card{background:var(--surface);border-radius:14px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;border:1.5px solid transparent}
.la-add{background:transparent;border:1.5px dashed var(--border2);border-radius:14px;padding:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:130px;transition:all .2s}
.la-add:hover{border-color:var(--accent);background:var(--al)}
.la-card.drag-over{border-color:var(--accent) !important;background:var(--al);box-shadow:0 0 0 2px var(--accent)40}
.la-card.dragging{opacity:.4;transform:scale(.97)}
.la-card[draggable="true"]{cursor:grab}
.la-card[draggable="true"]:active{cursor:grabbing}
.pj-drag-item{cursor:grab;user-select:none}
.pj-drag-item.dragging{opacity:.4}
.pj-drag-item.drag-over-top{border-top:2px solid var(--accent) !important}

/* ── PROJECT CARD ── */
.pj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.pj-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:var(--sh);transition:box-shadow .2s,transform .2s;display:flex;flex-direction:column}
.pj-card:hover{box-shadow:var(--shm);transform:translateY(-2px)}
.pj-bar{height:4px}
.pj-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:10px}

/* ── BACK ── */
.back{display:inline-flex;align-items:center;gap:6px;color:var(--t3);font-size:0.9286em;cursor:pointer;margin-bottom:20px;transition:color .15s;border:none;background:none}
.back:hover{color:var(--text)}

/* ── TODAY LAYOUT ── */
.today-wrap{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start}

/* ── ROUTINE CARD (screenshot style) ── */
.rc{background:var(--s2);border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
.rc-head{background:var(--rc-header);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.rc-head-title{color:#fff;font-size:1.0714em;font-weight:600;display:flex;align-items:center;gap:8px}
.rc-head-date{color:rgba(255,255,255,.85);font-size:0.9286em;font-family:var(--sans)}
.rc-nav{display:flex;align-items:center;gap:6px}
.rc-nav-btn{background:rgba(255,255,255,.25);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;transition:background .15s}
.rc-nav-btn:hover{background:rgba(255,255,255,.4)}
.rc-body{padding:16px}
.rc-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.rc-item:last-child{border-bottom:none;padding-bottom:0}
.rc-item:first-child{padding-top:0}
.rc-dot{width:10px;height:10px;border-radius:50%;background:var(--rc-dot);flex-shrink:0;margin-top:5px}
.rc-dot.done{background:var(--green)}
.rc-time{font-size:0.8571em;color:var(--rc-header);font-weight:600;font-family:var(--mono);margin-bottom:2px;font-variant-numeric:tabular-nums;letter-spacing:.03em}
.rc-task{font-size:1em;font-weight:400;color:var(--text);cursor:pointer;transition:color .15s}
.rc-task:hover{color:var(--rc-header)}
.rc-task.done{text-decoration:line-through;color:var(--t3)}
.rc-detail{font-size:0.8571em;color:var(--t2);margin-top:1px}
.rc-empty{padding:24px;text-align:center;color:var(--t3);font-size:0.9286em}
.rc-progress{padding:12px 16px 16px;display:flex;align-items:center;gap:10px}
.rc-pbar-wrap{flex:1;background:rgba(0,0,0,.05);border-radius:99px;height:6px;overflow:hidden}
.rc-pbar{height:100%;border-radius:99px;background:var(--rc-header);transition:width .6s}
.rc-pct{font-size:0.8571em;color:var(--rc-header);font-weight:600;font-family:var(--mono);flex-shrink:0;font-variant-numeric:tabular-nums}

/* ── DOW TABS ── */
.dow-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.dow-tab{padding:4px 10px;border-radius:99px;font-size:0.8571em;cursor:pointer;border:1px solid var(--border);background:none;color:var(--t2);font-family:var(--sans);transition:all .15s}
.dow-tab.on{background:var(--rc-header);color:#fff;border-color:var(--rc-header)}

/* ── QUOTE ── */
.quote{font-family:var(--serif);font-style:italic;font-size:1.1429em;color:var(--t2);line-height:1.5;border-left:3px solid var(--accent);padding-left:14px;margin-bottom:20px}

/* ── SAVINGS ── */
.sbig{font-family:var(--serif);font-size:2.8571em;letter-spacing:-1px}

hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.empty{text-align:center;padding:28px 20px;color:var(--t3)}
.diary-cell{position:relative;}
.diary-preview{
  display:none;position:absolute;z-index:200;
  left:50%;transform:translateX(-50%);
  bottom:calc(100% + 8px);
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
  width:220px;pointer-events:none;
  animation:fi .15s ease;
}
.diary-preview::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--border);
}
.diary-cell:hover .diary-preview{display:block;}
/* 상단 줄은 팝업이 아래로 펼쳐져서 헤더에 안 가림 */
.diary-cell.dc-top .diary-preview{bottom:auto;top:calc(100% + 8px);}
.diary-cell.dc-top .diary-preview::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:var(--border);}
.cal-cell{transition:background .1s;cursor:pointer;}
.cal-cell:hover{background:var(--s2) !important;}
.mini-cal-cell:hover{background:var(--s2) !important;}
.ei{font-size:2.1429em;margin-bottom:6px}

@media(max-width:900px){
  .today-wrap{grid-template-columns:1fr}
  .pj-grid,.la-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .sb{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  .sb.open{transform:translateX(0)}
  .sb-ov{display:block}
  .hbg{display:flex}
  .content{padding:20px 14px}
  .g2,.g3,.pj-grid,.la-grid,.dl-grid{grid-template-columns:1fr}
  .pj-layout{grid-template-columns:1fr}
  .pj-slot{grid-column:span 1!important}
  .topbar{padding:0 14px;display:flex !important}
  .pt{font-size:1.8571em}
  .today-wrap{grid-template-columns:1fr}
  .tb-date{display:block !important}
}
</style>
</head>

      display:inline-flex;align-items:center;justify-content:center;gap:10px;

      Google로 로그인
    </button>

<!-- 앱 본체 -->
<div id="app-wrap" style="display:none;height:100vh;width:100%;overflow:hidden;flex-direction:row">
<div class="app" style="width:100%;height:100vh;display:flex;overflow:hidden">

<!-- SIDEBAR -->
<div class="sb" id="sb">
  <div class="sb-head">
    <div class="logo">Lucy's Space</div>
    <div class="logo-sub" id="sb-date" style="display:none"></div>
  </div>
  <div class="sb-sc">

      <div class="sb-lbl">메인</div>
      <button class="nav on" id="nav-today" onclick="go('today')"><span class="nav-ic" data-color="#F5C842"></span>Today<span class="nav-bd" id="today-bd" style="display:none"></span></button>

      <button class="nav" id="nav-insights" onclick="go('insights')"><span class="nav-ic" data-color="#B89BD9"></span>회고 & 통계</button>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">관리</div>
      <button class="nav" id="nav-life" onclick="go('life')"><span class="nav-ic" data-color="#8BBF88"></span>나의 라이프</button>
      <button class="nav" id="nav-projects" onclick="go('projects')"><span class="nav-ic" data-color="#F5C490"></span>프로젝트</button>
      <button class="nav" id="nav-routine" onclick="go('routine')"><span class="nav-ic" data-color="#E8A87C"></span>루틴 설정</button>
      <button class="nav" id="nav-savings" onclick="go('savings')"><span class="nav-ic" data-color="#A8C5A0"></span>저축 목표</button>

  </div>

// Firestore 저장/로드
async function saveToCloud(data) {
  if (!currentUser) return;
  try {
    const chunks = chunkData(data);
    const batch = db.batch();
    Object.entries(chunks).forEach(([key, val]) => {
      const ref = db.collection('users').doc(currentUser.uid).collection('data').doc(key);
      batch.set(ref, { value: JSON.stringify(val), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    });
    await batch.commit();
  } catch(e) { console.error('Cloud save error:', e); }
}

async function loadFromCloud() {
  if (!currentUser) return null;
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('data').get();
    if (snap.empty) return null;
    const merged = {};
    let latestUpdatedAt = 0;
    snap.forEach(doc => {
      try { merged[doc.id] = JSON.parse(doc.data().value); } catch(e) {}
      try {
        const ts = doc.data().updatedAt;
        const ms = ts && ts.toMillis ? ts.toMillis() : 0;
        if(ms > latestUpdatedAt) latestUpdatedAt = ms;
      } catch(e) {}
    });
    const result = mergeChunks(merged);
    result._cloudUpdatedAt = latestUpdatedAt;
    return result;
  } catch(e) { console.error('Cloud load error:', e); return null; }
}

// 큰 데이터를 필드별로 나눠서 저장 (Firestore 1MB 제한 대응)
function chunkData(data) {
  const FIELDS = ['routines','checks','projects','deadlines','savings','notes','calEvents',
    'lifeGoal','theme','customThemeColor','diaryEntries','monthlyGoals','monthlyMemo',
    'weeklyGoals','weeklyMemo','diaryStickers','font','fontSize','fontWeight','customFonts','logoFont','navMarker','todayLayout','todayCardVis',
    'lifeAreas','todoList','todoListTmr'];
  const chunks = {};
  FIELDS.forEach(f => { if (data[f] !== undefined) chunks[f] = data[f]; });
  // customFontData는 Firestore 용량 초과 → 저장 제외 (localStorage에만)
  // 나머지 소형 데이터
  const rest = {};
  Object.keys(data).forEach(k => {
    if (!FIELDS.includes(k) && k !== 'customFontData') rest[k] = data[k];
  });
  if (Object.keys(rest).length > 0) chunks['_misc'] = rest;
  return chunks;
}
function mergeChunks(chunks) {
  const result = {};
  Object.entries(chunks).forEach(([k, v]) => {
    if (k === '_misc') Object.assign(result, v);
    else result[k] = v;
  });
  return result;
}

function addDays(dateS, d){const dt=new Date(dateS+'T00:00:00');dt.setDate(dt.getDate()+d);return dateStr(dt);}

function routinesForDate(ds){
  const dow = DOWS[dowOf(ds)];
  const dt = new Date(ds+'T00:00:00');
  const dayOfMonth = dt.getDate();
  const lastDayOfMonth = new Date(dt.getFullYear(), dt.getMonth()+1, 0).getDate();
  return S.routines.filter(function(r){
    // 루틴화(프로젝트 연동) 항목은 시작일~등록 마감일 범위 안에서만 표시
    if(r.isRz){
      if(r.startDate && ds<r.startDate) return false;
      if(r.until && ds>r.until) return false;
    }
    // 매월 루틴: 선택한 날짜(또는 말일)에만 표시
    if(r.isMonthly){
      const mdays = r.monthDays || [];
      if(mdays.includes('last') && dayOfMonth===lastDayOfMonth) return true;
      return mdays.includes(dayOfMonth);
    }
    // 매주/매일 루틴: 요일로 필터
    return !r.days || r.days.length===0 || r.days.includes(dow);
  });
}

    document.querySelectorAll('[data-rcnav]').forEach(function(btn){
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        e.preventDefault();
        var v=this.dataset.rcnav;
        if(v==='0'){resetView();}
        else{shiftView(parseInt(v));}
      },{once:true});

    document.querySelectorAll('.mini-cal-cell').forEach(function(el){
      el.addEventListener('click',function(){
        window.diaryDate=this.dataset.ds;
        go('diary');
      });
    });
    var cp=document.getElementById('custom-color-picker');
    if(cp){
      cp.addEventListener('input',function(){

      });
    }
    document.querySelectorAll('.diary-cell').forEach(function(el){
      el.addEventListener('click',function(){

      });

    document.querySelectorAll('[data-todo-input="1"]').forEach(function(inp){
      function handleEnter(e){
        if(e.key==='Enter'||e.keyCode===13){
          e.preventDefault(); e.stopPropagation();
          addTodoInline(inp.dataset.ds, inp.id);
        }
      }
      inp.addEventListener('keydown', handleEnter);
      inp.addEventListener('keyup', handleEnter);
      // 모바일 소프트키보드 "완료/보내기" 대응
      inp.addEventListener('input', function(e){
        if(inp.value.endsWith('\n')){

          addTodoInline(inp.dataset.ds, inp.id);
        }
      });
    });
  },0);
}

  const sec=document.getElementById('pj-nav-sec'),list=document.getElementById('pj-nav-list');
  if(S.projects.length>0){

        '<span class="pj-arrow">›</span>'+

      '<div class="pj-group-box">'+

        return '<div class="pnav '+(activePid===p.id?'on':'')+'" onclick="go(\'projects\',\''+p.id+'\')">'+

        '</div>';
      }).join('')+
      '</div>'+
      '</div>';
    });
    // 영역 없는 프로젝트
    noArea.forEach(function(p){
      html+='<div class="pnav '+(activePid===p.id?'on':'')+'" onclick="go(\'projects\',\''+p.id+'\')" >'+

window._pjGroupCollapsed={};

function togglePjBox(){

function togglePjGroup(aid){
  if(!window._pjGroupCollapsed) window._pjGroupCollapsed={};
  const col=!window._pjGroupCollapsed[aid];
  window._pjGroupCollapsed[aid]=col;
  const hd=document.querySelector('.pj-group-hd[onclick*="'+aid+'"]');
  const body=document.getElementById('pjg-'+aid);
  if(!hd||!body) return;
  hd.classList.toggle('collapsed',col);
  if(col){
    body.style.maxHeight=body.scrollHeight+'px';
    requestAnimationFrame(function(){body.style.maxHeight='0';});
    body.classList.add('collapsed');
  } else {
    body.classList.remove('collapsed');
    body.style.maxHeight=body.scrollHeight+'px';
    setTimeout(function(){if(!window._pjGroupCollapsed[aid])body.style.maxHeight='none';},260);
  }
}

function routineCard(ds){
  const dow=dowOf(ds);
  const dayName=DOW_KO[dow];
  const checks=S.checks[ds]||{};
  const rods=routinesForDate(ds);
  const done=rods.filter(r=>checks[r.id]).length;
  const pct=rods.length?Math.round(done/rods.length*100):0;
  const isToday=ds===todStr();

  const dt=new Date(ds+'T00:00:00');
  const dateLabel=(dt.getMonth()+1)+'월 '+dt.getDate()+'일 ('+dayName+')';

  let itemsHtml='';
  if(rods.length===0){
    itemsHtml='<div class="rc-empty">이 요일 루틴이 없어요<br><small>루틴 설정에서 추가하세요</small></div>';
  } else {
    rods.forEach(r=>{
      const isDone=!!checks[r.id];
      itemsHtml+='<div class="rc-item" onclick="toggleCheck(\''+r.id+'\',\''+ds+'\')">'+
        '<div class="rc-dot '+(isDone?'done':'')+'"></div>'+
        '<div style="flex:1">'+
          '<div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">'+
            (r.time?'<div class="rc-time">'+r.time+'</div>':'')+
            '<div class="rc-task '+(isDone?'done':'')+'">'+r.task+'</div>'+
            (r.saveAmount>0?'<span style="font-size:0.72em;background:'+(isDone?'var(--green)':'var(--al)')+';color:'+(isDone?'#fff':'var(--accent)')+';padding:1px 7px;border-radius:99px;font-weight:600;white-space:nowrap">💰 '+money(r.saveAmount)+'</span>':'')+
          '</div>'+
          (r.detail?'<div class="rc-detail">'+r.detail+'</div>':'')+
        '</div>'+
        (isDone?'<div style="color:var(--green);font-size:1.1429em">✓</div>':'')+
      '</div>';
    });
  }

  return '<div class="rc">'+
    '<div class="rc-head" style="display:flex;align-items:center;justify-content:space-between">'+
      '<div class="rc-head-title">데일리 루틴</div>'+
      '<div style="display:flex;align-items:center;gap:6px">'+
        '<button class="rc-nav-btn" data-rcnav="-1" type="button">‹</button>'+
        '<div class="rc-head-date" '+
          (viewDate!==todStr()?
            'data-rcnav="0" style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px" title="오늘로 이동"':
            'style="cursor:default"')+
        '>'+dateLabel+'</div>'+
        '<button class="rc-nav-btn" data-rcnav="1" type="button">›</button>'+
      '</div>'+
    '</div>'+
    '<div class="rc-body">'+itemsHtml+'</div>'+
    (rods.length>0?'<div class="rc-progress"><div class="rc-pbar-wrap"><div class="rc-pbar" style="width:'+pct+'%"></div></div><div class="rc-pct">'+done+'/'+rods.length+'</div></div>':'')+
  '</div>';
}

function toggleCheck(rid, ds){
  if(!S.checks[ds]) S.checks[ds]={};
  const nowChecked=!S.checks[ds][rid];
  S.checks[ds][rid]=nowChecked;

  // 저축 금액이 있는 루틴이면 저축 목표에 자동 반영
  const r=(S.routines||[]).find(x=>x.id===rid);
  if(r&&r.saveAmount>0){
    if(!S.savings)S.savings={goal:0,current:0,entries:[]};
    if(!S.savings.entries)S.savings.entries=[];
    const svId='rzsave-'+rid+'-'+ds; // 루틴+날짜별 고유 ID
    const existIdx=S.savings.entries.findIndex(e=>e.id===svId);
    // 프로젝트 정보 찾기
    const proj=r.rzProjectId?(S.projects||[]).find(p=>p.id===r.rzProjectId):null;
    if(nowChecked){
      // 체크 → 저축 입금 (중복 방지)
      if(existIdx<0){
        S.savings.entries.push({id:svId,amount:r.saveAmount,note:r.task+' (루틴 달성)',date:ds,projectId:r.rzProjectId||'',projectName:proj?proj.name:''});
        S.savings.current+=r.saveAmount;
      }
    } else {
      // 체크 해제 → 저축 회수
      if(existIdx>=0){
        S.savings.current-=S.savings.entries[existIdx].amount;
        S.savings.entries.splice(existIdx,1);
      }
    }
  }
  save(); render();
}

          'background:'+(done?p3.color:'transparent')+';transition:all .15s">'+

          '<span style="font-size:0.8em;font-weight:500;color:'+(done?p3.color:'var(--text)')+';text-decoration:'+(done?'line-through':'none')+';opacity:'+(done?'0.7':'1')+';transition:all .15s">'+

        '<div style="display:flex;align-items:center;gap:6px">'+

  var TCB={stats:statsCard, deadlines:deadlinesCard, monthlyGoal:monthlyGoalCard, todo:todoCardHtml, diary:diaryCard, projects:projectsCard||'', lookback:lookbackCard, suppToday:suppTodayCard};
  var defTL=[{id:'stats',cols:2},{id:'deadlines',cols:1},{id:'monthlyGoal',cols:1},{id:'suppToday',cols:1},{id:'todo',cols:1},{id:'diary',cols:1},{id:'lookback',cols:2},{id:'projects',cols:2}];

  var rightGrid='';
  tl.forEach(function(slot){
    var h=TCB[slot.id];

// ═══════════ TODO 체크리스트 ═══════════
let _todoAdding=false;
function addTodoInline(ds,inputId){
  if(_todoAdding) return;
  const el=document.getElementById(inputId);
  if(!el)return;
  const text=el.value.trim();
  if(!text)return;
  _todoAdding=true;
  el.value='';
  if(!S.todoList)S.todoList={};
  if(!S.todoList[ds])S.todoList[ds]=[];
  S.todoList[ds].push({id:gid(),text,done:false});
  save(); render();
  setTimeout(()=>{ _todoAdding=false; const inp=document.getElementById(inputId); if(inp) inp.focus(); },100);
}
function togTodoItem(ds,i){
  if(!S.todoList||!S.todoList[ds]||!S.todoList[ds][i])return;
  S.todoList[ds][i].done=!S.todoList[ds][i].done;
  save();
  // DOM만 업데이트 (깜빡임 방지)
  const list=S.todoList[ds];
  const item=list[i];
  // 해당 체크박스 찾기 - onclick 속성으로 찾기
  const allBoxes=document.querySelectorAll('[onclick*="togTodoItem"]');
  allBoxes.forEach(function(box){
    const attr=box.getAttribute('onclick')||'';
    if(attr.includes('\''+ds+'\'')&&attr.includes(','+i+')')){
      box.style.background=item.done?'var(--green)':'transparent';
      box.style.borderColor=item.done?'var(--green)':'var(--border2)';
      box.innerHTML=item.done?'<span style="color:#fff;font-size:0.6em">✓</span>':'';
      const textDiv=box.parentElement.querySelector('[style*="font-size:0.9em"]');
      if(textDiv)textDiv.style.textDecoration=item.done?'line-through':'';
    }
  });
}
function delTodoItem(ds,i){
  if(!S.todoList||!S.todoList[ds])return;
  S.todoList[ds].splice(i,1);
  save();render();
}

// ═══════════ ROUTINE SETTINGS PAGE ═══════════
function renderRoutinePage(){
  const now=new Date();
  const nowT=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  let html='';
  html+='<div class="card" style="margin-bottom:16px"><div class="ch"><div class="ct"><svg width="17" height="17" viewBox="0 0 24 24" fill="var(--accent)" style="flex-shrink:0"><path d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h1a2 2 0 0 1 2 2v2H3V6a2 2 0 0 1 2-2h1V3a1 1 0 0 1 1-1z"/><path d="M3 10h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill-opacity="0.55"/></svg>요일별 미리보기</div></div>'+
    '<div class="dow-tabs">'+
    DOW_KO.map((d,i)=>'<button class="dow-tab" onclick="previewDow('+i+')">'+d+'요일</button>').join('')+
    '</div><div id="dow-preview"></div></div>';

  const dailyWeeklyRoutines=S.routines.filter(r=>!r.isMonthly);
  const monthlyRoutines=S.routines.filter(r=>r.isMonthly);

  function renderRoutineRow(r,i){
    const dayLabels=r.isMonthly?('매월 '+(r.monthDays||[]).map(function(d){return d==='last'?'말':d;}).join('·')+'일'):((!r.days||r.days.length===0)?'매일':r.days.map(d=>DOW_KO[DOWS.indexOf(d)]).join('·'));
    const isCur=!!r.time&&r.time<=nowT&&(i===S.routines.length-1||!S.routines[i+1].time||S.routines[i+1].time>nowT);
    return '<div class="ci" style="'+(isCur?'border-left:2px solid var(--accent);padding-left:8px;background:var(--al);border-radius:0 6px 6px 0':'')+'">'+
      '<div style="flex:1">'+
        '<div style="display:flex;align-items:center;gap:8px">'+(r.time?'<span style="font-size:0.8571em;color:var(--rc-header);font-weight:600;font-family:var(--mono)">'+r.time+'</span>':'')+
        '<span style="font-size:0.9643em;font-weight:500">'+r.task+'</span>'+
        '<span style="font-size:0.7857em;padding:2px 7px;border-radius:99px;background:var(--s2);color:var(--t2)">'+dayLabels+'</span></div>'+
        (r.detail?'<div style="font-size:0.8571em;color:var(--t3);margin-top:2px;padding-left:0">'+r.detail+'</div>':'')+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:6px">'+
        '<button class="bi" onclick="openRModal('+S.routines.indexOf(r)+')" style="font-size:0.8571em">✎</button>'+
        '<button class="bi" onclick="delR(\''+r.id+'\')" style="font-size:0.8571em;color:var(--red)">✕</button>'+
      '</div>'+
    '</div>';
  }

  html+='<div class="card" style="margin-bottom:16px"><div class="ch"><div class="ct"><svg width="17" height="17" viewBox="0 0 24 24" fill="var(--accent)" style="flex-shrink:0"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 5a1 1 0 1 0-2 0v5a1 1 0 0 0 .5.87l3.5 2a1 1 0 0 0 1-1.74L13 11.42z"/></svg>전체 루틴 목록 <span style="font-size:0.75em;color:var(--t3);font-weight:400">(매일·매주)</span></div><button class="btn bp bsm" onclick="openRModal()">+ 추가</button></div>';
  if(dailyWeeklyRoutines.length===0){
    html+='<div class="empty"><div class="ei">⏰</div>루틴을 추가해요</div>';
  } else {
    dailyWeeklyRoutines.forEach((r,i)=>{ html+=renderRoutineRow(r,i); });
  }
  html+='</div>';

  html+='<div class="card"><div class="ch"><div class="ct"><svg width="17" height="17" viewBox="0 0 24 24" fill="var(--accent)" style="flex-shrink:0"><path d="M3 13h2v8H3zm4-6h2v14H7zm4-4h2v18h-2zm4 8h2v10h-2zm4-3h2v13h-2z"/></svg>매월 루틴</div></div>';
  if(monthlyRoutines.length===0){
    html+='<div class="empty"><div class="ei">📅</div>매월 반복되는 루틴이 없어요</div>';
  } else {
    monthlyRoutines.forEach((r,i)=>{ html+=renderRoutineRow(r,i); });
  }
  html+='</div>';
  return html;
}

function previewDow(dowIdx){
  const dowKey=DOWS[dowIdx];
  const matched=S.routines.filter(r=>!r.isMonthly&&(!r.days||r.days.length===0||r.days.includes(dowKey)));
  let html='';
  if(matched.length===0){html='<div class="empty" style="padding:12px">이 요일 루틴이 없어요</div>';}
  else{
    html='<div style="display:flex;flex-direction:column;gap:4px">';
    matched.forEach(r=>{html+='<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">'+(r.time?'<span style="font-size:0.7857em;color:var(--rc-header);font-weight:600;font-family:var(--mono);min-width:40px">'+r.time+'</span>':'')+'<span style="font-size:0.9286em">'+r.task+'</span></div>';});
    html+='</div>';
  }
  document.getElementById('dow-preview').innerHTML=html;
  document.querySelectorAll('.dow-tab').forEach((b,i)=>{b.classList.toggle('on',i===dowIdx);});
}

function openRModal(idx){
  const r=idx!==undefined?S.routines[idx]:{time:'09:00',task:'',detail:'',days:[]};
  const selDays=new Set(r.days||[]);
  const dowOpts=DOWS.map((k,i)=>'<button type="button" class="daybtn" id="rd-'+k+'" onclick="togRDay(this,\''+k+'\')" style="'+(selDays.has(k)?'background:var(--rc-header);color:#fff;border-color:var(--rc-header)':'')+'">'+DOW_KO[i]+'요일</button>').join('');
  openMo(idx!==undefined?'루틴 수정':'루틴 추가',
    '<div class="fg"><label class="fl">시간 <span style="color:var(--t3);font-weight:400">(선택)</span></label><input type="time" class="inp" id="r-time" value="'+(r.time||'')+'"></div>'+
    '<div class="fg"><label class="fl">이름</label><input class="inp" id="r-task" value="'+r.task+'" placeholder="루틴 이름"></div>'+
    '<div class="fg"><label class="fl">상세 설명</label><input class="inp" id="r-detail" value="'+(r.detail||'')+'" placeholder="상세 설명 (선택)"></div>'+
    '<div class="fg"><label class="fl">반복 요일 <span style="color:var(--t3)">(선택 없으면 매일)</span></label>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap">'+dowOpts+'</div></div>',
    '<button class="btn bg" onclick="closeMo()">취소</button><button class="btn bp" onclick="saveR(\''+(r.id||'')+'\')">저장</button>');
}

function togRDay(el,k){
  if(el.dataset.active==='1'){el.dataset.active='0';el.style.background='';el.style.color='';el.style.borderColor='';}
  else{el.dataset.active='1';el.style.background='var(--rc-header)';el.style.color='#fff';el.style.borderColor='var(--rc-header)';}
}
function saveR(eid){
  const time=document.getElementById('r-time').value;
  const task=document.getElementById('r-task').value.trim();
  const detail=document.getElementById('r-detail').value.trim();
  if(!task)return;
  const days=DOWS.filter(k=>{const el=document.getElementById('rd-'+k);return el&&el.dataset.active==='1';});
  if(eid){S.routines=S.routines.map(r=>r.id===eid?Object.assign({},r,{time,task,detail,days}):r);}
  else{S.routines.push({id:gid(),time,task,detail,days});S.routines.sort((a,b)=>a.time.localeCompare(b.time));}
  save();closeMo();render();
}
function delR(id){S.routines=S.routines.filter(r=>r.id!==id);save();render();}

let monthlyY=new Date().getFullYear(), monthlyM=new Date().getMonth();

// ═══════════ WEEKLY ═══════════
let weekOffset=0;

function getWeekDates(offset){
  const now=new Date();
  const dow=now.getDay();
  const monday=new Date(now);
  monday.setDate(now.getDate()-dow+1+(offset*7));
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(dateStr(d));}
  return days;
}

let diaryY=new Date().getFullYear(), diaryM=new Date().getMonth();

      'border-radius:10px;padding:9px 4px;cursor:pointer;text-align:center;'+

      '<div style="font-size:13px;font-weight:700;color:'+(isCur?'#fff':'var(--accent)')+'">'+MN_D[m].slice(0,3)+'</div>'+

  }

  var cells=[];

  });

    var isT=ds===ts;
    var entry=(S.diaryEntries||{})[ds];

    var isLR=ri===5, isLC=ci===6;
    calHtml+='<div class="diary-cell'+(ri<=1?' dc-top':'')+'" data-ds="'+ds+'" style="'+

      'border-bottom:'+(isLR?'none':'1px solid var(--border)')+';'+
      (isT?'outline:2px solid var(--accent);outline-offset:-2px;z-index:1;position:relative;':'')+
      'background:'+(isT?'var(--al)':hasDiary?'var(--s2)15':'transparent')+';'+
      'transition:background .15s">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between">'+
        '<span style="font-size:0.8em;font-weight:'+(isT?'700':'400')+';'+

          '<div style="font-size:0.8em;color:var(--t2);line-height:1.6;white-space:pre-wrap">'+

      :'')+

  var moodHtml=MOODS.map(function(m){
    var sel=entry.mood===m.v;
    return '<div data-key="mood" data-val="'+m.v+'" data-ds="'+ds+'" onclick="setDiaryMood(this.dataset.ds,this.dataset.val)" style="'+
      'padding:5px 9px;border-radius:8px;cursor:pointer;font-size:1.1em;'+
      'background:'+(sel?'var(--al)':'transparent')+';'+
      'border:1.5px solid '+(sel?'var(--accent)':'var(--border)')+';transition:all .15s" title="'+m.l+'">'+m.v+'</div>';
  }).join('');

  const weathers=['☀️','🌤️','⛅','🌧️','❄️','🌊','🌈'];
  var weatherHtml=weathers.map(function(w){
    var sel=entry.weather===w;
    return '<div data-key="weather" data-val="'+w+'" onclick="setDiaryWeather(\''+ds+'\',\''+w+'\')" style="'+
      'padding:5px 9px;border-radius:8px;cursor:pointer;font-size:1.1em;'+
      'background:'+(sel?'var(--al)':'transparent')+';'+
      'border:1.5px solid '+(sel?'var(--accent)':'var(--border)')+';transition:all .15s">'+w+'</div>';
  }).join('');

  var rawText=entry.text||'';
  var rawTitle=entry.title||'';

  openMo(label,
    '<div style="margin-bottom:10px"><div style="font-size:0.8em;color:var(--t3);margin-bottom:6px">기분</div>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap">'+moodHtml+'</div></div>'+
    '<div style="margin-bottom:12px"><div style="font-size:0.8em;color:var(--t3);margin-bottom:6px">날씨</div>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap">'+weatherHtml+'</div></div>'+
    '<div style="margin-bottom:12px"><input id="diary-title-inp" class="inp" placeholder="제목 (선택)" value="'+rawTitle+'" style="font-size:1em;font-weight:500;background:transparent;border-color:transparent;border-bottom:1px solid var(--border);border-radius:0;padding:6px 0"></div>'+
    '<div style="position:relative">'+
      '<div id="diary-line-nums" style="position:absolute;left:0;top:0;width:32px;padding:8px 6px 8px 0;font-family:var(--mono);font-size:0.9286em;color:var(--t3);line-height:1.8;user-select:none;pointer-events:none;text-align:right">'+
        getLineNums(rawText)+
      '</div>'+
      '<textarea id="diary-ta" style="width:100%;min-height:320px;border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 44px;font-size:0.9286em;font-family:var(--sans);line-height:1.8;resize:none;background:var(--s2);color:var(--text);outline:none" '+
      'placeholder="오늘 감사한 일을 적어보세요...\n1. \n2. \n3. " oninput="updateLineNums(this)">'+rawText+'</textarea>'+
    '</div>',
    '<button class="btn bg" onclick="closeMo()">닫기</button>'+
    (rawText?'<button class="btn bg bsm" style="color:var(--red)" data-ds="'+ds+'" onclick="delDiaryEntry(this.dataset.ds)">삭제</button>':'')+
    '<button class="btn bp" id="diary-save-btn">저장</button>'
  );
  document.getElementById('diary-save-btn').onclick=function(){saveDiaryFromModal(ds);};
  setTimeout(function(){var ta=document.getElementById('diary-ta');if(ta) updateLineNums(ta);},50);
}

function getLineNums(text){if(!text) return '1'; return text.split('\n').map(function(_,i){return i+1;}).join('<br>');}
function updateLineNums(ta){var nums=document.getElementById('diary-line-nums');if(!nums) return; nums.innerHTML=ta.value.split('\n').map(function(_,i){return i+1;}).join('<br>');}
function setDiaryMood(ds, mood){
  if(!S.diaryEntries) S.diaryEntries={};
  if(!S.diaryEntries[ds]) S.diaryEntries[ds]={text:'',mood:'',weather:''};
  S.diaryEntries[ds].mood = S.diaryEntries[ds].mood===mood ? '' : mood;
  save();
  // 모달 안에 있으면 UI만 업데이트 (render 안함)
  const moEl=document.getElementById('mo');
  if(moEl&&moEl.style.display!=='none'){
    document.querySelectorAll('[data-key="mood"]').forEach(function(el){
      var sel=el.dataset.val===S.diaryEntries[ds].mood;
      el.style.background=sel?'var(--al)':'transparent';
      el.style.borderColor=sel?'var(--accent)':'var(--border)';
    });
  } else {
    render();
  }
}
function setDiaryWeather(ds, weather){
  if(!S.diaryEntries) S.diaryEntries={};
  if(!S.diaryEntries[ds]) S.diaryEntries[ds]={text:'',mood:'',weather:''};
  S.diaryEntries[ds].weather = S.diaryEntries[ds].weather===weather ? '' : weather;
  save();
  // 모달 안에 있으면 UI만 업데이트
  const moEl=document.getElementById('mo');
  if(moEl&&moEl.style.display!=='none'){
    document.querySelectorAll('[data-key="weather"]').forEach(function(el){
      var sel=el.dataset.val===S.diaryEntries[ds].weather;
      el.style.background=sel?'var(--al)':'transparent';
      el.style.borderColor=sel?'var(--accent)':'var(--border)';
    });
  } else {
    render();
  }
}
function saveTodayDiaryDirect(ds, text){
  if(!S.diaryEntries) S.diaryEntries={};
  if(!S.diaryEntries[ds]) S.diaryEntries[ds]={text:'',mood:'',weather:''};
  S.diaryEntries[ds].text=text;

}
function saveDiaryFromModal(ds){
  var ta=document.getElementById('diary-ta'),ti=document.getElementById('diary-title-inp');
  if(!ta) return;
  if(!S.diaryEntries) S.diaryEntries={};
  if(!S.diaryEntries[ds]) S.diaryEntries[ds]={text:'',mood:'',title:''};
  S.diaryEntries[ds].text=ta.value;
  if(ti) S.diaryEntries[ds].title=ti.value.trim();
  save(); closeMo(); render();
}
function delDiaryEntry(ds){if(!confirm('이 날의 일기를 삭제할까요?')) return;if(S.diaryEntries&&S.diaryEntries[ds]) delete S.diaryEntries[ds];save(); closeMo(); render();}

// ═══════════ 일기 검색 ═══════════
function openDiarySearch(){
  openMo('🔍 일기 검색',
    '<input id="diary-search-inp" class="inp" placeholder="키워드를 입력하세요... (제목+본문 검색)" oninput="runDiarySearch(this.value)" style="margin-bottom:12px">'+
    '<div id="diary-search-res" style="max-height:380px;overflow-y:auto"><div class="empty">검색어를 입력하면 결과가 나타나요</div></div>',
    '<button class="btn bg" onclick="closeMo()">닫기</button>'
  );
  setTimeout(function(){var el=document.getElementById('diary-search-inp');if(el)el.focus();},80);
}
function runDiarySearch(q){
  var box=document.getElementById('diary-search-res');
  if(!box)return;
  q=(q||'').trim().toLowerCase();
  if(!q){box.innerHTML='<div class="empty">검색어를 입력하면 결과가 나타나요</div>';return;}
  var keys=Object.keys(S.diaryEntries||{}).sort(function(a,b){return b.localeCompare(a);});
  var hits=[];
  keys.forEach(function(ds){
    var e=S.diaryEntries[ds];if(!e)return;
    var hay=((e.title||'')+'\n'+(e.text||'')).toLowerCase();
    var idx=hay.indexOf(q);
    if(idx===-1)return;
    var src=(e.title||'')+'\n'+(e.text||'');
    var start=Math.max(0,idx-25), end=Math.min(src.length,idx+q.length+45);
    var snippet=(start>0?'…':'')+src.slice(start,end).replace(/[<>]/g,'').replace(/\n/g,' ')+(end<src.length?'…':'');
    var re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'ig');
    snippet=snippet.replace(re,function(m){return '<mark style="background:var(--al);color:var(--accent);border-radius:3px;padding:0 1px">'+m+'</mark>';});
    hits.push({ds:ds,mood:e.mood||'',title:e.title||'',snippet:snippet});
  });
  if(hits.length===0){box.innerHTML='<div class="empty">"'+q.replace(/[<>]/g,'')+'" 검색 결과가 없어요</div>';return;}
  var html='<div style="font-size:0.78em;color:var(--t3);margin-bottom:8px">'+hits.length+'개의 일기에서 발견</div>';
  hits.slice(0,50).forEach(function(h){
    html+='<div onclick="diarySearchGo(\''+h.ds+'\')" style="padding:10px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .15s" onmouseenter="this.style.borderColor=\'var(--accent)\'" onmouseleave="this.style.borderColor=\'var(--border)\'">'+
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'+
        (h.mood?'<span>'+h.mood+'</span>':'')+
        '<span style="font-size:0.8em;font-weight:600;color:var(--accent);font-family:var(--mono)">'+h.ds+'</span>'+
        (h.title?'<span style="font-size:0.85em;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+h.title.replace(/[<>]/g,'')+'</span>':'')+
      '</div>'+
      '<div style="font-size:0.82em;color:var(--t2);line-height:1.5">'+h.snippet+'</div>'+
    '</div>';
  });
  if(hits.length>50)html+='<div style="text-align:center;font-size:0.78em;color:var(--t3)">상위 50개만 표시됩니다</div>';
  box.innerHTML=html;
}
function diarySearchGo(ds){
  closeMo();
  diaryY=parseInt(ds.slice(0,4));diaryM=parseInt(ds.slice(5,7))-1;
  if(page!=='diary')go('diary');else render();
  setTimeout(function(){openDiaryModal(ds);},100);
}

function saveArea(eid){

function delArea(id){
  const pc=S.projects.filter(p=>p.lifeAreaId===id).length;
  if(pc>0&&!confirm('프로젝트 '+pc+'개의 영역이 해제돼요. 계속할까요?'))return;
  S.lifeAreas=(S.lifeAreas||[]).filter(a=>a.id!==id);
  S.projects=S.projects.map(p=>p.lifeAreaId===id?Object.assign({},p,{lifeAreaId:''}):p);
  save();render();
}

// ═══════════ LIFE 드래그앤드롭 ═══════════
window._laDragging = false;
var _dragAreaId = null;   // 드래그 중인 라이프 카드 aid
var _dragPjId = null;     // 드래그 중인 프로젝트 pid

document.addEventListener('dragstart', function(e){
  // pj-slot 드래그 (카드 레이아웃 편집)는 방해하지 않음
  if(e.target.closest('.pj-slot[draggable]')) return;
  // supp 약 pill 드래그는 방해하지 않음
  if(e.target.closest('[draggable][data-id]')) return;

  // pj-drag-item 안에서 시작했는지 먼저 확인 (부모 카드보다 우선)
  var pj = e.target.closest('.pj-drag-item[draggable]');
  var card = e.target.closest('.la-card[draggable]');

  if(pj){
    // 프로젝트 드래그 - 라이프 카드 드래그 차단
    e.stopPropagation();
    window._laDragging = true;
    _dragPjId = pj.dataset.pid;
    _dragAreaId = null;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('type','pj');
    setTimeout(function(){pj.classList.add('dragging');},0);
  } else if(card && !e.target.closest('.pj-drop-zone')){
    // 라이프 카드 드래그 (프로젝트 영역에서 시작한 게 아닐 때만)
    window._laDragging = true;
    _dragAreaId = card.dataset.aid;
    _dragPjId = null;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('type','area');
    setTimeout(function(){card.classList.add('dragging');},0);
  } else {
    // 드래그 취소
    e.preventDefault();
  }
});

document.addEventListener('dragend', function(e){
  window._laDragging = false;
  _dragAreaId = null; _dragPjId = null;
  document.querySelectorAll('.la-card.dragging,.pj-drag-item.dragging').forEach(function(el){el.classList.remove('dragging');});
  document.querySelectorAll('.la-card.drag-over,.pj-drop-zone.drag-over').forEach(function(el){el.classList.remove('drag-over');});
});

document.addEventListener('dragover', function(e){
  e.preventDefault();
  var type = e.dataTransfer.getData('type') || (_dragPjId?'pj':_dragAreaId?'area':'');

  if(type==='pj'||_dragPjId){
    // 프로젝트를 라이프 카드 위로
    var zone = e.target.closest('.pj-drop-zone');
    var card = e.target.closest('.la-card');
    document.querySelectorAll('.pj-drop-zone.drag-over').forEach(function(el){el.classList.remove('drag-over');});
    if(zone) zone.classList.add('drag-over');
    else if(card){ var z=card.querySelector('.pj-drop-zone'); if(z) z.classList.add('drag-over'); }
  } else if(type==='area'||_dragAreaId){
    // 라이프 카드 순서 변경
    var targetCard = e.target.closest('.la-card[draggable]');
    document.querySelectorAll('.la-card.drag-over').forEach(function(el){el.classList.remove('drag-over');});
    if(targetCard && targetCard.dataset.aid !== _dragAreaId) targetCard.classList.add('drag-over');
  }
});

document.addEventListener('dragleave', function(e){
  if(!e.currentTarget.contains(e.relatedTarget)){
    document.querySelectorAll('.pj-drop-zone.drag-over,.la-card.drag-over').forEach(function(el){el.classList.remove('drag-over');});
  }
});

document.addEventListener('drop', function(e){
  e.preventDefault();
  document.querySelectorAll('.pj-drop-zone.drag-over,.la-card.drag-over').forEach(function(el){el.classList.remove('drag-over');});

  if(_dragPjId){
    // 프로젝트 → 라이프 카드 이동
    var zone = e.target.closest('.pj-drop-zone');
    var card = e.target.closest('.la-card');
    var targetAid = zone ? zone.dataset.aid : (card ? card.dataset.aid : null);
    if(targetAid){
      var pj = S.projects.find(function(p){return p.id===_dragPjId;});
      if(pj && pj.lifeAreaId !== targetAid){
        pj.lifeAreaId = targetAid;
        save(); render();
      }
    }
  } else if(_dragAreaId){
    // 라이프 카드 순서 변경
    var targetCard = e.target.closest('.la-card[draggable]');
    if(targetCard && targetCard.dataset.aid !== _dragAreaId){
      var areas = S.lifeAreas;
      var fromIdx = areas.findIndex(function(a){return a.id===_dragAreaId;});
      var toIdx   = areas.findIndex(function(a){return a.id===targetCard.dataset.aid;});
      if(fromIdx>-1 && toIdx>-1){
        var moved = areas.splice(fromIdx,1)[0];
        areas.splice(toIdx,0,moved);
        save(); render();
      }
    }
  }
  window._laDragging = false;
  _dragAreaId = null; _dragPjId = null;
});

  openMo('새 프로젝트',

    '<div class="fg"><label class="fl">이모지</label><input class="inp" id="pj-e" placeholder="📁" maxlength="2" style="width:70px"></div>'+
    '<div class="fg"><label class="fl">설명</label><input class="inp" id="pj-d" placeholder="한 줄 설명"></div>'+
    '<div class="fg"><label class="fl">🎯 프로젝트 디데이 <span style="font-size:0.8em;color:var(--t3);font-weight:400">(라이프 영역 날짜 자동 · 수정 가능)</span></label><input class="inp" type="date" id="pj-dday" value="'+(initArea&&initArea.dday?initArea.dday:'')+'" style="max-width:180px"></div>'+
    '<div class="fg"><label class="fl">🌿 라이프 영역</label><div style="display:flex;gap:6px;flex-wrap:wrap">'+aHtml+'</div></div>'+
    '<div class="fg"><label class="fl">색상 <span style="font-size:0.8em;color:var(--t3);font-weight:400">(영역 선택 시 자동)</span></label><div class="cops" id="pj-cops">'+cops+'</div></div>',

function detectPdf(input){
  const file=input.files[0];
  if(!file)return;
  // 제목 자동 입력
  const titleEl=document.getElementById('mat-title');
  if(titleEl&&!titleEl.value) titleEl.value=file.name.replace(/\.pdf$/i,'');

  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const bytes=new Uint8Array(e.target.result);
      // 바이너리를 latin1 문자열로 변환 (PDF 내부 구조 파싱용)
      let str='';
      for(let i=0;i<bytes.length;i++) str+=String.fromCharCode(bytes[i]);

      let pages=0;

      // 방법 1: /N 숫자 (Pages 딕셔너리 안)
      const m1=str.match(/\/N\s+(\d+)/);
      if(m1) pages=parseInt(m1[1]);

      // 방법 2: /Count 숫자
      if(!pages){
        const counts=[...str.matchAll(/\/Count\s+(\d+)/g)].map(m=>parseInt(m[1]));
        if(counts.length) pages=Math.max(...counts);
      }

      // 방법 3: PDF 전체에서 페이지 오브젝트 개수 세기
      if(!pages){
        const pageObjs=(str.match(/\/Type\s*\/Page[^s]/g)||[]).length;
        if(pageObjs>0) pages=pageObjs;
      }

      // 방법 4: trailer의 /Size로 추정 (부정확하지만 없는 것보다 나음)
      if(!pages){
        const trailer=str.match(/\/Size\s+(\d+)/);
        if(trailer) pages=Math.max(1,parseInt(trailer[1])-1);
      }

      const totalEl=document.getElementById('mat-total');
      if(totalEl&&pages>0){
        totalEl.value=pages;
        document.getElementById('mat-unit').value='p';
      } else if(totalEl){
        totalEl.placeholder='페이지 수 직접 입력';
      }
    }catch(err){console.log('PDF 파싱 오류',err);}
  };
  // 앞 1MB 읽기 (페이지 정보는 대부분 앞부분에 있음)
  reader.readAsArrayBuffer(file.slice(0,1024*1024));
}

function saveRz(pid){
  const task=document.getElementById('rz-t').value.trim();
  const time=document.getElementById('rz-ti').value;
  const dur=document.getElementById('rz-du').value;
  const saveAmtEl=document.getElementById('rz-save');
  const saveAmt=saveAmtEl&&saveAmtEl.value?Math.round(parseFloat(saveAmtEl.value)*10000):0;
  const until=document.getElementById('rz-until').value;
  const startEl=document.getElementById('rz-start');
  const startVal=startEl&&startEl.value?startEl.value:dateStr(new Date());
  const isMonthly=(document.getElementById('rz-mode-month')&&document.getElementById('rz-mode-month').dataset.on==='1');
  const isDaily=(document.getElementById('rz-mode-day')&&document.getElementById('rz-mode-day').dataset.on==='1');

  if(!task){alert('할 일 이름을 입력해주세요');return;}
  if(!until){alert('등록 마감일을 선택해주세요');return;}
  if(startVal>until){alert('시작일이 마감일보다 늦을 수 없어요');return;}

  let days=[], monthDays=[];
  if(isMonthly){
    monthDays=Array.from(document.querySelectorAll('#rz-mdays [data-md]')).filter(el=>el.dataset.on==='1').map(el=>el.dataset.md==='last'?'last':parseInt(el.dataset.md));
    if(!monthDays.length){alert('날짜를 선택해주세요');return;}
  } else if(!isDaily){
    days=DOWS.filter(k=>{const el=document.getElementById('rzd-'+k);return el&&el.dataset.on==='1';});
    if(!days.length){alert('요일을 선택해주세요');return;}
  }

  const p=S.projects.find(x=>x.id===pid);if(!p.routinized)p.routinized=[];
  const entry={id:gid(),task,days:isMonthly?[]:days,monthDays:isMonthly?monthDays:[],isMonthly:!!isMonthly,time,duration:dur,projectId:pid,until,startDate:startVal,saveAmount:saveAmt};
  p.routinized.push(entry);
  S.routines.push({id:entry.id,time:time||'',task,detail:p.name+' 루틴화',days:isMonthly?[]:days,monthDays:isMonthly?monthDays:[],isMonthly:!!isMonthly,isRz:true,rzProjectId:pid,saveAmount:saveAmt,startDate:startVal,until});
  S.routines.sort((a,b)=>a.time.localeCompare(b.time));

  // 캘린더 등록: 시작일 ~ 마감일까지
  const untilDate=new Date(until+'T00:00:00');
  const now=new Date(startVal+'T00:00:00'); now.setHours(0,0,0,0);
  if(isMonthly){
    // 매월: 오늘~마감일 사이에 해당 일자(말일 포함)가 있으면 등록
    const hasLast=monthDays.includes('last');
    let cur=new Date(now);
    while(cur<=untilDate){
      const lastDayOfMonth=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();
      const isLastDay=hasLast&&cur.getDate()===lastDayOfMonth;
      if(monthDays.includes(cur.getDate())||isLastDay){
        S.calEvents.push({id:gid(),date:dateStr(cur),title:(time?time+' ':'')+task,color:p.color,rzId:entry.id,projectId:pid});
      }
      cur.setDate(cur.getDate()+1);
    }
  } else {
    // 매주/매일: 오늘~마감일 사이에 선택 요일(또는 매일) 등록
    let cur=new Date(now);
    while(cur<=untilDate){
      const dow=['sun','mon','tue','wed','thu','fri','sat'][cur.getDay()];
      if(isDaily||days.includes(dow)){
        S.calEvents.push({id:gid(),date:dateStr(cur),title:(time?time+' ':'')+task,color:p.color,rzId:entry.id,projectId:pid});
      }
      cur.setDate(cur.getDate()+1);
    }
  }
  syncRzToRoutines();
  restoreCustomFont();
  save();closeMo();render();
}

  if(S.savings&&S.savings.entries){
    const prefix='rzsave-'+rm.id+'-';
    const removed=S.savings.entries.filter(e=>e.id&&e.id.indexOf(prefix)===0);
    removed.forEach(e=>{S.savings.current-=e.amount;});
    S.savings.entries=S.savings.entries.filter(e=>!(e.id&&e.id.indexOf(prefix)===0));
    if(S.savings.current<0)S.savings.current=0;
  }
  syncRzToRoutines();save();render();
}

function renderDeadlines(){
  // 날짜가 비었거나 형식이 깨진 항목은 분리 (정렬/계산 중 에러로 전체 목록이 사라지는 것을 방지)
  const validDateRe=/^\d{4}-\d{2}-\d{2}$/;
  const broken=S.deadlines.filter(d=>!d.date||!validDateRe.test(d.date));
  const valid=S.deadlines.filter(d=>d.date&&validDateRe.test(d.date));
  const sorted=[...valid].sort((a,b)=>a.date.localeCompare(b.date));
  // 지난 마감은 최근 7일 이내 + 미완료만 표시
  const over=sorted.filter(d=>{const dd=dLeft(d.date);return dd<0&&dd>=-7&&!d.done;}),up=sorted.filter(d=>dLeft(d.date)>=0&&!d.done);
  // 7일 넘게 지났는데 아직도 미완료인 마감 (방치된 항목 — 완료/삭제하기 전까진 여기서 계속 보임)
  const stale=sorted.filter(d=>{const dd=dLeft(d.date);return dd<-7&&!d.done;});
  const doneList=sorted.filter(d=>d.done&&dLeft(d.date)>=-30);
  let html='<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn bp" onclick="openDlModal()">+ 마감 추가</button></div>';
  if(broken.length>0){
    html+='<div class="card" style="margin-bottom:16px;padding:14px 18px;border-color:var(--red)">'+

      '</div>'+
      (dlStaleOpen?'<div class="dl-grid" style="margin-top:12px">'+stale.map(dlRow).join('')+'</div>':'')+
    '</div>';
  }
  if(doneList.length>0){
    var dlDoneOpen=!!window._dlDoneOpen;
    html+='<div class="card" style="margin-top:'+(stale.length>0?'16':'60')+'px;padding:14px 18px">'+

        '<div class="ct" style="margin-bottom:0;color:var(--t3)">✓ 완료한 마감 <span style="font-size:0.8em;font-weight:400">(최근 한 달 · '+doneList.length+'개)</span></div>'+
        '<span style="color:var(--t3);font-size:0.85em;transition:transform .2s;transform:rotate('+(dlDoneOpen?'180':'0')+'deg)">▾</span>'+
      '</div>'+
      (dlDoneOpen?'<div class="dl-done-scroll" style="max-height:200px;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none;margin-top:12px"><div class="dl-grid" style="opacity:0.6">'+doneList.map(dlRow).join('')+'</div></div>':'')+
    '</div>';
  }

// ═══════════ SAVINGS ═══════════
function renderSavings(){
  const s=S.savings,pct=s.goal?Math.min(100,Math.round(s.current/s.goal*100)):0,rem=Math.max(0,s.goal-s.current);
  const entries=(s.entries||[]).slice().reverse();

  // 프로젝트별 합산
  const byProject={};
  const noProject={amount:0,count:0};
  (s.entries||[]).forEach(function(e){
    if(e.projectId&&e.projectName){
      if(!byProject[e.projectId])byProject[e.projectId]={name:e.projectName,amount:0,count:0,color:''};
      byProject[e.projectId].amount+=e.amount;
      byProject[e.projectId].count++;
    } else {
      noProject.amount+=e.amount;
      noProject.count++;
    }
  });
  // 프로젝트 색상 매칭
  Object.keys(byProject).forEach(function(pid){
    const proj=(S.projects||[]).find(p=>p.id===pid);
    byProject[pid].color=proj?proj.color:'var(--accent)';
  });

  // 저축 금액이 등록된 루틴이 있는 프로젝트는 적립 0이어도 카드 표시
  (S.routines||[]).forEach(function(r){
    if(r.saveAmount>0&&r.rzProjectId){
      const proj=(S.projects||[]).find(p=>p.id===r.rzProjectId);
      if(proj&&!byProject[proj.id]){
        byProject[proj.id]={name:proj.name,amount:0,count:0,color:proj.color||'var(--accent)'};
      }
    }
  });

  // 프로젝트별 목표 횟수 및 목표 금액 계산 (저축 루틴이 시작~마감일까지 등록한 캘린더 이벤트 총 수 × 회당 금액)
  Object.keys(byProject).forEach(function(pid){
    const proj=(S.projects||[]).find(p=>p.id===pid);
    var total=0, targetAmt=0;
    if(proj&&proj.routinized){
      proj.routinized.forEach(function(rz){
        if(rz.saveAmount>0){
          var cnt=(S.calEvents||[]).filter(function(e){return e.rzId===rz.id;}).length;
          total+=cnt;
          targetAmt+=cnt*rz.saveAmount;
        }
      });
    }
    byProject[pid].totalCount=total;
    byProject[pid].targetAmount=targetAmt;
  });

  var projectCards='';
  const pids=Object.keys(byProject);
  if(pids.length>0||noProject.count>0){
    // 가장 큰 금액 기준으로 막대 비율 계산
    var allAmts=pids.map(function(pid){return byProject[pid].amount;});
    if(noProject.count>0)allAmts.push(noProject.amount);
    var maxAmt=Math.max(1,...allAmts);

    projectCards='<div style="margin-bottom:6px;display:flex;align-items:center;gap:8px;font-size:0.9286em;font-weight:500;color:var(--text)"><svg width="17" height="17" viewBox="0 0 24 24" fill="var(--accent)" style="flex-shrink:0"><path d="M2 6a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/></svg>항목별 저축 현황</div>';
    projectCards+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px">';

    function svCard(name,amount,count,color,totalCount,targetAmount){
      var hasTarget=totalCount&&totalCount>0;
      var barPct=hasTarget?Math.min(100,Math.round(count/totalCount*100)):0;
      var countLabel=hasTarget?(count+' / '+totalCount+'회 적립 ('+barPct+'%)'):(count+'회 적립');
      var targetLabel=(hasTarget&&targetAmount>0)?('목표 '+money(targetAmount)):'';
      return '<div class="card" style="margin-bottom:0;padding:16px 18px">'+
        '<div style="display:flex;align-items:center;gap:7px;margin-bottom:10px">'+
          '<div style="width:9px;height:9px;border-radius:3px;background:'+color+';flex-shrink:0"></div>'+
          '<div style="font-size:0.88em;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+name+'</div>'+
        '</div>'+
        '<div style="font-family:var(--serif);font-size:1.7em;letter-spacing:-0.5px;color:var(--text);line-height:1.1;margin-bottom:8px">'+money(amount)+'</div>'+
        '<div class="pw" style="height:8px;margin-bottom:6px"><div class="pb" style="width:'+barPct+'%;background:'+color+'"></div></div>'+
        '<div style="font-size:0.75em;color:var(--t3)">'+countLabel+'</div>'+
        (targetLabel?'<div style="font-size:0.75em;color:var(--t3);margin-top:2px">'+targetLabel+'</div>':'')+
      '</div>';
    }

    pids.forEach(function(pid){
      const g=byProject[pid];
      projectCards+=svCard(g.name,g.amount,g.count,g.color,g.totalCount,g.targetAmount);
    });
    if(noProject.count>0){
      projectCards+=svCard('기타 (직접 입력)',noProject.amount,noProject.count,'var(--t3)',0,0);
    }
    projectCards+='</div>';
  }

  // 저축 내역을 루틴(note+projectName)별로 그룹화
  var histGroups={};
  (s.entries||[]).forEach(function(e){
    var key=(e.projectName||'')+'|'+(e.note||'저축');
    if(!histGroups[key]){
      var proj=e.projectId?(S.projects||[]).find(p=>p.id===e.projectId):null;
      histGroups[key]={note:(e.note||'저축').replace(/ \(루틴 달성\)$/,''),projectName:e.projectName||'',color:proj?proj.color:'var(--t3)',total:0,items:[]};
    }
    histGroups[key].total+=e.amount;
    histGroups[key].items.push(e);
  });
  var histKeys=Object.keys(histGroups);
  var histHtml='';
  if(histKeys.length===0){
    histHtml='<div class="empty">내역이 없어요</div>';
  } else {
    histHtml='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px">';
    histKeys.forEach(function(k){
      var g=histGroups[k];
      // 최신 날짜순 정렬
      g.items.sort(function(a,b){return b.date.localeCompare(a.date);});
      var itemsHtml=g.items.map(function(e){
        return '<div style="display:flex;align-items:center;justify-content:space-between;gap:4px;padding:3px 0;font-size:0.7em">'+
          '<span style="color:var(--t3);font-family:var(--mono)">'+e.date.slice(5)+'</span>'+
          '<span style="display:flex;align-items:center;gap:3px"><span style="color:var(--green);font-family:var(--mono)">'+money(e.amount)+'</span>'+
          '<button class="bi" onclick="delSv(\''+e.id+'\')" style="font-size:0.85em;color:var(--t3);padding:0 2px">✕</button></span>'+
        '</div>';
      }).join('');
      histHtml+='<div class="card" style="margin-bottom:0;padding:13px 14px">'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+
          '<div style="width:8px;height:8px;border-radius:3px;background:'+g.color+';flex-shrink:0"></div>'+
          '<div style="font-size:0.8em;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+g.note+'</div>'+
        '</div>'+
        (g.projectName?'<div style="font-size:0.68em;color:var(--t3);margin-bottom:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+g.projectName+'</div>':'')+
        '<div style="font-family:var(--serif);font-size:1.25em;color:var(--text);margin-bottom:8px;line-height:1.1">'+money(g.total)+'</div>'+
        '<div style="border-top:1px solid var(--border);padding-top:5px">'+itemsHtml+'</div>'+
      '</div>';
    });
    histHtml+='</div>';
  }

  // 목표 D-day 한 줄 표시
  var goalBanner='';
  if(s.goalName||s.goalDate){
    var ddTxt='',dateTxt='';
    if(s.goalDate){
      var gd=new Date(s.goalDate+'T00:00:00');
      var td=new Date();td.setHours(0,0,0,0);
      var diffDays=Math.ceil((gd-td)/(1000*60*60*24));
      var yy=String(gd.getFullYear()).slice(2),mm=gd.getMonth()+1,dd=gd.getDate();
      dateTxt=yy+'년 '+mm+'월 '+dd+'일까지 ';
      ddTxt=diffDays>0?'D-'+diffDays:diffDays===0?'D-DAY':'D+'+Math.abs(diffDays);
    }
    goalBanner='<div style="text-align:center;margin-top:14px;font-size:0.95em;color:var(--accent);font-weight:600">'+
      dateTxt+(s.goalName||'')+(s.goalName?'!':'')+(ddTxt?' <span style="color:var(--t2);font-weight:500">'+ddTxt+'</span>':'')+
    '</div>';
  }

  return ''+
    '<div class="card" style="margin-bottom:16px;position:relative"><div style="position:absolute;top:16px;right:16px;display:flex;gap:8px;z-index:1"><button class="btn bp bsm" onclick="openSvAdd()">+ 금액 추가</button><button class="btn bg bsm" onclick="openSvGoal()">목표 수정</button></div><div style="text-align:center;padding:4px 0 16px"><div style="font-family:var(--serif);font-size:2.8571em;letter-spacing:-1px">'+money(s.current)+'</div><div style="font-size:1.1em;color:var(--t2);margin-top:6px">목표: '+money(s.goal)+'</div><div style="margin:20px auto;max-width:400px"><div class="pw" style="height:18px"><div class="pb" style="width:'+pct+'%;background:var(--accent)"></div></div><div class="pl" style="font-size:0.95em;margin-top:6px"><span>'+pct+'% 달성</span><span>'+money(rem)+' 남음</span></div></div>'+goalBanner+'</div></div>'+
    projectCards+
    '<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:0.9286em;font-weight:500;color:var(--text)">💳 저축 내역</div>'+histHtml;
}

let insightHeatYear=new Date().getFullYear();

function renderOverview(){

    '<div style="font-size:0.85em;color:var(--t3)">'+todLabel()+'</div>'+

      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>보고서 인쇄'+
    '</button>'+
  '</div>';

  // ── 전체 라이프 목표 배너 ──
  const lg=S.lifeGoal||{};
  if(lg.text){
    var lgDd=lg.dday?dLeft(lg.dday):null;
    var lgDdLabel=lgDd!==null?(lgDd>0?'D-'+lgDd:lgDd===0?'D-DAY':'D+'+Math.abs(lgDd)):'';
    html+='<div style="border:1.5px solid var(--accent);border-radius:14px;padding:16px 18px;margin-bottom:20px;background:var(--al)">'+
      '<div style="font-size:0.75em;color:var(--accent);font-weight:600;letter-spacing:0.05em;margin-bottom:4px">🎯 인생 목표</div>'+
      '<div style="font-size:1.1em;font-weight:700;color:var(--text);line-height:1.3">'+lg.text+'</div>'+
      (lg.sub?'<div style="font-size:0.82em;color:var(--t3);margin-top:3px">'+lg.sub+'</div>':'')+
      (lg.dday?'<div style="font-size:0.82em;color:var(--accent);font-weight:600;margin-top:6px">'+lg.dday+' · '+lgDdLabel+'</div>':'')+
    '</div>';
  }

  const areas=(S.lifeAreas||[]).filter(a=>a.name);
  const pjByArea={}, pjNoArea=[];
  (S.projects||[]).forEach(function(p){
    if(p.lifeAreaId){ if(!pjByArea[p.lifeAreaId]) pjByArea[p.lifeAreaId]=[]; pjByArea[p.lifeAreaId].push(p); }
    else pjNoArea.push(p);
